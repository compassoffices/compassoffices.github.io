<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Compass Offices — Directory Editor</title>
<style>
  html,body{margin:0}
  body{background:#f6f7f8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#16191d}
/* ============================================================
   COMPASS OFFICES — DIRECTORY EDITOR (styles)
   Everything is scoped under .co-editor, so it cannot affect
   the rest of your WordPress site and the theme cannot break it.
   ============================================================ */

.co-editor{
  --orange:#ff6600; --orange-d:#e55a00; --orange-soft:rgba(255,102,0,.10);
  --ink:#16191d; --slate:#5b6470; --faint:#8b9199;
  --line:#e7e9ee; --line-soft:#eef0f3; --surface:#fff; --page:#f6f7f8; --warn:#d04a3b;

  font-family:inherit; color:var(--ink); background:var(--page);
  font-size:15px; line-height:1.45; padding:24px 0 0; border-radius:14px;
}
.co-editor *,.co-editor *::before,.co-editor *::after{box-sizing:border-box}
.co-editor svg{display:inline-block;vertical-align:middle;max-width:none !important}
.co-editor input,.co-editor textarea,.co-editor select,.co-editor button{
  font:inherit;color:var(--ink);margin:0;box-shadow:none;line-height:1.4}
.co-editor .wrap{max-width:1180px;margin:0 auto;padding:0 18px}

/* top */
.co-editor .top{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin:0 18px}
.co-editor .top .inner{padding:16px 18px}
.co-editor .title{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.co-editor .title .dot{width:26px;height:26px;border-radius:7px;background:var(--orange)}
.co-editor .title h2{font-size:1.1rem;margin:0;font-weight:800;color:var(--ink)}
.co-editor .title small{color:var(--faint)}
.co-editor .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.co-editor .row .grow{flex:1;min-width:220px}
.co-editor .status{font-size:.82rem;color:var(--slate);margin-top:8px;min-height:1.1em}
.co-editor .status.err{color:var(--warn)} .co-editor .status.ok{color:#1f7a3d}
.co-editor details.src{margin-top:4px}
.co-editor details.src summary{cursor:pointer;color:var(--slate);font-size:.85rem;font-weight:600;list-style:none}
.co-editor details.src summary::-webkit-details-marker{display:none}
.co-editor details.src .row{margin-top:10px}
.co-editor #coe-pasteWrap{margin-top:10px}

/* language tabs */
.co-editor .tabs{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--surface)}
.co-editor .tabs button{font:inherit;font-size:.85rem;font-weight:700;color:var(--slate);background:transparent;border:0;border-left:1px solid var(--line);padding:8px 12px;cursor:pointer}
.co-editor .tabs button:first-child{border-left:0}
.co-editor .tabs button[aria-pressed=true]{background:var(--orange);color:#fff}
.co-editor .lang-note{font-size:.82rem;color:var(--slate)}
.co-editor .lang-note b{color:var(--ink)}

/* generic controls / buttons */
.co-editor .ctrl{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 11px;outline:none;width:100%;appearance:none;-webkit-appearance:none}
.co-editor .ctrl:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-soft)}
.co-editor .btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 14px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--ink)}
.co-editor .btn:hover{border-color:var(--ink)}
.co-editor .btn.primary{background:var(--orange);border-color:var(--orange);color:#fff}
.co-editor .btn.primary:hover{background:var(--orange-d);border-color:var(--orange-d)}
.co-editor .btn.ghost{color:var(--slate)}
.co-editor .btn.sm{padding:6px 10px;font-size:.82rem}
.co-editor label.file{cursor:pointer} .co-editor label.file input{display:none}

.co-editor .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:18px 0 4px}
.co-editor .toolbar .grow{flex:1;min-width:200px}
.co-editor .count{font-size:.85rem;color:var(--slate)} .co-editor .count b{color:var(--ink)} .co-editor .issues{color:var(--warn);font-weight:600}

/* card grid */
.co-editor .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin:16px 0 30px;align-items:start}
.co-editor .card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.co-editor .card.bad{border-color:#f0c9c2}
.co-editor .card-del{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--slate);cursor:pointer;line-height:1;font-size:15px;opacity:0;transition:opacity .15s;padding:0}
.co-editor .card:hover .card-del{opacity:1}
.co-editor .card-del:hover{border-color:var(--warn);color:var(--warn)}

.co-editor .ctop{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.co-editor .e{border:1px solid transparent;border-radius:8px;padding:5px 7px;background:transparent;width:100%;color:var(--ink)}
.co-editor .e:hover{border-color:var(--line)}
.co-editor .e:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-soft);background:#fff;outline:none}
.co-editor .e.miss{border-color:#f0c9c2}
.co-editor .tile{flex:0 0 auto;width:48px;height:48px;border-radius:12px;background:var(--orange);color:#fff;border:0;
  text-align:center;font-weight:800;font-size:.8rem;letter-spacing:.02em;text-transform:uppercase;padding:0;appearance:none;-webkit-appearance:none}
.co-editor .tile:focus{outline:none;box-shadow:0 0 0 3px var(--orange-soft)}
.co-editor .tile::placeholder{color:rgba(255,255,255,.7)}
.co-editor .name{font-size:1.05rem;font-weight:700}
.co-editor .market{font-size:.82rem;color:var(--slate);margin-bottom:8px}
.co-editor .line{display:flex;align-items:flex-start;gap:9px;margin-bottom:6px}
.co-editor .line>svg{width:16px !important;height:16px !important;flex:0 0 16px;color:var(--faint);margin-top:9px}
.co-editor .line .e,.co-editor .area .e,.co-editor .phone .e{font-size:.88rem}
.co-editor .emails{flex:1}
.co-editor .erow{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.co-editor .erow .e{font-size:.85rem}
.co-editor .erow .x{flex:0 0 auto;border:0;background:transparent;color:var(--faint);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:6px}
.co-editor .erow .x:hover{color:var(--warn);background:var(--line-soft)}
.co-editor .addmail{font-size:.8rem;color:var(--orange);background:transparent;border:0;cursor:pointer;font-weight:600;padding:2px}
.co-editor .addr{margin-top:8px;padding-top:10px;border-top:1px solid var(--line-soft)}
.co-editor .addr .e{font-size:.8rem;color:var(--slate);min-height:46px;resize:vertical}
.co-editor .tagrow{margin-top:8px}
.co-editor .tagrow .e{font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:var(--orange-d)}
.co-editor .cfoot{display:flex;gap:6px;margin-top:10px;align-items:center}
.co-editor .cfoot .reorder{display:flex;gap:4px} .co-editor .cfoot .spacer{flex:1}
.co-editor .badge{font-size:.62rem;font-weight:800;color:var(--orange-d);background:var(--orange-soft);border-radius:5px;padding:2px 5px}

.co-editor .add{border:2px dashed var(--line);background:#fcfcfd;border-radius:16px;min-height:160px;display:flex;align-items:center;justify-content:center;
  color:var(--slate);font-weight:700;cursor:pointer;font-size:1rem;width:100%}
.co-editor .add:hover{border-color:var(--orange);color:var(--orange-d);background:var(--orange-soft)}

/* sticky bottom actions */
.co-editor .actions{position:sticky;bottom:0;z-index:5;background:var(--surface);border-top:1px solid var(--line);border-radius:0 0 14px 14px;margin-top:8px}
.co-editor .actions .inner{display:flex;gap:10px;align-items:center;padding:12px 18px;flex-wrap:wrap;max-width:1180px;margin:0 auto}
.co-editor .actions .spacer{flex:1}
.co-editor #coe-preview{display:none;background:#0f1216;border-radius:12px;margin:0 18px}
.co-editor #coe-preview.show{display:block}
.co-editor #coe-preview pre{margin:0;padding:16px;max-height:320px;overflow:auto;font:12px/1.5 ui-monospace,Menlo,Consolas,monospace;color:#cdd3da;white-space:pre}

</style>
</head>
<body>
<!-- COMPASS OFFICES — DIRECTORY EDITOR (markup) -->
<div class="co-editor">

  <div class="top">
    <div class="inner">
      <div class="title"><span class="dot"></span><h2>Directory Editor</h2><small>edit the cards, then download the JSON</small></div>
      <div class="row">
        <div class="tabs" id="coe-tabs" role="group" aria-label="Content language"></div>
        <span class="lang-note" id="coe-langNote"></span>
      </div>
      <details class="src">
        <summary>Data source &amp; loading options</summary>
        <div class="row">
          <input type="url" id="coe-srcUrl" class="ctrl grow" value="directory-data.json" aria-label="JSON URL">
          <button class="btn" id="coe-btnLoadUrl" type="button">Load from URL</button>
          <label class="btn file">Import .json file<input type="file" id="coe-fileIn" accept=".json,application/json"></label>
          <button class="btn ghost" id="coe-btnPaste" type="button">Paste JSON…</button>
          <button class="btn ghost" id="coe-btnRestore" type="button">Restore last session</button>
        </div>
        <div id="coe-pasteWrap" style="display:none">
          <textarea id="coe-pasteBox" class="ctrl" rows="5" placeholder="Paste directory-data.json contents, then Load pasted"></textarea>
          <div style="margin-top:8px"><button class="btn" id="coe-btnLoadPaste" type="button">Load pasted</button></div>
        </div>
      </details>
      <div class="status" id="coe-status"></div>
    </div>
  </div>

  <div class="wrap">
    <div class="toolbar">
      <input type="text" id="coe-search" class="ctrl grow" placeholder="Filter by name, code, area, or market…">
      <button class="btn primary" id="coe-btnAdd" type="button">+ Add office</button>
      <span class="count" id="coe-count"></span>
    </div>
    <div class="grid" id="coe-grid"></div>
  </div>

  <datalist id="coe-countries"></datalist>

  <div id="coe-preview"><pre id="coe-previewPre"></pre></div>

  <div class="actions">
    <div class="inner">
      <button class="btn ghost" id="coe-btnPreview" type="button">Show JSON</button>
      <button class="btn ghost" id="coe-btnClearDraft" type="button">Clear local draft</button>
      <div class="spacer"></div>
      <button class="btn" id="coe-btnCopy" type="button">Copy JSON</button>
      <button class="btn primary" id="coe-btnDownload" type="button">Download directory-data.json</button>
    </div>
  </div>

</div>

<script>
/* ============================================================
   COMPASS OFFICES — DIRECTORY EDITOR (script)
   Self-contained: all logic in one closure, one global
   (window.CO_EDITOR). Operates only inside .co-editor, so it
   does not interfere with the rest of the site's scripts.
   ============================================================ */
(function(){
  "use strict";
  var root=document.querySelector('.co-editor'); if(!root) return;
  var $=function(s){return root.querySelector(s);};

  var LANGS=[{k:'en',l:'English'},{k:'tc',l:'繁體 TC'},{k:'sc',l:'简体 SC'},{k:'jp',l:'日本語 JP'},{k:'vn',l:'Tiếng Việt VN'}];
  var TRANS=['tc','sc','jp','vn'];
  var LFIELDS=['name','area','address','tag'];
  var COUNTRIES=['Hong Kong','Singapore','Japan','Vietnam','Malaysia','Philippines','Australia'];
  var DRAFT='co-dir-draft';
  var ICON={
    pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.2-7-11a7 7 0 0 1 14 0c0 4.8-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>',
    mail:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>',
    phone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L20 13l2 5v.5a2 2 0 0 1-2 2A16 16 0 0 1 4 6 2 2 0 0 1 5 4z"/></svg>'
  };

  var state={records:[],lang:'en',search:'',uid:1};
  var grid=$('#coe-grid'), status=$('#coe-status');

  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function attr(s){return esc(s).replace(/"/g,'&quot;');}

  function normalize(r){
    r=r||{};
    var o={_uid:state.uid++,code:r.code||'',country:r.country||'',phone:r.phone||'',
      emails:Array.isArray(r.emails)?r.emails.slice():(r.emails?[r.emails]:[]),
      name:r.name||'',area:r.area||'',address:r.address||'',tag:r.tag||''};
    TRANS.forEach(function(lg){LFIELDS.forEach(function(f){o[f+'_'+lg]=r[f+'_'+lg]||'';});});
    return o;
  }
  function emptyRecord(){return normalize({emails:['']});}
  function findRec(uid){uid=+uid;return state.records.filter(function(r){return r._uid===uid;})[0];}
  function indexOfUid(uid){uid=+uid;for(var i=0;i<state.records.length;i++)if(state.records[i]._uid===uid)return i;return -1;}
  function recBad(r){return !(r.name||'').trim()||!(r.country||'').trim();}

  function buildExport(){
    return state.records.map(function(r){
      var o={name:(r.name||'').trim(),code:(r.code||'').trim(),country:(r.country||'').trim(),
        area:(r.area||'').trim(),address:(r.address||'').trim(),phone:(r.phone||'').trim(),
        emails:(r.emails||[]).map(function(s){return (s||'').trim();}).filter(Boolean),tag:(r.tag||'').trim()};
      TRANS.forEach(function(lg){LFIELDS.forEach(function(f){var v=(r[f+'_'+lg]||'').trim();if(v)o[f+'_'+lg]=v;});});
      return o;
    });
  }
  function jsonText(){return JSON.stringify(buildExport(),null,2);}
  function persist(){try{localStorage.setItem(DRAFT,JSON.stringify(buildExport()));}catch(e){}}
  function setStatus(t,k){status.textContent=t;status.className='status'+(k?(' '+k):'');}

  function loadRecords(arr,msg,kind,skipPersist){
    if(!Array.isArray(arr))throw new Error('JSON must be an array of offices');
    state.records=arr.map(normalize); if(!skipPersist) persist(); render();
    setStatus(msg||('Loaded '+state.records.length+' offices.'),kind||'ok');
  }

  function key(f){return state.lang==='en'?f:(f+'_'+state.lang);}
  function langBadges(r){
    return TRANS.filter(function(lg){return LFIELDS.some(function(f){return (r[f+'_'+lg]||'').trim();});})
      .map(function(lg){return '<span class="badge">'+lg.toUpperCase()+'</span>';}).join(' ');
  }
  function ph(f,r){
    if(state.lang==='en') return {name:'Building name',area:'Area / district',address:'Full address',tag:'Tag (optional)'}[f];
    var base=(r[f]||'').trim();
    return base?('EN: '+base):('Translate '+f+' to '+state.lang.toUpperCase());
  }
  function emailsHTML(r){
    var rows=(r.emails.length?r.emails:['']).map(function(e,i){
      return '<div class="erow"><input class="e" type="email" data-uid="'+r._uid+'" data-k="email" data-i="'+i+'" value="'+attr(e)+'" placeholder="name@compassoffices.com">'
        +'<button class="x" data-act="rmemail" data-uid="'+r._uid+'" data-i="'+i+'" title="Remove">&times;</button></div>';
    }).join('');
    return '<div class="emails">'+rows+'<button class="addmail" data-act="addemail" data-uid="'+r._uid+'">+ add email</button></div>';
  }

  function cardHTML(r){
    var bad=recBad(r);
    var nameK=key('name'), areaK=key('area'), addrK=key('address'), tagK=key('tag');
    return '<article class="card'+(bad?' bad':'')+'" data-uid="'+r._uid+'">'
      +'<button class="card-del" data-act="del" data-uid="'+r._uid+'" title="Delete office">&times;</button>'
      +'<div class="ctop">'
        +'<input class="tile" data-uid="'+r._uid+'" data-k="code" maxlength="6" value="'+attr(r.code)+'" placeholder="2LG" aria-label="Code">'
        +'<input class="e name'+(state.lang==="en"&&!r.name?" miss":"")+'" data-uid="'+r._uid+'" data-k="'+nameK+'" value="'+attr(r[nameK])+'" placeholder="'+attr(ph("name",r))+'" aria-label="Name">'
      +'</div>'
      +'<input class="e market'+(!r.country?" miss":"")+'" list="coe-countries" data-uid="'+r._uid+'" data-k="country" value="'+attr(r.country)+'" placeholder="Market — e.g. Hong Kong" aria-label="Market">'
      +'<div class="line area">'+ICON.pin+'<input class="e" data-uid="'+r._uid+'" data-k="'+areaK+'" value="'+attr(r[areaK])+'" placeholder="'+attr(ph("area",r))+'" aria-label="Area"></div>'
      +'<div class="line">'+ICON.mail+emailsHTML(r)+'</div>'
      +'<div class="line phone">'+ICON.phone+'<input class="e" type="tel" data-uid="'+r._uid+'" data-k="phone" value="'+attr(r.phone)+'" placeholder="+852 0000 0000" aria-label="Phone"></div>'
      +'<div class="addr"><textarea class="e" data-uid="'+r._uid+'" data-k="'+addrK+'" placeholder="'+attr(ph("address",r))+'" aria-label="Address">'+esc(r[addrK])+'</textarea></div>'
      +'<div class="tagrow"><input class="e" data-uid="'+r._uid+'" data-k="'+tagK+'" value="'+attr(r[tagK])+'" placeholder="'+attr(ph("tag",r))+'" aria-label="Tag"></div>'
      +'<div class="cfoot"><div class="reorder"><button class="btn sm" data-act="up" data-uid="'+r._uid+'" title="Move up">&uarr;</button>'
        +'<button class="btn sm" data-act="down" data-uid="'+r._uid+'" title="Move down">&darr;</button></div>'
        +'<div class="spacer"></div>'+langBadges(r)+'</div>'
    +'</article>';
  }

  function filtered(){
    var q=state.search.trim().toLowerCase(); if(!q)return state.records;
    return state.records.filter(function(r){
      var hay=[r.name,r.code,r.country,r.area].concat(TRANS.map(function(lg){return r['name_'+lg];})).join(' ').toLowerCase();
      return hay.indexOf(q)!==-1;
    });
  }
  function renderTabs(){ $('#coe-tabs').innerHTML=LANGS.map(function(x){return '<button data-lang="'+x.k+'" aria-pressed="'+(x.k===state.lang)+'">'+esc(x.l)+'</button>';}).join(''); }
  function renderNote(){ $('#coe-langNote').innerHTML = state.lang==='en' ? 'Editing <b>English</b> (the base text every page falls back to).' : ('Editing <b>'+esc(LANGS.filter(function(x){return x.k===state.lang;})[0].l)+'</b> — blank = uses English. Code, market, phone & email are shared.'); }
  function renderCount(){ var bad=state.records.filter(recBad).length; $('#coe-count').innerHTML='<b>'+state.records.length+'</b> offices'+(bad?(' &middot; <span class="issues">'+bad+' need name/market</span>'):''); }
  function updatePreview(){ $('#coe-previewPre').textContent=jsonText(); }
  function render(){
    renderTabs(); renderNote();
    grid.innerHTML=filtered().map(cardHTML).join('')+'<button class="add" data-act="add" type="button">+ Add office</button>';
    renderCount(); updatePreview();
  }

  grid.addEventListener('input',function(e){
    var t=e.target,uid=t.getAttribute('data-uid'); if(!uid)return;
    var r=findRec(uid); if(!r)return; var k=t.getAttribute('data-k');
    if(k==='email'){ r.emails[+t.getAttribute('data-i')]=t.value; }
    else { r[k]=t.value; if(t.classList&&t.classList.contains('miss')&&t.value.trim())t.classList.remove('miss'); }
    persist(); updatePreview();
  });
  grid.addEventListener('click',function(e){
    var b=e.target.closest('[data-act]'); if(!b)return;
    var act=b.getAttribute('data-act');
    if(act==='add'){ var rec=emptyRecord(); state.records.push(rec); state.search=''; $('#coe-search').value=''; render(); persist();
      var el=grid.querySelector('.card[data-uid="'+rec._uid+'"] .name'); if(el){if(el.scrollIntoView)el.scrollIntoView({behavior:'smooth',block:'center'}); el.focus();} return; }
    var uid=b.getAttribute('data-uid'), r=findRec(uid), i=indexOfUid(uid); if(!r)return;
    if(act==='addemail'){ r.emails.push(''); render(); var n=grid.querySelectorAll('.card[data-uid="'+uid+'"] .erow .e'); if(n.length)n[n.length-1].focus(); }
    else if(act==='rmemail'){ r.emails.splice(+b.getAttribute('data-i'),1); render(); persist(); }
    else if(act==='up'){ if(i>0){var a=state.records[i-1];state.records[i-1]=state.records[i];state.records[i]=a;} render(); persist(); }
    else if(act==='down'){ if(i<state.records.length-1){var c=state.records[i+1];state.records[i+1]=state.records[i];state.records[i]=c;} render(); persist(); }
    else if(act==='del'){ if(confirm('Delete '+((r.name||'this office'))+'?')){ state.records.splice(i,1); render(); persist(); } }
  });
  $('#coe-tabs').addEventListener('click',function(e){ var b=e.target.closest('button[data-lang]'); if(!b)return; state.lang=b.getAttribute('data-lang'); render(); });
  $('#coe-search').addEventListener('input',function(e){ state.search=e.target.value; render(); });
  $('#coe-btnAdd').addEventListener('click',function(){ grid.querySelector('.add').click(); });

  $('#coe-btnLoadUrl').addEventListener('click',function(){
    var url=$('#coe-srcUrl').value.trim(); if(!url){setStatus('Enter a URL first.','err');return;}
    if(typeof fetch!=='function'){setStatus('Use “Import .json file” instead.','err');return;}
    setStatus('Loading…');
    fetch(url,{cache:'no-store'}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(d){loadRecords(d,'Loaded '+d.length+' offices from the URL.','ok');})
      .catch(function(err){setStatus('Could not load from URL ('+err.message+'). Use “Import .json file” instead.','err');});
  });
  $('#coe-fileIn').addEventListener('change',function(e){ var f=e.target.files[0]; if(!f)return; var rd=new FileReader();
    rd.onload=function(){try{loadRecords(JSON.parse(rd.result),'Imported '+f.name+'.','ok');}catch(err){setStatus('Not valid JSON: '+err.message,'err');}}; rd.readAsText(f); e.target.value=''; });
  $('#coe-btnPaste').addEventListener('click',function(){ var w=$('#coe-pasteWrap'); w.style.display=w.style.display==='none'?'block':'none'; });
  $('#coe-btnLoadPaste').addEventListener('click',function(){ try{loadRecords(JSON.parse($('#coe-pasteBox').value),'Loaded pasted JSON.','ok');$('#coe-pasteWrap').style.display='none';}catch(err){setStatus('Pasted text is not valid JSON: '+err.message,'err');} });

  $('#coe-btnPreview').addEventListener('click',function(){ var p=$('#coe-preview'); var on=p.classList.toggle('show'); this.textContent=on?'Hide JSON':'Show JSON'; if(on)updatePreview(); });
  $('#coe-btnClearDraft').addEventListener('click',function(){ try{localStorage.removeItem(DRAFT);}catch(e){} setStatus('Cleared the auto-saved draft in this browser.','ok'); });
  $('#coe-btnDownload').addEventListener('click',function(){
    var bad=state.records.filter(recBad).length;
    if(bad&&!confirm(bad+' office(s) are missing a name or market. Download anyway?'))return;
    var blob=new Blob([jsonText()],{type:'application/json'}); var a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='directory-data.json'; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
    setStatus('Downloaded directory-data.json — upload it to the website, and replace directory-data.json in your repo so the tool stays current.','ok');
  });
  $('#coe-btnCopy').addEventListener('click',function(){
    var txt=jsonText(), done=function(){setStatus('JSON copied to clipboard.','ok');};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done,fb);}else{fb();}
    function fb(){var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');done();}catch(e){$('#coe-preview').classList.add('show');updatePreview();setStatus('Press Ctrl/Cmd+C to copy from the panel.','err');}ta.remove();}
  });

  // init
  $('#coe-countries').innerHTML=COUNTRIES.map(function(c){return '<option value="'+attr(c)+'">';}).join('');
  renderTabs(); renderNote();

  function loadDraft(announceIfNone){
    var draft=null; try{draft=localStorage.getItem(DRAFT);}catch(e){}
    if(draft){ try{ state.records=JSON.parse(draft).map(normalize); render(); setStatus('Restored your last saved edits from this browser. (Not yet uploaded — Download when ready.)','ok'); return true; }catch(e){} }
    if(announceIfNone) setStatus('No saved draft found in this browser.','');
    return false;
  }
  function openSrc(){ var s=root.querySelector('details.src'); if(s)s.open=true; }
  $('#coe-btnRestore').addEventListener('click',function(){ loadDraft(true); });

  (function start(){
    var url=$('#coe-srcUrl').value.trim();
    if(typeof fetch!=='function'){ if(!loadDraft(false)){ openSrc(); state.records=[emptyRecord()]; render(); setStatus('Import the live directory-data.json above, or start adding offices.',''); } return; }
    setStatus('Loading directory-data.json…');
    fetch(url,{cache:'no-store'}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(d){ loadRecords(d,'Loaded '+d.length+' offices. (Tip: “Restore last session” brings back unsaved edits from before.)','ok',true); })
      .catch(function(){ if(!loadDraft(false)){ openSrc(); state.records=[]; render(); setStatus('Couldn’t load the data automatically. Click “Import .json file” above and choose your directory-data.json.',''); } });
  })();

  window.CO_EDITOR={state:state,loadRecords:loadRecords,buildExport:buildExport,getJSON:jsonText};
})();

</script>
</body>
</html>

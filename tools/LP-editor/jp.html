<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Compass JP Landing Page — Content Editor</title>
<style>
  :root{--o:#FF6600;--ink:#1a1a1a;--mut:#666;--line:#e3e3e6;--bg:#f4f5f7;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;color:var(--ink);background:#fff;}
  .ed-top{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:12px 18px;background:#1c1c1c;color:#fff;}
  .ed-top h1{font-size:1rem;margin:0;font-weight:700;}
  .ed-top .sp{flex:1;}
  .ed-btn{border:none;border-radius:9px;padding:10px 14px;font-weight:700;font-size:.86rem;cursor:pointer;background:var(--o);color:#fff;}
  .ed-btn.alt{background:#333;color:#fff;}
  .ed-btn:hover{filter:brightness(1.06);}
  .ed-wrap{display:grid;grid-template-columns:minmax(360px,440px) 1fr;height:calc(100vh - 58px);}
  .ed-panel{overflow:auto;border-right:1px solid var(--line);padding:16px 16px 80px;}
  .ed-prev{background:var(--bg);overflow:hidden;}
  .ed-prev iframe{width:100%;height:100%;border:0;background:#fff;}
  details.ed-sec{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;background:#fff;}
  details.ed-sec>summary{cursor:pointer;list-style:none;padding:12px 14px;font-weight:700;background:#fafafa;display:flex;align-items:center;gap:8px;}
  details.ed-sec>summary::-webkit-details-marker{display:none;}
  details.ed-sec>summary .chev{margin-left:auto;color:#999;transition:transform .2s;}
  details.ed-sec[open]>summary .chev{transform:rotate(90deg);}
  .ed-body{padding:12px 14px;}
  .ed-f{margin-bottom:10px;}
  .ed-f label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);font-weight:700;margin-bottom:4px;}
  .ed-f input,.ed-f textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:.9rem;font-family:inherit;}
  .ed-f textarea{min-height:60px;resize:vertical;}
  .ed-f input:focus,.ed-f textarea:focus{outline:none;border-color:var(--o);box-shadow:0 0 0 3px rgba(255,102,0,.12);}
  .ed-item{border:1px dashed var(--line);border-radius:10px;padding:10px;margin-bottom:10px;background:#fcfcfd;}
  .ed-item-h{display:flex;gap:6px;align-items:center;margin-bottom:8px;}
  .ed-item-h .t{font-weight:700;font-size:.82rem;color:var(--mut);}
  .ed-mini{margin-left:auto;display:flex;gap:4px;}
  .ed-mini button{border:1px solid var(--line);background:#fff;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:.85rem;line-height:1;}
  .ed-mini button:hover{border-color:var(--o);color:var(--o);}
  .ed-add{border:1px dashed var(--o);color:var(--o);background:#fff6ef;border-radius:9px;padding:8px;width:100%;font-weight:700;cursor:pointer;}
  .ed-toggle{display:flex;align-items:center;gap:8px;font-size:.85rem;font-weight:600;margin-bottom:10px;}
  .ed-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .ed-note{font-size:.78rem;color:var(--mut);background:#fff8f1;border:1px solid #ffe2cc;border-radius:8px;padding:8px 10px;margin-bottom:12px;}
  .ed-sub{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin:4px 0 6px;}
  .ed-toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1c1c1c;color:#fff;padding:11px 18px;border-radius:10px;font-weight:600;font-size:.9rem;opacity:0;transition:opacity .25s;pointer-events:none;z-index:40;}
  .ed-toast.show{opacity:1;}
  @media(max-width:900px){.ed-wrap{grid-template-columns:1fr;height:auto;}.ed-prev{height:70vh;}.ed-panel{height:auto;}}
  .ed-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:30;padding:20px;}
  .ed-modal.show{display:flex;}
  .ed-modal-box{background:#fff;border-radius:14px;max-width:840px;width:100%;max-height:86vh;display:flex;flex-direction:column;overflow:hidden;}
  .ed-modal-h{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .ed-modal-h h2{margin:0;font-size:1rem;}
  .ed-modal-h .sp{flex:1;}
  .ed-modal textarea{flex:1;border:0;padding:14px 16px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.8rem;resize:none;min-height:340px;}
  .ed-x{border:none;background:#eee;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:1rem;}
</style>
</head>
<body>
  <div class="ed-top">
    <h1>Compass JP Landing Page — Content Editor</h1>
    <div class="sp"></div>
    <button class="ed-btn alt" onclick="saveJSON()">Save JSON</button>
    <button class="ed-btn alt" onclick="document.getElementById('importFile').click()">Import JSON</button>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importJSON(event)">
    <button class="ed-btn alt" onclick="translateAll('en|ja','Japanese',this)">&#8594; 日本語</button>
    <button class="ed-btn alt" onclick="translateAll('ja|en','English',this)">&#8594; English</button>
    <button class="ed-btn alt" onclick="resetAll()">Reset</button>
    <button class="ed-btn" onclick="openExport()">Copy HTML for WordPress</button>
  </div>
  <div class="ed-wrap">
    <div class="ed-panel" id="panel"></div>
    <div class="ed-prev"><iframe id="prev"></iframe></div>
  </div>

  <div class="ed-modal" id="modal">
    <div class="ed-modal-box">
      <div class="ed-modal-h">
        <h2>Copy for your WordPress block</h2>
        <div class="sp"></div>
        <label style="display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:600;">
          <input type="checkbox" id="htmlOnlyChk" onchange="onHtmlOnlyToggle()"> HTML only (3-tab block)
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:600;">
          <input type="checkbox" id="inlineChk" onchange="onInlineToggle()"> Bundle CSS &amp; JS inline
        </label>
        <button class="ed-btn" onclick="copyExport()">Copy</button>
        <button class="ed-x" onclick="closeExport()">✕</button>
      </div>
      <textarea id="exportText" readonly spellcheck="false"></textarea>
    </div>
  </div>

  <div class="ed-toast" id="toast"></div>

<script>
const CSS = "/* ============================================================\n   COMPASS OFFICES x ouno - Yaesu / Tokyo | JP Landing Page\n   All rules namespaced under .co-lp-jp. No font-family declared\n   (brand font inherited). Compass brand: orange #FF6600, rounded\n   frames, charcoal closing. Japanese-tuned line-height.\n   ============================================================ */\n\n.co-lp-jp{\n  --co-orange:#FF6600;\n  --co-orange-dark:#E55A00;\n  --co-tint:#FFF3EA;\n  --co-ink:#1A1A1A;\n  --co-slate:#5C5C5C;\n  --co-paper:#FFFFFF;\n  --co-mist:#F4F5F7;\n  --co-dark:#1C1C1C;\n  --co-line:rgba(0,0,0,.09);\n  --co-radius:16px;\n  --co-radius-lg:22px;\n  --co-shadow:0 1px 2px rgba(0,0,0,.05);\n  --co-shadow-md:0 10px 30px rgba(0,0,0,.08);\n  --co-shadow-lift:0 22px 50px rgba(0,0,0,.16);\n  --co-max:1180px;\n  color:var(--co-ink);\n  line-height:1.85;            /* JP reads better with more leading */\n}\n.co-lp-jp *,.co-lp-jp *::before,.co-lp-jp *::after{box-sizing:border-box;}\n.co-lp-jp p{margin:0 0 1rem;color:var(--co-slate);font-size:1.02rem;}\n.co-lp-jp img{max-width:100%;display:block;}\n.co-lp-jp a{color:inherit;}\n.co-lp-jp .cojp-wrap{max-width:var(--co-max);margin:0 auto;padding:0 24px;}\n.co-lp-jp .cojp-section{padding:64px 0;}\n.co-lp-jp .cojp-center{text-align:center;}\n\n.co-lp-jp .cojp-eyebrow{\n  display:inline-block;font-size:.8rem;letter-spacing:.14em;\n  font-weight:700;color:var(--co-orange);margin-bottom:12px;\n}\n.co-lp-jp .cojp-h2{\n  font-size:clamp(1.5rem,3.2vw,2.2rem);line-height:1.4;\n  font-weight:800;margin:0 0 14px;color:var(--co-ink);\n}\n.co-lp-jp .cojp-h2 .em{color:var(--co-orange);}\n.co-lp-jp .cojp-head{max-width:760px;margin:0 auto 44px;}\n.co-lp-jp .cojp-head p{font-size:1.04rem;}\n\n/* ---- Buttons --------------------------------------------- */\n.co-lp-jp .cojp-btn{\n  display:inline-flex;align-items:center;justify-content:center;gap:8px;\n  background:var(--co-orange);color:#fff;text-decoration:none;\n  font-weight:700;font-size:1.04rem;padding:16px 38px;border-radius:999px;\n  cursor:pointer;border:2px solid var(--co-orange);transition:all .25s ease;\n}\n.co-lp-jp .cojp-btn:hover{background:var(--co-orange-dark);border-color:var(--co-orange-dark);\n  color:#fff;transform:translateY(-2px);box-shadow:0 12px 24px rgba(255,102,0,.28);}\n.co-lp-jp .cojp-btn-ghost{background:#fff;color:var(--co-orange);}\n.co-lp-jp .cojp-btn-ghost:hover{background:var(--co-tint);color:var(--co-orange-dark);}\n.co-lp-jp .cojp-cta-row{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}\n\n/* ---- Hero ------------------------------------------------- */\n.co-lp-jp .cojp-hero{\n  background:linear-gradient(180deg,#fff 0%, #FFF8F2 100%);\n  padding:0 0 0;\n}\n.co-lp-jp .cojp-hero-grid{\n  display:grid;grid-template-columns:1.04fr .96fr;gap:0;align-items:stretch;\n}\n.co-lp-jp .cojp-hero-copy{\n  background:var(--co-mist);padding:clamp(34px,4vw,58px);\n  display:flex;flex-direction:column;justify-content:center;\n}\n.co-lp-jp .cojp-hero-pre{font-size:clamp(1.25rem,2.4vw,1.7rem);font-weight:800;margin:0 0 6px;color:var(--co-ink);}\n.co-lp-jp .cojp-hero-h1{font-size:clamp(2rem,4.6vw,3.1rem);font-weight:900;line-height:1.18;margin:0 0 14px;color:var(--co-ink);}\n.co-lp-jp .cojp-hero-h1 .em{color:var(--co-orange);}\n.co-lp-jp .cojp-hero-sub{font-size:clamp(1rem,1.7vw,1.18rem);font-weight:700;color:var(--co-ink);margin:0 0 26px;}\n.co-lp-jp .cojp-hero-feat{display:flex;flex-wrap:wrap;gap:8px 22px;margin:0 0 30px;padding:0;list-style:none;}\n.co-lp-jp .cojp-hero-feat li{font-weight:700;color:var(--co-ink);display:flex;align-items:center;gap:8px;font-size:1rem;}\n.co-lp-jp .cojp-hero-feat li::before{content:\"\";width:9px;height:9px;border-radius:50%;background:var(--co-orange);flex:0 0 auto;}\n.co-lp-jp .cojp-hero-img{position:relative;min-height:340px;overflow:hidden;background:#dfe3e8;}\n.co-lp-jp .cojp-hero-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}\n.co-lp-jp .cojp-hero-logo{position:absolute;top:22px;right:26px;z-index:2;display:flex;align-items:center;gap:8px;\n  color:#fff;font-weight:800;font-size:1.2rem;letter-spacing:.04em;text-shadow:0 1px 4px rgba(0,0,0,.3);}\n\n/* trust badges (laurel) */\n.co-lp-jp .cojp-badges{display:flex;gap:30px;flex-wrap:wrap;}\n.co-lp-jp .cojp-badge{display:flex;align-items:center;gap:6px;color:var(--co-ink);}\n.co-lp-jp .cojp-badge svg{width:30px;height:62px;flex:0 0 auto;color:var(--co-orange);}\n.co-lp-jp .cojp-badge-in{text-align:center;padding:0 2px;}\n.co-lp-jp .cojp-badge-l{font-size:.74rem;color:var(--co-slate);font-weight:600;margin-bottom:2px;}\n.co-lp-jp .cojp-badge-n{font-size:1.7rem;font-weight:900;color:var(--co-ink);line-height:1;}\n.co-lp-jp .cojp-badge-n .u{font-size:.9rem;font-weight:700;margin-left:1px;}\n\n/* hero CTA band */\n.co-lp-jp .cojp-herobar{background:var(--co-dark);}\n.co-lp-jp .cojp-herobar-in{\n  max-width:var(--co-max);margin:0 auto;padding:20px 24px;\n  display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;\n}\n.co-lp-jp .cojp-herobar-tag{color:#fff;font-weight:800;font-size:clamp(1.05rem,2vw,1.5rem);}\n.co-lp-jp .cojp-herobar .cojp-cta-row{justify-content:flex-end;}\n.co-lp-jp .cojp-herobar .cojp-btn{padding:13px 28px;font-size:.98rem;}\n\n/* ---- Pain points ----------------------------------------- */\n.co-lp-jp .cojp-checks{\n  display:grid;grid-template-columns:1fr 1fr;gap:18px 40px;max-width:920px;margin:0 auto;\n}\n.co-lp-jp .cojp-check{display:flex;align-items:flex-start;gap:12px;font-size:1.06rem;font-weight:600;color:var(--co-ink);}\n.co-lp-jp .cojp-check svg{width:24px;height:24px;flex:0 0 auto;color:var(--co-orange);margin-top:2px;}\n\n.co-lp-jp .cojp-arrow{display:flex;justify-content:center;margin:34px 0 30px;}\n.co-lp-jp .cojp-arrow svg{width:54px;height:30px;color:var(--co-orange);opacity:.9;}\n\n.co-lp-jp .cojp-solve{text-align:center;max-width:820px;margin:0 auto;}\n.co-lp-jp .cojp-solve h3{font-size:clamp(1.4rem,3vw,2rem);font-weight:900;margin:0 0 18px;color:var(--co-ink);}\n.co-lp-jp .cojp-solve h3 .em{color:var(--co-orange);}\n.co-lp-jp .cojp-solve .line{display:inline-block;border-bottom:2px solid var(--co-orange);padding-bottom:4px;font-weight:700;color:var(--co-ink);margin-bottom:8px;}\n.co-lp-jp .cojp-solve p{font-size:1.04rem;}\n\n/* ---- Numbered cards (benefits / why) --------------------- */\n.co-lp-jp .cojp-numgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px;margin-top:46px;text-align:left;}\n.co-lp-jp .cojp-numcard{\n  background:var(--co-paper);border:1px solid var(--co-line);border-radius:var(--co-radius);\n  overflow:hidden;box-shadow:var(--co-shadow);transition:transform .3s ease, box-shadow .3s ease;display:flex;flex-direction:column;\n}\n.co-lp-jp .cojp-numcard:hover{transform:translateY(-5px);box-shadow:var(--co-shadow-md);}\n.co-lp-jp .cojp-numcard-img{aspect-ratio:16/10;background:var(--co-mist);overflow:hidden;}\n.co-lp-jp .cojp-numcard-img img{width:100%;height:100%;object-fit:cover;}\n.co-lp-jp .cojp-numcard-body{padding:22px 24px 26px;}\n.co-lp-jp .cojp-numcard-head{display:flex;align-items:baseline;gap:12px;margin-bottom:10px;}\n.co-lp-jp .cojp-num{font-size:2.4rem;font-weight:900;color:var(--co-orange);line-height:.9;flex:0 0 auto;}\n.co-lp-jp .cojp-numcard-head h4{font-size:1.14rem;font-weight:800;margin:0;color:var(--co-ink);}\n.co-lp-jp .cojp-numcard-body p{margin:0;font-size:.97rem;}\n\n/* ---- Office-environment feature cards (with \u6ce8\u76ee tag) ----- */\n.co-lp-jp .cojp-envgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:42px;text-align:left;}\n.co-lp-jp .cojp-env{\n  position:relative;background:var(--co-paper);border:1px solid var(--co-line);border-radius:var(--co-radius);\n  overflow:hidden;box-shadow:var(--co-shadow);\n}\n.co-lp-jp .cojp-env-img{aspect-ratio:16/7;background:var(--co-mist);overflow:hidden;}\n.co-lp-jp .cojp-env-img img{width:100%;height:100%;object-fit:cover;}\n.co-lp-jp function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return esc(s).replace(/"/g,'&quot;');}
function img(src){return src?('<img src="'+escAttr(src)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">'):'';}
function cta(label,href,ghost){return '<a class="cojp-btn'+(ghost?' cojp-btn-ghost':'')+'" href="'+escAttr(href)+'">'+esc(label)+'</a>';}

function previewDoc(){
  return '<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;}</style><style>'+CSS+
    '</style><style>.co-lp-jp .cojp-reveal{opacity:1!important;transform:none!important;animation:none!important;}</style></head><body>'+
    gen('preview')+'<script>'+JS+'<'+'/script></body></html>';
}
function refresh(){ document.getElementById('prev').srcdoc = previewDoc(); }

function exportHTML(){
  var body=gen('export');
  if(htmlOnly){
    return '<!-- Compass x ouno Yaesu (JP) - HTML only. Paste into your HTML tab.\n     CSS goes in your CSS tab, JS in your JS tab (those stay the same for every page). -->\n\n'+body+'\n';
  }
  var note='<!-- Compass x ouno Yaesu (JP) - paste into ONE WordPress block.\n';
  if(inlineMode){
    return note+'     Self-contained: CSS & JS included below, no external files. Purge cache after saving. -->\n\n'+
      '<style>\n'+CSS+'\n</style>\n\n'+body+'\n\n<script data-cfasync="false" data-no-optimize="1" data-no-minify="1">\n'+JS+'\n<'+'/script>\n';
  }
  var link='<link rel="stylesheet" href="'+S.css_url+'">';
  var script='<script data-cfasync="false" data-no-optimize="1" data-no-minify="1" src="'+S.js_url+'"><'+'/script>';
  return note+'     Loads CSS & JS from uploaded files. -->\n\n'+link+'\n\n'+body+'\n\n'+script+'\n';
}
function onHtmlOnlyToggle(){htmlOnly=document.getElementById('htmlOnlyChk').checked;var ic=document.getElementById('inlineChk');if(ic)ic.disabled=htmlOnly;document.getElementById('exportText').value=exportHTML();}
function onInlineToggle(){inlineMode=document.getElementById('inlineChk').checked;document.getElementById('exportText').value=exportHTML();}

/* ---------- editor UI ---------- */
function field(label,val,onin,multi){
  var wrap=document.createElement('div');wrap.className='ed-f';
  var lb=document.createElement('label');lb.textContent=label;wrap.appendChild(lb);
  var inp=document.createElement(multi?'textarea':'input');
  inp.value=val==null?'':val;
  inp.addEventListener('input',function(){onin(inp.value);scheduleRefresh();});
  wrap.appendChild(inp);return wrap;
}
function row(a,b){var r=document.createElement('div');r.className='ed-row';r.appendChild(a);r.appendChild(b);return r;}
function sec(title,open){
  var d=document.createElement('details');d.className='ed-sec';if(open)d.open=true;
  var s=document.createElement('summary');s.innerHTML=title+'<span class="chev">\u203a</span>';
  d.appendChild(s);var body=document.createElement('div');body.className='ed-body';d.appendChild(body);
  d._body=body;return d;
}
function toggle(label,obj,key){
  var w=document.createElement('label');w.className='ed-toggle';
  var cb=document.createElement('input');cb.type='checkbox';cb.checked=!!obj[key];
  cb.addEventListener('change',function(){obj[key]=cb.checked;scheduleRefresh();});
  w.appendChild(cb);w.appendChild(document.createTextNode(' '+label));return w;
}
function miniBtns(arr,idx,onchange){
  var wrap=document.createElement('div');wrap.className='ed-mini';
  var up=document.createElement('button');up.textContent='\u2191';up.title='Move up';
  up.onclick=function(){if(idx>0){var t=arr[idx-1];arr[idx-1]=arr[idx];arr[idx]=t;onchange();}};
  var dn=document.createElement('button');dn.textContent='\u2193';dn.title='Move down';
  dn.onclick=function(){if(idx<arr.length-1){var t=arr[idx+1];arr[idx+1]=arr[idx];arr[idx]=t;onchange();}};
  var rm=document.createElement('button');rm.textContent='\u2715';rm.title='Remove';
  rm.onclick=function(){arr.splice(idx,1);onchange();};
  wrap.appendChild(up);wrap.appendChild(dn);wrap.appendChild(rm);return wrap;
}
function itemHead(label,arr,i){
  var hd=document.createElement('div');hd.className='ed-item-h';hd.innerHTML='<span class="t">'+label+' '+(i+1)+'</span>';
  hd.appendChild(miniBtns(arr,i,build));return hd;
}
function listAdd(label,onclick){var b=document.createElement('button');b.className='ed-add';b.textContent=label;b.onclick=onclick;return b;}

  bd.appendChild(listAdd('+ Add pain point',function(){S.pain.checks.push('新しい項目');build();}));
  bd.appendChild(document.createElement('div')).className='ed-sub';bd.lastChild.textContent='Solution';
  bd.appendChild(row(field('Solution head',S.pain.solveH,function(v){S.pain.solveH=v;}),field('Head accent (orange)',S.pain.solveEm,function(v){S.pain.solveEm=v;})));
  bd.appendChild(field('Head tail',S.pain.solveAfter,function(v){S.pain.solveAfter=v;}));
  bd.appendChild(field('Underlined line',S.pain.solveLine,function(v){S.pain.solveLine=v;}));
  bd.appendChild(field('Paragraph',S.pain.solveP,function(v){S.pain.solveP=v;},true));
  bd.appendChild(document.createElement('div')).className='ed-sub';bd.lastChild.textContent='Benefit cards (1·2·3)';
  S.pain.benefits.forEach(function(b,i){var it=document.createElement('div');it.className='ed-item';it.appendChild(itemHead('Benefit',S.pain.benefits,i));
    it.appendChild(field('Title',b.title,function(v){S.pain.benefits[i].title=v;}));
    it.appendChild(field('Body',b.body,function(v){S.pain.benefits[i].body=v;},true));

    it.appendChild(field('Title',c.title,function(v){S.why.cards[i].title=v;}));

  S.why.env.forEach(function(e,i){var it=document.createElement('div');it.className='ed-item';it.appendChild(itemHead('Card',S.why.env,i));
    it.appendChild(field('Caption',e.cap,function(v){S.why.env[i].cap=v;}));
    it.appendChild(field('Caption accent (orange, e.g. → result)',e.em,function(v){S.why.env[i].em=v;}));

    it.appendChild(toggle('Show 注目 tag',S.why.env[i],'tag'));bd.appendChild(it);});
  bd.appendChild(listAdd('+ Add environment card',function(){S.why.env.push({cap:'新しい項目 ',em:'',img:'',tag:false});build();}));
  p.appendChild(d);

  /* CHANGES */
  d=sec('What a Tokyo base changes',false);bd=d._body;
  bd.appendChild(field('Heading',S.changes.h2,function(v){S.changes.h2=v;}));
  S.changes.items.forEach(function(it2,i){var it=document.createElement('div');it.className='ed-item';it.appendChild(itemHead('Item',S.changes.items,i));

    it.appendChild(row(field('Icon # (0–4)',it2.icon,function(v){S.changes.items[i].icon=parseInt(v||'0',10);}),document.createElement('div')));
    it.appendChild(toggle('Full width row',S.changes.items[i],'full'));bd.appendChild(it);});
  bd.appendChild(listAdd('+ Add change',function(){S.changes.items.push({title:'新しい項目',body:'',icon:0,full:false});build();}));

  /* CASES */
  d=sec('Case studies',false);bd=d._body;

    it.appendChild(row(field('Label (STEP.n)',s.n,function(v){S.steps.items[i].n=v;}),field('Title',s.title,function(v){S.steps.items[i].title=v;})));

  /* FAQ */
  d=sec('FAQ',false);bd=d._body;
  bd.appendChild(row(field('Eyebrow',S.faq.eyebrow,function(v){S.faq.eyebrow=v;}),field('Sub heading',S.faq.sub,function(v){S.faq.sub=v;})));
  S.faq.items.forEach(function(q,i){var it=document.createElement('div');it.className='ed-item';it.appendChild(itemHead('Q',S.faq.items,i));
    it.appendChild(field('Question',q.q,function(v){S.faq.items[i].q=v;}));
    it.appendChild(field('Answer',q.a,function(v){S.faq.items[i].a=v;},true));bd.appendChild(it);});
  bd.appendChild(listAdd('+ Add question',function(){S.faq.items.push({q:'新しい質問',a:''});build();}));
  p.appendChild(d);

  /* OFFICES */
  d=sec('Office listings',false);bd=d._body;
  bd.appendChild(field('Heading',S.offices.h2,function(v){S.offices.h2=v;}));
  S.offices.items.forEach(function(o,i){var it=document.createElement('div');it.className='ed-item';it.appendChild(itemHead('Office',S.offices.items,i));
    it.appendChild(field('Title',o.title,function(v){S.offices.items[i].title=v;}));
    it.appendChild(row(field('Location',o.loc,function(v){S.offices.items[i].loc=v;}),field('Logo text',o.logo,function(v){S.offices.items[i].logo=v;})));
    it.appendChild(field('Access',o.access,function(v){S.offices.items[i].access=v;}));
    it.appendChild(field('Image URL',o.img,function(v){S.offices.items[i].img=v;}));
    var sub=document.createElement('div');sub.className='ed-sub';sub.textContent='Price rows';it.appendChild(sub);
    o.prices.forEach(function(pr,j){var pit=document.createElement('div');pit.className='ed-item';pit.appendChild(itemHead('Price',o.prices,j));
      pit.appendChild(field('Label',pr.k,function(v){S.offices.items[i].prices[j].k=v;}));
      pit.appendChild(row(field('Price',pr.v,function(v){S.offices.items[i].prices[j].v=v;}),field('Note',pr.note,function(v){S.offices.items[i].prices[j].note=v;})));it.appendChild(pit);});
    var addp=listAdd('+ Add price row',function(){S.offices.items[i].prices.push({k:'項目',v:'¥0〜',note:''});build();});it.appendChild(addp);
    bd.appendChild(it);});
  bd.appendChild(listAdd('+ Add office',function(){S.offices.items.push(JSON.parse(JSON.stringify(DEFAULT.offices.items[0])));build();}));

  /* FINAL CTA */

  /* ADVANCED */

  refresh();
}

var rt=null;
function scheduleRefresh(){clearTimeout(rt);rt=setTimeout(refresh,250);}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1700);}
function openExport(){var c=document.getElementById('inlineChk');if(c)c.checked=inlineMode;var ho=document.getElementById('htmlOnlyChk');if(ho)ho.checked=htmlOnly;if(c)c.disabled=htmlOnly;document.getElementById('exportText').value=exportHTML();document.getElementById('modal').classList.add('show');}
function closeExport(){document.getElementById('modal').classList.remove('show');}
function copyExport(){var t=document.getElementById('exportText');t.select();try{document.execCommand('copy');}catch(e){}if(navigator.clipboard){navigator.clipboard.writeText(t.value).catch(function(){});}toast('HTML copied');}
function resetAll(){if(confirm('Reset all content to the original Japanese?')){S=JSON.parse(JSON.stringify(DEFAULT));build();}}

/* ---- Save / import JSON ---- */
function saveJSON(){
  try{
    var blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='compass-lp-jp-content.json';
    document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120);
    toast('JSON saved');
  }catch(e){alert('Could not save JSON: '+e.message);}
}
function importJSON(ev){
  var f=ev.target.files&&ev.target.files[0];if(!f){return;}
  var r=new FileReader();
  r.onload=function(){
    try{var obj=JSON.parse(r.result);if(!obj||typeof obj!=='object'){throw new Error('not an object');}
      for(var k in S){if(Object.prototype.hasOwnProperty.call(S,k))delete S[k];}
      Object.assign(S,obj);build();toast('JSON imported');
    }catch(e){alert('That does not look like a valid editor JSON file.\n\n'+e.message);}
    ev.target.value='';
  };
  r.readAsText(f);
}

/* ---- Auto-translate (en<->ja) ---- */
var TR_SKIP={css_url:1,js_url:1,img:1,logo:1,icon:1,num:1,unit:1,v:1,n:1,ctaPrimaryHref:1,ctaGhostHref:1};
function trOk(key,val){
  if(typeof val!=='string')return false;
  if(!val.trim())return false;
  if(key&&TR_SKIP[key])return false;
  if(/^https?:\/\//i.test(val))return false;
  if(/^(tel:|mailto:|#)/i.test(val))return false;
  if(/^[\d\s+\-\u2013\u2014().\/:%$,]+$/.test(val))return false;
  return true;
}
function trCollect(node,jobs){
  if(Array.isArray(node)){
    node.forEach(function(v,i){
      if(typeof v==='string'){if(trOk(null,v))jobs.push({get:function(){return node[i];},set:function(t){node[i]=t;}});}
      else if(v&&typeof v==='object'){trCollect(v,jobs);}
    });
  } else if(node&&typeof node==='object'){
    Object.keys(node).forEach(function(k){
      var v=node[k];
      if(typeof v==='string'){if(trOk(k,v))jobs.push({get:function(){return node[k];},set:function(t){node[k]=t;}});}
      else if(v&&typeof v==='object'){trCollect(v,jobs);}
    });
  }
}
async function mmTranslate(text,pair){
  var url='https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair='+pair;
  try{var r=await fetch(url);var j=await r.json();
    if(j&&j.responseData&&j.responseData.translatedText){var out=j.responseData.translatedText;
      if(/MYMEMORY WARNING|QUOTA|INVALID/i.test(out))return null;return out;}
  }catch(e){}
  return null;
}
var translating=false;
async function translateAll(pair,name,btn){
  if(translating)return;
  if(!confirm('Auto-translate the current content into '+name+'?\n\nThis replaces the text in the editor. Save your JSON first if you want to keep this version.\n\nMachine translation is a starting point \u2014 please review the result.'))return;
  translating=true;var label=btn.textContent;var jobs=[];trCollect(S,jobs);var done=0,fail=0;
  for(var i=0;i<jobs.length;i++){
    btn.textContent='\u2026 '+(i+1)+'/'+jobs.length;
    var t=await mmTranslate(jobs[i].get(),pair);
    if(t){jobs[i].set(t);done++;}else{fail++;}
    await new Promise(function(res){setTimeout(res,260);});
  }
  translating=false;btn.textContent=label;build();
  toast(fail?('Translated '+done+', kept '+fail+' as-is'):'Translated '+done+' fields \u2014 review them');
}

build();

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Compass · Infographic Builder</title>
<link href="https://fonts.cdnfonts.com/css/neue-haas-grotesk-display-pro" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--or:#FF6600;--nhg:'Neue Haas Grotesk Display Pro','Helvetica Neue',sans-serif}
body{display:flex;height:100vh;overflow:hidden;background:#141414;font-family:var(--nhg);color:#ddd}

/* ── SIDEBAR ── */
.sidebar{width:290px;min-width:290px;background:#111;display:flex;flex-direction:column;border-right:1px solid #1e1e1e;overflow:hidden}
.sb-head{padding:13px 15px;border-bottom:1px solid #1e1e1e;flex-shrink:0}
.sb-brand{font-size:11px;font-weight:700;color:#fff;letter-spacing:.1em;text-transform:uppercase}
.sb-brand em{color:var(--or);font-style:normal}
.sb-body{flex:1;overflow-y:auto;padding:11px}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:#252525;border-radius:2px}
.sb-sec{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#2a2a2a;margin:12px 0 7px;padding-bottom:3px;border-bottom:1px solid #1a1a1a}
.fg{margin-bottom:8px}
.fl{display:block;font-size:9px;font-weight:700;color:#3a3a3a;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.fi{width:100%;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:6px;padding:6px 9px;color:#ccc;font-family:var(--nhg);font-size:11px;outline:none;transition:border-color .15s;resize:none}
.fi:focus{border-color:var(--or)}
.fi[rows]{field-sizing:content;min-height:34px;max-height:80px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ce{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:8px;padding:9px 10px;margin-bottom:7px}
.ce-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.ce-lbl{font-size:8px;font-weight:700;color:#2a2a2a;letter-spacing:.08em}
.ce-del{background:none;border:none;color:#2a2a2a;cursor:pointer;font-size:12px;padding:1px 4px;border-radius:3px;transition:color .15s}
.ce-del:hover{color:#cc4444}
.sw-row{display:flex;gap:4px;flex-wrap:wrap}
.sw{width:22px;height:14px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0}
.sw.on{border-color:var(--or)!important}
.sw-glass{background:#fff;border:1px solid #ccc!important}
.sw-glassdark{background:#1c1c1c;border:1px solid #444!important}
.sw-orange{background:#FF6600}
.sw-orl{background:#fff5f0;border:1px solid #ffd4b8!important}
.sw-dark{background:#1c1c1c;border:1px solid #333!important}
.sw-white{background:#fff;border:1px solid #ccc!important}
.sw-outline{background:transparent;border:2px solid var(--or)!important}
.ct-row{display:flex;gap:4px}
.ct-btn{flex:1;padding:4px 2px;background:#111;border:1px solid #1e1e1e;border-radius:5px;cursor:pointer;color:#3a3a3a;font-size:8px;font-weight:700;text-align:center;transition:all .15s}
.ct-btn.on{border-color:var(--or);color:var(--or);background:rgba(255,102,0,.08)}
.tgl{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:3px 0}
.tck{width:28px;height:16px;background:#1e1e1e;border-radius:8px;position:relative;transition:background .15s;flex-shrink:0}
.tck.on{background:var(--or)}
.tck::after{content:'';position:absolute;width:10px;height:10px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .15s}
.tck.on::after{left:15px}
.cp-row{display:flex;align-items:center;gap:7px}
.cp-row input[type=color]{width:28px;height:24px;padding:1px;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:5px;cursor:pointer}
.btn-add{width:100%;padding:6px;background:transparent;border:1px dashed #1e1e1e;border-radius:6px;color:#2a2a2a;font-family:var(--nhg);font-size:10px;cursor:pointer;transition:all .15s;margin-top:2px}
.btn-add:hover{border-color:var(--or);color:var(--or)}
.img-lbl{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:5px;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:5px;color:#3a3a3a;font-family:var(--nhg);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.img-lbl:hover{border-color:var(--or);color:var(--or)}
.toolbar{flex-shrink:0;background:#0a0a0a;border-top:1px solid #1a1a1a;padding:10px 12px;display:flex;gap:6px}
.tbtn{padding:7px 13px;border-radius:7px;border:1px solid #252525;background:#111;color:#555;font-family:var(--nhg);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.tbtn:hover{color:#fff;border-color:#444}
.tbtn.or{background:var(--or);color:#fff;border-color:var(--or)}.tbtn.or:hover{opacity:.85}
.tbtn.pdf{background:#7a0000;color:#fff;border-color:#7a0000}.tbtn.pdf:hover{opacity:.85}
.canvas-area{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:28px;background:#1a1a1a}
.canvas-area::-webkit-scrollbar{width:5px;height:5px}
.canvas-area::-webkit-scrollbar-thumb{background:#252525;border-radius:3px}

/* ══════════════════════════════════
   INFOGRAPHIC
══════════════════════════════════ */
#infographic{
  width:794px;min-height:600px;background:#f8f6f4;
  box-shadow:0 28px 90px rgba(0,0,0,.8);
  flex-shrink:0;overflow:hidden;font-family:var(--nhg);
  position:relative;
}
#infographic > *{position:relative;z-index:1}

/* Header */
.ig-header{background:#0f0f0f;padding:14px 28px;display:grid;grid-template-columns:auto 1px 1fr auto;align-items:center;gap:18px}
.ig-logo-block{display:flex;align-items:center}
.ig-logo-block svg{height:32px;width:auto;flex-shrink:0}
.ig-vline{width:1px;height:32px;background:rgba(255,255,255,.1)}
.ig-badge{border:1.5px solid var(--or);border-radius:100px;padding:4px 13px;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--or);text-transform:uppercase;white-space:nowrap;justify-self:start}
.ig-htag{font-size:18px;font-weight:300;color:rgba(255,255,255,.38);letter-spacing:.02em;text-align:right;justify-self:end}

/* Title */
.ig-title{padding:40px 50px 26px}
.ig-hl{font-size:54px;font-weight:800;line-height:1;color:#0f0f0f;letter-spacing:-.025em;margin-bottom:14px}
.ig-rule{height:4px;background:var(--or);margin-bottom:20px;border-radius:2px}
.ig-intro{font-size:15px;font-weight:400;line-height:1.65;color:#555;max-width:640px}

/* Cards */
.ig-cards-wrap{padding:0 50px 32px}
.ig-grid{display:grid;gap:14px}

/* ══ CARD BASE ══ */
.igc{
  border-radius:18px;overflow:hidden;display:flex;flex-direction:column;
  min-height:155px;position:relative;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s ease;
}
.igc:hover{transform:translateY(-5px) scale(1.02)}

/* ══ LIQUID GLASS — rendered via gradients + SVG filter (exports correctly) ══ */
.igc.s-glass{
  background:#ffffff;border:1.5px solid #e8e8e8;
  box-shadow:0 4px 18px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
}
.igc.s-glassdark{
  background:#1c1c1c;border:1px solid rgba(255,255,255,.07);
  box-shadow:0 8px 28px rgba(0,0,0,.28);
}
.igc.s-orange{
  background:linear-gradient(145deg,#FF7820 0%,#FF6600 40%,#E05000 100%);
  box-shadow:0 10px 36px rgba(255,102,0,.35),0 4px 12px rgba(255,102,0,.2),
    inset 0 1px 0 rgba(255,200,150,.45), inset 0 -1px 0 rgba(0,0,0,.15);
}
.igc.s-orl{
  background:
    radial-gradient(ellipse 60% 40% at 20% 15%, rgba(255,255,255,.9) 0%, transparent 55%),
    linear-gradient(145deg,rgba(255,248,244,.95),rgba(255,236,224,.85));
  border:2.5px solid rgba(255,102,0,.65);
  box-shadow:0 8px 28px rgba(255,102,0,.15),inset 0 1px 0 rgba(255,255,255,.9);
}
.igc.s-dark{
  background:
    radial-gradient(ellipse 55% 40% at 15% 12%, rgba(255,255,255,.08) 0%, transparent 50%),
    linear-gradient(145deg,rgba(30,32,40,.98),rgba(18,20,26,.96));
  border:1px solid rgba(255,255,255,.07);
  box-shadow:0 10px 36px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);
}
.igc.s-white{
  background:
    radial-gradient(ellipse 50% 35% at 18% 12%, rgba(255,255,255,1) 0%, rgba(248,250,255,.85) 45%, transparent 70%),
    linear-gradient(145deg,#fff 0%,#f8f9fc 100%);
  border:1.5px solid rgba(220,225,235,.9);
  box-shadow:0 6px 24px rgba(100,110,140,.12),0 2px 8px rgba(100,110,140,.07),
    inset 0 1px 0 rgba(255,255,255,1);
}
.igc.s-outline{
  background:
    radial-gradient(ellipse 55% 40% at 18% 12%, rgba(255,255,255,.95) 0%, transparent 55%),
    rgba(255,255,255,.92);
  border:2.5px solid var(--or);
  box-shadow:0 6px 24px rgba(255,102,0,.12),inset 0 1px 0 rgba(255,255,255,.9);
}



/* Image top banner strip */
.igc-img-banner{
  width:100%;flex-shrink:0;
  background-size:cover;background-position:center 50%;
  position:relative;overflow:hidden;
  transition:height .25s ease;
}
.igc-img-banner.pos-bottom{order:10} /* push to bottom of flex column */
.igc-img-banner.pos-bottom::after{
  content:'';position:absolute;top:0;left:0;right:0;height:50px;
  background:linear-gradient(to bottom,rgba(0,0,0,.25),transparent);
}
.igc-img-banner.pos-top::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:50px;
  background:linear-gradient(to top,rgba(0,0,0,.25),transparent);
}

/* Body */
.igc-body{padding:22px 24px 14px;flex:1}
.igc-tag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:9px;opacity:.52}
.igc-stat{font-size:60px;font-weight:800;line-height:1;letter-spacing:-.03em;display:block;margin-bottom:5px}
.igc-label{font-size:17px;font-weight:500;line-height:1.25;display:block;margin-bottom:6px}
.igc-desc{font-size:15px;font-weight:400;line-height:1.55;display:block;opacity:.58} /* ← BIGGER */

/* Color tokens */
.s-glass .igc-tag{color:var(--or)}.s-glass .igc-stat{color:#0f0f0f}.s-glass .igc-label{color:#222}.s-glass .igc-desc{color:#666}
.s-glassdark .igc-tag{color:var(--or)}.s-glassdark .igc-stat{color:#fff}.s-glassdark .igc-label{color:rgba(255,255,255,.8)}.s-glassdark .igc-desc{color:rgba(255,255,255,.45)}
.s-orange .igc-tag,.s-orange .igc-label,.s-orange .igc-desc{color:rgba(255,255,255,.85)}.s-orange .igc-stat{color:#fff}
.s-orl .igc-tag,.s-orl .igc-stat{color:#FF6600}.s-orl .igc-label{color:#2a2a2a}.s-orl .igc-desc{color:#666}
.s-dark .igc-tag,.s-dark .igc-label,.s-dark .igc-desc{color:rgba(255,255,255,.45)}.s-dark .igc-stat{color:#fff}
.s-white .igc-tag{color:var(--or)}.s-white .igc-stat{color:#0f0f0f}.s-white .igc-label{color:#222}.s-white .igc-desc{color:#777}
.s-outline .igc-tag,.s-outline .igc-stat{color:var(--or)}.s-outline .igc-label{color:#1a1a1a}.s-outline .igc-desc{color:#666}

/* Chart strip */
.igc-chart{flex-shrink:0;overflow:hidden}
.igc-chart svg{display:block;width:100%}

/* ── BANNER ── */
.ig-banner{margin:0 50px 42px;border-radius:18px;overflow:hidden;position:relative}
.ig-banner.b-dark{
  background:
    radial-gradient(ellipse 55% 40% at 10% 10%, rgba(255,255,255,.07) 0%, transparent 55%),
    linear-gradient(145deg,rgba(28,32,40,.97),rgba(14,16,22,.98));
  border:1px solid rgba(255,255,255,.07);
  box-shadow:0 10px 36px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);
}
.ig-banner.b-glass{
  background:
    radial-gradient(ellipse 60% 40% at 15% 10%, rgba(255,255,255,.85) 0%, transparent 55%),
    radial-gradient(ellipse 40% 55% at 90% 80%, rgba(200,218,240,.35) 0%, transparent 55%),
    linear-gradient(145deg,rgba(255,255,255,.82) 0%,rgba(238,244,252,.68) 60%,rgba(228,236,248,.75) 100%);
  border:1px solid rgba(255,255,255,.88);
  box-shadow:0 10px 36px rgba(100,120,160,.18),inset 0 1px 0 rgba(255,255,255,1);
}
.ig-banner.b-orange{background:linear-gradient(135deg,#FF7820,#cc4000);box-shadow:0 8px 30px rgba(255,102,0,.35)}

.ig-btop{padding:26px 32px 14px;position:relative;z-index:3}
.ig-btitle{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px}
.ig-bsub{font-size:12px;font-weight:400;opacity:.4}
.b-dark .ig-btitle,.b-dark .ig-bsub,.b-orange .ig-btitle,.b-orange .ig-bsub{color:#fff}
.b-glass .ig-btitle{color:#0f0f0f}.b-glass .ig-bsub{color:#555;opacity:1}.b-glass .ig-bnum{color:#0f0f0f}.b-glass .ig-bnum em{color:var(--or)}.b-glass .ig-blbl{color:#666}
.ig-bchart-wrap{padding:0 32px 2px;position:relative;z-index:3}
.ig-bstats{display:grid;padding:14px 32px 28px;gap:20px;position:relative;z-index:3}
.ig-bnum{font-size:44px;font-weight:800;color:#fff;line-height:1;margin-bottom:4px;letter-spacing:-.025em}
.ig-bnum em{color:var(--or);font-style:normal}
.b-orange .ig-bnum em{color:rgba(255,255,255,.65)}
.b-glass .ig-bnum{color:#0f0f0f}.b-glass .ig-bnum em{color:var(--or)}
.ig-blbl{font-size:13px;color:rgba(255,255,255,.45);line-height:1.4}
.b-glass .ig-blbl{color:#666}

/* Footer */
.ig-footer{background:#0f0f0f;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.ig-fbrand{font-size:11px;font-weight:700;letter-spacing:.14em;color:#fff;text-transform:uppercase}
.ig-fbrand span{color:var(--or)}
.ig-ftag{font-size:9px;color:#333;letter-spacing:.08em;text-transform:uppercase}

#dlv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#dlv.on{display:flex}
#dlv p{color:#fff;font-size:12px;font-weight:600;letter-spacing:.08em}
.dlsp{width:34px;height:34px;border:3px solid #222;border-top-color:var(--or);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>



<div class="sidebar">
  <div class="sb-head"><div class="sb-brand">Compass<em>.</em>Infographic</div></div>
  <div class="sb-body">
    <div class="sb-sec">Header</div>
    <div class="fg"><label class="fl">Badge</label><input class="fi" id="f-badge" value="Our Story in Numbers" oninput="upd()"></div>
    <div class="fg"><label class="fl">Right tagline</label><input class="fi" id="f-htag" value="A Great Place to Work" oninput="upd()"></div>

    <div class="sb-sec">Page Content</div>
    <div class="fg"><label class="fl">Headline</label><textarea class="fi" rows="2" id="f-hl" oninput="upd()">Our Achievements to Date</textarea></div>
    <div class="fg"><label class="fl">Intro</label><textarea class="fi" rows="3" id="f-intro" oninput="upd()">Compass Offices continues its rapid development fuelled by high client satisfaction and a first-rate professional team across Asia Pacific.</textarea></div>

    <div class="sb-sec">Brand</div>
    <div class="fg"><div class="cp-row">
      <input type="color" value="#FF6600" id="cp" oninput="setBrand(this.value)">
      <label class="fl" style="margin:0">Primary orange</label>
    </div></div>

    <div class="sb-sec" style="display:flex;justify-content:space-between">
      <span>Stat Cards</span><span id="cc" style="color:#2a2a2a;font-size:8px"></span>
    </div>
    <div id="ce"></div>
    <button class="btn-add" onclick="addCard()">+ Add Card</button>

    <div class="sb-sec"><div class="tgl" onclick="toggleBanner()"><span>Stats Banner</span><div class="tck on" id="btck"></div></div></div>
    <div id="be">
      <div class="row2 fg">
        <div><label class="fl">Title</label><input class="fi" id="f-bt" value="Market Insights" oninput="upd()"></div>
        <div><label class="fl">Subtitle</label><input class="fi" id="f-bst" value="Global workspace data" oninput="upd()"></div>
      </div>
      <div class="fg"><label class="fl">Banner style</label>
        <select class="fi" id="f-bsty" onchange="upd()" style="cursor:pointer">
          <option value="dark">Dark glass</option>
          <option value="glass">Light glass</option>
          <option value="orange">Orange</option>
        </select>
      </div>
      <div class="fg"><div class="tgl" onclick="toggleBChart()"><span class="fl" style="margin:0">Show bar chart</span><div class="tck on" id="bctck"></div></div></div>
      <div class="fg"><label class="fl">Bar values (comma-separated)</label>
        <input class="fi" id="f-bdata" value="42,65,38,80,55,91,70,88,60,95,75,100" oninput="upd()"></div>
      <div id="bie"></div>
      <button class="btn-add" onclick="addBI()">+ Add Stat</button>
    </div>

    <div class="sb-sec">Footer</div>
    <div class="fg"><label class="fl">Tagline</label>
      <input class="fi" id="f-ftag" value="Flexible. Connected. Human Centric." oninput="upd()"></div>
  </div>
  <div class="toolbar">
    <button class="tbtn or" onclick="dlJPG()">↓ JPG</button>
    <button class="tbtn pdf" onclick="dlPDF()">↓ PDF</button>
    <button class="tbtn" onclick="initAll()">↺ Reset</button>
  </div>
</div>

<div class="canvas-area">
<div id="infographic">
  <div class="ig-header">
    <div class="ig-logo-block">

<script>
const STYLES=['glass','glassdark','orange','orl','dark','white','outline'];
let brandOr='#FF6600', showBanner=true, showBChart=true;

let cards=[
  {stat:'15+', tag:'EST. 2009', label:'Years of Excellence',  desc:'Serving businesses across Asia Pacific since 2009', style:'glassdark', chart:'none', pts:[], img:null,imgY:.5,imgZ:1,imgPos:'top',imgH:130},
  {stat:'12',  tag:'LOCATIONS', label:'CBD Prime Cities',     desc:'Every major business district covered',             style:'orange',    chart:'bar',  pts:[55,72,48,88,64,100,70,84,76,94,82,100], img:null,imgY:.5,imgZ:1,imgPos:'top',imgH:130},
  {stat:'20K+',tag:'TRUSTED BY',label:'Clients Served',       desc:'Businesses of all sizes and industries',            style:'glass',     chart:'none', pts:[], img:null,imgY:.5,imgZ:1,imgPos:'top',imgH:130},
  {stat:'95%', tag:'NPS SCORE', label:'Client Satisfaction',  desc:'Measured across all markets annually',              style:'orl',       chart:'fill', pts:[], img:null,imgY:.5,imgZ:1,imgPos:'top',imgH:130},
  {stat:'30%', tag:'CAGR',      label:'Annual Growth Rate',   desc:'Consistent year-on-year expansion',                 style:'glassdark', chart:'area', pts:[45,52,48,60,55,68,62,74,70,82,78,100], img:null,imgY:.5,imgZ:1,imgPos:'top',imgH:130},
  {stat:'12K+',tag:'READY NOW', label:'Workstations',         desc:'Fully furnished and move-in ready',                 style:'white',     chart:'bar',  pts:[30,48,38,62,52,74,58,78,66,86,74,100], img:null,imgY:.5,imgZ:1,imgPos:'top',imgH:130},
];

let bis=[
  {stat:'3.1 BN',label:'Workers globally',          accent:false},
  {stat:'1.3 BN',label:'Mobile & flexible workers', accent:true},
  {stat:'66%',   label:'Workers want flexibility',  accent:false},
  {stat:'$19K',  label:'Avg annual desk cost',      accent:true},
];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function parsePct(stat){const m=String(stat).match(/(\d+\.?\d*)%/);return m?Math.min(100,parseFloat(m[1])):null;}

// ── REDESIGNED FILL BAR — glass pill style with clear % label ──
function fillBar(stat, W, H, isDark) {
  const pct = parsePct(stat) ?? 0;
  const label = pct + '%';
  const barH = 28, barY = (H - barH) / 2, r = barH / 2;
  const trackW = W - 2, filled = Math.max(r*2, (pct / 100) * trackW);

  // Color scheme based on card style
  const fillCol   = isDark ? '#FF6600' : brandOr;
  const trackFill = isDark ? 'rgba(255,255,255,.1)' : 'rgba(0,0,0,.07)';
  const textOnFill= '#fff';
  const textOnTrack = isDark ? 'rgba(255,255,255,.35)' : 'rgba(0,0,0,.3)';

  // Gradient IDs
  const gid = 'fb'+Math.random().toString(36).slice(2,7);
  const shineId = 'fs'+Math.random().toString(36).slice(2,7);

  // Tick marks at 25/50/75
  const ticks = [25,50,75].filter(t=>t<pct).map(t=>{
    const tx = 1 + (t/100)*trackW;
    return `<line x1="${tx.toFixed(1)}" y1="${(barY+4).toFixed(1)}" x2="${tx.toFixed(1)}" y2="${(barY+barH-4).toFixed(1)}" stroke="rgba(255,255,255,.25)" stroke-width="1"/>`;
  }).join('');

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Main fill gradient — rich orange with depth -->
      <linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="${fillCol}" stop-opacity="0.75"/>
        <stop offset="50%"  stop-color="${fillCol}" stop-opacity="1"/>
        <stop offset="100%" stop-color="${fillCol}" stop-opacity="0.95"/>
      </linearGradient>
      <!-- Glass shine on filled bar -->
      <linearGradient id="${shineId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.45)"/>
        <stop offset="45%"  stop-color="rgba(255,255,255,0.10)"/>
        <stop offset="55%"  stop-color="rgba(0,0,0,0.04)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
      </linearGradient>
    </defs>
    <!-- Track -->
    <rect x="1" y="${barY.toFixed(1)}" width="${trackW.toFixed(1)}" height="${barH.toFixed(1)}" rx="${r.toFixed(1)}" fill="${trackFill}"/>
    <!-- Filled portion -->
    <rect x="1" y="${barY.toFixed(1)}" width="${filled.toFixed(1)}" height="${barH.toFixed(1)}" rx="${r.toFixed(1)}" fill="url(#${gid})"/>
    <!-- Glass shine overlay on fill -->
    <rect x="1" y="${barY.toFixed(1)}" width="${filled.toFixed(1)}" height="${barH.toFixed(1)}" rx="${r.toFixed(1)}" fill="url(#${shineId})"/>
    ${ticks}
    <!-- Inset border on filled bar for glass rim feel -->
    <rect x="1.5" y="${(barY+.5).toFixed(1)}" width="${(filled-.5).toFixed(1)}" height="${(barH-1).toFixed(1)}" rx="${(r-.5).toFixed(1)}" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
    <!-- % label — positioned clearly AFTER the bar, or inside if bar wide enough -->
    ${filled > W * 0.5
      ? `<text x="${(filled - 10).toFixed(1)}" y="${(H/2+1).toFixed(1)}" text-anchor="end" dominant-baseline="central" font-family="'Neue Haas Grotesk Display Pro','Helvetica Neue',sans-serif" font-weight="800" font-size="13" fill="${textOnFill}">${label}</text>`
      : `<text x="${(filled + 10).toFixed(1)}" y="${(H/2+1).toFixed(1)}" text-anchor="start" dominant-baseline="central" font-family="'Neue Haas Grotesk Display Pro','Helvetica Neue',sans-serif" font-weight="800" font-size="13" fill="${textOnTrack}">${label}</text>`
    }
  </svg>`;
}

// Area chart
function areaChart(pts, W, H, col) {
  if(!pts?.length) return '';
  const mx=Math.max(...pts),mn=Math.min(...pts),rng=mx-mn||1,p=3;
  const xs=pts.map((_,i)=>p+(i/(pts.length-1))*(W-p*2));
  const ys=pts.map(v=>H-p-((v-mn)/rng)*(H-p*2));
  const ln=xs.map((x,i)=>(i?'L':'M')+x.toFixed(1)+','+ys[i].toFixed(1)).join(' ');
  const ar=ln+` L${xs[xs.length-1].toFixed(1)},${H} L${xs[0].toFixed(1)},${H} Z`;
  const id='ac'+Math.random().toString(36).slice(2,6);
  const pi=pts.indexOf(mx);
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0.02"/>
    </linearGradient></defs>
    <path d="${ar}" fill="url(#${id})"/>
    <path d="${ln}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${xs[pi].toFixed(1)}" cy="${ys[pi].toFixed(1)}" r="3.5" fill="${col}"/>
  </svg>`;
}

// Bar chart
function barChart(pts, W, H, col, col2) {
  if(!pts?.length) return '';
  const mx=Math.max(...pts)||1,n=pts.length,gap=3;
  const bw=Math.max(4,(W-gap*(n+1))/n);
  const id1='b1'+Math.random().toString(36).slice(2,6);
  const id2='b2'+Math.random().toString(36).slice(2,6);
  const bars=pts.map((v,i)=>{
    const bh=Math.max(3,(v/mx)*(H-4)),x=gap+i*(bw+gap),y=H-bh;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="url(#${i%2?id2:id1})"/>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="${id1}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${col}" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="${col}" stop-opacity="0.22"/>
      </linearGradient>
      <linearGradient id="${id2}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${col2||col}" stop-opacity="0.52"/>
        <stop offset="100%" stop-color="${col2||col}" stop-opacity="0.07"/>
      </linearGradient>
    </defs>${bars}
  </svg>`;
}

function chartCols(style){
  const dark=['glassdark','dark','orange'];
  const isDark=dark.includes(style);
  if(style==='orange')    return['#fff','rgba(255,255,255,.4)',true];
  if(style==='glassdark') return[brandOr,'#ff9940',true];
  if(style==='dark')      return[brandOr,'#ff9940',true];
  return[brandOr,'#ffb380',false];
}

// ── RENDER ──
function upd(){
  const G=id=>document.getElementById(id),gv=id=>G(id)?.value||'';
  G('ig-badge').textContent=gv('f-badge');
  G('ig-htag').textContent=gv('f-htag');
  G('ig-hl').textContent=gv('f-hl');
  G('ig-intro').textContent=gv('f-intro');
  G('ig-ftag').textContent=gv('f-ftag');

  const n=cards.length,cols=n<=1?1:n===3?3:2;
  const grid=G('ig-grid');
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  grid.innerHTML=cards.map(c=>{
    const [c1,c2,isDark]=chartCols(c.style);
    const cH=70;
    let ch='';
    if(c.chart==='fill')            ch=`<div class="igc-chart" style="height:${cH}px;padding:8px 22px">${fillBar(c.stat,380-44,cH-16,isDark)}</div>`;
    else if(c.chart==='area'&&c.pts?.length) ch=`<div class="igc-chart" style="height:${cH}px">${areaChart(c.pts,380,cH,c1)}</div>`;
    else if(c.chart==='bar'&&c.pts?.length)  ch=`<div class="igc-chart" style="height:${cH}px">${barChart(c.pts,380,cH,c1,c2)}</div>`;

    const iH=c.imgH||130, iPos=c.imgPos||'top';
    const imgHTML=c.img?`<div class="igc-img-banner pos-${iPos}" style="height:${iH}px;background-image:url('${c.img}');background-position:center ${Math.round((c.imgY||.5)*100)}%;background-size:${Math.round((c.imgZ||1)*100)}%"></div>`:'';

    return `<div class="igc s-${c.style}">
      ${imgHTML}
      <div class="igc-body">
        ${c.tag?`<span class="igc-tag">${esc(c.tag)}</span>`:''}
        <span class="igc-stat">${esc(c.stat)}</span>
        <span class="igc-label">${esc(c.label)}</span>
        ${c.desc?`<span class="igc-desc">${esc(c.desc)}</span>`:''}
      </div>
      ${ch}
    </div>`;
  }).join('');

  // Smart equalize: cards with images in same row get the max imgH of that row
  equalizeCardImages();
  const bwrap=G('ig-bwrap');
  bwrap.style.display=showBanner?'':'none';
  if(showBanner){
    const sty=gv('f-bsty')||'dark';
    G('ig-banner').className=`ig-banner b-${sty}`;
    G('ig-btitle').textContent=gv('f-bt');
    G('ig-bsub').textContent=gv('f-bst');
    const bcEl=G('ig-bchart');
    if(showBChart){
      const pts=(gv('f-bdata')||'').split(',').map(v=>parseFloat(v)||0).filter(v=>v>0);
      if(pts.length){
        const bc=(sty==='glass')?brandOr:'#fff';
        const bc2=(sty==='orange'||sty==='glass')?'rgba(255,255,255,.35)':'#ff9940';
        bcEl.style.display='';
        bcEl.innerHTML=barChart(pts,720,88,bc,bc2);
      }else bcEl.style.display='none';
    }else bcEl.style.display='none';
    const bsg=G('ig-bstats');
    bsg.style.gridTemplateColumns=`repeat(${Math.min(4,bis.length)},1fr)`;
    bsg.innerHTML=bis.map(b=>`<div>
      <div class="ig-bnum">${b.accent?`<em>${esc(b.stat)}</em>`:esc(b.stat)}</div>
      <div class="ig-blbl">${esc(b.label)}</div>
    </div>`).join('');
  }
}

// ── CARD EDITOR ──
function rce(){
  document.getElementById('ce').innerHTML=cards.map((c,i)=>`
    <div class="ce">
      <div class="ce-head">
        <span class="ce-lbl">CARD ${i+1}${c.img?' 📷':''}</span>
        <button class="ce-del" onclick="delC(${i})">✕</button>
      </div>
      <div class="row2" style="margin-bottom:6px">
        <div><label class="fl">Stat</label><input class="fi" value="${esc(c.stat)}" oninput="sc(${i},'stat',this.value)"></div>
        <div><label class="fl">Tag</label><input class="fi" value="${esc(c.tag||'')}" oninput="sc(${i},'tag',this.value)"></div>
      </div>
      <div class="fg" style="margin-bottom:5px"><label class="fl">Label</label><input class="fi" value="${esc(c.label)}" oninput="sc(${i},'label',this.value)"></div>
      <div class="fg" style="margin-bottom:5px"><label class="fl">Description</label><input class="fi" value="${esc(c.desc||'')}" oninput="sc(${i},'desc',this.value)"></div>
      <div class="fg" style="margin-bottom:5px"><label class="fl">Style</label>
        <div class="sw-row">${STYLES.map(s=>`<div class="sw sw-${s} ${c.style===s?'on':''}" onclick="sc(${i},'style','${s}');rce();upd()" title="${s}"></div>`).join('')}</div>
      </div>
      <div class="fg" style="margin-bottom:5px"><label class="fl">Chart (auto-calculates %)</label>
        <div class="ct-row">
          ${['none','fill','area','bar'].map(t=>`<button class="ct-btn ${c.chart===t?'on':''}" onclick="sc(${i},'chart','${t}');rce();upd()">${{none:'None',fill:'Fill %',area:'Area',bar:'Bars'}[t]}</button>`).join('')}
        </div>
      </div>
      ${(c.chart==='area'||c.chart==='bar')?`<div class="fg" style="margin-bottom:5px"><label class="fl">Data values</label>
        <input class="fi" value="${(c.pts||[]).join(',')}" oninput="sc(${i},'pts',this.value.split(',').map(v=>parseFloat(v)||0))"></div>`:''}
      <div class="fg" style="margin-bottom:0">
        <label class="fl">Image banner</label>
        <label class="img-lbl">📷 ${c.img?'Change':'Upload'}<input type="file" accept="image/*" style="display:none" onchange="loadImg(${i},this)"></label>
      </div>
      ${c.img?`
        <div class="fg" style="margin-top:6px">
          <label class="fl">Position</label>
          <div class="ct-row">
            <button class="ct-btn ${'top'===(c.imgPos||'top')?'on':''}" onclick="sc(${i},'imgPos','top');rce();upd()">▲ Top</button>
            <button class="ct-btn ${'bottom'===c.imgPos?'on':''}" onclick="sc(${i},'imgPos','bottom');rce();upd()">▼ Bottom</button>
          </div>
        </div>
        <div class="fg" style="margin-bottom:4px">
          <label class="fl">Image height — ${c.imgH||130}px <span style="color:#444">(all cards in row adjust)</span></label>
          <input type="range" min="80" max="260" step="10" value="${c.imgH||130}"
            oninput="sc(${i},'imgH',parseInt(this.value));this.previousElementSibling.innerHTML='Image height — '+this.value+'px <span style=\'color:#444\'>(all cards in row adjust)</span>'"
            style="width:100%;accent-color:var(--or)">
        </div>
        <div class="fg" style="margin-bottom:4px">
          <label class="fl">Vertical crop</label>
          <input type="range" min="0" max="1" step=".02" value="${c.imgY||.5}" oninput="sc(${i},'imgY',parseFloat(this.value))" style="width:100%;accent-color:var(--or)">
        </div>
        <div class="fg" style="margin-bottom:0">
          <label class="fl">Zoom</label>
          <input type="range" min="1" max="3" step=".05" value="${c.imgZ||1}" oninput="sc(${i},'imgZ',parseFloat(this.value))" style="width:100%;accent-color:var(--or)">
        </div>
        <button class="btn-add" style="color:#cc4444;border-color:#440000;margin-top:5px" onclick="sc(${i},'img',null);rce();upd()">✕ Remove</button>`:''}
    </div>`).join('');
  document.getElementById('cc').textContent=cards.length+' cards';
}

function loadImg(i,input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{cards[i].img=e.target.result;cards[i].imgY=.5;cards[i].imgZ=1;if(!cards[i].imgPos)cards[i].imgPos='top';if(!cards[i].imgH)cards[i].imgH=130;rce();upd();};
  r.readAsDataURL(f);
}
function sc(i,k,v){cards[i][k]=v;upd();}
function addCard(){cards.push({stat:'—',label:'New Stat',tag:'',desc:'',style:'white',chart:'none',pts:[],img:null,imgY:.5,imgZ:1,imgPos:'top',imgH:130});rce();upd();}
function delC(i){if(cards.length<=1)return;cards.splice(i,1);rce();upd();}

function rbe(){
  document.getElementById('bie').innerHTML=bis.map((b,i)=>`
    <div class="ce" style="padding:8px 9px;margin-bottom:6px">
      <div class="ce-head"><span class="ce-lbl">STAT ${i+1}</span><button class="ce-del" onclick="delBI(${i})">✕</button></div>
      <div class="row2">
        <div><label class="fl">Number</label><input class="fi" value="${esc(b.stat)}" oninput="sbi(${i},'stat',this.value)"></div>
        <div><label class="fl">Label</label><input class="fi" value="${esc(b.label)}" oninput="sbi(${i},'label',this.value)"></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:5px">
        <input type="checkbox" id="bi${i}" ${b.accent?'checked':''} onchange="sbi(${i},'accent',this.checked)" style="accent-color:var(--or)">
        <label for="bi${i}" style="font-size:9px;color:#3a3a3a;cursor:pointer">Orange accent</label>
      </div>
    </div>`).join('');
}
function sbi(i,k,v){bis[i][k]=v;upd();}
function addBI(){bis.push({stat:'—',label:'New stat',accent:false});rbe();upd();}
function delBI(i){if(bis.length<=1)return;bis.splice(i,1);rbe();upd();}
function toggleBanner(){showBanner=!showBanner;document.getElementById('btck').classList.toggle('on',showBanner);document.getElementById('be').style.display=showBanner?'':'none';upd();}
function toggleBChart(){showBChart=!showBChart;document.getElementById('bctck').classList.toggle('on',showBChart);upd();}
function setBrand(v){brandOr=v;document.documentElement.style.setProperty('--or',v);upd();}

async function renderCanvas(){
  const ig=document.getElementById('infographic');
  ig.querySelectorAll('.igc').forEach(c=>{c.style.transform='none';c.style.transition='none';});
  await new Promise(r=>requestAnimationFrame(r));
  await new Promise(r=>setTimeout(r,80));
  const BG_MAP={orange:'#FF6600',orl:'#fff5f0',dark:'#1c1c1c',
    white:'#ffffff',outline:'#ffffff',grey:'#f5f5f5',glass:'#ffffff',glassdark:'#1c1c1c'};
  const cv=await html2canvas(ig,{
    scale:3,useCORS:true,allowTaint:true,logging:false,
    backgroundColor:'#f8f6f4',
    width:ig.offsetWidth,height:ig.offsetHeight,
    onclone:(doc,el)=>{
      el.style.background='#f8f6f4';
      el.querySelectorAll('.igc').forEach((card,idx)=>{
        const c=cards[idx];if(!c)return;
        card.style.transform='none';card.style.transition='none';
        card.style.background=c.style==='orange'?'linear-gradient(145deg,#FF7820,#FF6600,#E05000)':(BG_MAP[c.style]||'#ffffff');
      });
      const hdr=el.querySelector('.ig-header');if(hdr)hdr.style.background='#0f0f0f';
      const ftr=el.querySelector('.ig-footer');if(ftr)ftr.style.background='#0f0f0f';
      const ban=el.querySelector('.ig-banner');
      if(ban){ban.style.background=ban.classList.contains('b-glass')?'#ffffff':ban.classList.contains('b-orange')?'#FF6600':'#1c1c1c';}
    }
  });
  ig.querySelectorAll('.igc').forEach(c=>{c.style.transform='';c.style.transition='';});
  return cv;
}
async function dlJPG(){
  const ov=document.getElementById('dlv');ov.classList.add('on');
  await new Promise(r=>setTimeout(r,200));
  try{const cv=await renderCanvas();const a=document.createElement('a');a.download='compass-infographic.jpg';a.href=cv.toDataURL('image/jpeg',.97);a.click();}
  catch(e){alert('Failed: '+e.message);}
  ov.classList.remove('on');
}
async function dlPDF(){
  const ov=document.getElementById('dlv');ov.classList.add('on');
  await new Promise(r=>setTimeout(r,200));
  try{
    const cv=await renderCanvas(),img=cv.toDataURL('image/jpeg',.97);
    const{jsPDF}=window.jspdf;
    const ig=document.getElementById('infographic');
    const W=210,H=Math.round(W*ig.offsetHeight/ig.offsetWidth);
    const pdf=new jsPDF({orientation:H>W?'portrait':'landscape',unit:'mm',format:[W,H]});
    pdf.addImage(img,'JPEG',0,0,W,H,undefined,'FAST');
    pdf.save('compass-infographic.pdf');
  }catch(e){alert('PDF failed: '+e.message);}
  ov.classList.remove('on');
}
function equalizeCardImages() {
  // Cards are in a CSS grid. For each visual row, find cards that have images
  // and match position (all-top or all-bottom). Set a uniform height so the
  // row looks consistent — the CSS grid will stretch non-image cards to fill.
  const grid = document.getElementById('ig-grid');
  if (!grid) return;
  const n = cards.length;
  const cols = n <= 1 ? 1 : n === 3 ? 3 : 2;
  // Process each row
  for (let row = 0; row < Math.ceil(n / cols); row++) {
    const rowCards = cards.slice(row * cols, row * cols + cols);
    // Top images in this row: max height
    const topImgs = rowCards.filter(c => c.img && (c.imgPos || 'top') === 'top');
    const botImgs = rowCards.filter(c => c.img && c.imgPos === 'bottom');
    const maxTopH = topImgs.length ? Math.max(...topImgs.map(c => c.imgH || 130)) : 0;
    const maxBotH = botImgs.length ? Math.max(...botImgs.map(c => c.imgH || 130)) : 0;

    // Apply equalised height to all banners in this row
    const gridCards = grid.querySelectorAll('.igc');
    for (let ci = row * cols; ci < Math.min(row * cols + cols, n); ci++) {
      const igc = gridCards[ci];
      if (!igc) continue;
      const topBanner = igc.querySelector('.igc-img-banner.pos-top');
      const botBanner = igc.querySelector('.igc-img-banner.pos-bottom');
      if (topBanner && maxTopH) topBanner.style.height = maxTopH + 'px';
      if (botBanner && maxBotH) botBanner.style.height = maxBotH + 'px';
      // Cards without an image in a row that has images: add matching placeholder space
      // via min-height so all cards stay the same row height (CSS Grid handles this)
    }
  }
}

function initAll(){rce();rbe();upd();}
initAll();
</script>

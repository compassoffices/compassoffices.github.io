<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass Offices — Member Perks</title>
<style>
/* ============================================================
   COMPASS OFFICES — Member Perks dashboard
   Namespaced under .cop. Brand tokens mirror the Company
   Overview (.cov) sheet. Font inherits from the host page.
   ============================================================ */
/* Standalone-only fallback font (no import). Inside WordPress the
   .cop namespace inherits the theme/brand font instead. */
body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;margin:0;background:#fff;}

.cop{
  --orange:#FF6600;
  --orange-dk:#E55A00;
  --tint:#FFF1E6;
  --ink:#161616;
  --slate:#5E5E5E;
  --paper:#FFFFFF;
  --char:#1A1A1A;
  --line:rgba(0,0,0,.14);
  --line-soft:rgba(0,0,0,.08);
  --max:1180px;
  color:var(--ink);
  line-height:1.55;
  font-variant-numeric:tabular-nums;
  font-family:inherit;
}
.cop *,.cop *::before,.cop *::after{box-sizing:border-box;margin:0;padding:0;}
.cop img{max-width:100%;display:block;}
.cop .wrap{max-width:var(--max);margin:0 auto;padding:0 28px;}

.cop .eye{
  display:inline-flex;align-items:center;gap:10px;
  font-size:.80rem;letter-spacing:.22em;text-transform:uppercase;
  font-weight:700;color:var(--orange);margin-bottom:18px;
}
.cop .eye svg{width:15px;height:15px;fill:var(--orange);flex:0 0 auto;}

/* ---- Header ----------------------------------------------- */
.cop .head{padding:64px 0 30px;}
.cop .head h1{
  font-size:clamp(2.2rem,5.2vw,3.4rem);line-height:1.02;letter-spacing:-.025em;
  font-weight:800;color:var(--ink);margin-bottom:16px;
}
.cop .head .lead{font-size:1.12rem;color:var(--slate);max-width:560px;}
.cop .head .rule{margin-top:30px;height:5px;width:64px;background:var(--orange);}

/* ---- Controls --------------------------------------------- */
.cop .controls{
  position:sticky;top:0;z-index:30;background:var(--paper);
  padding:16px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  display:flex;flex-wrap:wrap;gap:14px;align-items:center;
}
.cop .search{position:relative;flex:1 1 240px;max-width:320px;}
.cop .search input{
  width:100%;border:1px solid var(--line);border-radius:0;
  padding:12px 16px 12px 42px;font-size:.95rem;color:var(--ink);
  background:var(--paper);font-family:inherit;
}
.cop .search input:focus{outline:2px solid var(--orange);outline-offset:-1px;border-color:var(--orange);}
.cop .search svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--slate);}
.cop .filters{display:flex;flex-wrap:wrap;gap:0;border:1px solid var(--line);}
.cop .filter{
  border:0;border-right:1px solid var(--line);background:var(--paper);color:var(--ink);
  padding:11px 17px;font-size:.86rem;font-weight:700;letter-spacing:.02em;
  cursor:pointer;font-family:inherit;transition:background .18s ease,color .18s ease;
}
.cop .filter:last-child{border-right:0;}
.cop .filter:hover{color:var(--orange);}
.cop .filter[aria-pressed="true"]{background:var(--ink);color:#fff;}
.cop .filter:focus-visible{outline:2px solid var(--orange);outline-offset:2px;}
.cop .count{margin-left:auto;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--slate);white-space:nowrap;}

/* ---- Group section ---------------------------------------- */
.cop .section{padding:46px 0 6px;}
.cop .section-head{
  display:flex;align-items:center;gap:18px;
  border-bottom:2px solid var(--ink);padding-bottom:16px;margin-bottom:26px;
}
.cop .point{
  font-size:clamp(2rem,3.4vw,2.7rem);font-weight:800;color:var(--orange);
  line-height:1;letter-spacing:-.02em;min-width:1.3ch;text-align:center;flex:0 0 auto;
}
.cop .section-titles{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
.cop .section-name{font-size:clamp(1.3rem,2.4vw,1.6rem);font-weight:800;letter-spacing:-.01em;color:var(--ink);}
.cop .section-meta{font-size:.74rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);}

/* ---- Cards ------------------------------------------------ */
.cop .grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(236px,1fr));}
.cop .card{
  background:var(--paper);border:1px solid var(--line);border-radius:16px;
  padding:20px;cursor:pointer;text-align:left;width:100%;font-family:inherit;
  display:flex;flex-direction:column;gap:13px;
  transition:transform .18s cubic-bezier(.2,.7,.2,1),box-shadow .18s ease,border-color .18s ease;
}
.cop .card:hover{transform:translateY(-4px);border-color:rgba(0,0,0,.22);box-shadow:0 18px 40px -22px rgba(20,20,20,.5);}
.cop .card:focus-visible{outline:2px solid var(--orange);outline-offset:2px;}
.cop .logo{height:62px;display:flex;align-items:center;}
.cop .logo img{max-height:62px;max-width:152px;object-fit:contain;}
.cop .logo .fallback{font-weight:800;font-size:1.2rem;color:var(--ink);letter-spacing:-.01em;}
.cop .card-name{
  position:relative;padding-left:15px;font-weight:800;font-size:1.06rem;
  line-height:1.2;color:var(--ink);letter-spacing:-.01em;
}
.cop .card-name::before{content:"";position:absolute;left:0;top:3px;width:6px;height:15px;background:var(--orange);}
.cop .tag{
  display:inline-block;width:fit-content;font-size:.66rem;font-weight:800;
  letter-spacing:.07em;text-transform:uppercase;color:var(--orange-dk);
  background:var(--tint);border-radius:3px;padding:4px 9px;line-height:1;
}
.cop .offer{font-size:.9rem;color:var(--slate);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cop .offer.empty{font-style:italic;opacity:.7;}
.cop .more{margin-top:auto;font-size:.8rem;font-weight:800;letter-spacing:.02em;
  color:var(--orange);display:flex;align-items:center;gap:6px;text-transform:uppercase;}
.cop .more svg{width:13px;height:11px;fill:var(--orange);transition:transform .2s ease;}
.cop .card:hover .more svg{transform:translateX(4px);}

/* ---- Empty ------------------------------------------------ */
.cop .empty{padding:64px 0;text-align:center;color:var(--slate);}
.cop .empty strong{display:block;color:var(--ink);font-size:1.1rem;font-weight:800;margin-bottom:6px;}

/* ---- Modal ------------------------------------------------ */
.cop .overlay{position:fixed;inset:0;background:rgba(20,20,20,.6);backdrop-filter:blur(3px);
  display:none;align-items:flex-end;justify-content:center;z-index:100;}
.cop .overlay.open{display:flex;}
.cop .modal{
  background:var(--paper);width:100%;max-width:560px;max-height:88vh;overflow:auto;
  border-radius:20px 20px 0 0;padding:28px;position:relative;border-top:5px solid var(--orange);
}
.cop .close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:10px;
  border:1px solid var(--line);background:#fff;cursor:pointer;font-size:20px;color:var(--ink);line-height:1;font-family:inherit;}
.cop .close:hover{color:var(--orange);border-color:var(--orange);}
.cop .close:focus-visible{outline:2px solid var(--orange);outline-offset:2px;}
.cop .modal-logo{height:78px;display:flex;align-items:center;margin-bottom:14px;}
.cop .modal-logo img{max-height:78px;max-width:200px;object-fit:contain;}
.cop .modal-logo .fallback{font-weight:800;font-size:1.6rem;color:var(--ink);}
.cop .modal h2{font-size:clamp(1.5rem,3vw,1.9rem);font-weight:800;letter-spacing:-.015em;color:var(--ink);}
.cop .modal .tag{margin:12px 0 2px;}
.cop .offer-block{
  white-space:pre-line;font-size:.97rem;color:var(--ink);line-height:1.6;
  background:#FFF8F2;border:1px solid var(--line-soft);border-left:4px solid var(--orange);
  border-radius:10px;padding:16px 18px;margin:18px 0;
}
.cop .meta{display:grid;grid-template-columns:auto 1fr;gap:10px 18px;font-size:.95rem;}
.cop .meta dt{color:var(--slate);font-weight:700;}
.cop .meta dd{color:var(--ink);}
.cop .meta a{color:var(--orange);text-decoration:none;font-weight:700;word-break:break-all;}
.cop .meta a:hover{text-decoration:underline;}

/* ---- Footer ----------------------------------------------- */
.cop .foot{margin-top:40px;padding:22px 0 8px;border-top:1px solid var(--line);
  font-size:.82rem;color:var(--slate);display:flex;flex-wrap:wrap;gap:9px;align-items:center;}
.cop .foot code{background:#f3f1ee;padding:2px 6px;border-radius:4px;font-size:.82em;color:var(--ink);}
.cop .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.cop .dot.live{background:var(--orange);}
.cop .dot.demo{background:var(--slate);}

/* ---- Reveal ----------------------------------------------- */
.cop .rv{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease;}
.cop .rv.is-in{opacity:1;transform:none;}

@media (min-width:620px){
  .cop .overlay{align-items:center;padding:24px;}
  .cop .modal{border-radius:20px;}
}
@media (max-width:768px){
  .cop .filters{border:0;gap:8px;}
  .cop .filter{border:1px solid var(--line);border-radius:999px;padding:9px 16px;}
  .cop .filter:last-child{border-right:1px solid var(--line);}
  .cop .filter[aria-pressed="true"]{border-color:var(--ink);}
  .cop .search{flex:1 1 auto;max-width:none;}
  .cop .search input{border-radius:10px;}
  .cop .count{margin-left:0;flex-basis:100%;}
}
@media (max-width:600px){
  .cop .head{padding:44px 0 24px;}
  .cop .wrap{padding:0 22px;}
}
@media (prefers-reduced-motion:reduce){
  .cop *{transition:none!important;animation:none!important;}
  .cop .rv{opacity:1;transform:none;}
}
</style>
</head>
<body>
<div class="cop">
  <div class="wrap">

    <header class="head rv">
      <div class="eye">
        <svg viewBox="0 0 24 24"><path d="M12 2 14.4 9.6 22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z"/></svg>
        Compass Offices · Member Benefits
      </div>
      <h1>Member Perks</h1>
      <p class="lead">Exclusive offers for Compass Offices clients, organised across the four points of the compass.</p>
      <div class="rule"></div>
    </header>

    <div class="controls">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="cop-search-input" type="search" placeholder="Search perks, brands or offers…" aria-label="Search perks">
      </div>
      <div class="filters" id="cop-tabs" role="group" aria-label="Filter by group"></div>
      <span class="count" id="cop-count"></span>
    </div>

    <main id="cop-sections"></main>

    <footer class="foot" id="cop-foot"></footer>
  </div>

  <div class="overlay" id="cop-overlay" role="dialog" aria-modal="true" aria-labelledby="cop-modal-name">
    <div class="modal" id="cop-modal">
      <button class="close" id="cop-close" aria-label="Close">&times;</button>
      <div class="modal-logo" id="cop-modal-logo"></div>
      <h2 id="cop-modal-name"></h2>
      <span class="tag" id="cop-modal-tag"></span>
      <div class="offer-block" id="cop-modal-offer"></div>
      <dl class="meta" id="cop-modal-meta"></dl>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ======================================================================
     CONNECT YOUR GOOGLE SHEET
     ----------------------------------------------------------------------
     Google Sheets ▸ File ▸ Share ▸ Publish to web
       • Page: the "Perks" sheet   • Format: Comma-separated values (.csv)
     Publish, copy the link, paste it between the quotes below.

     ====================================================================== */
  var SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1FYYJghRMxQ520lULymVePqj3dfZraxoxT2m9xdd83-zQbT9_cX2nSJTejP8qfQ/pub?output=csv";

  var GROUPS = [
    {name:"Fitness & Wellness",   point:"N", dir:"North"},
    {name:"Food & Beverage",      point:"E", dir:"East"},
    {name:"Travel & Hospitality", point:"S", dir:"South"},
    {name:"Lifestyle & Services", point:"W", dir:"West"}
  ];

  var L = "https://www.compassoffices.com/wp-content/uploads/2026/06/perks-logo_";
  var FALLBACK = [
    ["Fitness & Wellness","ASAP",L+"ASAP-1.jpg","Wellness / Recovery","First-time session: HK$280 (regular HK$360).","Hong Kong","",""],
    ["Fitness & Wellness","CONDITN",L+"CONDITN.jpg","Fitness Studio","","Australia","",""],
    ["Fitness & Wellness","Pure Fitness",L+"Pure-1.jpg","Fitness & Yoga","Corporate rate starting from $709.","Hong Kong","",""],

    ["Fitness & Wellness","Skin Laundry",L+"SKIN-LAUNDRY-1.jpg","Skincare Clinic","First Signature Laser Facial FREE ($1,000 value) + 20% off your first purchase.\nCode: COMPASSFREE","Hong Kong","","https://www.skinlaundry.com/"],
    ["Fitness & Wellness","Epic",L+"Epic.jpg","Fitness","","","",""],
    ["Food & Beverage","Bakehouse",L+"Bakehouse.jpg","Bakery & Cafe","","Hong Kong","",""],
    ["Food & Beverage","Eatigo",L+"Eatingo-1.jpg","Dining Bookings","Extra PHP 100 on top of Eatigo's existing discounts of up to 50% at partner restaurants.","Philippines","",""],
    ["Food & Beverage","Frites",L+"FRITES-1.jpg","Belgian Restaurant","Silver members get 10% off.","Hong Kong","","https://www.frites.hk"],
    ["Food & Beverage","Kuki Zakaya",L+"KukiZakaya-1.jpg","Japanese Izakaya","","Hong Kong","",""],
    ["Food & Beverage","Keeta",L+"Keeta.jpg","Food Delivery","","Hong Kong","",""],
    ["Food & Beverage","MyiCellar",L+"MyiCellar-1.jpg","Wine Cellaring","10% off all orders.","Hong Kong","",""],
    ["Food & Beverage","Nosh",L+"Nosh-1.jpg","Healthy Meal Delivery","\"COMPASS15\" — 15% off for new customers (one-time use per account).\n\"COMPASS10\" — 10% off for existing customers (multiple use throughout the year).","Hong Kong","Louise Yeung",""],
    ["Food & Beverage","Sino Vantage",L+"SINO-Vantage-1.jpg","Wine & Spirits","","Hong Kong","",""],
    ["Food & Beverage","Suphia Foods",L+"SuphiaFoods.jpg","Functional Food","","Hong Kong","Suphia",""],
    ["Travel & Hospitality","Club Med",L+"ClubMed-1.jpg","Resorts","Member offers on selected Club Med resort stays. Booking via WhatsApp or phone; offers exclude flights/transport.","Hong Kong","","www.clubmed.com.hk"],
    ["Travel & Hospitality","Dash Living",L+"DASH-living-1.jpg","Co-living / Stays","Exclusive accommodation discount: 10% off your entire booking.","Hong Kong","","www.dash.co"],
    ["Travel & Hospitality","Greater Bay Airlines",L+"GBA.jpg","Airline","Designated routes round-trip net fare from HKD $80. Promo code: DG8AT31 (check current sales & travel periods).","Hong Kong","calvinchang@greaterbay-airlines.com","https://www.greaterbay-airlines.com/"],
    ["Travel & Hospitality","Holiday Inn",L+"HolidayInn-1.jpg","Hotel","","","",""],
    ["Travel & Hospitality","Pullman",L+"Pullman.jpg","Hotel","20% discount (Pullman Hanoi).","Vietnam","",""],
    ["Travel & Hospitality","Royal View Hotel",L+"Royal-View-Hotel-1.jpg","Hotel","Individual booking: 40% off Best Unrestricted Rate (book 3 days ahead).\nLong stay (28+ nights): extra 5% off (book 5 days ahead).","Hong Kong","Getsby Chan","https://www.royalview.com.hk"],
    ["Travel & Hospitality","The Bicester Collection",L+"TheBicesterCollection-1.jpg","Luxury Outlet Shopping","10% discount on outlet prices + access to The Apartment VIP lounge.","Hong Kong","Christy",""],
    ["Travel & Hospitality","The Charterhouse",L+"TheCharterhouse-1.jpg","Hotel","Exclusive room rates from HK$800/night (up to HK$4,800 value). +10% service charge & 3% government tax.","Hong Kong","info@charterhouse.com","www.charterhouse.com"],
    ["Lifestyle & Services","Adecco",L+"Adecco.jpg","HR / Recruitment","Special discount on HR services.","Hong Kong","Jovian",""],
    ["Lifestyle & Services","China Mobile",L+"China-Mobile-1.jpg","Telecom","Corporate plan.","Hong Kong","",""],
    ["Lifestyle & Services","Futubull",L+"Futu.jpg","Investing / Brokerage","Special offer for account opening.","Hong Kong","",""],
    ["Lifestyle & Services","Jo Malone",L+"JoMalone-1.jpg","Fragrance & Beauty","","","",""],
    ["Lifestyle & Services","OneDegree",L+"OneDegree-1.jpg","Insurance","","Hong Kong","Wayne",""],
    ["Lifestyle & Services","RedBox",L+"RedBox-1.jpg","Storage","Flexible self-storage & valet plans for home and business. Member specials on monthly plans + complimentary consultation, transport and shelving.","Hong Kong","","http://www.redboxstorage.com.hk/"],
    ["Lifestyle & Services","Syfe",L+"Syfe.jpg","Wealth / Investing","Up to HKD 2,800 in cash for account opening.","Hong Kong","",""],
    ["Lifestyle & Services","Uber",L+"Uber-1.jpg","Transport","Uber for Business: 5% discount on every ride for Compass Offices in Hong Kong.","Hong Kong","",""]
  ];
  var COLS = ["group","company","logo","industry","offer","country","contact","website"];

  function parseCSV(text){
    var rows=[], row=[], field="", i=0, inQ=false, c;
    text = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
    while(i<text.length){
      c=text[i];
      if(inQ){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else {inQ=false;} } else field+=c; }
      else { if(c==='"') inQ=true; else if(c===','){ row.push(field); field=""; }
        else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=""; } else field+=c; }
      i++;
    }
    if(field.length||row.length){ row.push(field); rows.push(row); }
    return rows;
  }
  function fromSheet(text){
    var rows = parseCSV(text).filter(function(r){return r.some(function(c){return c&&c.trim()!=="";});});
    if(!rows.length) return [];
    var head = rows[0].map(function(h){return h.trim().toLowerCase();});
    function idx(){ for(var a=0;a<arguments.length;a++){var k=head.indexOf(arguments[a]); if(k>-1)return k;} return -1; }
    var map = { group:idx("group"), company:idx("company","name"), logo:idx("logo","image"),
      industry:idx("industry","type"), offer:idx("offer","details","perk"),
      country:idx("country/region","country","region"), contact:idx("contact"),
      website:idx("website","url","link"), show:idx("show","active","visible") };
    var out=[];
    for(var r=1;r<rows.length;r++){
      var row=rows[r];
      var get=function(k){return map[k]>-1 && row[map[k]]!=null ? row[map[k]].trim() : "";};
      if(map.show>-1){ var s=get("show").toLowerCase(); if(s==="false"||s==="no"||s==="0"||s==="hide") continue; }
      if(!get("company") && !get("group")) continue;
      out.push([get("group"),get("company"),get("logo"),get("industry"),get("offer"),get("country"),get("contact"),get("website")]);
    }
    return out;
  }
  function toObjects(arr){ return arr.map(function(r){var o={};COLS.forEach(function(c,i){o[c]=(r[i]||"").trim();});return o;}); }

  var DATA=[], activeGroup="all", query="", LIVE=false;
  var $=function(id){return document.getElementById(id);};
  function esc(s){return (s||"").replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}
  function pointFor(g){var x=GROUPS.filter(function(z){return z.name===g;})[0];return x?x.point:"";}

  function fillLogo(wrap,p){
    wrap.innerHTML="";
    if(p.logo){
      var img=new Image(); img.alt=p.company; img.src=p.logo;
      img.onerror=function(){ wrap.innerHTML='<span class="fallback">'+esc(p.company)+'</span>'; };
      wrap.appendChild(img);
    } else { wrap.innerHTML='<span class="fallback">'+esc(p.company)+'</span>'; }
    return wrap;
  }
  function logoNode(p){ var w=document.createElement("div"); w.className="logo"; return fillLogo(w,p); }

  function matches(p){
    if(activeGroup!=="all" && p.group!==activeGroup) return false;
    if(query){
      var hay=(p.company+" "+p.industry+" "+p.offer+" "+p.country+" "+p.group).toLowerCase();
      if(hay.indexOf(query)===-1) return false;
    }
    return true;
  }

  function renderTabs(){
    var t=$("cop-tabs"); t.innerHTML="";
    function tab(label,val){
      var b=document.createElement("button");
      b.className="filter"; b.type="button"; b.setAttribute("aria-pressed", val===activeGroup);
      b.textContent=label;
      b.onclick=function(){activeGroup=val;render();};
      t.appendChild(b);
    }
    tab("All","all");
    GROUPS.forEach(function(g){ tab(g.name, g.name); });
  }

  var io=null;
  function observe(){
    if(io) io.disconnect();
    if(!("IntersectionObserver" in window)){ Array.prototype.forEach.call(document.querySelectorAll(".cop .rv"),function(e){e.classList.add("is-in");}); return; }
    io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add("is-in");io.unobserve(e.target);}});},{threshold:.08});
    Array.prototype.forEach.call(document.querySelectorAll(".cop .rv:not(.is-in)"),function(e){io.observe(e);});
  }

  function render(){
    renderTabs();
    var host=$("cop-sections"); host.innerHTML="";
    var shown=0;
    GROUPS.forEach(function(g){
      if(activeGroup!=="all" && activeGroup!==g.name) return;
      var items=DATA.filter(function(p){return p.group===g.name && matches(p);});
      if(!items.length) return;
      shown+=items.length;

      var sec=document.createElement("section"); sec.className="section rv";
      var head=document.createElement("div"); head.className="section-head";
      head.innerHTML='<div class="point" aria-hidden="true">'+g.point+'</div>'+
        '<div class="section-titles"><span class="section-name">'+esc(g.name)+'</span>'+
        '<span class="section-meta">'+g.dir+' · '+items.length+' partner'+(items.length>1?'s':'')+'</span></div>';
      sec.appendChild(head);

      var grid=document.createElement("div"); grid.className="grid";
      items.forEach(function(p){
        var card=document.createElement("button"); card.className="card"; card.type="button";
        card.appendChild(logoNode(p));
        var body=document.createElement("div");
        body.style.display="flex"; body.style.flexDirection="column"; body.style.gap="11px"; body.style.flex="1";
        body.innerHTML='<div class="card-name">'+esc(p.company)+'</div>'+
          (p.industry?'<span class="tag">'+esc(p.industry)+'</span>':'')+
          (p.offer?'<div class="offer">'+esc(p.offer)+'</div>':'<div class="offer empty">Ask reception for the latest offer</div>')+
          '<div class="more">View offer <svg viewBox="0 0 24 24"><path d="M14 5l7 7-7 7v-4H3v-6h11z"/></svg></div>';
        card.appendChild(body);
        card.onclick=function(){openModal(p);};
        grid.appendChild(card);
      });
      sec.appendChild(grid);
      host.appendChild(sec);
    });

    if(!shown){
      host.innerHTML='<div class="empty"><strong>No perks match your search.</strong>Try a different keyword or clear the filter.</div>';
    }
    var total=DATA.filter(matches).length;
    $("cop-count").textContent=total+" of "+DATA.length+" perks";
    observe();
  }

  var lastFocus=null;
  function openModal(p){
    lastFocus=document.activeElement;
    fillLogo($("cop-modal-logo"),p);
    $("cop-modal-name").textContent=p.company;
    $("cop-modal-tag").textContent=(pointFor(p.group)?pointFor(p.group)+" · ":"")+p.group+(p.industry?"  ·  "+p.industry:"");
    $("cop-modal-offer").textContent=p.offer || "No offer details on file yet — please ask Compass reception for the current perk.";
    var meta=$("cop-modal-meta"); meta.innerHTML="";
    function add(label,val,isLink){
      if(!val) return;
      var dt=document.createElement("dt"); dt.textContent=label;
      var dd=document.createElement("dd");
      if(isLink){ var href=/^https?:/.test(val)?val:"https://"+val; dd.innerHTML='<a href="'+esc(href)+'" target="_blank" rel="noopener">'+esc(val)+'</a>'; }
      else dd.textContent=val;
      meta.appendChild(dt); meta.appendChild(dd);
    }
    add("Region",p.country,false);
    add("Contact",p.contact,false);
    add("Website",p.website,true);
    $("cop-overlay").classList.add("open");
    $("cop-close").focus();
  }
  function closeModal(){ $("cop-overlay").classList.remove("open"); if(lastFocus)lastFocus.focus(); }
  $("cop-close").onclick=closeModal;
  $("cop-overlay").addEventListener("click",function(e){if(e.target===this)closeModal();});
  document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});
  $("cop-search-input").addEventListener("input",function(e){query=e.target.value.trim().toLowerCase();render();});

  function setFoot(){
    var f=$("cop-foot");
    if(LIVE){ f.innerHTML='<span class="dot live"></span> Live from Google Sheet · '+DATA.length+' perks. Edit the sheet to update this page.'; }
    else { f.innerHTML='<span class="dot demo"></span> Showing built-in sample data. Add your published Google Sheet CSV link to <code>SHEET_CSV_URL</code> to go live.'; }
  }
  function boot(rows,live){ DATA=toObjects(rows); LIVE=live; render(); setFoot(); }

  if(SHEET_CSV_URL){
    fetch(SHEET_CSV_URL).then(function(r){if(!r.ok)throw 0;return r.text();})
      .then(function(t){ var rows=fromSheet(t); if(!rows.length)throw 0; boot(rows,true); })
      .catch(function(){ boot(FALLBACK,false); });
  } else { boot(FALLBACK,false); }
})();
</script>
</body>
</html>

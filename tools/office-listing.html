<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Listing Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --o:#FF6600;--olt:#FFF3EB;
  --blk:#1A1A1A;--drk:#333;--mid:#555;--lt:#888;--xlt:#BBBBBB;
  --bd:#E5E5E5;--bg:#F5F5F5;--wh:#FFFFFF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--bg);color:var(--drk);
     height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}

/* HEADER */
header{background:var(--wh);border-bottom:1px solid var(--bd);height:54px;
       padding:0 22px;display:flex;align-items:center;justify-content:space-between;z-index:300;}
.hbrand{display:flex;align-items:center;gap:12px;}
.hlogo-fb{font-size:14px;font-weight:800;color:var(--o);}
.hdiv{width:1px;height:16px;background:var(--bd);}
.htag{font-size:11px;font-weight:600;color:var(--xlt);text-transform:uppercase;letter-spacing:.09em;}
.hright{display:flex;align-items:center;gap:10px;}
.status-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;
  background:#F0FDF4;color:#166534;border:1px solid #BBF7D0;}
.hbtn{padding:8px 18px;font-size:13px;font-weight:700;border-radius:6px;cursor:pointer;
      font-family:inherit;border:none;background:var(--o);color:var(--wh);
      display:flex;align-items:center;gap:6px;transition:background .15s;}
.hbtn:hover{background:#e55a00;}
.hbtn-ghost{padding:8px 14px;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;
      font-family:inherit;border:1.5px solid var(--bd);background:var(--wh);color:var(--mid);
      display:flex;align-items:center;gap:6px;transition:all .15s;}
.hbtn-ghost:hover{border-color:var(--o);color:var(--o);}

/* LAYOUT */
.app{display:grid;grid-template-columns:420px 1fr;height:calc(100vh - 54px);}

/* SIDEBAR */
.sidebar{background:var(--wh);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;}
.tabnav{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;}
.tab{flex:1;padding:13px 4px 11px;font-size:11px;font-weight:700;text-transform:uppercase;
     letter-spacing:.06em;border:none;background:transparent;cursor:pointer;color:var(--xlt);
     border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:inherit;}
.tab:hover{color:var(--drk);}
.tab.on{color:var(--o);border-bottom-color:var(--o);}
.panels{flex:1;overflow-y:auto;}
.panel{display:none;padding:20px 18px 80px;}
.panel.on{display:block;}

/* FORM */
.slabel{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;
        color:var(--xlt);margin:20px 0 10px;display:flex;align-items:center;gap:7px;}
.slabel:first-child{margin-top:0;}
.slabel::after{content:'';flex:1;height:1px;background:var(--bd);}
.field{margin-bottom:10px;}
.fl{display:block;font-size:10.5px;font-weight:600;color:var(--lt);margin-bottom:5px;letter-spacing:.01em;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.frow .field{margin-bottom:0;}

input[type=text],input[type=url],textarea,select{
  width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:6px;
  font-size:13.5px;font-family:inherit;color:var(--drk);background:var(--wh);
  outline:none;transition:border-color .15s;line-height:1.45;}
input:focus,textarea:focus,select:focus{border-color:var(--o);}
textarea{resize:vertical;min-height:60px;}

/* SEPARATOR BUTTONS */
.sep-opts{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px;}
.sep-opt{padding:6px 11px;border:1.5px solid var(--bd);border-radius:6px;
  background:var(--wh);color:var(--mid);font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .15s;line-height:1;}
.sep-opt:hover{border-color:var(--o);color:var(--o);}
.sep-opt.on{background:var(--o);border-color:var(--o);color:var(--wh);}

/* TRANSPORT ROWS */
.tr-list{display:flex;flex-direction:column;gap:5px;}
.tr-row{display:flex;align-items:center;gap:7px;padding:7px 9px;
        border:1.5px solid var(--bd);border-radius:8px;background:var(--wh);}
.tr-ico-btn{width:32px;height:32px;flex-shrink:0;border:1.5px solid var(--o);
            border-radius:8px;background:var(--olt);cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            color:var(--o);transition:all .15s;padding:0;}
.tr-ico-btn:hover{background:var(--o);color:var(--wh);}
.tr-ico-btn svg{width:15px;height:15px;pointer-events:none;}
.tr-input{flex:1;border:none;background:transparent;font-family:inherit;
          font-size:13px;color:var(--drk);outline:none;padding:0;min-width:0;}
.tr-input::placeholder{color:var(--xlt);}
.tr-del{width:20px;height:20px;background:transparent;border:none;color:var(--xlt);
        cursor:pointer;display:flex;align-items:center;justify-content:center;
        flex-shrink:0;border-radius:3px;transition:color .15s;padding:0;}
.tr-del:hover{color:#DC2626;}
.tr-add{width:100%;padding:8px;border:1px dashed var(--bd);border-radius:8px;
        background:transparent;color:var(--xlt);font-size:12.5px;font-weight:600;
        cursor:pointer;font-family:inherit;transition:all .15s;margin-top:4px;
        display:flex;align-items:center;justify-content:center;gap:6px;}
.tr-add:hover{border-color:var(--o);color:var(--o);}

/* AMENITY CHIPS */
.amen-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.amen-item{display:flex;align-items:center;gap:7px;padding:8px 10px;
           border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;
           font-size:12px;font-weight:500;color:var(--lt);transition:all .15s;user-select:none;}
.amen-item:hover{border-color:var(--o);color:var(--drk);}
.amen-item.on{border-color:var(--o);color:var(--drk);background:var(--olt);}
.amen-item .aico{width:14px;height:14px;flex-shrink:0;color:var(--bd);transition:color .15s;}
.amen-item.on .aico,.amen-item:hover .aico{color:var(--o);}

/* ICON PICKER */
.ico-picker{position:fixed;z-index:9999;background:var(--wh);border:1px solid var(--bd);
  border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.15);padding:10px;width:232px;display:none;}
.ico-picker.open{display:block;}
.ico-picker-title{font-size:10px;font-weight:800;text-transform:uppercase;
                  letter-spacing:.08em;color:var(--xlt);margin-bottom:8px;}
.ico-picker-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.ico-opt{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 3px;border:1.5px solid transparent;border-radius:6px;cursor:pointer;transition:all .12s;}
.ico-opt:hover{border-color:var(--o);background:var(--olt);}
.ico-opt.sel{border-color:var(--o);background:var(--olt);}
.ico-opt svg{width:16px;height:16px;color:var(--drk);}
.ico-opt:hover svg,.ico-opt.sel svg{color:var(--o);}
.ico-opt span{font-size:9px;color:var(--xlt);text-align:center;line-height:1.2;}

/* BOTTOM ACTIONS */
.gen-wrap{padding:12px 18px;border-top:1px solid var(--bd);background:var(--wh);
  flex-shrink:0;display:flex;gap:8px;}
.gen-btn{flex:1;padding:11px;background:var(--o);border:none;border-radius:8px;
         color:var(--wh);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
         display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;}
.gen-btn:hover{background:#e55a00;transform:translateY(-1px);}
.gen-btn-ghost{padding:11px 16px;border:1.5px solid var(--bd);border-radius:8px;
  background:var(--wh);color:var(--mid);font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s;}
.gen-btn-ghost:hover{border-color:var(--o);color:var(--o);}

/* RIGHT: JSON PREVIEW */
.preview{background:var(--bg);overflow:hidden;display:flex;flex-direction:column;}
.preview-topbar{padding:14px 22px;border-bottom:1px solid var(--bd);background:var(--wh);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.preview-topbar-left{display:flex;align-items:center;gap:10px;}
.preview-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--xlt);}
.json-filename{font-size:12px;font-weight:600;color:var(--mid);background:var(--bg);
  border:1px solid var(--bd);border-radius:5px;padding:4px 10px;}
.copy-btn{padding:6px 14px;border:1.5px solid var(--bd);border-radius:6px;background:var(--wh);
  color:var(--mid);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:5px;transition:all .15s;}
.copy-btn:hover{border-color:var(--o);color:var(--o);}
.json-wrap{flex:1;padding:18px 22px 40px;overflow-y:auto;}
.json-card{background:var(--wh);border:1px solid var(--bd);border-radius:10px;
  padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
pre{font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:12.5px;
    line-height:1.8;color:var(--mid);white-space:pre-wrap;word-break:break-all;}
.jk{color:#0369a1;}
.js{color:#c25200;}
.jn{color:#6f42c1;}
.jb{color:#166534;}
.jnull{color:#DC2626;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
</style>
</head>
<body>

<header>
  <div class="hbrand">
    <div class="hlogo-fb">compass</div>
    <div class="hdiv"></div>
    <div class="htag">Listing Editor</div>
  </div>
  <div class="hright">
    <div class="status-pill" id="statusPill">Ready</div>
    <button class="hbtn-ghost" onclick="loadDefaults()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      Reset
    </button>
    <button class="hbtn" onclick="downloadJSON()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download JSON
    </button>
  </div>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="tabnav">
      <button class="tab on" onclick="showTab('info',this)">Info</button>
      <button class="tab" onclick="showTab('specs',this)">Specs</button>
      <button class="tab" onclick="showTab('transport',this)">Transport</button>
      <button class="tab" onclick="showTab('amenities',this)">Amenities</button>
    </div>

    <div class="panels">

      <!-- INFO -->
      <div class="panel on" id="tab-info">
        <div class="slabel">Basic Info</div>
        <div class="frow">
          <div class="field"><label class="fl">Building Name</label><input type="text" id="f_name" oninput="updateJSON()"></div>
          <div class="field"><label class="fl">City</label><input type="text" id="f_city" oninput="updateJSON()"></div>
        </div>
        <div class="field" style="margin-top:10px"><label class="fl">Address</label><input type="text" id="f_address" oninput="updateJSON()"></div>
        <div class="frow">
          <div class="field"><label class="fl">Floor</label><input type="text" id="f_floor" oninput="updateJSON()"></div>
          <div class="field">
            <label class="fl">Logo Separator</label>
            <div class="sep-opts" id="sep_opts"></div>
          </div>
        </div>
        <div class="slabel">URLs</div>
        <div class="field"><label class="fl">Page URL</label><input type="url" id="f_page_url" oninput="updateJSON()"></div>
        <div class="field"><label class="fl">Partner Logo URL</label><input type="url" id="f_partner_logo_url" oninput="updateJSON()"></div>
      </div>

      <!-- SPECS -->
      <div class="panel" id="tab-specs">
        <div class="slabel">Building</div>
        <div class="frow">
          <div class="field"><label class="fl">Completion Year</label><input type="text" id="s_completion" oninput="updateJSON()"></div>
          <div class="field"><label class="fl">Elevators</label><input type="text" id="s_elevators" oninput="updateJSON()"></div>
        </div>
        <div class="frow">
          <div class="field"><label class="fl">Ceiling Height</label><input type="text" id="s_ceiling" oninput="updateJSON()"></div>
          <div class="field"><label class="fl">OA Height</label><input type="text" id="s_oa" oninput="updateJSON()"></div>
        </div>
        <div class="field"><label class="fl">Structure</label><input type="text" id="s_structure" oninput="updateJSON()"></div>

        <div class="slabel">Area</div>
        <div class="frow">
          <div class="field"><label class="fl">Floor Area</label><input type="text" id="s_floor_area" oninput="updateJSON()"></div>
          <div class="field"><label class="fl">Common Area</label><input type="text" id="s_common_area" oninput="updateJSON()"></div>
        </div>

        <div class="slabel">Services</div>
        <div class="field"><label class="fl">Air Conditioning</label><input type="text" id="s_ac" oninput="updateJSON()"></div>
        <div class="field"><label class="fl">Network</label><input type="text" id="s_network" oninput="updateJSON()"></div>
        <div class="field"><label class="fl">Facilities</label><input type="text" id="s_facilities" oninput="updateJSON()"></div>
        <div class="frow">
          <div class="field"><label class="fl">Hours</label><input type="text" id="s_hours" oninput="updateJSON()"></div>
          <div class="field"><label class="fl">Parking</label><input type="text" id="s_parking" oninput="updateJSON()"></div>
        </div>
      </div>

      <!-- TRANSPORT -->
      <div class="panel" id="tab-transport">
        <div class="slabel">Transport Links</div>
        <div class="tr-list" id="transport_list"></div>
        <button class="tr-add" onclick="addTransport()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Transport Link
        </button>
      </div>

      <!-- AMENITIES -->
      <div class="panel" id="tab-amenities">
        <div class="slabel">Amenities Available</div>
        <div class="amen-grid" id="amenities_grid"></div>
        <div class="slabel">Benefits Enabled</div>
        <div class="amen-grid" id="benefits_grid"></div>
      </div>

    </div>

    <div class="gen-wrap">
      <button class="gen-btn-ghost" onclick="copyJSON()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
      <button class="gen-btn" onclick="downloadJSON()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download JSON
      </button>
    </div>
  </div>

  <!-- JSON PREVIEW -->
  <div class="preview">
    <div class="preview-topbar">
      <div class="preview-topbar-left">
        <div class="preview-label">JSON Output</div>
        <div class="json-filename" id="jsonFilename">china-building.json</div>
      </div>
      <button class="copy-btn" onclick="copyJSON()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy JSON
      </button>
    </div>
    <div class="json-wrap">
      <div class="json-card">
        <pre id="jsonPreview"></pre>
      </div>
    </div>
  </div>

</div>

<!-- Icon Picker Popover -->
<div class="ico-picker" id="icoPicker">
  <div class="ico-picker-title">Choose Icon</div>
  <div class="ico-picker-grid" id="icoPickerGrid"></div>
</div>

<script>
const DEFAULTS = {
  name:"China Building",city:"Hong Kong",floor:"18-19F",
  address:"29 Queen's Road Central, Central, Hong Kong",
  page_url:"https://www.compassoffices.com/locations/china-building/",
  partner_logo_url:"https://example.com/partner-logo.png",
  logo_separator:"x",
  transport:[
    {text:"MTR Central Station — direct access (Exit J2)",iconId:"tr_metro"},
    {text:"Central Ferry Piers — 5 min walk",iconId:"tr_ferry"}
  ],
  specs:{
    structure:"Steel frame, seismic isolation, B3-21F",completion:"2025",
    ceiling:"2.9m",floor_area:"390 tsubo",common_area:"60 tsubo",oa:"100mm",
    elevators:"6",ac:"Block AC, weekdays 9:00–18:00",
    network:"Free Wi-Fi + dedicated line available",
    facilities:"Lounge, 3 meeting rooms, phone booths",hours:"24/7",parking:"Available"
  },
  amenities:["concierge","lounge","drinks","flexible","deposit","furniture","utilities","access24","norestore"],
  benefits_on:["concierge","lounge","drinks","flexible","deposit","furniture","utilities","access24","norestore"]
};

const AMENITY_OPTIONS=[
  {id:"concierge",label:"Concierge"},{id:"lounge",label:"Lounge"},
  {id:"drinks",label:"Drinks"},{id:"flexible",label:"Flexible"},
  {id:"deposit",label:"No Deposit"},{id:"furniture",label:"Furniture"},
  {id:"utilities",label:"Utilities"},{id:"access24",label:"24/7 Access"},
  {id:"norestore",label:"No Restore"},{id:"printing",label:"Printing"},
  {id:"mail",label:"Mail"},{id:"events",label:"Events"},
];

const TRANSPORT_ICONS=[
  {id:"tr_metro",label:"Metro",svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="16" rx="3"/><path d="M8 18l-2 4m10-4l2 4M8 10h8M9 6h6"/></svg>`},
  {id:"tr_bus",label:"Bus",svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h8M3 10h18M7 18h.01M17 18h.01"/><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M5 6V4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v2"/><circle cx="7" cy="18" r="1.5"/><circle cx="17" cy="18" r="1.5"/></svg>`},
  {id:"tr_ferry",label:"Ferry",svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2c1.3 0 1.9.5 2.5 1"/><path d="M19.38 20A11.6 11.6 0 0 0 21 14l-9-4-9 4c0 2.9.94 5.34 2.81 7.76"/><path d="M19 13V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6"/><path d="M12 5v4"/></svg>`},
  {id:"tr_train",label:"Train",svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>`},
  {id:"tr_tram",label:"Tram",svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="12" height="13" rx="2"/><path d="M7 18l-1 3m11-3l1 3M3 11h18M10 2h4"/></svg>`},
  {id:"tr_walk",label:"Walk",svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 4a1 1 0 1 0 2 0 1 1 0 0 0-2 0zm1 3-2 4-3 1 2 2-1 4 4-2 1-4 2 1z"/><path d="M10 12l-2 6M17 12l1 5"/></svg>`},
  {id:"tr_taxi",label:"Taxi",svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1L2 11v5h2"/><circle cx="6.5" cy="16.5" r="2.5"/><circle cx="16.5" cy="16.5" r="2.5"/></svg>`},
  {id:"tr_bike",label:"Bike",svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="15" cy="5" r="1"/><path d="M12 17.5V14l-3-3 4-3 2 3h2"/></svg>`},
  {id:"tr_parking",label:"Park",svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9"/></svg>`},
];

const SEP_OPTIONS=['x','×','|','/','·','&'];
let transportItems=[];
let currentIcoPicker=null;

function showTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('tab-'+id).classList.add('on');
}

function buildSepOpts(){
  const wrap=document.getElementById('sep_opts');
  wrap.innerHTML='';
  SEP_OPTIONS.forEach(s=>{
    const b=document.createElement('button');
    b.className='sep-opt';b.textContent=s;
    b.onclick=()=>{wrap.querySelectorAll('.sep-opt').forEach(x=>x.classList.remove('on'));b.classList.add('on');updateJSON();};
    wrap.appendChild(b);
  });
}
function getSep(){const on=document.querySelector('#sep_opts .sep-opt.on');return on?on.textContent:'x';}
function setSep(val){document.querySelectorAll('#sep_opts .sep-opt').forEach(b=>b.classList.toggle('on',b.textContent===val));}

function buildAmenityGrid(containerId){
  const grid=document.getElementById(containerId);grid.innerHTML='';
  AMENITY_OPTIONS.forEach(opt=>{
    const item=document.createElement('div');item.className='amen-item';item.dataset.id=opt.id;
    item.innerHTML=`<svg class="aico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>${opt.label}`;
    item.onclick=()=>{item.classList.toggle('on');updateJSON();};
    grid.appendChild(item);
  });
}
function getChecked(containerId){return[...document.querySelectorAll(`#${containerId} .amen-item.on`)].map(el=>el.dataset.id);}
function setChecked(containerId,values){document.querySelectorAll(`#${containerId} .amen-item`).forEach(el=>el.classList.toggle('on',values.includes(el.dataset.id)));}

function buildIconPicker(){
  const grid=document.getElementById('icoPickerGrid');grid.innerHTML='';
  TRANSPORT_ICONS.forEach(ico=>{
    const opt=document.createElement('div');opt.className='ico-opt';opt.dataset.id=ico.id;
    opt.innerHTML=`${ico.svg}<span>${ico.label}</span>`;
    opt.onclick=()=>{
      if(!currentIcoPicker)return;
      const idx=parseInt(currentIcoPicker.dataset.idx);
      transportItems[idx].iconId=ico.id;
      currentIcoPicker.innerHTML=TRANSPORT_ICONS.find(i=>i.id===ico.id)?.svg||'';
      grid.querySelectorAll('.ico-opt').forEach(o=>o.classList.remove('sel'));
      opt.classList.add('sel');closeIconPicker();updateJSON();
    };
    grid.appendChild(opt);
  });
}
function openIconPicker(btn,idx){
  const picker=document.getElementById('icoPicker');currentIcoPicker=btn;
  const rect=btn.getBoundingClientRect();
  picker.style.top=(rect.bottom+6)+'px';
  picker.style.left=Math.min(rect.left,window.innerWidth-246)+'px';
  const curId=transportItems[idx]?.iconId;
  document.querySelectorAll('.ico-opt').forEach(o=>o.classList.toggle('sel',o.dataset.id===curId));
  picker.classList.add('open');
}
function closeIconPicker(){document.getElementById('icoPicker').classList.remove('open');currentIcoPicker=null;}
document.addEventListener('click',e=>{if(!e.target.closest('.ico-picker')&&!e.target.closest('.tr-ico-btn'))closeIconPicker();});

function renderTransport(){
  const list=document.getElementById('transport_list');list.innerHTML='';
  transportItems.forEach((item,i)=>{
    const ico=TRANSPORT_ICONS.find(t=>t.id===item.iconId)||TRANSPORT_ICONS[0];
    const row=document.createElement('div');row.className='tr-row';
    row.innerHTML=`
      <button class="tr-ico-btn" data-idx="${i}" onclick="openIconPicker(this,${i})">${ico.svg}</button>
      <input class="tr-input" type="text" placeholder="e.g. MTR Central — 3 min walk"
        value="${esc(item.text)}" oninput="transportItems[${i}].text=this.value;updateJSON()">
      <button class="tr-del" onclick="removeTransport(${i})" title="Remove">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`;
    list.appendChild(row);
  });
}
function addTransport(){transportItems.push({text:'',iconId:'tr_metro'});renderTransport();updateJSON();}
function removeTransport(i){transportItems.splice(i,1);renderTransport();updateJSON();}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function v(id){return document.getElementById(id)?.value||'';}
function sv(id,val){const el=document.getElementById(id);if(el)el.value=val||'';}

function buildJSON(){
  return{
    name:v('f_name'),city:v('f_city'),floor:v('f_floor'),
    address:v('f_address'),page_url:v('f_page_url'),
    partner_logo_url:v('f_partner_logo_url'),logo_separator:getSep(),
    transport:transportItems.map(t=>({text:t.text,iconId:t.iconId})),
    specs:{
      structure:v('s_structure'),completion:v('s_completion'),ceiling:v('s_ceiling'),
      floor_area:v('s_floor_area'),common_area:v('s_common_area'),oa:v('s_oa'),
      elevators:v('s_elevators'),ac:v('s_ac'),network:v('s_network'),
      facilities:v('s_facilities'),hours:v('s_hours'),parking:v('s_parking'),
    },
    amenities:getChecked('amenities_grid'),
    benefits_on:getChecked('benefits_grid'),
  };
}

function highlight(obj){
  return JSON.stringify(obj,null,2).replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,m=>{
    if(/^"/.test(m))return/:$/.test(m)?`<span class="jk">${m}</span>`:`<span class="js">${m}</span>`;
    if(/true|false/.test(m))return`<span class="jb">${m}</span>`;
    if(/null/.test(m))return`<span class="jnull">${m}</span>`;
    return`<span class="jn">${m}</span>`;
  });
}

function updateJSON(){
  const obj=buildJSON();
  document.getElementById('jsonPreview').innerHTML=highlight(obj);
  document.getElementById('jsonFilename').textContent=(obj.name||'listing').toLowerCase().replace(/\s+/g,'-')+'.json';
  document.getElementById('statusPill').textContent='Updated ✓';
}

function downloadJSON(){
  const obj=buildJSON();
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(obj.name||'listing').toLowerCase().replace(/\s+/g,'-')+'.json';a.click();
  document.getElementById('statusPill').textContent='Downloaded ✓';
}
function copyJSON(){
  navigator.clipboard.writeText(JSON.stringify(buildJSON(),null,2)).then(()=>{
    const p=document.getElementById('statusPill');p.textContent='Copied!';
    setTimeout(()=>p.textContent='Updated ✓',1500);
  });
}

function loadDefaults(data=DEFAULTS){
  sv('f_name',data.name);sv('f_city',data.city);sv('f_floor',data.floor);
  sv('f_address',data.address);sv('f_page_url',data.page_url);sv('f_partner_logo_url',data.partner_logo_url);
  setSep(data.logo_separator||'x');
  transportItems=(data.transport||[]).map(t=>({...t}));renderTransport();
  const s=data.specs||{};
  sv('s_structure',s.structure);sv('s_completion',s.completion);sv('s_ceiling',s.ceiling);
  sv('s_floor_area',s.floor_area);sv('s_common_area',s.common_area);sv('s_oa',s.oa);
  sv('s_elevators',s.elevators);sv('s_ac',s.ac);sv('s_network',s.network);
  sv('s_facilities',s.facilities);sv('s_hours',s.hours);sv('s_parking',s.parking);
  setChecked('amenities_grid',data.amenities||[]);
  setChecked('benefits_grid',data.benefits_on||[]);
  updateJSON();
}

buildSepOpts();buildAmenityGrid('amenities_grid');buildAmenityGrid('benefits_grid');buildIconPicker();loadDefaults();
</script>
</body>
</html>

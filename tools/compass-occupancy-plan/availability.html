<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass Offices — Find a Location</title>
<style>
.co{
  --co-orange:#FF6600; --co-orange-dk:#E55A00; --co-orange-wash:#FFF3EB; --co-orange-tint:#FFD9BD;
  --co-ink:#282828; --co-ink-deep:#1E1E1E; --co-text:#333333; --co-text-2:#595959; --co-muted:#8C8C8C; --co-faint:#BBBBBB;
  --co-line:#E1E1E1; --co-bg:#F5F5F5; --co-fill:#EFEFEF; --co-paper:#FFFFFF; --co-ok:#15803D;
  --co-radius:14px; --co-radius-pill:999px;
  color:var(--co-ink); font-family:'Hanken Grotesk','Noto Sans TC','Noto Sans JP',system-ui,-apple-system,sans-serif;
  line-height:1.5; -webkit-font-smoothing:antialiased;
}
.co *,.co *::before,.co *::after{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--co-paper);}
.co{height:100vh;overflow:hidden;display:flex;flex-direction:column;background:var(--co-paper);}
.btn{border:1px solid var(--co-line);background:var(--co-paper);color:var(--co-text);border-radius:10px;padding:8px 15px;font:inherit;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap;}
.btn:hover{border-color:var(--co-orange);color:var(--co-orange);}
.btn.pri{background:var(--co-ink);border-color:var(--co-ink);color:#fff;}
.btn.pri:hover{background:#000;border-color:#000;color:#fff;}
.btn svg{width:15px;height:15px;}
.spacer{flex:1;}

/* ---------- HERO (cities screen) ---------- */
.hero{background:linear-gradient(120deg,#1E1E1E 0%,#282828 60%,#1E1E1E 100%);position:relative;overflow:hidden;flex-shrink:0;}
.hero::after{content:'';position:absolute;right:-40px;top:-60px;width:380px;height:380px;background:radial-gradient(circle,rgba(255,102,0,.14),transparent 66%);pointer-events:none;}
.hero-bar{display:flex;align-items:center;gap:14px;padding:1.4rem 2.2rem;position:relative;z-index:2;max-width:1180px;margin:0 auto;width:100%;}
.hero-bar .logo{height:34px;}
.hero-bar .logo svg{height:34px;width:auto;display:block;}
.fa-wrap{margin-left:auto;position:relative;}
.fa-btn{display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:#fff;font:inherit;font-size:15px;font-weight:600;padding:10px 20px;border-radius:var(--co-radius-pill);cursor:pointer;transition:.15s;}
.fa-btn:hover{background:rgba(255,255,255,.22);}
.fa-btn svg{width:15px;height:15px;transition:transform .18s;}
.fa-btn.open svg{transform:rotate(180deg);}
.loc-menu{position:fixed;background:#fff;border-radius:16px;box-shadow:0 16px 46px rgba(0,0,0,.3);padding:8px;display:none;grid-template-columns:1fr 1fr;gap:2px;min-width:340px;z-index:90;}
.loc-menu.open{display:grid;}
.loc-menu .li{padding:11px 16px;border-radius:10px;font-size:14.5px;font-weight:600;color:var(--co-ink);cursor:pointer;white-space:nowrap;transition:.1s;}
.loc-menu .li:hover{background:var(--co-orange-wash);color:var(--co-orange-dk);}
.hero-body{display:none;}
.hero-body h1{color:#fff;font-size:32px;font-weight:800;letter-spacing:-.8px;line-height:1.1;}
.hero-body p{color:rgba(255,255,255,.62);font-size:14.5px;margin-top:9px;max-width:520px;line-height:1.55;}

/* ---------- CITIES ---------- */
#screenCities{flex:1;overflow-y:auto;}
.cities-wrap{max-width:1180px;margin:0 auto;padding:2rem 2.2rem 3.5rem;width:100%;}
.cities-lead{display:flex;align-items:baseline;gap:12px;margin-bottom:1.25rem;}
.cities-lead h2{font-size:14px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--co-muted);}
.fp-status{font-size:11.5px;color:var(--co-muted);}
.fp-status.warn{color:var(--co-orange-dk);}
.cc-dl{width:32px;height:32px;border-radius:9px;border:1px solid var(--co-line);background:var(--co-paper);display:flex;align-items:center;justify-content:center;color:var(--co-text-2);cursor:pointer;flex-shrink:0;transition:.14s;}
.cc-dl:hover{border-color:var(--co-orange);color:var(--co-orange);background:var(--co-orange-wash);}
.cc-dl svg{width:15px;height:15px;}
.cc-top-actions{display:flex;align-items:center;gap:8px;}
.cities-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;}
.city-card{background:var(--co-paper);border:1px solid var(--co-line);border-radius:var(--co-radius);padding:1.15rem 1.25rem;cursor:pointer;transition:.16s;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.city-card:hover{box-shadow:0 8px 26px rgba(0,0,0,.09);transform:translateY(-2px);border-color:var(--co-orange-tint);}
.city-card .cc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.city-card .cc-name{font-size:19px;font-weight:800;letter-spacing:-.4px;}
.city-card .cc-arrow{color:var(--co-faint);flex-shrink:0;transition:.16s;}
.city-card:hover .cc-arrow{color:var(--co-orange);transform:translateX(3px);}
.city-card .cc-big{display:flex;align-items:baseline;gap:8px;margin-top:12px;}
.city-card .cc-num{font-size:34px;font-weight:800;letter-spacing:-1px;color:var(--co-orange);line-height:1;}
.city-card .cc-num-lbl{font-size:12.5px;color:var(--co-text-2);font-weight:600;}
.city-card .cc-sub{font-size:12px;color:var(--co-muted);margin-top:5px;}
.city-card .cc-bar{display:flex;height:8px;border-radius:5px;overflow:hidden;margin-top:13px;background:var(--co-fill);}
.city-card .cc-bar i{display:block;height:100%;}
.city-card .cc-legend{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:9px;}
.city-card .cc-legend span{font-size:10.5px;color:var(--co-text-2);display:inline-flex;align-items:center;gap:5px;}
.city-card .cc-legend i{width:9px;height:9px;border-radius:2px;}
.city-card.empty{opacity:.6;}
.city-card .cc-wait{font-size:12px;color:var(--co-faint);margin-top:12px;}

/* ---------- CITY VIEW ---------- */
#screenCity{flex:1;display:none;flex-direction:column;min-height:0;}
#screenCity.on{display:flex;}
.city-head{border-bottom:1px solid var(--co-line);padding:.7rem 1.4rem;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.city-head .logo{height:26px;}.city-head .logo svg{height:26px;width:auto;display:block;}
.city-head .sep{width:1px;height:24px;background:var(--co-line);}
.city-head .ttl{font-weight:800;font-size:16px;letter-spacing:-.3px;}
.city-body{flex:1;display:flex;min-height:0;}
.clist{width:340px;flex-shrink:0;border-right:1px solid var(--co-line);display:flex;flex-direction:column;min-height:0;}
.cview{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--co-bg);}
.cdetail{width:290px;flex-shrink:0;border-left:1px solid var(--co-line);display:none;flex-direction:column;min-height:0;background:var(--co-paper);}
.cdetail.on{display:flex;}
@media(max-width:900px){.city-body{flex-direction:column;}.clist,.cdetail{width:100%;border:none;border-bottom:1px solid var(--co-line);max-height:40vh;}}

.clist-head{padding:1rem 1.4rem .7rem;flex-shrink:0;}
.field{position:relative;}
.field svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--co-faint);pointer-events:none;}
.field input{width:100%;padding:10px 12px 10px 38px;border:1px solid var(--co-line);border-radius:10px;font:inherit;font-size:14px;background:var(--co-paper);outline:none;}
.field input:focus{border-color:var(--co-orange);}
.clist-count{padding:0 1.4rem;font-size:12px;color:var(--co-muted);margin-bottom:6px;flex-shrink:0;}
.clist-scroll{flex:1;overflow-y:auto;min-height:0;}
.cb{border-top:1px solid var(--co-line);padding:1rem 1.4rem;}
.cb .cb-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.cb .cb-name{font-weight:700;font-size:15px;letter-spacing:-.2px;line-height:1.25;}
.cb .cb-badge{flex-shrink:0;font-size:12px;font-weight:700;white-space:nowrap;}
.cb .cb-badge.has{color:var(--co-ok);}.cb .cb-badge.none{color:var(--co-faint);}
.cb-floors{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;}
.cb-floor{border:1px solid var(--co-line);background:var(--co-paper);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--co-text);cursor:pointer;transition:.12s;display:inline-flex;align-items:center;gap:7px;}
.cb-floor:hover{border-color:var(--co-orange);color:var(--co-orange);}
.cb-floor.active{background:var(--co-ink);border-color:var(--co-ink);color:#fff;}
.cb-item{cursor:pointer;transition:.12s;}
.cb-item:hover{background:var(--co-orange-wash);}
.cb-item.active{background:var(--co-ink);}
.cb-item.active .cb-name,.cb-item.active .cb-sub2{color:#fff;}
.cb-item.active .cb-badge.has{color:#7CFFA6;}
.cb-sub2{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--co-muted);margin-top:3px;}
.cb-sub2 svg{width:13px;height:13px;}

.view-top{padding:.6rem 1.4rem;border-bottom:1px solid var(--co-line);background:var(--co-paper);display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;}
.view-top .vt-name{font-weight:700;font-size:14px;}.view-top .vt-sub{font-size:12px;color:var(--co-muted);}
.atg{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--co-text-2);cursor:pointer;user-select:none;}
.atg .sw{width:34px;height:19px;border-radius:var(--co-radius-pill);background:var(--co-line);position:relative;transition:.15s;}
.atg .sw::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.atg.on .sw{background:var(--co-orange);}.atg.on .sw::after{left:17px;}
.seg{display:inline-flex;background:var(--co-fill);border-radius:var(--co-radius-pill);padding:3px;gap:2px;}
.seg button{border:none;background:transparent;border-radius:var(--co-radius-pill);padding:5px 13px;font:inherit;font-size:12px;font-weight:600;color:var(--co-text-2);cursor:pointer;}
.seg button.on{background:var(--co-orange);color:#fff;}
.seg button:disabled{opacity:.4;cursor:default;}
.menu-wrap{position:relative;}
.menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--co-paper);border:1px solid var(--co-line);border-radius:12px;box-shadow:0 10px 34px rgba(0,0,0,.14);min-width:240px;padding:6px;display:none;z-index:60;}
.menu.open{display:block;}
.menu .mi{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;font-size:13px;}
.menu .mi:hover{background:var(--co-orange-wash);}
.menu .mi svg{width:16px;height:16px;color:var(--co-muted);}
.menu .mi b{font-weight:600;display:block;}.menu .mi small{color:var(--co-muted);font-size:11px;}
.menu .sep{height:1px;background:var(--co-line);margin:4px 8px;}

.stage{flex:1;position:relative;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:1.1rem 1.4rem;min-height:0;}
.pwrap{position:relative;display:inline-block;line-height:0;box-shadow:0 3px 26px rgba(0,0,0,.13);background:#fff;max-width:100%;max-height:100%;}
.pwrap img{display:block;max-width:100%;max-height:calc(100vh - 172px);width:auto;height:auto;user-select:none;}
.pwrap svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;}
.room{cursor:pointer;transition:opacity .12s;}.room.dim{opacity:.13;}
.room-num{font-weight:700;pointer-events:none;paint-order:stroke;stroke:#fff;stroke-width:3px;stroke-linejoin:round;}
.sch{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:9px;width:100%;align-content:start;}
.scell{border-radius:12px;border:1.5px solid var(--co-line);background:var(--co-paper);padding:9px 10px;cursor:pointer;position:relative;overflow:hidden;min-height:76px;transition:.12s;}
.scell:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.09);}
.scell.dim{opacity:.3;}.scell.sel{border-color:var(--co-orange);box-shadow:0 0 0 2px var(--co-orange-tint);}
.scell .bar{position:absolute;left:0;top:0;bottom:0;width:5px;}
.scell .num{font-weight:800;font-size:15px;padding-left:4px;}
.scell .meta{font-size:10.5px;color:var(--co-muted);margin-top:3px;padding-left:4px;}
.scell .av{display:inline-block;margin-top:6px;margin-left:4px;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:var(--co-radius-pill);color:#0a0a0a;}
.legend{display:flex;flex-wrap:wrap;gap:6px 16px;padding:.55rem 1.4rem;background:var(--co-paper);border-bottom:1px solid var(--co-line);font-size:11.5px;align-items:center;flex-shrink:0;}
.legend .li{display:inline-flex;align-items:center;gap:6px;color:var(--co-text-2);}
.legend .li .sw{width:13px;height:13px;border-radius:3px;}
.legend .cap{font-weight:700;color:var(--co-muted);font-size:10px;letter-spacing:.08em;text-transform:uppercase;}
.vempty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--co-faint);text-align:center;padding:2rem;}
.vempty svg{width:44px;height:44px;opacity:.4;}
.load{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:rgba(245,244,242,.85);z-index:20;color:var(--co-muted);font-size:13px;}
.load.on{display:flex;}
.spin{width:26px;height:26px;border:3px solid var(--co-orange-tint);border-top-color:var(--co-orange);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.rdetail{position:absolute;left:18px;bottom:18px;background:var(--co-paper);border:1px solid var(--co-line);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.16);padding:.9rem 1rem;min-width:210px;max-width:260px;display:none;z-index:10;}
.rdetail.on{display:block;}
.rdetail .x{position:absolute;top:8px;right:10px;color:var(--co-faint);cursor:pointer;font-size:16px;line-height:1;}
.rdetail .o{font-weight:800;font-size:17px;letter-spacing:-.3px;}
.rdetail .av{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:var(--co-radius-pill);color:#0a0a0a;margin:6px 0 8px;}
.rdetail .r{display:flex;justify-content:space-between;gap:14px;font-size:12px;color:var(--co-muted);padding:2px 0;}
.rdetail .r b{color:var(--co-ink);font-weight:600;}
.rdetail .add{margin-top:9px;width:100%;justify-content:center;}

.dh{padding:1rem 1.2rem .7rem;border-bottom:1px solid var(--co-line);display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
.dh .t{font-weight:800;font-size:15px;letter-spacing:-.3px;}.dh .c{font-size:12px;color:var(--co-ok);font-weight:700;}
.dl{flex:1;overflow-y:auto;padding:.6rem .8rem;}
.dl-empty{color:var(--co-faint);font-size:12.5px;text-align:center;padding:2rem 1rem;}
.acard{border:1px solid var(--co-line);border-radius:11px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:.12s;}
.acard:hover{border-color:var(--co-orange);box-shadow:0 3px 12px rgba(0,0,0,.07);}
.acard.sel{border-color:var(--co-orange);box-shadow:0 0 0 2px var(--co-orange-tint);}
.acard .t{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.acard .o{font-weight:800;font-size:16px;letter-spacing:-.3px;}
.acard .m{font-size:10px;font-weight:800;padding:2px 9px;border-radius:999px;color:#0a0a0a;white-space:nowrap;}
.acard .meta{font-size:11.5px;color:var(--co-muted);margin-top:6px;line-height:1.5;}
.acard .meta b{color:var(--co-text);font-weight:600;}
.acard .foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.acard .price{font-weight:800;font-size:15px;}.acard .price span{font-size:11px;color:var(--co-muted);font-weight:600;}
.acard .plus{width:24px;height:24px;border-radius:7px;border:1px solid var(--co-line);display:flex;align-items:center;justify-content:center;color:var(--co-muted);}
.acard.sel .plus{background:var(--co-orange);border-color:var(--co-orange);color:#fff;}
.acard .plus svg{width:13px;height:13px;}
.df{border-top:1px solid var(--co-line);padding:.7rem .9rem;flex-shrink:0;}
.df .hint{font-size:11px;color:var(--co-muted);margin-bottom:8px;line-height:1.4;}
.df .cp{width:100%;justify-content:center;}
.df .cp.ok{background:var(--co-ok);border-color:var(--co-ok);color:#fff;}

.selbar{position:fixed;bottom:0;left:0;right:0;background:var(--co-ink);color:#fff;padding:.7rem 1.4rem;display:none;align-items:center;gap:14px;z-index:50;}
.selbar.on{display:flex;}
.selbar .n{font-weight:700;font-size:13.5px;}.selbar .n span{color:var(--co-orange-tint);}
.selbar .meta{font-size:12px;color:rgba(255,255,255,.6);}
.selbar .btn{background:transparent;border-color:rgba(255,255,255,.25);color:#fff;}
.selbar .btn:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.1);}
.selbar .btn.pri{background:var(--co-orange);border-color:var(--co-orange);}
.tip{position:fixed;z-index:80;background:#fff;color:#282828;border:1px solid #E1E1E1;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;font-family:'Hanken Grotesk','Noto Sans TC','Noto Sans JP',system-ui,-apple-system,sans-serif;pointer-events:none;opacity:0;transition:opacity .1s;box-shadow:0 4px 16px rgba(0,0,0,.16);}
.tip.show{opacity:1;}
::-webkit-scrollbar{width:8px;}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.14);border-radius:4px;}
/* login */
.login{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:linear-gradient(120deg,#1E1E1E,#282828 60%,#1E1E1E);padding:1.5rem;}
.login.on{display:flex;}
.login-card{background:#fff;border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.4);padding:2.2rem 2.1rem;width:100%;max-width:360px;text-align:center;}
.login-logo{height:38px;margin:0 auto .9rem;display:flex;justify-content:center;}
.login-logo svg{height:38px;width:auto;}
.login-t{font-size:20px;font-weight:800;letter-spacing:-.4px;color:var(--co-ink);}
.login-s{font-size:13px;color:var(--co-muted);margin:5px 0 20px;}
.login-in{width:100%;padding:12px 14px;border:1px solid var(--co-line);border-radius:11px;font:inherit;font-size:14.5px;margin-bottom:11px;outline:none;transition:.15s;}
.login-in:focus{border-color:var(--co-orange);}
.login-err{color:#c0392b;font-size:12.5px;min-height:16px;margin:-3px 0 8px;text-align:left;}
.login-btn{width:100%;padding:12px;background:var(--co-orange);color:#fff;border:none;border-radius:11px;font:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;}
.login-btn:hover{background:var(--co-orange-dk);}
.login-btn:disabled{opacity:.6;cursor:default;}
.user-chip{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,.85);font-size:12.5px;font-weight:600;}
.user-chip .out{cursor:pointer;border:1px solid rgba(255,255,255,.28);border-radius:8px;padding:5px 11px;color:#fff;transition:.15s;}
.user-chip .out:hover{background:rgba(255,255,255,.14);}
</style>
</head>
<body>
<div class="co" id="app">

  <!-- ===== LOGIN ===== -->
  <div id="loginScreen" class="login">
    <div class="login-card">
      <div class="login-logo" id="loginLogo"></div>
      <div class="login-t">Office Availability</div>
      <div class="login-s">Sign in to view your assigned regions.</div>
      <input id="loginEmail" class="login-in" type="email" placeholder="Work email" autocomplete="username">
      <input id="loginPass" class="login-in" type="password" placeholder="Passcode" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <div class="login-err" id="loginErr"></div>
      <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign in</button>
    </div>
  </div>

  <!-- ===== CITIES SCREEN ===== -->
  <div id="screenCities">
    <div class="hero">
      <div class="hero-bar"><div class="logo" id="heroLogo"></div><div class="user-chip" id="userChip"></div><div class="fa-wrap" style="margin-left:14px"><button class="fa-btn" id="faBtn" onclick="toggleLocMenu(event)">Find a Location<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button><div class="loc-menu" id="locMenu"></div></div></div>
    </div>
    <div class="cities-wrap">
      <div class="cities-lead"><h2>Cities</h2><div class="fp-status" id="fpStatus"></div></div>
      <div class="cities-grid" id="citiesGrid"></div>
    </div>
  </div>

  <!-- ===== CITY SCREEN ===== -->

function addressFor(centreName,level){
  if(!ADDRESSES.length)return '';
  const n=(centreName||'').toLowerCase().replace(/[^a-z0-9]/g,'');let best=null,score=0;
  ADDRESSES.forEach(function(a){let sc=0;for(let len=Math.min(n.length,a.key.length);len>=4;len--){let hit=false;for(let i=0;i+len<=n.length;i++){if(a.key.indexOf(n.substr(i,len))!==-1){hit=true;break;}}if(hit){sc=len;break;}}if(sc>score){score=sc;best=a;}});
  if(!best||score<4)return '';
  let addr=best.addr;
  // swap the leading floor prefix (e.g. "15, 16 & 28F, ") for the specific level
  if(level){addr=addr.replace(/^[^,]*?F\s*,\s*/i, 'Level '+level+', ');}
  return addr;
}

async function resolveItems(city){
  if(CITY_ITEMS[city])return CITY_ITEMS[city];
  const rep=await ensureReport(city);if(!rep){CITY_ITEMS[city]=[];return [];}
  const ml=rep.monthLabels;const classified=rep.offices.map(o=>classifyOffice(o,ml));
  const regionIdx=numIndex(classified);
  const centres=[...new Set(classified.map(o=>o.centre))];
  const cands=REGISTRY.filter(r=>r.cities&&r.cities.includes(city));const items=[];const covered=new Set();
  await Promise.all(cands.map(async row=>{
    if(row._rooms===undefined){try{const data=await (await fetch(row.jsonUrl)).json();row._json=data;row._rooms=(data.rooms||[]).map(r=>({label:(r.displayLabel||r.label||'').toString(),raw:(r.label||'').toString()}));}catch(e){row._rooms=[];}}
    let centre=null,offs=[];
    // (1) NAME binding first — if the centre code reads like a real name (e.g. "Silvercord Tower 1 - L8"),
    //     match it to the report centre and scope room-matching to that centre (avoids office-number collisions)
    const named=fuzzyCentre(row.code,centres);
    if(named){
      centre=named;const cOffs=classified.filter(o=>o.centre===centre);const cIdx=numIndex(cOffs);
      const seen=new Set();row._rooms.forEach(rm=>{const o=matchRoom(rm,cIdx);if(o&&!seen.has(o.office)){seen.add(o.office);offs.push(o);}});
      if(!offs.length){const lvl=(row.level||'').replace(/[^0-9]/g,'');if(lvl)offs=cOffs.filter(o=>(''+o.office).replace(/[^0-9]/g,'').indexOf(lvl)===0);}
      if(!offs.length)offs=cOffs;
    } else {
      // (2) fall back to office-number matching across the whole region
      const seen=new Set();row._rooms.forEach(rm=>{const o=matchRoom(rm,regionIdx);if(o&&!seen.has(o.office)){seen.add(o.office);offs.push(o);}});
      if(offs.length){const cc={};offs.forEach(o=>cc[o.centre]=(cc[o.centre]||0)+1);centre=Object.keys(cc).sort((a,b)=>cc[b]-cc[a])[0];}
    }
    if(!centre||!offs.length)return;
    covered.add(centre);
    offs.sort((a,b)=>a.idx-b.idx||(''+a.office).localeCompare(''+b.office,undefined,{numeric:true}));
    items.push({kind:'floor',id:row.id,row,centre,name:prettyCentre(centre),level:row.level,offices:offs,avail:offs.filter(o=>o.bucket==='month').length});
  }));
  centres.forEach(centre=>{if(covered.has(centre))return;
    const offs=classified.filter(o=>o.centre===centre).sort((a,b)=>a.idx-b.idx||(''+a.office).localeCompare(''+b.office,undefined,{numeric:true}));
    items.push({kind:'centre',id:'c-'+centre.replace(/[^A-Za-z0-9]/g,'_'),centre,name:prettyCentre(centre),offices:offs,avail:offs.filter(o=>o.bucket==='month').length});});
  items.sort((a,b)=>a.name.localeCompare(b.name)||(''+(a.level||'')).localeCompare(''+(b.level||''),undefined,{numeric:true}));
  CITY_ITEMS[city]=items;return items;
}

async function ensureReport(region){if(!region)return null;if(REPORTS[region])return REPORTS[region];if(!AUTH||!AUTH.token)throw new Error('Not signed in');const r=await jsonp(CONFIG.GATE_URL+'?action=report&region='+encodeURIComponent(region)+'&token='+encodeURIComponent(AUTH.token));if(!r||!r.ok){if(r&&r.error==='expired'){logout();throw new Error('Session expired');}throw new Error((r&&r.error)||'report failed');}REPORTS[region]=ingestReport(r.rows);return REPORTS[region];}

function emailHtml(title,rows){
  const th='style="text-align:left;padding:8px 12px;font-family:Arial,Helvetica,sans-serif;font-size:12px;letter-spacing:.03em;text-transform:uppercase;color:#8C8C8C;border-bottom:2px solid #FF6600"';

  h+='<table cellspacing="0" cellpadding="0" style="border-collapse:collapse;width:100%;max-width:720px"><thead><tr>';

  rows.forEach(o=>{const view=(o.view||'')+((o.viewType&&o.viewType!=='N/A')?(' \u00b7 '+o.viewType):'');
    h+='<tr><td '+td+'><b>'+o.office+'</b></td><td '+td+'>'+(o.class||'')+'</td><td '+td+'>'+(o.size||'?')+' sq ft</td><td '+td+'>'+(o.maxConfig||'?')+'</td><td '+td+'>'+view+'</td><td '+td+'>'+o.availLabel+'</td><td '+td+'><b>'+(o.price?fmtPrice(o.price)+'/mo':'\u2014')+'</b></td></tr>';});
  h+='</tbody></table><p style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#8C8C8C;margin:12px 0 0">compassoffices.com</p></div>';

async function copyEmailTable(){

  try{
    if(window.ClipboardItem&&navigator.clipboard&&navigator.clipboard.write){
      await navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([html],{type:'text/html'}),'text/plain':new Blob([plain],{type:'text/plain'})})]);
    }else if(navigator.clipboard&&navigator.clipboard.writeText){await navigator.clipboard.writeText(plain);}
    else{const ta=document.createElement('textarea');ta.value=plain;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}

function hexRgb(h){if(!h)return[210,210,210];h=h.length===4?'#'+h[1]+h[1]+h[2]+h[2]+h[3]+h[3]:h;return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

/* coloured plan -> {dataUrl,w,h}; drawn at natural size so it never distorts */
function pathRoomCtx(ctx,r){if(r.polygon&&r.polygon.length>=3){ctx.beginPath();ctx.moveTo(r.polygon[0].x,r.polygon[0].y);for(let i=0;i<r.polygon.length;i++){const A=r.polygon[i],B=r.polygon[(i+1)%r.polygon.length];if(A.hOut)ctx.bezierCurveTo(A.x+A.hOut[0],A.y+A.hOut[1],B.x+(B.hIn?B.hIn[0]:-A.hOut[0]*.4),B.y+(B.hIn?B.hIn[1]:-A.hOut[1]*.4),B.x,B.y);else ctx.lineTo(B.x,B.y);}ctx.closePath();}else{const{x1,y1,x2,y2}=r.rect;ctx.beginPath();ctx.rect(x1,y1,x2-x1,y2-y1);}}
async function colourPlan(plan,offices,idx){
  if(!plan||!plan.masterUrl)return null;
  const img=await new Promise(res=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>res(i);i.onerror=()=>res(null);i.src=plan.masterUrl;});
  const iw=(img&&img.naturalWidth)||plan.w, ih=(img&&img.naturalHeight)||plan.h, sx=iw/plan.w, sy=ih/plan.h;
  const cv=document.createElement('canvas');cv.width=iw;cv.height=ih;const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,iw,ih);if(img)ctx.drawImage(img,0,0,iw,ih);
  ctx.save();ctx.scale(sx,sy);
  plan.rooms.forEach(rm=>{const rk=[...normKeys(rm.label),...normKeys(rm.raw)];let o=null;for(const k of rk){if(idx[k]){o=idx[k];break;}}if(!o||!offices.includes(o))return;
    if(thisMonthOnly&&!(o.bucket==='month'&&o.idx===0))return;
    const c=hexRgb(o.color);ctx.save();pathRoomCtx(ctx,rm);ctx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+',0.55)';ctx.fill();ctx.restore();
    const cx=rm.rect?(rm.rect.x1+rm.rect.x2)/2:0,cy=rm.rect?(rm.rect.y1+rm.rect.y2)/2:0,fs=Math.max(16,(rm.rect?(rm.rect.x2-rm.rect.x1):40)*0.14);
    ctx.font='bold '+fs+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#111';ctx.fillText(rm.label,cx,cy);});
  ctx.restore();
  return {dataUrl:cv.toDataURL('image/jpeg',0.94),w:iw,h:ih};
}

let LOGO_PNG=null;

function drawHeader_(pdf,opt,continued){
  const W=pdf.internal.pageSize.getWidth(),M=24;
  if(opt.logoPng)pdf.addImage(opt.logoPng,'PNG',M,16,108,40);
  const bw=Math.min(W*0.52,470),bx=W-M-bw,by=16,bh=46;

  pdf.text((opt.centre+(opt.level?', LEVEL '+opt.level:'')).toUpperCase()+(continued?'  (CONT.)':''),bx+13,by+18,{maxWidth:bw-26});
  if(opt.address){pdf.setFont('helvetica','normal');pdf.setFontSize(7.5);pdf.text((opt.address).toUpperCase(),bx+13,by+31,{maxWidth:bw-26});}
  const top=80;pdf.setFontSize(8);pdf.setTextColor(140,140,140);pdf.setFont('helvetica','bold');pdf.text('AVAILABLE FROM',M,top);
  let cx=M+80;(opt.legend||[]).forEach(function(v){const c=hexRgb(v.c);pdf.setFillColor(c[0],c[1],c[2]);pdf.roundedRect(cx,top-9,10,10,2,2,'F');pdf.setTextColor(70,70,70);pdf.setFont('helvetica','normal');pdf.text(v.l,cx+14,top);cx+=14+pdf.getTextWidth(v.l)+18;});
  return top+12;
}
function drawFooter_(pdf,opt){
  const W=pdf.internal.pageSize.getWidth(),H=pdf.internal.pageSize.getHeight(),M=24;
  pdf.setFont('helvetica','normal');pdf.setFontSize(7.5);pdf.setTextColor(140,140,140);
  pdf.text('compassoffices.com',M,H-12);
  pdf.text((opt.city||'')+'  ·  as of '+((opt.monthLabels&&opt.monthLabels[0])||''),W-M,H-12,{align:'right'});
}
function drawFloorPage(pdf,opt){
  const W=pdf.internal.pageSize.getWidth(),H=pdf.internal.pageSize.getHeight(),M=24,gap=7,bH=54;
  const boxes=opt.boxes||[];const hasBoxes=boxes.length>0;
  const bodyTop=drawHeader_(pdf,opt,false),bodyBot=H-30,areaH=bodyBot-bodyTop;
  const planW=hasBoxes?(W-2*M)*0.68:(W-2*M);
  // floorplan (page 1, left)
  if(opt.plan){const ar=opt.plan.w/opt.plan.h;let dw=planW,dh=dw/ar;if(dh>areaH){dh=areaH;dw=dh*ar;}pdf.addImage(opt.plan.dataUrl,'JPEG',M+(planW-dw)/2,bodyTop,dw,dh);}
  else if(!hasBoxes){pdf.setTextColor(150,150,150);pdf.setFont('helvetica','normal');pdf.setFontSize(11);pdf.text('Floorplan not available for this centre',M+planW/2,bodyTop+areaH/2,{align:'center'});}
  let idx=0;
  // page 1 — boxes in the right column beside the plan
  if(hasBoxes){
    const bX=M+planW+16,bW=(W-M)-(M+planW+16);
    const per=Math.max(1,Math.floor((areaH+gap)/(bH+gap)));
    let y=bodyTop;
    for(let k=0;k<per&&idx<boxes.length;k++,idx++){drawBox_(pdf,boxes[idx],bX,y,bW,bH);y+=bH+gap;}
  }
  drawFooter_(pdf,opt);
  // continuation pages — remaining boxes in a full-width 3-column grid
  while(idx<boxes.length){
    pdf.addPage();
    const top=drawHeader_(pdf,opt,true);
    const cols=3,cgap=8,gW=(W-2*M-(cols-1)*cgap)/cols;
    const rowsPer=Math.max(1,Math.floor((H-30-top+cgap)/(bH+cgap)));
    const per=cols*rowsPer;
    for(let k=0;k<per&&idx<boxes.length;k++,idx++){
      const col=k%cols,rw=Math.floor(k/cols);
      drawBox_(pdf,boxes[idx],M+col*(gW+cgap),top+rw*(bH+cgap),gW,bH);
    }
    drawFooter_(pdf,opt);
  }
}

function pdfBoxes(offices,useSel){
  let rows;
  if(useSel&&selected.size)rows=offices.filter(o=>selected.has(o.office));
  else if(thisMonthOnly)rows=offices.filter(o=>o.bucket==='month'&&o.idx===0);
  else rows=offices.filter(o=>o.bucket==='month'||o.bucket==='presold');
  rows=rows.slice().sort((a,b)=>a.idx-b.idx||(''+a.office).localeCompare(''+b.office,undefined,{numeric:true}));
  return rows.map(o=>({office:o.office,avail:o.availLabel,color:o.color,class:o.class,size:o.size,desks:o.maxConfig,view:(o.view||'')+((o.viewType&&o.viewType!=='N/A')?(' · '+o.viewType):''),price:fmtPrice(o.price)+(o.price?' /mo':'')}));
}

async function exportFloorPdf(){
  $('exportMenu').classList.remove('open');if(!CUR)return;
  const {jsPDF}=window.jspdf;const logo=await logoPng();
  const boxes=showDetail?pdfBoxes(CUR.offices,true):[];
  const legendSrc=CUR.offices.filter(o=>thisMonthOnly?(o.bucket==='month'&&o.idx===0):(o.bucket!=='occupied'&&o.bucket!=='suspended'));
  const plan=CUR.plan?await colourPlan(CUR.plan,CUR.offices,CUR.idx||{}):null;
  const pdf=new jsPDF({orientation:'landscape',unit:'pt',format:'a4'});
  const _cn=CUR.centre?prettyCentre(CUR.centre):CUR.row.name;drawFloorPage(pdf,{centre:_cn,level:CUR.row.level,address:addressFor(_cn,CUR.row.level),city:CITY,monthLabels:CUR.monthLabels,legend:legendFrom(legendSrc),plan,boxes,logoPng:logo});
  pdf.save('Compass_'+((CUR.centre?prettyCentre(CUR.centre):CUR.row.name)+(CUR.row.level?'_L'+CUR.row.level:'')).replace(/[^A-Za-z0-9_-]/g,'_')+'.pdf');
}

async function buildCombinedPdf(city,items,onProgress){
  const {jsPDF}=window.jspdf;const logo=await logoPng();const rep=await ensureReport(city);if(!rep){alert('No report for '+city);return;}const ml=rep.monthLabels;
  const pdf=new jsPDF({orientation:'landscape',unit:'pt',format:'a4'});let first=true,done=0;
  for(const it of items){
    try{
      const row=it.row;const data=row._json||await (await fetch(row.jsonUrl)).json();row._json=data;const base=deriveImgBase(row.jsonUrl);
      const rooms=(data.rooms||[]).map(r=>({label:(r.displayLabel||r.label||'').toString(),raw:(r.label||'').toString(),rect:r.rect,polygon:r.polygon||null}));
      const plan={masterUrl:row.masterUrl||resolveAsset(base,data.master&&data.master.file),w:(data.master&&data.master.width)||1000,h:(data.master&&data.master.height)||700,rooms};
      const col=await colourPlan(plan,it.offices,numIndex(it.offices));
      if(!first)pdf.addPage();first=false;
      drawFloorPage(pdf,{centre:it.name,level:it.level,address:addressFor(it.name,it.level),city,monthLabels:ml,legend:legendFrom(it.offices.filter(o=>thisMonthOnly?(o.bucket==='month'&&o.idx===0):(o.bucket!=='occupied'&&o.bucket!=='suspended'))),plan:col,boxes:showDetail?pdfBoxes(it.offices,false):[],logoPng:logo});
    }catch(e){console.warn('combined skip',it.id,e);}
    if(onProgress)onProgress(++done,items.length);
  }
  if(first){alert('No floorplans could be built for '+city+' yet.');return;}
  pdf.save('Compass_Availability_'+city.replace(/[^A-Za-z0-9_-]/g,'_')+'.pdf');
}
async function exportAllPdf(){
  $('exportMenu').classList.remove('open');
  const items=(CITY_ITEMS[CITY]||await resolveItems(CITY)).filter(x=>x.kind==='floor');
  if(!items.length){alert('No matched floorplans in '+CITY+' yet.');return;}
  $('load').classList.add('on');$('loadMsg').textContent='Building combined PDF…';
  await buildCombinedPdf(CITY,items,(d,t)=>{$('loadMsg').textContent='Building combined PDF… '+d+'/'+t;});
  $('load').classList.remove('on');
}
async function exportCityAll(i){
  const city=CITIES[i];if(!city)return;
  const btn=$('dl-'+i);const orig=btn?btn.innerHTML:'';if(btn)btn.innerHTML='<div class="spin" style="width:14px;height:14px;border-width:2px"></div>';
  try{const items=(await resolveItems(city)).filter(x=>x.kind==='floor');
    if(!items.length){alert('No floorplans matched for '+city+' yet.');}
    else{const prev=CITY;CITY=city;await buildCombinedPdf(city,items);CITY=prev;}
  }finally{if(btn)btn.innerHTML=orig;}
}

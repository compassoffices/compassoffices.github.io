<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
  <title>EDM Banner Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #0d0d10;
      --s1:    #16161b;
      --s2:    #1d1d23;
      --s3:    #24242c;
      --b1:    #2b2b36;
      --b2:    #3a3a48;
      --acc:   #ff6600;
      --al:    rgba(255,102,0,.11);
      --am:    rgba(255,102,0,.28);
      --tx:    #ececef;
      --tx2:   #8888a0;
      --tx3:   #46465a;
      --th:    46px;
      --bh:    56px;
      --sw:    296px;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--tx); overflow-x:hidden; }

    /* ICONS */
    .ic { display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
    .ic svg { fill:none; stroke:currentColor; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
    .ic-s svg { width:11px; height:11px; }
    .ic-m svg { width:14px; height:14px; }
    .ic-l svg { width:17px; height:17px; }

    /* TOPBAR */
    .topbar {
      position:sticky; top:0; z-index:300;
      height:var(--th); background:var(--s1); border-bottom:1px solid var(--b1);
      display:flex; align-items:center; gap:.5rem; padding:0 .85rem; flex-shrink:0;
    }
    .brand { display:flex; align-items:center; gap:.36rem; font-size:.71rem; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--acc); white-space:nowrap; flex-shrink:0; }
    .brand-sep { color:var(--tx3); font-weight:400; }
    .tsep { width:1px; height:15px; background:var(--b1); flex-shrink:0; }
    .tf { display:flex; align-items:center; gap:.32rem; }
    .tf label { font-size:.64rem; color:var(--tx2); white-space:nowrap; }
    select.ts { background:var(--s3); border:1px solid var(--b1); color:var(--tx); padding:.2rem .38rem; border-radius:4px; font-size:.69rem; font-family:'DM Mono',monospace; cursor:pointer; outline:none; }
    select.ts:focus { border-color:var(--acc); }
    .mbtn { margin-left:auto; display:none; align-items:center; justify-content:center; width:27px; height:27px; background:var(--s3); border:1px solid var(--b1); border-radius:4px; cursor:pointer; color:var(--tx2); flex-shrink:0; }
    .mbtn:hover { color:var(--tx); }

    /* APP */
    .app { display:flex; height:calc(100vh - var(--th) - var(--bh)); overflow:hidden; }

    /* SIDEBAR */
    .sidebar { width:var(--sw); min-width:var(--sw); background:var(--s1); border-right:1px solid var(--b1); overflow-y:auto; overflow-x:hidden; flex-shrink:0; }
    .sidebar::-webkit-scrollbar { width:3px; }
    .sidebar::-webkit-scrollbar-thumb { background:var(--b2); border-radius:99px; }

    /* ACCORDION */
    .acc { border-bottom:1px solid var(--b1); }
    .acc-hd { display:flex; align-items:center; justify-content:space-between; padding:.6rem .8rem; cursor:pointer; user-select:none; background:var(--s1); transition:background .1s; }
    .acc-hd:hover { background:var(--s2); }
    .acc-title { display:flex; align-items:center; gap:.4rem; font-size:.64rem; font-weight:600; text-transform:uppercase; letter-spacing:.09em; color:var(--tx2); }
    .pip { width:5px; height:5px; border-radius:50%; background:var(--acc); opacity:0; transition:opacity .2s; flex-shrink:0; }
    .acc-title.lit .pip { opacity:1; }
    .chev { color:var(--tx3); transition:transform .18s; }
    .acc.open .chev { transform:rotate(180deg); }
    .acc-bd { display:none; padding:.72rem .8rem .82rem; background:var(--s2); }
    .acc.open .acc-bd { display:block; }

    /* FORM */
    .f { margin-bottom:.55rem; }
    .f:last-child { margin-bottom:0; }
    .fl { display:block; font-size:.59rem; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--tx2); margin-bottom:.22rem; }
    input[type=number], select, textarea { width:100%; background:var(--s3); border:1px solid var(--b1); color:var(--tx); padding:.33rem .44rem; border-radius:4px; font-size:.75rem; font-family:'DM Sans',sans-serif; outline:none; transition:border-color .12s, box-shadow .12s; }
    input[type=number]:focus, select:focus, textarea:focus { border-color:var(--acc); box-shadow:0 0 0 3px var(--al); }
    textarea { resize:vertical; min-height:54px; line-height:1.5; }
    select option { background:var(--s3); }
    .rr { display:flex; align-items:center; gap:.36rem; }
    .rr input[type=range] { flex:1; -webkit-appearance:none; height:3px; background:var(--s3); border-radius:99px; border:none; cursor:pointer; padding:0; outline:none; }
    .rr input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:var(--acc); box-shadow:0 0 4px var(--am); cursor:pointer; }
    .rr input[type=number] { width:44px; flex-shrink:0; font-family:'DM Mono',monospace; font-size:.67rem; text-align:center; }
    .g2 { display:grid; grid-template-columns:1fr 1fr; gap:.38rem; }
    .g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.38rem; }
    input[type=color] { width:24px; height:24px; border:1px solid var(--b1); border-radius:3px; cursor:pointer; padding:2px; background:var(--s3); flex-shrink:0; }
    /* toggle */
    .togrow { display:flex; align-items:center; justify-content:space-between; }
    .togrow .fl { margin:0; }
    .tog { position:relative; width:30px; height:16px; }
    .tog input { opacity:0; width:0; height:0; }
    .tog-s { position:absolute; inset:0; background:var(--s3); border:1px solid var(--b1); border-radius:99px; cursor:pointer; transition:.14s; }
    .tog-s::before { content:''; position:absolute; width:10px; height:10px; left:2px; top:2px; background:var(--tx3); border-radius:50%; transition:.14s; }
    .tog input:checked + .tog-s { background:var(--acc); border-color:var(--acc); }
    .tog input:checked + .tog-s::before { transform:translateX(14px); background:#fff; }
    /* divider */
    .sdiv { font-size:.57rem; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--tx3); margin:.68rem 0 .4rem; padding-top:.58rem; border-top:1px solid var(--b1); display:flex; align-items:center; gap:.32rem; }
    .sb { font-size:.56rem; color:var(--tx3); background:var(--s1); border:1px solid var(--b1); border-radius:3px; padding:.07rem .26rem; font-family:'DM Mono',monospace; text-transform:none; letter-spacing:0; }
    /* upload */
    .upz { border:1.5px dashed var(--b2); border-radius:5px; padding:.52rem .46rem; text-align:center; background:var(--s3); cursor:pointer; transition:border-color .14s, background .14s; }
    .upz:hover { border-color:var(--acc); background:var(--al); }
    .upz label { cursor:pointer; display:block; }
    .upz input { display:none; }
    .upz-icon { color:var(--tx3); display:flex; justify-content:center; margin-bottom:.16rem; }
    .upz-txt { font-size:.69rem; color:var(--tx2); }
    .upz-nm { font-size:.61rem; color:var(--acc); margin-top:.14rem; font-family:'DM Mono',monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    /* dpad */
    .dpad { display:grid; grid-template-areas:". u ." "l . r" ". d ."; grid-template-columns:24px 24px 24px; gap:2px; flex-shrink:0; }
    .dpb { width:24px; height:24px; border-radius:4px; background:var(--s3); border:1px solid var(--b1); color:var(--tx2); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .1s, color .1s; }
    .dpb:hover { background:var(--acc); border-color:var(--acc); color:#fff; }
    .du{grid-area:u} .dd{grid-area:d} .dl{grid-area:l} .dr{grid-area:r}
    .mvrow { display:flex; align-items:center; gap:.52rem; }
    .mvcrd { flex:1; }

    /* CANVAS */
    .canvas-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:1rem .85rem .85rem; overflow:auto; background:var(--bg); gap:.5rem; }
    .canvas-wrap { position:relative; max-width:100%; }
    canvas { display:block; border-radius:3px; border:1px solid var(--b2); box-shadow:0 6px 28px rgba(0,0,0,.55); max-width:100%; height:auto; touch-action:none; cursor:grab; }
    canvas:active { cursor:grabbing; }
    .cmeta { display:flex; align-items:center; gap:.38rem; flex-wrap:wrap; justify-content:center; }
    .ctag { font-size:.61rem; color:var(--tx3); font-family:'DM Mono',monospace; background:var(--s1); border:1px solid var(--b1); padding:.13rem .35rem; border-radius:3px; }

    /* BOTTOM BAR */
    .dl-bar { position:fixed; bottom:0; left:0; right:0; height:var(--bh); background:rgba(22,22,27,.97); backdrop-filter:blur(14px); border-top:1px solid var(--b1); display:flex; align-items:center; justify-content:center; gap:.8rem; z-index:400; }
    .dl-info { font-size:.67rem; color:var(--tx3); font-family:'DM Mono',monospace; }
    .btn-dl { display:inline-flex; align-items:center; gap:.38rem; padding:.44rem 1.25rem; background:var(--acc); color:#fff; border:none; border-radius:5px; font-family:'DM Sans',sans-serif; font-size:.79rem; font-weight:600; cursor:pointer; letter-spacing:.02em; box-shadow:0 3px 10px var(--am); transition:transform .12s, box-shadow .12s; }
    .btn-dl:hover { transform:translateY(-1px); box-shadow:0 5px 16px rgba(255,102,0,.42); }
    .btn-dl:active { transform:none; }

    /* BG REMOVE */
    .bgr-wrap { border:1px solid var(--b1); border-radius:6px; overflow:hidden; background:var(--s3); margin-bottom:.55rem; }
    .bgr-toolbar { display:flex; align-items:center; gap:2px; padding:.32rem .4rem; background:var(--s2); border-bottom:1px solid var(--b1); }
    .bgr-tool { display:inline-flex; align-items:center; justify-content:center; gap:.28rem; padding:.28rem .48rem; background:transparent; border:1px solid transparent; color:var(--tx3); border-radius:4px; font-family:'DM Sans',sans-serif; font-size:.67rem; font-weight:500; cursor:pointer; transition:all .12s; white-space:nowrap; }
    .bgr-tool:hover { background:var(--s3); color:var(--tx2); }
    .bgr-tool.active { background:var(--s3); border-color:var(--b2); color:var(--tx); }
    .bgr-tool.active.wand  { border-color:var(--acc); color:var(--acc); }
    .bgr-tool.active.brush { border-color:#4caf90; color:#4caf90; }
    .bgr-tool-sep { width:1px; height:14px; background:var(--b1); margin:0 2px; flex-shrink:0; }
    .bgr-seed-swatch { width:12px; height:12px; border-radius:2px; border:1px solid var(--b2); background:#fff; flex-shrink:0; }
    .bgr-seed-label  { font-size:.62rem; color:var(--tx3); font-family:'DM Mono',monospace; }
    .bgr-spacer { flex:1; }
    .bgr-stage { 
      width:100%; position:relative; cursor:crosshair;
      background: repeating-conic-gradient(#1a1a20 0% 25%, #222228 0% 50%) 0 0 / 12px 12px;
      display:flex; align-items:center; justify-content:center; min-height:80px;
    }
    .bgr-stage canvas { display:block; max-width:100%; }
    .bgr-stage .bgr-empty { font-size:.65rem; color:var(--tx3); padding:1.5rem; }
    .bgr-crosshair { position:absolute; pointer-events:none; width:16px; height:16px; display:none; }
    .bgr-crosshair::before, .bgr-crosshair::after { content:''; position:absolute; background:rgba(255,255,255,.9); }
    .bgr-crosshair::before { width:1px; height:100%; left:50%; top:0; }
    .bgr-crosshair::after  { width:100%; height:1px; left:0; top:50%; }
    .bgr-controls { padding:.45rem .5rem .5rem; display:flex; flex-direction:column; gap:.4rem; }
    .bgr-row { display:flex; align-items:center; gap:.4rem; }
    .bgr-row .fl { margin:0; min-width:52px; flex-shrink:0; }
    .bgr-row input[type=range] { flex:1; -webkit-appearance:none; height:3px; background:var(--s1); border-radius:99px; border:none; cursor:pointer; padding:0; outline:none; }
    .bgr-row input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:11px; height:11px; border-radius:50%; background:var(--acc); cursor:pointer; }
    .bgr-row .val { font-size:.64rem; color:var(--tx2); font-family:'DM Mono',monospace; width:26px; text-align:right; flex-shrink:0; }
    .bgr-footer { display:flex; gap:.36rem; padding:.4rem .5rem .45rem; border-top:1px solid var(--b1); }
    .bgr-btn { flex:1; display:inline-flex; align-items:center; justify-content:center; gap:.28rem; padding:.35rem .4rem; background:var(--s3); border:1px solid var(--b1); color:var(--tx2); border-radius:4px; font-family:'DM Sans',sans-serif; font-size:.69rem; font-weight:500; cursor:pointer; transition:background .12s, color .12s, border-color .12s; white-space:nowrap; }
    .bgr-btn:hover:not(:disabled) { background:var(--b1); color:var(--tx); }
    .bgr-btn.accent { background:var(--acc); border-color:var(--acc); color:#fff; }
    .bgr-btn.accent:hover:not(:disabled) { filter:brightness(1.1); }
    .bgr-btn:disabled { opacity:.35; cursor:not-allowed; }
    .bgr-status { font-size:.61rem; color:var(--tx3); font-family:'DM Mono',monospace; text-align:center; padding:.18rem 0 0; min-height:.85rem; }
    .bgr-status.ok  { color:#4caf90; }
    .bgr-status.err { color:#f06060; }

    /* RESPONSIVE */
    @media (max-width:720px) {
      :root { --sw:100%; }
      .app { flex-direction:column; height:auto; overflow:visible; }
      .sidebar { width:100%; min-width:unset; border-right:none; border-bottom:1px solid var(--b1); max-height:0; overflow:hidden; transition:max-height .28s ease; }
      .sidebar.open { max-height:10000px; overflow:visible; }
      .mbtn { display:flex; }
      .brand-sep { display:none; }
      .canvas-area { padding:.8rem .5rem .8rem; }
    }
    @media (max-width:420px) {
      :root { --th:42px; }
      .topbar { padding:0 .55rem; gap:.36rem; }
      .tsep, .tf { display:none; }
      .g3 { grid-template-columns:1fr 1fr; }
      .canvas-area { padding:.55rem .2rem .55rem; }
      .acc-hd { padding:.52rem .68rem; }
      .acc-bd  { padding:.6rem .68rem .7rem; }
    }
  </style>
</head>
<body>

<!-- SVG SPRITE -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="i-img"  viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></symbol>
  <symbol id="i-logo" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></symbol>
  <symbol id="i-txt"  viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></symbol>
  <symbol id="i-dl"   viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
  <symbol id="i-up"   viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></symbol>
  <symbol id="i-dn"   viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></symbol>
  <symbol id="i-lt"   viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></symbol>
  <symbol id="i-rt"   viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></symbol>
  <symbol id="i-upl"  viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></symbol>
  <symbol id="i-menu" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></symbol>
  <symbol id="i-chev" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></symbol>
  <symbol id="i-grid"  viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></symbol>
  <symbol id="i-wand"  viewBox="0 0 24 24"><line x1="15" y1="4" x2="19" y2="8"/><path d="M4 20L15 9"/><line x1="5" y1="7" x2="5" y2="3"/><line x1="3" y1="5" x2="7" y2="5"/><line x1="20" y1="14" x2="20" y2="18"/><line x1="18" y1="16" x2="22" y2="16"/><line x1="11" y1="3" x2="11" y2="5"/><line x1="10" y1="4" x2="12" y2="4"/></symbol>
  <symbol id="i-brush" viewBox="0 0 24 24"><path d="M18 3a3 3 0 0 1 0 4l-8 8a4 4 0 0 1-4 1 2 2 0 0 0-2 2v1H2v-1a4 4 0 0 1 4-4 2 2 0 0 0 2-2l8-8a3 3 0 0 1 2-1z"/></symbol>
  <symbol id="i-reset" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></symbol>
  <symbol id="i-eye"   viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></symbol>
</svg>

<!-- TOPBAR -->
<header class="topbar">
  <div class="brand">
    <img src="https://compassoffices.github.io/img/logo/new-p1-32.png" alt="" style="height:20px;width:auto;display:block;flex-shrink:0;" />
    EDM <span class="brand-sep">/ Banner Editor</span>
  </div>
  <div class="tsep"></div>
  <div class="tf">
    <label>Canvas</label>
    <select class="ts" id="layoutSelect">
      <option value="385x300" selected>385 × 300</option>
      <option value="680x150">680 × 150</option>
      <option value="680x200">680 × 200</option>
      <option value="680x300">680 × 300</option>
      <option value="800x800">800 × 800</option>
    </select>
  </div>
  <button class="mbtn" id="menuBtn" aria-label="Toggle panel">
    <span class="ic ic-m"><svg><use href="#i-menu"/></svg></span>
  </button>
</header>

<div class="app">
  <aside class="sidebar" id="sidebar">

    <!-- BACKGROUND -->
    <div class="acc open" id="acc-img">
      <div class="acc-hd" onclick="toggleAcc('acc-img')">
        <div class="acc-title" id="at-img"><span class="ic ic-m"><svg><use href="#i-img"/></svg></span><span class="pip"></span>Background</div>
        <span class="chev ic ic-s"><svg><use href="#i-chev"/></svg></span>
      </div>
      <div class="acc-bd">
        <div class="f"><div class="upz"><label><input type="file" id="uploadImage" accept="image/*"/>
          <div class="upz-icon"><span class="ic ic-l"><svg><use href="#i-upl"/></svg></span></div>
          <div class="upz-txt">Upload background image</div>
          <div class="upz-nm" id="imgName">No file chosen</div>
        </label></div></div>
        <div class="f"><label class="fl">Zoom</label>
          <div class="rr"><input type="range" id="zoomSlider" min=".05" max="5" step=".05" value="1"/><input type="number" id="zoomNum" min=".05" max="5" step=".05" value="1"/></div>
        </div>
        <div class="f"><label class="fl">Overlay</label>
          <select id="overlayEffect"><option value="none">None</option><option value="gradient" selected>Black Gradient</option><option value="dark">Dark Fill</option></select>
        </div>
        <div class="f"><label class="fl">Opacity</label>
          <div class="rr"><input type="range" id="overlayOpacity" min=".05" max="1" step=".05" value=".3"/><input type="number" id="overlayOpacityNum" min=".05" max="1" step=".05" value=".3"/></div>
        </div>
        <div class="sdiv">Position</div>
        <div class="mvrow">
          <div class="dpad">
            <button class="dpb du" onclick="moveImg(0,-8)"><span class="ic ic-s"><svg><use href="#i-up"/></svg></span></button>
            <button class="dpb dd" onclick="moveImg(0,8)"><span class="ic ic-s"><svg><use href="#i-dn"/></svg></span></button>
            <button class="dpb dl" onclick="moveImg(-8,0)"><span class="ic ic-s"><svg><use href="#i-lt"/></svg></span></button>
            <button class="dpb dr" onclick="moveImg(8,0)"><span class="ic ic-s"><svg><use href="#i-rt"/></svg></span></button>
          </div>
          <div class="mvcrd g2">
            <div><label class="fl">X</label><input type="number" id="offsetX" value="0" step="1"/></div>
            <div><label class="fl">Y</label><input type="number" id="offsetY" value="0" step="1"/></div>
          </div>
        </div>
      </div>
    </div>

    <!-- LOGO -->
    <div class="acc" id="acc-logo">
      <div class="acc-hd" onclick="toggleAcc('acc-logo')">
        <div class="acc-title" id="at-logo"><span class="ic ic-m"><svg><use href="#i-logo"/></svg></span><span class="pip"></span>Logo</div>
        <span class="chev ic ic-s"><svg><use href="#i-chev"/></svg></span>
      </div>
      <div class="acc-bd">
        <div class="f"><div class="upz"><label><input type="file" id="uploadLogo" accept="image/*"/>
          <div class="upz-icon"><span class="ic ic-l"><svg><use href="#i-upl"/></svg></span></div>
          <div class="upz-txt">Upload logo — ratio preserved</div>
          <div class="upz-nm" id="logoName">No file chosen</div>
        </label></div></div>
        <!-- BG REMOVAL -->

        <div class="f togrow"><label class="fl">Enable</label><label class="tog"><input type="checkbox" id="shadow2" checked/><span class="tog-s"></span></label></div>

        <div class="f g3">
          <div><label class="fl">X</label><div class="rr"><input type="range" id="shadowX2" min="-20" max="20" step="1" value="2"/><input type="number" id="shadowX2Num" value="2"/></div></div>
          <div><label class="fl">Y</label><div class="rr"><input type="range" id="shadowY2" min="-20" max="20" step="1" value="2"/><input type="number" id="shadowY2Num" value="2"/></div></div>
          <div><label class="fl">Blur</label><div class="rr"><input type="range" id="shadowBlur2" min="0" max="50" step="1" value="20"/><input type="number" id="shadowBlur2Num" value="20"/></div></div>
        </div>
        <div class="sdiv">Position <span class="sb">snap 8</span></div>
        <div class="f g2">
          <div><label class="fl">X</label><input type="number" id="textPosX2" step="8" value="16"/></div>

<div class="dl-bar">
  <span class="dl-info" id="dlLabel">385 × 300 px</span>
  <button class="btn-dl" onclick="downloadImage()">
    <span class="ic ic-m"><svg><use href="#i-dl"/></svg></span>
    Download JPG
  </button>
</div>

<script>
const SNAP = 8, SC = 2;
const canvas = document.getElementById('editorCanvas');
const ctx    = canvas.getContext('2d');
const E      = id => document.getElementById(id);
const sn     = v  => Math.round(v / SNAP) * SNAP;

let image = null, logo = null;
let zoom  = 1;
let cW = 385, cH = 300;

// positions — imgOff in canvas px (×SC), logoPos & tp* in logical px
let imgOff  = { x:0, y:0 };
let logoPos = { x:0, y:0 };
let tp1     = { x:0, y:0 };   // logical px
let tp2     = { x:0, y:0 };

// drag
let dragging = false, dragWhat = null;
// start-of-drag snapshots (all in logical px)
let ds_ptr   = { x:0, y:0 };  // pointer start, in canvas px
let ds_img   = { x:0, y:0 };  // imgOff start, canvas px
let ds_logo  = { x:0, y:0 };
let ds_tp1   = { x:0, y:0 };
let ds_tp2   = { x:0, y:0 };

// ── accordion / menu ──────────────────────────────
function toggleAcc(id) { E(id).classList.toggle('open'); }
E('menuBtn').onclick   = () => E('sidebar').classList.toggle('open');

// ── canvas setup ─────────────────────────────────
function setCanvasSize() {
  [cW, cH] = E('layoutSelect').value.split('x').map(Number);
  canvas.width  = cW * SC;
  canvas.height = cH * SC;
  canvas.style.width  = cW + 'px';
  canvas.style.height = cH + 'px';

  zoom = 1; E('zoomSlider').value = 1; E('zoomNum').value = 1;
  imgOff = { x:0, y:0 };
  E('offsetX').value = 0; E('offsetY').value = 0;

  const lw = parseInt(E('logoSize').value);
  logoPos = { x: sn(cW - lw - 16), y: sn(16) };
  E('logoPosX').value = logoPos.x;
  E('logoPosY').value = logoPos.y;

  tp1 = { x: sn(16), y: sn(cH * .56) };
  E('textPosX1').value = tp1.x; E('textPosY1').value = tp1.y;
  tp2 = { x: sn(16), y: sn(cH * .76) };
  E('textPosX2').value = tp2.x; E('textPosY2').value = tp2.y;

  E('cTag').textContent    = `${cW} × ${cH} px`;
  E('dlLabel').textContent = `${cW} × ${cH} px`;
  render();
}

// ── render ────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!image) {
    const sq = 12 * SC;
    for (let cy = 0; cy < canvas.height; cy += sq)
      for (let cx = 0; cx < canvas.width; cx += sq) {
        ctx.fillStyle = ((cx/sq + cy/sq) % 2 === 0) ? '#16161b' : '#1d1d23';
        ctx.fillRect(cx, cy, sq, sq);
      }
  } else {
    const iw = image.width * zoom, ih = image.height * zoom;
    ctx.drawImage(image, (canvas.width - iw) / 2 + imgOff.x,
                         (canvas.height - ih) / 2 + imgOff.y, iw, ih);
  }

  const op = parseFloat(E('overlayOpacity').value);
  if (E('overlayEffect').value === 'dark') {
    ctx.fillStyle = `rgba(0,0,0,${op})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else if (E('overlayEffect').value === 'gradient') {
    const g = ctx.createLinearGradient(0, canvas.height, 0, 0);
    g.addColorStop(0, `rgba(0,0,0,${op})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  if (logo) {
    const tw = parseInt(E('logoSize').value) * SC;
    const th = tw / (logo.naturalWidth / logo.naturalHeight);
    ctx.drawImage(logo, logoPos.x * SC, logoPos.y * SC, tw, th);
  }

  drawTxt(E('text1').value, +E('textSize1').value, E('textColor1').value,
    E('textAlign1').value, E('fontWeight1').value, tp1, E('shadow1').checked,
    { c:E('shadowColor1').value, x:+E('shadowX1').value, y:+E('shadowY1').value, b:+E('shadowBlur1').value });
  drawTxt(E('text2').value, +E('textSize2').value, E('textColor2').value,
    E('textAlign2').value, E('fontWeight2').value, tp2, E('shadow2').checked,
    { c:E('shadowColor2').value, x:+E('shadowX2').value, y:+E('shadowY2').value, b:+E('shadowBlur2').value });
}

function drawTxt(text, size, color, align, weight, pos, shOn, sh) {
  if (!text.trim()) return;
  ctx.save();
  if (shOn) { ctx.shadowColor = sh.c; ctx.shadowOffsetX = sh.x*SC; ctx.shadowOffsetY = sh.y*SC; ctx.shadowBlur = sh.b*SC; }
  ctx.fillStyle = color;
  ctx.font      = `${weight} ${size*SC}px 'DM Sans',sans-serif`;
  ctx.textAlign = align; ctx.textBaseline = 'top';
  // pos is in logical px; draw at ×SC
  text.split('\n').forEach((l,i) => ctx.fillText(l, pos.x*SC, pos.y*SC + i*size*SC*1.25));
  ctx.restore();
}

// ── d-pad ─────────────────────────────────────────
function moveImg(dx, dy) {
  imgOff.x += dx * SC; imgOff.y += dy * SC;
  E('offsetX').value = Math.round(imgOff.x / SC);
  E('offsetY').value = Math.round(imgOff.y / SC);
  render();
}
function moveLogo(dx, dy) {
  logoPos.x = sn(logoPos.x + dx);
  logoPos.y = sn(logoPos.y + dy);
  E('logoPosX').value = logoPos.x;
  E('logoPosY').value = logoPos.y;
  render();
}

// ── hit tests (all in canvas px) ─────────────────
function hitLogo(mx, my) {
  if (!logo) return false;
  const tw = parseInt(E('logoSize').value) * SC;
  const th = tw / (logo.naturalWidth / logo.naturalHeight);
  const lx = logoPos.x * SC, ly = logoPos.y * SC;
  return mx >= lx-6 && mx <= lx+tw+6 && my >= ly-6 && my <= ly+th+6;
}
function hitTxt(pos, mx, my, size, lines) {
  const s = size * SC;
  const px = pos.x * SC, py = pos.y * SC;
  return mx >= px-8 && mx <= px + canvas.width * .9
      && my >= py-8 && my <= py + s * 1.25 * lines + 8;
}

// ── pointer helper ────────────────────────────────
function pxy(e) {
  const r = canvas.getBoundingClientRect();
  const s = e.touches ? e.touches[0] : e;
  return {
    x: (s.clientX - r.left) / r.width  * canvas.width,
    y: (s.clientY - r.top)  / r.height * canvas.height
  };
}

// ── drag handlers (snap-from-start strategy) ──────
// Snap works by computing total delta from drag-start,
// snapping the result relative to start position.
// This prevents jitter and gives clean grid movement.

function onDown(e) {
  e.preventDefault();
  const p = pxy(e);
  const l1 = (E('text1').value||'').split('\n').length;
  const l2 = (E('text2').value||'').split('\n').length;
  dragWhat = null;
  if      (hitLogo(p.x, p.y))                                                         dragWhat = 'logo';
  else if (E('text1').value.trim() && hitTxt(tp1,p.x,p.y,+E('textSize1').value,l1))   dragWhat = 'text1';
  else if (E('text2').value.trim() && hitTxt(tp2,p.x,p.y,+E('textSize2').value,l2))   dragWhat = 'text2';
  else                                                                                  dragWhat = 'image';
  // snapshot start state
  ds_ptr  = { ...p };
  ds_img  = { ...imgOff };
  ds_logo = { ...logoPos };
  ds_tp1  = { ...tp1 };
  ds_tp2  = { ...tp2 };
  dragging = true;
}

function onMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const p  = pxy(e);
  // total delta from drag start, in canvas px
  const dx = p.x - ds_ptr.x;
  const dy = p.y - ds_ptr.y;
  // logical px delta
  const ldx = dx / SC;
  const ldy = dy / SC;

  if (dragWhat === 'image') {
    // free move — no snap
    imgOff.x = Math.round(ds_img.x + dx);
    imgOff.y = Math.round(ds_img.y + dy);
    E('offsetX').value = Math.round(imgOff.x / SC);
    E('offsetY').value = Math.round(imgOff.y / SC);
  } else if (dragWhat === 'logo') {
    // snap: compute target from start, snap that
    logoPos.x = sn(ds_logo.x + ldx);
    logoPos.y = sn(ds_logo.y + ldy);
    E('logoPosX').value = logoPos.x;
    E('logoPosY').value = logoPos.y;
  } else if (dragWhat === 'text1') {
    tp1.x = sn(ds_tp1.x + ldx);
    tp1.y = sn(ds_tp1.y + ldy);
    E('textPosX1').value = tp1.x;
    E('textPosY1').value = tp1.y;
  } else if (dragWhat === 'text2') {
    tp2.x = sn(ds_tp2.x + ldx);
    tp2.y = sn(ds_tp2.y + ldy);
    E('textPosX2').value = tp2.x;
    E('textPosY2').value = tp2.y;
  }
  render();
}

function onUp() { dragging = false; dragWhat = null; }

canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('mouseleave', onUp);
canvas.addEventListener('touchstart', onDown, { passive:false });
canvas.addEventListener('touchmove',  onMove, { passive:false });
canvas.addEventListener('touchend',   onUp);

// ── download ──────────────────────────────────────
function downloadImage() {
  const ts = new Date().toISOString().replace(/[:.]/g,'-');
  const a  = document.createElement('a');
  a.download = `edm-${cW}x${cH}-${ts}.jpg`;
  a.href     = canvas.toDataURL('image/jpeg', 0.92);
  a.click();
}

// ── file upload ───────────────────────────────────
function loadFile(inId, nmId, cb) {
  E(inId).addEventListener('change', ev => {
    const f = ev.target.files[0];
    if (!f || !f.type.startsWith('image/')) return;
    E(nmId).textContent = f.name;
    const fr = new FileReader();
    fr.onload = () => { const i = new Image(); i.onload = () => cb(i); i.src = fr.result; };
    fr.readAsDataURL(f);
  });
}
loadFile('uploadImage', 'imgName', img => { image = img; E('at-img').classList.add('lit'); render(); });
loadFile('uploadLogo',  'logoName', onLogoLoaded);

// ── range ↔ number sync ───────────────────────────
function pair(rId, nId, cb) {
  E(rId).addEventListener('input', () => { E(nId).value = E(rId).value; cb && cb(); });
  E(nId).addEventListener('input', () => { E(rId).value = E(nId).value; cb && cb(); });
}
pair('overlayOpacity','overlayOpacityNum', render);
pair('zoomSlider','zoomNum', () => { zoom = +E('zoomSlider').value; render(); });
pair('logoSize','logoSizeNum', render);
pair('textSize1','textSize1Num', render);
pair('shadowX1','shadowX1Num', render);
pair('shadowY1','shadowY1Num', render);
pair('shadowBlur1','shadowBlur1Num', render);
pair('textSize2','textSize2Num', render);
pair('shadowX2','shadowX2Num', render);
pair('shadowY2','shadowY2Num', render);
pair('shadowBlur2','shadowBlur2Num', render);

// ── manual position inputs ────────────────────────
E('offsetX').addEventListener('input', () => { imgOff.x = +E('offsetX').value * SC; render(); });
E('offsetY').addEventListener('input', () => { imgOff.y = +E('offsetY').value * SC; render(); });
E('logoPosX').addEventListener('input', () => { logoPos.x = sn(+E('logoPosX').value); E('logoPosX').value = logoPos.x; render(); });
E('logoPosY').addEventListener('input', () => { logoPos.y = sn(+E('logoPosY').value); E('logoPosY').value = logoPos.y; render(); });
E('textPosX1').addEventListener('input', () => { tp1.x = sn(+E('textPosX1').value); render(); });
E('textPosY1').addEventListener('input', () => { tp1.y = sn(+E('textPosY1').value); render(); });
E('textPosX2').addEventListener('input', () => { tp2.x = sn(+E('textPosX2').value); render(); });
E('textPosY2').addEventListener('input', () => { tp2.y = sn(+E('textPosY2').value); render(); });

// ── change listeners ──────────────────────────────
['overlayEffect','text1','textColor1','fontWeight1','shadow1','shadowColor1','textAlign1',
 'text2','textColor2','fontWeight2','shadow2','shadowColor2','textAlign2']
  .forEach(id => { E(id).addEventListener('input', render); E(id).addEventListener('change', render); });

// ═══════════════════════════════════════════════════
// BG REMOVAL — click-to-pick wand + restore brush
// ═══════════════════════════════════════════════════

let logoOriginal = null;   // pristine Image on upload
let bgrImageData = null;   // working ImageData (full logo res)
let bgrOrigData  = null;   // copy of original pixels for restore
let bgrCanvas    = null;   // the preview canvas element
let bgrCtx       = null;
let bgrTool      = 'wand'; // 'wand' | 'brush'
let bgrPainting  = false;

// ── tool selector ──────────────────────────────────
function setTool(t) {
  bgrTool = t;
  E('toolWand').classList.toggle('active', t === 'wand');
  E('toolBrush').classList.toggle('active', t === 'brush');
  if (bgrCanvas) bgrCanvas.style.cursor = t === 'wand' ? 'crosshair' : 'cell';
}

// ── range syncs ────────────────────────────────────
E('bgrTol').addEventListener('input', () => E('tolVal').textContent = E('bgrTol').value);
E('brushSize').addEventListener('input', () => E('brushVal').textContent = E('brushSize').value);

// ── status helper ──────────────────────────────────
function bgrMsg(msg, cls='') {
  const el = E('bgrStatus');
  el.textContent = msg; el.className = 'bgr-status ' + cls;
  if (cls === 'ok') setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 2500);
}

// ── seed swatch ────────────────────────────────────
function showSeed(r, g, b) {
  E('seedSwatch').style.background = `rgb(${r},${g},${b})`;
  E('seedLabel').textContent = `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`.toUpperCase();
}

// ── init preview after logo upload ─────────────────
function initBgrPreview(img) {
  const stage = E('bgrStage');
  E('bgrEmpty').style.display = 'none';

  if (!bgrCanvas) {
    bgrCanvas = E('bgrCanvas');
    bgrCtx    = bgrCanvas.getContext('2d', { willReadFrequently: true });
    bgrCanvas.style.display = 'block';
    bindBgrEvents();
  }

  // scale preview to fit sidebar (~260px wide)
  const maxW = (stage.clientWidth || 260);
  const maxH = 160;
  const ratio = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1);
  bgrCanvas.width  = img.naturalWidth;
  bgrCanvas.height = img.naturalHeight;
  bgrCanvas.style.width  = Math.round(img.naturalWidth  * ratio) + 'px';
  bgrCanvas.style.height = Math.round(img.naturalHeight * ratio) + 'px';

  bgrCtx.clearRect(0, 0, bgrCanvas.width, bgrCanvas.height);
  bgrCtx.drawImage(img, 0, 0);

  bgrImageData = bgrCtx.getImageData(0, 0, bgrCanvas.width, bgrCanvas.height);
  // store original for restore brush
  bgrOrigData  = new Uint8ClampedArray(bgrImageData.data);

  E('bgrApplyBtn').disabled = false;
  E('bgrResetBtn').disabled = false;
  bgrMsg('Click to pick colour · drag to restore');
}

// ── coordinate mapping preview→canvas ──────────────
function bgrEventPx(e) {
  const r   = bgrCanvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  const rx  = (src.clientX - r.left) / r.width;
  const ry  = (src.clientY - r.top)  / r.height;
  return {
    x: Math.floor(rx * bgrCanvas.width),
    y: Math.floor(ry * bgrCanvas.height)
  };
}

// ── colour distance ─────────────────────────────────
function colDist(d, i, r, g, b) {
  const dr = d[i]-r, dg = d[i+1]-g, db = d[i+2]-b;
  // ignore alpha in distance — treat semi-transparent as colour match
  return Math.sqrt(dr*dr + dg*dg + db*db);
}

// ── flood fill erase from seed point ───────────────
function floodErase(px, py) {
  const d   = bgrImageData.data;
  const W   = bgrCanvas.width, H = bgrCanvas.height;
  const tol = parseInt(E('bgrTol').value);
  const si  = (py * W + px) * 4;
  const sR  = d[si], sG = d[si+1], sB = d[si+2];

  showSeed(sR, sG, sB);

  const visited = new Uint8Array(W * H);
  const q = [px, py];
  visited[py * W + px] = 1;

  let qi = 0;
  while (qi < q.length) {
    const x = q[qi++], y = q[qi++];
    const i = (y * W + x) * 4;
    if (colDist(d, i, sR, sG, sB) <= tol) {
      d[i+3] = 0; // erase
      const check = (nx, ny) => {
        if (nx < 0 || ny < 0 || nx >= W || ny >= H) return;
        const ni = ny * W + nx;
        if (visited[ni]) return;
        visited[ni] = 1;
        q.push(nx, ny);
      };
      check(x+1,y); check(x-1,y); check(x,y+1); check(x,y-1);
    }
  }

  // feather: blur alpha at edges
  if (E('bgrFeather').checked) featherAlpha(d, W, H);

  bgrCtx.putImageData(bgrImageData, 0, 0);
  bgrMsg('Click more areas · drag to restore', '');
}

// ── feather alpha edges ─────────────────────────────
function featherAlpha(d, W, H) {
  const a = new Float32Array(W * H);
  for (let i = 0; i < W*H; i++) a[i] = d[i*4+3];
  const s = new Float32Array(W * H);
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      let sum = 0, cnt = 0;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const nx=x+dx, ny=y+dy;
          if (nx>=0&&ny>=0&&nx<W&&ny<H) { sum+=a[ny*W+nx]; cnt++; }
        }
      }
      s[y*W+x] = sum/cnt;
    }
  }
  for (let i = 0; i < W*H; i++) d[i*4+3] = Math.round(s[i]);
}

// ── restore brush paint ─────────────────────────────
function restoreBrush(px, py) {
  const d   = bgrImageData.data;
  const od  = bgrOrigData;
  const W   = bgrCanvas.width, H = bgrCanvas.height;
  const rad = Math.round(parseInt(E('brushSize').value) * (bgrCanvas.width / (bgrCanvas.getBoundingClientRect().width || bgrCanvas.width)));
  const r2  = rad * rad;

  for (let dy = -rad; dy <= rad; dy++) {
    for (let dx = -rad; dx <= rad; dx++) {
      if (dx*dx + dy*dy > r2) continue;
      const nx = px+dx, ny = py+dy;
      if (nx<0||ny<0||nx>=W||ny>=H) continue;
      const i = (ny*W+nx)*4;
      // restore all 4 channels from original
      d[i]   = od[i];
      d[i+1] = od[i+1];
      d[i+2] = od[i+2];
      d[i+3] = od[i+3];
    }
  }
  bgrCtx.putImageData(bgrImageData, 0, 0);
}

// ── bind events to preview canvas ──────────────────
function bindBgrEvents() {
  function getP(e) { e.preventDefault(); return bgrEventPx(e); }

  bgrCanvas.addEventListener('mousedown', e => {
    const {x,y} = getP(e);
    bgrPainting = true;
    if (bgrTool === 'wand')  { floodErase(x, y); bgrPainting = false; }
    else                      restoreBrush(x, y);
  });
  bgrCanvas.addEventListener('mousemove', e => {
    if (!bgrPainting || bgrTool !== 'brush') return;
    const {x,y} = getP(e);
    restoreBrush(x, y);
  });
  bgrCanvas.addEventListener('mouseup',    () => bgrPainting = false);
  bgrCanvas.addEventListener('mouseleave', () => bgrPainting = false);

  // touch
  bgrCanvas.addEventListener('touchstart', e => {
    const {x,y} = getP(e);
    bgrPainting = true;
    if (bgrTool === 'wand')  { floodErase(x, y); bgrPainting = false; }
    else                      restoreBrush(x, y);
  }, {passive:false});
  bgrCanvas.addEventListener('touchmove', e => {
    if (!bgrPainting || bgrTool !== 'brush') return;
    const {x,y} = getP(e);
    restoreBrush(x, y);
  }, {passive:false});
  bgrCanvas.addEventListener('touchend', () => bgrPainting = false);
}

// ── commit preview → logo (used in canvas render) ──
function commitBgRemove() {
  if (!bgrImageData) return;
  // convert working canvas to Image
  const newImg  = new Image();
  newImg.onload = () => {
    logo = newImg;
    render();
    bgrMsg('Applied to canvas.', 'ok');
  };
  newImg.src = bgrCanvas.toDataURL('image/png');
}

// ── reset to original ────────────────────────────── 
function resetLogo() {
  if (!logoOriginal) return;
  logo = logoOriginal;
  initBgrPreview(logoOriginal);
  render();
  bgrMsg('Reset to original.', '');
}

// ── on logo upload: store original + init preview ──
function onLogoLoaded(img) {
  logo         = img;
  logoOriginal = img;
  E('at-logo').classList.add('lit');
  const lw = parseInt(E('logoSize').value);
  logoPos = { x: sn(cW - lw - 16), y: sn(16) };
  E('logoPosX').value = logoPos.x;
  E('logoPosY').value = logoPos.y;
  initBgrPreview(img);
  render();
}

E('layoutSelect').addEventListener('change', setCanvasSize);
setCanvasSize();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://www.compassoffices.com/wp-content/uploads/2025/09/compassoffices-logo-web-2025_icon-o-scaled.png">
<title>Compass Events</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0; padding: 20px;
  background: #000; min-height: 100vh;
}
.container {
  max-width: 1200px; margin: 0 auto;
  box-shadow: 0 20px 40px rgba(0,0,0,.3);
  overflow: hidden; padding-bottom: 40px;
}

/* ── LOGO ── */
.logo-banner {
  width: 100%; background: #000;
  display: flex; justify-content: center; align-items: center;
  padding: 18px 0 10px;
}
.logo-banner img { height: 50px; max-width: 260px; }

/* ── HEADER ── */
.header {
  background: #000; color: #fff;
  padding: 28px 30px 18px; text-align: center;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 2px solid #ff6600;
}
.header h1 { margin: 0 0 4px; font-size: 2.2rem; font-weight: 700; color: #fff; }
.header p  { margin: 0; font-size: 1rem; color: #ff6600; font-weight: 600; letter-spacing: .02em; }
#event-count { margin: 10px 0 0; font-size: .92rem; color: rgba(255,255,255,.6); font-weight: 400; }

/* ── SEARCH ── */
.search-wrap {
  margin: 14px auto 0; max-width: 460px; position: relative;
}
.search-wrap .ico-search {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px; color: #ff6600; pointer-events: none;
}
#search-input {
  width: 100%; padding: 9px 36px 9px 38px;
  border: 2px solid #ff6600; border-radius: 25px;
  background: #111; color: #fff; font-size: .92rem;
  outline: none; font-family: inherit;
  transition: background .2s;
}
#search-input::placeholder { color: #666; }
#search-input:focus { background: #1a1a1a; }
#search-clear {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: #666; cursor: pointer;
  display: none; padding: 2px; line-height: 1;
}
#search-clear svg { width: 13px; height: 13px; display: block; }
#search-clear:hover { color: #fff; }

/* ── SELECTORS ── */
.selector-group {
  margin: 14px 0 0; display: flex; justify-content: center;
  align-items: center; gap: 12px; flex-wrap: wrap;
}
.selector-group label { font-weight: 600; font-size: .9rem; color: #fff; }
.selector-group select {
  background: #111; border: 2px solid #ff6600; color: #ff6600;
  padding: 8px 14px; border-radius: 25px; font-size: .9rem;
  font-weight: 500; cursor: pointer; outline: none;
  font-family: inherit; transition: all .25s;
}
.selector-group select:hover,
.selector-group select:focus { background: #ff6600; color: #fff; }
.selector-group select option { background: #222; color: #fff; }

/* ── ACTION BUTTONS ── */
.action-row {
  margin: 12px 0 0; display: flex; justify-content: center;
  align-items: center; gap: 10px; flex-wrap: wrap;
}
.btn-action {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 20px; font-size: .82rem;
  font-weight: 600; cursor: pointer; font-family: inherit;
  transition: all .2s; border: 2px solid rgba(255,255,255,.2);
  background: transparent; color: rgba(255,255,255,.65);
}
.btn-action svg { width: 13px; height: 13px; flex-shrink: 0; }
.btn-action:hover { border-color: #ff6600; color: #ff6600; }
.btn-copy {
  border-color: #ff6600; color: #ff6600;
  display: none;
}
.btn-copy.visible { display: inline-flex; }
.btn-copy:hover   { background: #ff6600; color: #fff; }
.btn-copy.copied  { background: #51cf66; border-color: #51cf66; color: #fff; pointer-events: none; }

/* ── LOADING / ERROR ── */
.loading-state {
  text-align: center; padding: 70px 20px;
  background: #f5f5f5;
}
.spinner {
  border: 4px solid #e0e0e0; border-top-color: #ff6600;
  border-radius: 50%; width: 40px; height: 40px;
  animation: spin .9s linear infinite; margin: 0 auto 18px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-state p { color: #888; font-size: .95rem; }
.error-box {
  padding: 32px; background: #fff;
}
.error-inner {
  background: #ffe6e6; border-left: 4px solid #dc2626;
  border-radius: 6px; padding: 18px 20px; color: #7f1d1d;
}
.error-inner h3 { margin-bottom: 6px; font-size: 1rem; color: #dc2626; }

/* ── LIST VIEW ── */
.list-view { padding: 30px; background: #f0f0f0; }
.event-card {
  background: #fff; border-radius: 12px; padding: 22px 24px;
  margin-bottom: 16px; border-left: 5px solid #ccc;
  box-shadow: 0 2px 10px rgba(0,0,0,.06);
  transition: box-shadow .2s, transform .2s, opacity .2s;
  animation: fadeUp .3s ease both;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.event-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.1); transform: translateY(-1px); }
.event-card.is-past { opacity: .45; }
.event-card.is-past:hover { opacity: .75; }
.event-card.is-today  { border-left-color: #ff6b6b; background: #fff6f6; border: 2px solid #ff6b6b; }
.event-card.is-upcoming { border-left-color: #51cf66; }
.event-card.is-today .event-title { color: #ff6b6b; }

.card-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 12px; border-radius: 20px;
  font-size: .75rem; font-weight: 700; white-space: nowrap;
}
.badge svg { width: 11px; height: 11px; }
.badge-today    { background: #ff6b6b; color: #fff; }
.badge-upcoming { background: #51cf66; color: #fff; }
.badge-past     { background: #e5e5e5; color: #888; }
.badge-time     { background: #ff6600; color: #fff; }
.badge-confirm  { background: #dcfce7; color: #16a34a; margin-left: auto; }
.badge-pending  { background: #f0f0f0; color: #999; margin-left: auto; }

.event-title { font-size: 1.15rem; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; line-height: 1.3; }
.event-meta  { display: flex; gap: 20px; flex-wrap: wrap; }
.meta-item   { display: flex; align-items: center; gap: 7px; font-size: .85rem; color: #555; }
.meta-item svg { width: 14px; height: 14px; color: #ff6600; flex-shrink: 0; }

/* ── TABLE VIEW ── */
.table-view { padding: 30px; background: #f0f0f0; display: flex; flex-direction: column; gap: 24px; }

/* Country group */
.country-section { border-radius: 12px; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.07); }
.country-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px; background: #111;
  cursor: pointer; user-select: none;
  transition: background .2s;
}
.country-header:hover { background: #222; }
.country-label { font-size: .78rem; font-weight: 700; color: rgba(255,255,255,.85); letter-spacing: .07em; text-transform: uppercase; flex: 1; }
.country-count { font-size: .75rem; font-weight: 600; color: #ff6600; }
.chev {
  width: 14px; height: 14px; color: rgba(255,255,255,.4);
  transition: transform .25s; flex-shrink: 0;
}
.chev.open { transform: rotate(180deg); }
.country-body { overflow: hidden; transition: max-height .3s ease; }
.country-body.closed { max-height: 0 !important; }

/* Location group inside country */
.location-group { border-top: 1px solid #e0e0e0; }
.location-group:first-child { border-top: none; }
.location-header {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 10px 20px; background: #ff6600;
  cursor: pointer; user-select: none; transition: background .2s;
}
.location-header:hover { background: #e05a00; }
.loc-name  { font-size: .9rem; font-weight: 700; color: #fff; flex: 1; }
.loc-email {
  font-size: .78rem; color: rgba(255,255,255,.85);
  display: inline-flex; align-items: center; gap: 5px;
}
.loc-email svg { width: 11px; height: 11px; flex-shrink: 0; }
.loc-count { font-size: .73rem; font-weight: 700; background: rgba(0,0,0,.2); color: rgba(255,255,255,.9); border-radius: 20px; padding: 2px 9px; }
.loc-chev  { width: 13px; height: 13px; color: rgba(255,255,255,.5); transition: transform .25s; flex-shrink: 0; }
.loc-chev.open { transform: rotate(180deg); }
.loc-body  { overflow: hidden; transition: max-height .3s ease; }
.loc-body.closed { max-height: 0 !important; }

.table-scroll { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; min-width: 560px; background: #fff; }
.data-table th {
  background: #f5f5f5; color: #555; padding: 9px 14px;
  text-align: left; font-size: .72rem; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  border-bottom: 2px solid #e0e0e0;
}
.data-table td { padding: 10px 14px; border-bottom: 1px solid #eee; font-size: .87rem; color: #222; vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #fff8f3; }
.data-table tr.row-past td { color: #bbb; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #51cf66; }
.dot.pending { background: #ddd; }

/* ── CALENDAR VIEW ── */
.calendar-view { padding: 30px; background: #f0f0f0; }
.cal-inner { background: #f7f7f7; border-radius: 12px; padding: 24px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-title { font-size: 1.1rem; font-weight: 700; color: #222; }
.cal-btn {
  width: 34px; height: 34px; border-radius: 50%; border: 2px solid #ff6600;
  background: transparent; color: #ff6600; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; font-size: 1rem;
}
.cal-btn svg { width: 14px; height: 14px; }
.cal-btn:hover { background: #ff6600; color: #fff; }
.cal-grid-header {
  display: grid; grid-template-columns: repeat(7,1fr);
  text-align: center; font-weight: 700; color: #444;
  font-size: .78rem; letter-spacing: .05em; text-transform: uppercase;
  padding: 8px 0; border-bottom: 2px solid #ff6600; margin-bottom: 8px;
}
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
.cal-cell {
  background: #fff; border: 1px solid #ddd; border-radius: 8px;
  min-height: 90px; padding: 8px; cursor: pointer;
  transition: all .2s; overflow: hidden;
}
.cal-cell:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); border-color: #ff6600; }
.cal-cell.is-today { border: 2px solid #ff6b6b; background: #fff6f6; }
.cal-cell.has-events { background: #e8f4ff; border-color: #90caf9; }
.cal-cell.is-past { opacity: .5; }
.cal-cell.is-empty { background: transparent; border-color: transparent; cursor: default; min-height: 0; }
.cal-cell.is-empty:hover { box-shadow: none; border-color: transparent; }
.day-num { font-size: .8rem; font-weight: 700; color: #444; margin-bottom: 4px; }
.is-today .day-num { color: #ff6b6b; }
.event-pip {
  display: block; background: #ff6600; color: #fff;
  border-radius: 4px; padding: 2px 6px; font-size: .68rem;
  font-weight: 600; margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── MODAL ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 300;
}
.overlay.open { display: block; }
.modal {
  display: none; position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: #fff; border-radius: 14px; padding: 26px;
  box-shadow: 0 8px 40px rgba(0,0,0,.22); z-index: 400;
  max-width: 520px; width: 92%; max-height: 82vh; overflow-y: auto;
}
.modal.open { display: block; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.modal-head h3 { font-size: 1.05rem; font-weight: 700; color: #222; }
.modal-close {
  background: none; border: none; cursor: pointer; color: #ff6600;
  font-size: 1.1rem; padding: 4px 8px; border-radius: 4px;
  line-height: 1; transition: background .2s;
}
.modal-close:hover { background: #ffe4d0; }
.modal-card { padding: 14px 0; border-bottom: 1px solid #eee; }
.modal-card:last-child { border-bottom: none; }
.modal-card-title { font-weight: 700; font-size: .95rem; margin: 8px 0 4px; }
.modal-card-sub   { font-size: .82rem; color: #777; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 60px 20px; background: #fff;
  border-radius: 12px;
}
.empty-state svg { width: 44px; height: 44px; color: #ddd; margin-bottom: 14px; }
.empty-state h3 { color: #999; font-size: 1rem; margin-bottom: 4px; }
.empty-state p  { color: #bbb; font-size: .87rem; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #111; color: #fff; padding: 10px 24px;
  border-radius: 8px; font-size: .85rem; font-weight: 600;
  border-left: 3px solid #ff6600;
  box-shadow: 0 4px 20px rgba(0,0,0,.2); z-index: 500;
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 860px) {
  .list-view, .table-view, .calendar-view { padding: 16px; }
  .cal-cell { min-height: 70px; }
}
@media (max-width: 600px) {
  body { padding: 0; }
  .header { padding: 18px 14px 14px; }
  .header h1 { font-size: 1.6rem; }
  .cal-cell { min-height: 56px; padding: 5px; }
  .cal-cell.has-events::after {
    content: ''; display: block; width: 6px; height: 6px;
    background: #ff6600; border-radius: 50%; margin: 4px auto 0;
  }
  .event-pip { display: none; }
}
</style>
</head>
<body>
<div class="container">

  <!-- LOGO -->
  <div class="logo-banner">
    <img src="https://www.compassoffices.com/wp-content/themes/compass-offices/assets/images/compassoffices-logo-web-all-in-one-2025_ow.svg" alt="Compass Offices" />
  </div>

  <!-- HEADER -->
  <div class="header">
    <h1>Compass Events</h1>
    <p>Upcoming events and today's schedule</p>
    <div id="event-count">Loading events…</div>

    <!-- Search -->
    <div class="search-wrap">
      <svg class="ico-search" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search-input" type="text" placeholder="Search events, clients, locations…" autocomplete="off" />
      <button id="search-clear">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Filters -->
    <div class="selector-group">
      <div><label for="year-select">Year:</label>
        <select id="year-select"><option value="all">All Years</option></select></div>
      <div><label for="month-select">Month:</label>
        <select id="month-select">
          <option value="all">All Months</option>
          <option value="0">January</option><option value="1">February</option>
          <option value="2">March</option><option value="3">April</option>
          <option value="4">May</option><option value="5">June</option>
          <option value="6">July</option><option value="7">August</option>
          <option value="8">September</option><option value="9">October</option>
          <option value="10">November</option><option value="11">December</option>
        </select></div>
      <div><label for="region-select">Region:</label>
        <select id="region-select"><option value="all">All Regions</option></select></div>
      <div><label for="location-select">Location:</label>
        <select id="location-select"><option value="all">All Locations</option></select></div>
      <div><label for="view-select">View:</label>
        <select id="view-select">
          <option value="list">List View</option>
          <option value="table">Table View</option>
          <option value="calendar">Calendar View</option>
        </select></div>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="btn-action" id="today-btn">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        Jump to Today
      </button>
      <button class="btn-action" id="refresh-btn">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 12a9 9 0 0 1-15 6.7L3 16"/>
          <path d="M17 8h4V4M7 16H3v4"/>
        </svg>
        Refresh
      </button>
      <button class="btn-copy" id="copy-button">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copy Table to Clipboard
      </button>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="loading-state" class="loading-state">
    <div class="spinner"></div>
    <p>Loading events…</p>
  </div>
  <div id="error-box" class="error-box" style="display:none">
    <div class="error-inner">
      <h3>Unable to load events</h3>
      <p>Could not fetch data from the Google Sheet. Please ensure the sheet is published and accessible.</p>
    </div>
  </div>
  <div id="list-view"     class="list-view"     style="display:none"></div>
  <div id="table-view"    class="table-view"    style="display:none"></div>
  <div id="calendar-view" class="calendar-view"  style="display:none">
    <div class="cal-inner">
      <div class="cal-nav">
        <button class="cal-btn" id="cal-prev">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <span class="cal-title" id="cal-title"></span>
        <button class="cal-btn" id="cal-next">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
      <div class="cal-grid-header">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
        <div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>
</div>

<!-- Overlay + Modal -->
<div class="overlay" id="overlay"></div>
<div class="modal" id="modal">
  <div class="modal-head">
    <h3 id="modal-title"></h3>
    <button class="modal-close" id="modal-close">&#10005;</button>
  </div>
  <div id="modal-body"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
let allEvents = [];
let calYear   = new Date().getFullYear();
let calMonth  = new Date().getMonth();

const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTazGFKOEPVQu77BpCHV9rTo8odUfVeH7_k0xLjio7V4bUXw__hk14JMBJu0iDC3MewNy8Hw3kowOJt/pub?gid=1632866699&single=true&output=csv';

/* ══════════════════════════════════
   DATA
══════════════════════════════════ */
async function loadEvents(silent = false) {
  if (!silent) { showEl('loading-state'); hideViews(); }
  try {
    const res = await fetch(CSV_URL, { mode: 'cors' });
    if (!res.ok) throw new Error();
    allEvents = processCSV(await res.text());
    populateYears();
    if (!silent) {
      document.getElementById('year-select').value  = new Date().getFullYear();
      document.getElementById('month-select').value = new Date().getMonth().toString();
    }
    updateRegionFilter();
    updateLocationFilter();
    render();
    if (silent) showToast('Data refreshed');
  } catch(e) {
    console.error(e);
    hideEl('loading-state');
    if (silent) { showToast('Refresh failed'); return; }
    showEl('error-box');
  }
}

function processCSV(text) {
  const lines   = text.split(/\r?\n/);
  const headers = parseCSVLine(lines[0]).map(h => h.trim());
  const seen    = new Set();
  return lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = parseCSVLine(l);
    const row  = {};
    headers.forEach((h,i) => row[h] = (vals[i]||'').trim());
    row._date = parseDate(row.Date);
    return row;
  }).filter(r => r._date).filter(r => {
    const k = `${r['Event-Name']}|${r.Date}|${r.Time}|${r['Client-Name']}|${r.Location}`;
    if (seen.has(k)) return false; seen.add(k); return true;
  }).sort((a,b) => a._date - b._date);
}

function parseCSVLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
    else if (c===',' && !inQ) { res.push(cur.trim()); cur=''; }
    else cur += c;
  }
  res.push(cur.trim()); return res;
}

function parseDate(s) {
  if (!s) return null;
  const fmts = [
    [/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/, m=>new Date(+m[3],+m[2]-1,+m[1])],
    [/^(\d{4})-(\d{1,2})-(\d{1,2})$/,   m=>new Date(+m[1],+m[2]-1,+m[3])],
    [/^(\d{1,2})-(\d{1,2})-(\d{4})$/,   m=>new Date(+m[3],+m[1]-1,+m[2])],
  ];
  for (const [re,fn] of fmts) { const m=s.match(re); if(m) return fn(m); }
  const d=new Date(s); return isNaN(d)?null:d;
}

/* ══════════════════════════════════
   HELPERS
══════════════════════════════════ */
const todayStart = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const isToday    = d => d.toDateString() === new Date().toDateString();
const isPast     = d => { const e=new Date(d); e.setHours(0,0,0,0); return e < todayStart(); };
const isUpcoming = d => { const e=new Date(d); e.setHours(0,0,0,0); return e >= todayStart(); };
const fmtDate    = d => d.toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
const fmtMonth   = (y,m) => new Date(y,m).toLocaleString('en-US',{month:'long',year:'numeric'});
const baseLoc    = loc => (loc||'').split(',')[0].trim() || 'Unknown';

/* Country detection — used in Table View grouping */
function detectCountry(ev) {
  const t = ((ev.Region||'')+' '+(ev.Location||'')).toLowerCase();
  if (/japan|tokyo|osaka|kyoto|nagoya|fukuoka/.test(t))                         return 'Japan';
  if (/hong kong|hk |admiralty|causeway|tsim sha tsui|wanchai|mong kok/.test(t)) return 'Hong Kong';
  if (/singapore|raffles|orchard|marina bay/.test(t))                           return 'Singapore';
  if (/china|shanghai|beijing|shenzhen|guangzhou/.test(t))                      return 'China';
  if (/korea|seoul|busan/.test(t))                                              return 'South Korea';
  if (/australia|sydney|melbourne|brisbane|perth/.test(t))                      return 'Australia';
  if (/taiwan|taipei/.test(t))                                                  return 'Taiwan';
  if (/malaysia|kuala lumpur|\bkl\b/.test(t))                                   return 'Malaysia';
  if (/philippines|manila/.test(t))                                             return 'Philippines';
  if (/thailand|bangkok/.test(t))                                               return 'Thailand';
  if (/india|mumbai|delhi|bangalore/.test(t))                                   return 'India';
  return ev.Region || 'Other';
}

/* ══════════════════════════════════
   FILTERS
══════════════════════════════════ */
function getFiltered() {
  const y   = document.getElementById('year-select').value;
  const m   = document.getElementById('month-select').value;
  const reg = document.getElementById('region-select').value;
  const loc = document.getElementById('location-select').value;
  const q   = document.getElementById('search-input').value.toLowerCase().trim();
  let f = allEvents;
  if (y   !== 'all') f = f.filter(e => e._date.getFullYear()===+y);
  if (m   !== 'all') f = f.filter(e => e._date.getMonth()===+m);
  if (reg !== 'all') f = f.filter(e => e.Region===reg);
  if (loc !== 'all') f = f.filter(e => e.Location===loc);
  if (q)             f = f.filter(e =>
    (e['Event-Name']||'').toLowerCase().includes(q) ||
    (e['Client-Name']||'').toLowerCase().includes(q) ||
    (e.Location||'').toLowerCase().includes(q) ||
    (e.Region||'').toLowerCase().includes(q)
  );
  return [...f].sort((a,b) => {
    const [at,bt]=[isToday(a._date),isToday(b._date)];
    const [au,bu]=[isUpcoming(a._date),isUpcoming(b._date)];
    if(at&&!bt)return -1; if(!at&&bt)return 1;
    if(au&&!bu)return -1; if(!au&&bu)return 1;
    return a._date - b._date;
  });
}

function populateYears() {
  const years = [...new Set(allEvents.map(e=>e._date.getFullYear()))].sort();
  const sel = document.getElementById('year-select');
  sel.innerHTML = '<option value="all">All Years</option>';
  years.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;sel.appendChild(o);});
  sel.value = new Date().getFullYear();
}
function updateRegionFilter() {
  const y=document.getElementById('year-select').value;
  const m=document.getElementById('month-select').value;
  let f=allEvents;
  if(y!=='all') f=f.filter(e=>e._date.getFullYear()===+y);
  if(m!=='all') f=f.filter(e=>e._date.getMonth()===+m);
  const regions=[...new Set(f.map(e=>e.Region).filter(Boolean))].sort();
  const sel=document.getElementById('region-select');
  const cur=sel.value;
  sel.innerHTML='<option value="all">All Regions</option>';
  regions.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;sel.appendChild(o);});
  if(regions.includes(cur)) sel.value=cur;
}
function updateLocationFilter() {
  const y=document.getElementById('year-select').value;
  const m=document.getElementById('month-select').value;
  const reg=document.getElementById('region-select').value;
  let f=allEvents;
  if(y!=='all')   f=f.filter(e=>e._date.getFullYear()===+y);
  if(m!=='all')   f=f.filter(e=>e._date.getMonth()===+m);
  if(reg!=='all') f=f.filter(e=>e.Region===reg);
  const locs=[...new Set(f.map(e=>e.Location).filter(Boolean))].sort();
  const sel=document.getElementById('location-select');
  const cur=sel.value;
  sel.innerHTML='<option value="all">All Locations</option>';
  locs.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;sel.appendChild(o);});
  if(locs.includes(cur)) sel.value=cur;
}
function updateCount(n) {
  const y=document.getElementById('year-select').value;
  const m=document.getElementById('month-select').value;
  const reg=document.getElementById('region-select').value;
  const loc=document.getElementById('location-select').value;
  const q=document.getElementById('search-input').value.trim();
  const yN = y==='all'?'all years':y;
  const mN = m==='all'?'all months':new Date(0,+m).toLocaleString('en-US',{month:'long'});
  const rN = reg==='all'?'all regions':reg;
  const lN = loc==='all'?'all locations':loc;
  const qN = q?` · "${q}"`:'';
  document.getElementById('event-count').textContent =
    `${n} event${n===1?'':'s'} · ${yN}, ${mN} · ${rN}, ${lN}${qN}`;
}

/* ══════════════════════════════════
   RENDER
══════════════════════════════════ */
function render() {
  const view     = document.getElementById('view-select').value;
  const filtered = getFiltered();
  updateCount(filtered.length);
  hideViews();
  hideEl('loading-state');
  const copyBtn = document.getElementById('copy-button');
  copyBtn.classList.remove('visible');

  if      (view==='list')     { showEl('list-view');     renderList(filtered); }
  else if (view==='table')    { showEl('table-view');    renderTable(filtered); if(filtered.length) copyBtn.classList.add('visible'); }
  else if (view==='calendar') {
    showEl('calendar-view');
    const sy=document.getElementById('year-select').value;
    const sm=document.getElementById('month-select').value;
    if(sy!=='all') calYear=+sy;
    if(sm!=='all') calMonth=+sm;
    renderCalendar();
  }
}

/* ══════════════════════════════════
   LIST VIEW
══════════════════════════════════ */
function renderList(events) {
  const el = document.getElementById('list-view');
  if (!events.length) { el.innerHTML = emptyHTML(); return; }
  el.innerHTML = events.map(ev => {
    const d    = ev._date;
    const past = isPast(d) && !isToday(d);
    const tod  = isToday(d);
    const up   = isUpcoming(d) && !tod;
    const cls  = tod ? 'is-today' : (up ? 'is-upcoming' : (past ? 'is-past' : ''));
    const dateBadge = tod
      ? `<span class="badge badge-today"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Today</span>`
      : past
        ? `<span class="badge badge-past"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${fmtDate(d)}</span>`
        : `<span class="badge badge-upcoming"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${fmtDate(d)}</span>`;
    const conf = (ev.Confirmed||'').toLowerCase();
    const confBadge = conf==='yes'
      ? `<span class="badge badge-confirm" style="margin-left:auto;">Confirmed</span>`
      : conf ? `<span class="badge badge-pending" style="margin-left:auto;">Pending</span>` : '';
    return `<div class="event-card ${cls}">
      <div class="card-top">
        ${dateBadge}
        ${ev.Time?`<span class="badge badge-time"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${ev.Time}</span>`:''}
        ${confBadge}
      </div>
      <div class="event-title">${ev['Event-Name']||'Untitled Event'}</div>
      <div class="event-meta">
        ${ev['Client-Name']?`<div class="meta-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${ev['Client-Name']}</div>`:''}
        ${ev.Location?`<div class="meta-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${ev.Location}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════
   TABLE VIEW  (Country → Location → Rows)
══════════════════════════════════ */
function renderTable(events) {
  const el = document.getElementById('table-view');
  if (!events.length) { el.innerHTML = emptyHTML(); return; }

  /* Build tree: country → baseLoc → events[] */
  const tree = {};
  events.forEach(ev => {
    const c = detectCountry(ev);
    const l = baseLoc(ev.Location);
    if (!tree[c]) tree[c] = {};
    if (!tree[c][l]) tree[c][l] = [];
    tree[c][l].push(ev);
  });

  let html = '';
  Object.keys(tree).sort().forEach((country, ci) => {
    const locs  = tree[country];
    const total = Object.values(locs).reduce((s,a)=>s+a.length,0);
    const cId   = `cb${ci}`;
    html += `
      <div class="country-section">
        <div class="country-header" onclick="toggleSection('${cId}','cc${ci}')">
          <span class="country-label">${country}</span>
          <span class="country-count">${total} event${total===1?'':'s'}</span>
          <svg class="chev open" id="cc${ci}" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </div>
        <div class="country-body" id="${cId}">`;

    Object.keys(locs).sort().forEach((loc, li) => {
      const rows   = locs[loc];
      const emails = [...new Set(rows.map(e=>e.Reception).filter(Boolean))];
      const lId    = `lb${ci}_${li}`;
      const emailHtml = emails.map(em=>`
        <span class="loc-email">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>${em}
        </span>`).join('');
      html += `
          <div class="location-group">
            <div class="location-header" onclick="toggleSection('${lId}','lc${ci}_${li}');event.stopPropagation()">
              <span class="loc-name">${loc}</span>
              ${emailHtml}
              <span class="loc-count">${rows.length}</span>
              <svg class="loc-chev open" id="lc${ci}_${li}" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path d="m6 9 6 6 6-6"/>
              </svg>
            </div>
            <div class="loc-body" id="${lId}">
              <div class="table-scroll">
                <table class="data-table">
                  <thead><tr>
                    <th>Date</th><th>Time</th><th>Event Name</th>
                    <th>Client Name</th><th>Full Location</th>
                    <th style="text-align:center">Confirmed</th>
                  </tr></thead>
                  <tbody>${rows.map(ev=>{
                    const past=isPast(ev._date)&&!isToday(ev._date);
                    const conf=(ev.Confirmed||'').toLowerCase()==='yes';
                    return `<tr class="${past?'row-past':''}">
                      <td>${fmtDate(ev._date)}</td>
                      <td>${ev.Time||'—'}</td>
                      <td style="font-weight:600">${ev['Event-Name']||''}</td>
                      <td>${ev['Client-Name']||''}</td>
                      <td style="font-size:.82rem;color:#666">${ev.Location||''}</td>
                      <td style="text-align:center"><span class="dot${conf?'':' pending'}"></span></td>
                    </tr>`;
                  }).join('')}</tbody>
                </table>
              </div>
            </div>
          </div>`;
    });
    html += `</div></div>`;
  });

  el.innerHTML = html;
  el.querySelectorAll('.country-body, .loc-body').forEach(b => {
    b.style.maxHeight = b.scrollHeight + 'px';
  });
}

function toggleSection(bodyId, chevId) {
  const body = document.getElementById(bodyId);
  const chev = document.getElementById(chevId);
  if (!body) return;
  const closing = !body.classList.contains('closed');
  if (closing) {
    body.style.maxHeight = body.scrollHeight + 'px';
    requestAnimationFrame(() => {
      body.classList.add('closed');
      if (chev) chev.classList.remove('open');
    });
  } else {
    body.classList.remove('closed');
    body.style.maxHeight = body.scrollHeight + 'px';
    if (chev) chev.classList.add('open');
  }
}

/* ══════════════════════════════════
   CALENDAR VIEW
══════════════════════════════════ */
function renderCalendar() {
  const reg = document.getElementById('region-select').value;
  const loc = document.getElementById('location-select').value;
  const q   = document.getElementById('search-input').value.toLowerCase().trim();
  const evts = allEvents.filter(ev =>
    ev._date.getFullYear()===calYear && ev._date.getMonth()===calMonth &&
    (reg==='all'||ev.Region===reg) &&
    (loc==='all'||ev.Location===loc) &&
    (!q||(ev['Event-Name']||'').toLowerCase().includes(q)||
         (ev['Client-Name']||'').toLowerCase().includes(q)||
         (ev.Location||'').toLowerCase().includes(q))
  );
  document.getElementById('cal-title').textContent = fmtMonth(calYear, calMonth);
  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const total       = Math.ceil((daysInMonth+firstDay)/7)*7;
  const todayStr    = new Date().toDateString();
  let html = '';
  for (let i=0; i<total; i++) {
    const day = i - firstDay + 1;
    if (day<1||day>daysInMonth) { html+='<div class="cal-cell is-empty"></div>'; continue; }
    const d       = new Date(calYear, calMonth, day);
    const dStr    = d.toDateString();
    const dayEvts = evts.filter(ev=>ev._date.toDateString()===dStr);
    const cls     = [
      dStr===todayStr?'is-today':'',
      dayEvts.length?'has-events':'',
      d<todayStart()&&dStr!==todayStr?'is-past':'',
    ].filter(Boolean).join(' ');
    html+=`<div class="cal-cell ${cls}" data-date="${dStr}">
      <div class="day-num">${day}</div>
      ${dayEvts.map(ev=>`<span class="event-pip">${ev['Event-Name']||'Event'}</span>`).join('')}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  document.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
    cell.addEventListener('click', () => {
      const ds   = cell.getAttribute('data-date');
      const list = evts.filter(ev=>ev._date.toDateString()===ds);
      openModal(fmtDate(new Date(ds)), list);
    });
  });
}

/* ══════════════════════════════════
   COPY TABLE
══════════════════════════════════ */
async function copyTable() {
  const filtered = getFiltered();
  const y  = document.getElementById('year-select').value;
  const m  = document.getElementById('month-select').value;
  const yn = y==='all'?'All Years':y;
  const mn = m==='all'?'All Months':new Date(0,+m).toLocaleString('en-US',{month:'long'});
  const tree = {};
  filtered.forEach(ev => {
    const c=detectCountry(ev); const l=baseLoc(ev.Location);
    if(!tree[c]) tree[c]={};
    if(!tree[c][l]) tree[c][l]=[];
    tree[c][l].push(ev);
  });
  let html = `<div style="font-family:Segoe UI,Arial,sans-serif;"><h2 style="color:#111;font-size:16px;margin:0 0 16px;font-weight:700;">Compass Events &mdash; ${yn}, ${mn}</h2>`;
  let txt  = `Compass Events — ${yn}, ${mn}\n\n`;
  Object.keys(tree).sort().forEach(country => {
    const locs=tree[country];
    html += `<h3 style="font-size:11px;font-weight:700;color:#555;letter-spacing:.06em;text-transform:uppercase;margin:20px 0 8px;">${country}</h3>`;
    txt  += `${country}\n`;
    Object.keys(locs).sort().forEach(loc => {
      const rows=locs[loc];
      const emails=[...new Set(rows.map(e=>e.Reception).filter(Boolean))];
      const emHtml=emails.length?` &nbsp;|&nbsp; <span style="font-weight:400;color:rgba(255,255,255,.85);font-size:12px;">${emails.join(', ')}</span>`:'';
      const emTxt=emails.length?` [${emails.join(', ')}]`:'';
      html += `<table style="border-collapse:collapse;width:100%;font-family:Segoe UI,Arial,sans-serif;margin-bottom:18px;font-size:12.5px;">
        <thead>
          <tr><td colspan="6" style="background:#ff6600;color:#fff;padding:9px 13px;font-weight:700;border-radius:6px 6px 0 0;">${loc}${emHtml}</td></tr>
          <tr style="background:#f5f5f5;">
            <th style="border:1px solid #e0e0e0;padding:8px 12px;text-align:left;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#555;">Date</th>
            <th style="border:1px solid #e0e0e0;padding:8px 12px;text-align:left;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#555;">Time</th>
            <th style="border:1px solid #e0e0e0;padding:8px 12px;text-align:left;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#555;">Event Name</th>
            <th style="border:1px solid #e0e0e0;padding:8px 12px;text-align:left;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#555;">Client</th>
            <th style="border:1px solid #e0e0e0;padding:8px 12px;text-align:left;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#555;">Location</th>
            <th style="border:1px solid #e0e0e0;padding:8px 12px;text-align:center;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#555;">Confirmed</th>
          </tr>
        </thead>
        <tbody>${rows.map((ev,i)=>`
          <tr style="background:${i%2===0?'#fff':'#f9f9f9'}">
            <td style="border:1px solid #e0e0e0;padding:9px 12px;">${fmtDate(ev._date)}</td>
            <td style="border:1px solid #e0e0e0;padding:9px 12px;">${ev.Time||''}</td>
            <td style="border:1px solid #e0e0e0;padding:9px 12px;font-weight:600;">${ev['Event-Name']||''}</td>
            <td style="border:1px solid #e0e0e0;padding:9px 12px;">${ev['Client-Name']||''}</td>
            <td style="border:1px solid #e0e0e0;padding:9px 12px;color:#666;font-size:12px;">${ev.Location||''}</td>
            <td style="border:1px solid #e0e0e0;padding:9px 12px;text-align:center;">${(ev.Confirmed||'').toLowerCase()==='yes'?'Yes':''}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
      txt += `  ${loc}${emTxt}\n  Date\tTime\tEvent Name\tClient\tLocation\tConfirmed\n`;
      rows.forEach(ev=>{txt+=`  ${fmtDate(ev._date)}\t${ev.Time||''}\t${ev['Event-Name']||''}\t${ev['Client-Name']||''}\t${ev.Location||''}\t${ev.Confirmed||''}\n`;});
      txt+='\n';
    });
  });
  html += '</div>';
  const btn = document.getElementById('copy-button');
  btn.classList.add('copied');
  try {
    await navigator.clipboard.write([
      new ClipboardItem({'text/html':new Blob([html],{type:'text/html'}),'text/plain':new Blob([txt],{type:'text/plain'})})
    ]);
  } catch {
    try { await navigator.clipboard.writeText(txt); }
    catch { showToast('Copy failed — please try again'); btn.classList.remove('copied'); return; }
  }
  showToast('Table copied to clipboard');
  const orig = btn.innerHTML;
  btn.textContent = 'Copied';
  setTimeout(()=>{ btn.innerHTML=orig; btn.classList.remove('copied'); }, 2500);
}

/* ══════════════════════════════════
   MODAL
══════════════════════════════════ */
function openModal(title, events) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = events.length
    ? events.map(ev=>{
        const conf=(ev.Confirmed||'').toLowerCase()==='yes';
        return `<div class="modal-card">
          <div class="card-top" style="margin-bottom:8px;">
            ${ev.Time?`<span class="badge badge-time" style="font-size:.72rem;">${ev.Time}</span>`:''}
            <span class="badge ${conf?'badge-confirm':'badge-pending'}" style="font-size:.72rem;">${conf?'Confirmed':'Pending'}</span>
          </div>
          <div class="modal-card-title">${ev['Event-Name']||'Untitled'}</div>
          ${ev['Client-Name']?`<div class="modal-card-sub">${ev['Client-Name']}</div>`:''}
          ${ev.Location?`<div class="modal-card-sub" style="margin-top:2px;font-size:.79rem;">${ev.Location}</div>`:''}
        </div>`;
      }).join('')
    : '<p style="color:#aaa;font-size:.87rem;padding:10px 0;">No events on this day.</p>';
  document.getElementById('modal').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

/* ══════════════════════════════════
   UTILITIES
══════════════════════════════════ */
function showEl(id) { document.getElementById(id).style.display=''; }
function hideEl(id) { document.getElementById(id).style.display='none'; }
function hideViews() {
  ['list-view','table-view','calendar-view','error-box','loading-state']
    .forEach(id=>hideEl(id));
}
function emptyHTML() {
  return `<div class="empty-state">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/>
    </svg>
    <h3>No events found</h3>
    <p>Try adjusting your filters or search.</p>
  </div>`;
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

/* ══════════════════════════════════
   WIRE UP
══════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  loadEvents();

  ['year-select','month-select'].forEach(id =>
    document.getElementById(id).addEventListener('change',()=>{updateRegionFilter();updateLocationFilter();render();}));
  document.getElementById('region-select').addEventListener('change',()=>{updateLocationFilter();render();});
  document.getElementById('location-select').addEventListener('change', render);
  document.getElementById('view-select').addEventListener('change', render);

  // Search
  const si=document.getElementById('search-input');
  const sc=document.getElementById('search-clear');
  let st;
  si.addEventListener('input',()=>{
    sc.style.display=si.value?'block':'none';
    clearTimeout(st); st=setTimeout(render, 200);
  });
  sc.addEventListener('click',()=>{ si.value=''; sc.style.display='none'; render(); });

  // Action buttons
  document.getElementById('today-btn').addEventListener('click',()=>{
    const n=new Date();
    document.getElementById('year-select').value=n.getFullYear();
    document.getElementById('month-select').value=n.getMonth().toString();
    document.getElementById('region-select').value='all';
    document.getElementById('location-select').value='all';
    si.value=''; sc.style.display='none';
    calYear=n.getFullYear(); calMonth=n.getMonth();
    updateRegionFilter(); updateLocationFilter(); render();
  });
  document.getElementById('refresh-btn').addEventListener('click',()=>loadEvents(true));
  document.getElementById('copy-button').addEventListener('click', copyTable);

  // Calendar nav
  document.getElementById('cal-prev').addEventListener('click',()=>{
    if(--calMonth<0){calMonth=11;calYear--;} renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click',()=>{
    if(++calMonth>11){calMonth=0;calYear++;} renderCalendar();
  });

  // Modal
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', closeModal);
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
});
</script>

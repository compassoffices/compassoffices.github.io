<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://www.compassoffices.com/wp-content/uploads/2025/09/compassoffices-logo-web-2025_icon-o-scaled.png">
<title>Compass Events</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0; padding: 20px;
  background: #000; min-height: 100vh;
}
.container {
  max-width: 1200px; margin: 0 auto;
  box-shadow: 0 20px 40px rgba(0,0,0,.4);
  overflow: hidden; padding-bottom: 50px;
}

/* ── LOGO ── */
.logo-banner {
  background: #000; display: flex;
  justify-content: center; align-items: center; padding: 20px 0 12px;
}
.logo-banner img { height: 50px; max-width: 280px; }

/* ── HEADER ── */
.header {
  background: #000; color: #fff;
  padding: 30px 30px 20px; text-align: center;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 2px solid #ff6600;
}
.header h1 { margin: 0 0 5px; font-size: 2.3rem; font-weight: 700; }
.header p  { margin: 0; font-size: 1.1rem; color: #ff6600; font-weight: 600; letter-spacing: .02em; }
#event-count { margin: 10px 0 0; font-size: 1rem; color: rgba(255,255,255,.65); font-weight: 500; }

/* ── SELECTORS ── */
.selector-group {
  margin: 20px 0 0; display: flex; justify-content: center;
  align-items: center; gap: 14px; flex-wrap: wrap;
}
.selector-group label { font-weight: 600; font-size: 1rem; color: #fff; }
.selector-group select {
  background: #111; border: 2px solid #ff6600; color: #ff6600;
  padding: 10px 16px; border-radius: 25px; font-size: 1rem;
  font-weight: 500; cursor: pointer; outline: none;
  font-family: inherit; transition: all .25s;
}
.selector-group select:hover,
.selector-group select:focus { background: #ff6600; color: #fff; }
.selector-group select option { background: #222; color: #fff; }
.selector-group select optgroup { background: #111; color: #ff6600; font-style: normal; font-weight: 700; }

/* ── ACTION ROW ── */
.action-row {
  margin: 16px 0 0; display: flex; justify-content: center;
  align-items: center; gap: 12px; flex-wrap: wrap;
}
.btn-ghost {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 20px; border-radius: 25px; font-size: .95rem;
  font-weight: 600; cursor: pointer; font-family: inherit;
  border: 2px solid rgba(255,255,255,.25); background: transparent;
  color: rgba(255,255,255,.7); transition: all .2s;
}
.btn-ghost svg { width: 15px; height: 15px; flex-shrink: 0; }
.btn-ghost:hover { border-color: #ff6600; color: #ff6600; }

.btn-orange {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 24px; border-radius: 25px; font-size: 1rem;
  font-weight: 700; cursor: pointer; font-family: inherit;
  background: #ff6600; border: 2px solid #ff6600; color: #fff;
  transition: all .2s; display: none;
}
.btn-orange svg { width: 16px; height: 16px; flex-shrink: 0; }
.btn-orange:hover { background: #e05a00; border-color: #e05a00; }
.btn-orange.show  { display: inline-flex; }
.btn-orange.copied { background: #51cf66; border-color: #51cf66; pointer-events: none; }

/* ── LOADING / ERROR ── */
.loading-state { text-align: center; padding: 80px 20px; background: #f5f5f5; }
.spinner {
  border: 4px solid #ddd; border-top-color: #ff6600;
  border-radius: 50%; width: 44px; height: 44px;
  animation: spin .9s linear infinite; margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-state p { color: #888; font-size: 1.05rem; }
.error-box { padding: 36px; background: #f5f5f5; }
.error-inner { background: #ffe6e6; border-left: 4px solid #dc2626; border-radius: 8px; padding: 20px 24px; }
.error-inner h3 { font-size: 1.1rem; color: #dc2626; margin-bottom: 6px; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 70px 20px; background: #fff; border-radius: 12px; }
.empty-state svg { width: 50px; height: 50px; color: #ddd; margin-bottom: 16px; }
.empty-state h3 { font-size: 1.1rem; color: #999; margin-bottom: 6px; }
.empty-state p  { font-size: .95rem; color: #bbb; }

/* ════════════════════════════════════
   LIST VIEW
════════════════════════════════════ */
.list-view { padding: 36px; background: #f0f0f0; display: flex; flex-direction: column; gap: 18px; }
.event-card {
  background: #fff; border-radius: 14px; padding: 24px 26px;
  border-left: 5px solid #ccc;
  box-shadow: 0 3px 14px rgba(0,0,0,.07);
  transition: box-shadow .2s, transform .2s, opacity .2s;
  animation: fadeUp .3s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.event-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.11); transform: translateY(-1px); }
.event-card.is-past     { opacity: .45; }
.event-card.is-past:hover { opacity: .75; }
.event-card.is-today    { border-left-color: #ff6b6b; background: #fff6f6; border: 2px solid #ff6b6b; }
.event-card.is-upcoming { border-left-color: #51cf66; }
.event-card.is-today .event-title { color: #ff6b6b; }

.card-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px; border-radius: 20px;
  font-size: .88rem; font-weight: 700; white-space: nowrap;
}
.badge svg { width: 13px; height: 13px; }
.badge-today    { background: #ff6b6b; color: #fff; }
.badge-upcoming { background: #51cf66; color: #fff; }
.badge-past     { background: #e5e5e5; color: #888; }
.badge-time     { background: #ff6600; color: #fff; }
.badge-confirm  { background: #dcfce7; color: #16a34a; margin-left: auto; }
.badge-pending  { background: #f0f0f0; color: #999; margin-left: auto; }

.event-title { font-size: 1.32rem; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; line-height: 1.3; }
.event-meta  { display: flex; gap: 22px; flex-wrap: wrap; }
.meta-item   { display: flex; align-items: center; gap: 8px; font-size: .95rem; color: #555; font-weight: 500; }
.meta-item svg { width: 16px; height: 16px; color: #ff6600; flex-shrink: 0; }

/* ════════════════════════════════════
   TABLE VIEW
════════════════════════════════════ */
.table-view { padding: 36px; background: #f0f0f0; display: flex; flex-direction: column; gap: 24px; }
.country-section { border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
.country-header {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 22px; background: #111;
  cursor: pointer; user-select: none; transition: background .2s;
}
.country-header:hover { background: #222; }
.country-label { font-size: .85rem; font-weight: 700; color: rgba(255,255,255,.88); letter-spacing: .07em; text-transform: uppercase; flex: 1; }
.country-count { font-size: .82rem; font-weight: 600; color: #ff6600; }
.chev { width: 15px; height: 15px; color: rgba(255,255,255,.4); transition: transform .25s; flex-shrink: 0; }
.chev.open { transform: rotate(180deg); }
.country-body { overflow: hidden; transition: max-height .3s ease; }
.country-body.closed { max-height: 0 !important; }

.location-group { border-top: 1px solid #e0e0e0; }
.location-group:first-child { border-top: none; }
.location-header {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 11px 22px; background: #ff6600;
  cursor: pointer; user-select: none; transition: background .2s;
}
.location-header:hover { background: #e05a00; }
.loc-name  { font-size: .95rem; font-weight: 700; color: #fff; flex: 1; }
.loc-email { font-size: .82rem; color: rgba(255,255,255,.88); display: inline-flex; align-items: center; gap: 5px; }
.loc-email svg { width: 12px; height: 12px; }
.loc-count { font-size: .78rem; font-weight: 700; background: rgba(0,0,0,.2); color: rgba(255,255,255,.9); border-radius: 20px; padding: 2px 10px; }
.loc-chev  { width: 14px; height: 14px; color: rgba(255,255,255,.5); transition: transform .25s; flex-shrink: 0; }
.loc-chev.open { transform: rotate(180deg); }
.loc-body  { overflow: hidden; transition: max-height .3s ease; }
.loc-body.closed { max-height: 0 !important; }
.table-scroll { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; min-width: 580px; background: #fff; }
.data-table th {
  background: #f5f5f5; color: #555; padding: 10px 16px;
  text-align: left; font-size: .78rem; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  border-bottom: 2px solid #e0e0e0;
}
.data-table td { padding: 11px 16px; border-bottom: 1px solid #eee; font-size: .93rem; color: #222; vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #fff8f3; }
.data-table tr.row-past td { color: #bbb; }
.dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #51cf66; }
.dot.no { background: #ddd; }

/* ════════════════════════════════════
   CALENDAR VIEW — HERO FEATURE
════════════════════════════════════ */
.calendar-view { padding: 30px; background: #f0f0f0; }

.cal-shell {
  background: #fff; border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,.09); overflow: hidden;
}

/* Month navigation bar */
.cal-nav {
  display: flex; align-items: center;
  padding: 20px 28px; background: #000;
  gap: 16px;
}
.cal-nav-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.25); background: transparent;
  color: rgba(255,255,255,.7); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
}
.cal-nav-btn svg { width: 18px; height: 18px; }
.cal-nav-btn:hover { border-color: #ff6600; color: #ff6600; background: rgba(255,102,0,.1); }
.cal-month-title {
  flex: 1; text-align: center;
  font-size: 1.5rem; font-weight: 700; color: #fff;
  letter-spacing: -.01em;
}
.cal-today-btn {
  padding: 8px 18px; border-radius: 20px;
  border: 2px solid #ff6600; background: transparent;
  color: #ff6600; font-size: .9rem; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: all .2s;
  white-space: nowrap;
}
.cal-today-btn:hover { background: #ff6600; color: #fff; }

/* Day name header */
.cal-day-names {
  display: grid; grid-template-columns: repeat(7,1fr);
  background: #f8f8f8; border-bottom: 1px solid #e8e8e8;
}
.cal-day-name {
  text-align: center; padding: 12px 0;
  font-size: .82rem; font-weight: 700;
  color: #888; letter-spacing: .06em; text-transform: uppercase;
}
.cal-day-name:first-child { color: #ff6b6b; }
.cal-day-name:last-child  { color: #ff6b6b; }

/* Calendar grid */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); }
.cal-cell {
  min-height: 120px; padding: 10px;
  border-right: 1px solid #eee; border-bottom: 1px solid #eee;
  cursor: pointer; transition: background .15s; position: relative;
  overflow: hidden;
}
.cal-cell:nth-child(7n)   { border-right: none; }
.cal-cell:hover { background: #fff8f3; }
.cal-cell.is-empty { background: #fafafa; cursor: default; }
.cal-cell.is-empty:hover  { background: #fafafa; }
.cal-cell.is-other-month  { opacity: .4; }
.cal-cell.is-past { background: #fafafa; }
.cal-cell.is-past .day-num { color: #ccc; }
.cal-cell.is-today { background: #fff6f2; }
.cal-cell.is-today::after {
  content: ''; position: absolute; inset: 0;
  border: 2px solid #ff6600; border-radius: 0; pointer-events: none;
}
.cal-cell.is-selected { background: #fff0e6; }
.cal-cell.is-selected::after {
  content: ''; position: absolute; inset: 0;
  border: 2px solid #ff6600; pointer-events: none;
}

.day-num {
  font-size: 1rem; font-weight: 700; color: #333;
  margin-bottom: 6px; line-height: 1;
}
/* Orange circle on today's date number */
.cal-cell.is-today .day-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  background: #ff6600; color: #fff; margin-bottom: 6px;
}
/* Weekend date color */
.cal-cell.is-sunday .day-num,
.cal-cell.is-saturday .day-num { color: #ff6b6b; }
.cal-cell.is-today .day-num { color: #fff; }

.event-pip {
  display: flex; align-items: center; gap: 4px;
  background: #ff6600; color: #fff;
  border-radius: 5px; padding: 3px 8px;
  font-size: .75rem; font-weight: 600;
  margin-bottom: 3px;
  white-space: nowrap; overflow: hidden;
}
.event-pip.is-past-pip { background: #ccc; }
.pip-time { font-size: .68rem; opacity: .85; flex-shrink: 0; }
.pip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.more-pip {
  font-size: .72rem; color: #ff6600; font-weight: 700;
  padding: 2px 0; text-align: center; cursor: pointer;
}

/* Selected day panel */
.day-panel {
  border-top: 2px solid #ff6600; background: #fff;
  padding: 24px 28px; display: none;
}
.day-panel.open { display: block; }
.day-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.day-panel-title { font-size: 1.15rem; font-weight: 700; color: #222; }
.day-panel-close {
  background: none; border: 1px solid #ddd; border-radius: 6px;
  color: #888; cursor: pointer; padding: 4px 10px; font-size: .85rem;
  font-family: inherit; transition: all .2s;
}
.day-panel-close:hover { border-color: #ff6600; color: #ff6600; }
.day-panel-events { display: flex; flex-direction: column; gap: 12px; }
.dp-event {
  background: #f8f8f8; border-radius: 10px; padding: 14px 18px;
  border-left: 4px solid #ff6600;
}
.dp-event-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.dp-event-title { font-size: 1.05rem; font-weight: 700; color: #1a1a1a; }
.dp-event-meta  { font-size: .88rem; color: #666; display: flex; gap: 14px; flex-wrap: wrap; margin-top: 4px; }
.dp-meta-item   { display: flex; align-items: center; gap: 6px; }
.dp-meta-item svg { width: 13px; height: 13px; color: #ff6600; flex-shrink: 0; }

/* Calendar legend */
.cal-legend {
  display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  padding: 14px 28px; background: #f8f8f8;
  border-top: 1px solid #eee; font-size: .82rem; color: #888;
}
.legend-item { display: flex; align-items: center; gap: 7px; }
.legend-swatch {
  width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
}
.ls-today    { background: #ff6600; border-radius: 50%; width: 14px; height: 14px; }
.ls-events   { background: #ff6600; opacity: .7; }
.ls-past     { background: #f0f0f0; border: 1px solid #ddd; }
.ls-selected { border: 2px solid #ff6600; background: #fff0e6; }

/* ── MODAL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300; }
.overlay.open { display: block; }
.modal {
  display: none; position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: #fff; border-radius: 16px; padding: 28px;
  box-shadow: 0 8px 40px rgba(0,0,0,.22); z-index: 400;
  max-width: 540px; width: 92%; max-height: 82vh; overflow-y: auto;
}
.modal.open { display: block; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-head h3 { font-size: 1.1rem; font-weight: 700; color: #222; }
.modal-close {
  background: none; border: 1px solid #ddd; border-radius: 6px;
  color: #888; cursor: pointer; padding: 5px 10px; font-size: .9rem;
  transition: all .2s;
}
.modal-close:hover { border-color: #ff6600; color: #ff6600; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #111; color: #fff; padding: 12px 28px;
  border-radius: 8px; font-size: .95rem; font-weight: 600;
  border-left: 3px solid #ff6600;
  box-shadow: 0 4px 24px rgba(0,0,0,.2); z-index: 500;
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 860px) {
  .list-view, .table-view, .calendar-view { padding: 20px; }
  .cal-cell { min-height: 90px; }
  .cal-month-title { font-size: 1.2rem; }
}
@media (max-width: 600px) {
  body { padding: 0; }
  .header { padding: 20px 16px 16px; }
  .header h1 { font-size: 1.7rem; }
  .list-view, .table-view, .calendar-view { padding: 14px; }
  .cal-cell { min-height: 66px; padding: 6px; }
  .day-num  { font-size: .85rem; }
  .event-pip { display: none; }
  .cal-cell.has-events::after {
    content: ''; display: block; width: 6px; height: 6px;
    background: #ff6600; border-radius: 50%; margin: 4px auto 0;
  }
  .cal-legend { display: none; }
  .day-panel { padding: 16px; }
}
</style>
</head>
<body>
<div class="container">

  <!-- LOGO -->
  <div class="logo-banner">
    <img src="https://www.compassoffices.com/wp-content/themes/compass-offices/assets/images/compassoffices-logo-web-all-in-one-2025_ow.svg" alt="Compass Offices" />
  </div>

  <!-- HEADER -->
  <div class="header">
    <h1>Compass Events</h1>
    <p>Upcoming events and today's schedule</p>
    <div id="event-count">Loading events…</div>

    <!-- Filters -->
    <div class="selector-group">
      <div>
        <label for="year-select">Year:</label>
        <select id="year-select"><option value="all">All Years</option></select>
      </div>
      <div>
        <label for="month-select">Month:</label>
        <select id="month-select">
          <option value="all">All Months</option>
          <option value="0">January</option><option value="1">February</option>
          <option value="2">March</option><option value="3">April</option>
          <option value="4">May</option><option value="5">June</option>
          <option value="6">July</option><option value="7">August</option>
          <option value="8">September</option><option value="9">October</option>
          <option value="10">November</option><option value="11">December</option>
        </select>
      </div>
      <div>
        <label for="region-select">Region:</label>
        <!-- Grouped by country via optgroup — populated by JS -->
        <select id="region-select"><option value="all">All Regions</option></select>
      </div>
      <div>
        <label for="location-select">Location:</label>
        <select id="location-select"><option value="all">All Locations</option></select>
      </div>
      <div>
        <label for="view-select">View:</label>
        <select id="view-select">
          <option value="calendar">Calendar View</option>
          <option value="list">List View</option>
          <option value="table">Table View</option>
        </select>
      </div>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="btn-ghost" id="refresh-btn">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 12a9 9 0 0 1-15 6.7L3 16"/>
          <path d="M17 8h4V4M7 16H3v4"/>
        </svg>
        Refresh
      </button>
      <button class="btn-orange" id="copy-button">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copy Table to Clipboard
      </button>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="loading-state" class="loading-state">
    <div class="spinner"></div><p>Loading events…</p>
  </div>
  <div id="error-box" class="error-box" style="display:none">
    <div class="error-inner">
      <h3>Unable to load events</h3>
      <p>Could not fetch data. Please ensure the Google Sheet is published and accessible.</p>
    </div>
  </div>

  <!-- List -->
  <div id="list-view" class="list-view" style="display:none"></div>

  <!-- Table -->
  <div id="table-view" class="table-view" style="display:none"></div>

  <!-- Calendar -->
  <div id="calendar-view" class="calendar-view" style="display:none">
    <div class="cal-shell">
      <!-- Nav -->
      <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <span class="cal-month-title" id="cal-title"></span>
        <button class="cal-nav-btn" id="cal-next">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <button class="cal-today-btn" id="cal-goto-today">Today</button>
      </div>
      <!-- Day names -->
      <div class="cal-day-names">
        <div class="cal-day-name">Sun</div><div class="cal-day-name">Mon</div>
        <div class="cal-day-name">Tue</div><div class="cal-day-name">Wed</div>
        <div class="cal-day-name">Thu</div><div class="cal-day-name">Fri</div>
        <div class="cal-day-name">Sat</div>
      </div>
      <!-- Grid -->
      <div class="cal-grid" id="cal-grid"></div>
      <!-- Selected day panel (inline, below calendar) -->
      <div class="day-panel" id="day-panel">
        <div class="day-panel-header">
          <span class="day-panel-title" id="day-panel-title"></span>
          <button class="day-panel-close" id="day-panel-close">Close</button>
        </div>
        <div class="day-panel-events" id="day-panel-events"></div>
      </div>
      <!-- Legend -->
      <div class="cal-legend">
        <span class="legend-item"><span class="legend-swatch ls-today"></span> Today</span>
        <span class="legend-item"><span class="legend-swatch ls-events"></span> Has events</span>
        <span class="legend-item"><span class="legend-swatch ls-past"></span> Past</span>
        <span class="legend-item"><span class="legend-swatch ls-selected"></span> Selected</span>
      </div>
    </div>
  </div>

</div><!-- /container -->

<!-- Modal (for list/table card clicks) -->
<div class="overlay" id="overlay"></div>
<div class="modal" id="modal">
  <div class="modal-head">
    <h3 id="modal-title"></h3>
    <button class="modal-close" id="modal-close">&#10005;</button>
  </div>
  <div id="modal-body"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════
   STATE
══════════════════════ */
let allEvents = [];
let calYear   = new Date().getFullYear();
let calMonth  = new Date().getMonth();
let selectedDate = null;  // currently selected calendar day

const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTazGFKOEPVQu77BpCHV9rTo8odUfVeH7_k0xLjio7V4bUXw__hk14JMBJu0iDC3MewNy8Hw3kowOJt/pub?gid=1632866699&single=true&output=csv';

/* ══════════════════════
   DATA
══════════════════════ */
async function loadEvents(silent = false) {
  if (!silent) { showEl('loading-state'); hideViews(); }
  try {
    const res = await fetch(CSV_URL, { mode: 'cors' });
    if (!res.ok) throw new Error();
    allEvents = processCSV(await res.text());
    populateYears();
    if (!silent) {
      document.getElementById('year-select').value  = new Date().getFullYear();
      document.getElementById('month-select').value = new Date().getMonth().toString();
    }
    updateRegionFilter();
    updateLocationFilter();
    render();
    if (silent) showToast('Data refreshed');
  } catch(e) {
    hideEl('loading-state');
    if (silent) { showToast('Refresh failed'); return; }
    showEl('error-box');
  }
}

function processCSV(text) {
  const lines   = text.split(/\r?\n/);
  const headers = parseCSVLine(lines[0]).map(h => h.trim());
  const seen    = new Set();
  return lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = parseCSVLine(l), row = {};
    headers.forEach((h,i) => row[h] = (vals[i]||'').trim());
    row._date = parseDate(row.Date);
    return row;
  }).filter(r => r._date).filter(r => {
    const k = `${r['Event-Name']}|${r.Date}|${r.Time}|${r['Client-Name']}|${r.Location}`;
    if (seen.has(k)) return false; seen.add(k); return true;
  }).sort((a,b) => a._date - b._date);
}

function parseCSVLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c==='"') { if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
    else if (c===','&&!inQ) { res.push(cur.trim()); cur=''; }
    else cur += c;
  }
  res.push(cur.trim()); return res;
}

function parseDate(s) {
  if (!s) return null;
  const fmts = [
    [/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/, m=>new Date(+m[3],+m[2]-1,+m[1])],
    [/^(\d{4})-(\d{1,2})-(\d{1,2})$/,   m=>new Date(+m[1],+m[2]-1,+m[3])],
    [/^(\d{1,2})-(\d{1,2})-(\d{4})$/,   m=>new Date(+m[3],+m[1]-1,+m[2])],
  ];
  for (const [re,fn] of fmts) { const m=s.match(re); if(m) return fn(m); }
  const d=new Date(s); return isNaN(d)?null:d;
}

/* ══════════════════════
   HELPERS
══════════════════════ */
const todayStart = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const isToday    = d => d.toDateString()===new Date().toDateString();
const isPast     = d => { const e=new Date(d); e.setHours(0,0,0,0); return e<todayStart(); };
const isUpcoming = d => { const e=new Date(d); e.setHours(0,0,0,0); return e>=todayStart(); };
const fmtDate    = d => d.toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
const fmtMonth   = (y,m) => new Date(y,m).toLocaleString('en-US',{month:'long',year:'numeric'});
const baseLoc    = loc => (loc||'').split(',')[0].trim()||'Unknown';

/* Country detection — used for Region optgroup grouping AND Table grouping */
function detectCountry(ev) {
  const t = ((ev.Region||'')+' '+(ev.Location||'')).toLowerCase();
  if (/japan|tokyo|osaka|kyoto|nagoya|fukuoka/.test(t))                          return 'Japan';
  if (/hong kong|hk |admiralty|causeway|tsim sha tsui|wanchai|mong kok/.test(t)) return 'Hong Kong';
  if (/singapore|raffles|orchard|marina bay/.test(t))                            return 'Singapore';
  if (/china|shanghai|beijing|shenzhen|guangzhou/.test(t))                       return 'China';
  if (/korea|seoul|busan/.test(t))                                               return 'South Korea';
  if (/australia|sydney|melbourne|brisbane|perth/.test(t))                       return 'Australia';
  if (/taiwan|taipei/.test(t))                                                   return 'Taiwan';
  if (/malaysia|kuala lumpur|\bkl\b/.test(t))                                    return 'Malaysia';
  if (/philippines|manila/.test(t))                                              return 'Philippines';
  if (/thailand|bangkok/.test(t))                                                return 'Thailand';
  if (/india|mumbai|delhi|bangalore/.test(t))                                    return 'India';
  return ev.Region || 'Other';
}

/* ══════════════════════
   FILTERS
══════════════════════ */
function getFiltered() {
  const y   = document.getElementById('year-select').value;
  const m   = document.getElementById('month-select').value;
  const reg = document.getElementById('region-select').value;
  const loc = document.getElementById('location-select').value;
  let f = allEvents;
  if (y   !== 'all') f = f.filter(e => e._date.getFullYear()===+y);
  if (m   !== 'all') f = f.filter(e => e._date.getMonth()===+m);
  if (reg !== 'all') f = f.filter(e => e.Region===reg);
  if (loc !== 'all') f = f.filter(e => e.Location===loc);
  return [...f].sort((a,b) => {
    const [at,bt]=[isToday(a._date),isToday(b._date)];
    const [au,bu]=[isUpcoming(a._date),isUpcoming(b._date)];
    if(at&&!bt)return -1; if(!at&&bt)return 1;
    if(au&&!bu)return -1; if(!au&&bu)return 1;
    return a._date - b._date;
  });
}

function populateYears() {
  const years=[...new Set(allEvents.map(e=>e._date.getFullYear()))].sort();
  const sel=document.getElementById('year-select');
  sel.innerHTML='<option value="all">All Years</option>';
  years.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;sel.appendChild(o);});
  sel.value=new Date().getFullYear();
}

/* Region filter — grouped by country using <optgroup> */
function updateRegionFilter() {
  const y=document.getElementById('year-select').value;
  const m=document.getElementById('month-select').value;
  let f=allEvents;
  if(y!=='all') f=f.filter(e=>e._date.getFullYear()===+y);
  if(m!=='all') f=f.filter(e=>e._date.getMonth()===+m);

  // Build country → regions map
  const countryRegions = {};
  f.forEach(e => {
    if (!e.Region) return;
    const country = detectCountry(e);
    if (!countryRegions[country]) countryRegions[country] = new Set();
    countryRegions[country].add(e.Region);
  });

  const sel = document.getElementById('region-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="all">All Regions</option>';

  Object.keys(countryRegions).sort().forEach(country => {
    const regions = [...countryRegions[country]].sort();
    if (regions.length === 1) {
      // Single region in this country — no need for optgroup
      const o = document.createElement('option');
      o.value = regions[0]; o.textContent = regions[0];
      sel.appendChild(o);
    } else {
      // Multiple regions under same country — use optgroup
      const grp = document.createElement('optgroup');
      grp.label = country;
      regions.forEach(r => {
        const o = document.createElement('option');
        o.value = r; o.textContent = r;
        grp.appendChild(o);
      });
      sel.appendChild(grp);
    }
  });

  if ([...sel.options].some(o => o.value===cur)) sel.value=cur;
}

function updateLocationFilter() {
  const y=document.getElementById('year-select').value;
  const m=document.getElementById('month-select').value;
  const reg=document.getElementById('region-select').value;
  let f=allEvents;
  if(y!=='all')   f=f.filter(e=>e._date.getFullYear()===+y);
  if(m!=='all')   f=f.filter(e=>e._date.getMonth()===+m);
  if(reg!=='all') f=f.filter(e=>e.Region===reg);

  // Group locations by country for optgroup
  const countryLocs = {};
  f.forEach(e => {
    if (!e.Location) return;
    const country = detectCountry(e);
    if (!countryLocs[country]) countryLocs[country] = new Set();
    countryLocs[country].add(e.Location);
  });

  const sel = document.getElementById('location-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="all">All Locations</option>';

  Object.keys(countryLocs).sort().forEach(country => {
    const locs = [...countryLocs[country]].sort();
    if (Object.keys(countryLocs).length === 1) {
      locs.forEach(l => {
        const o = document.createElement('option');
        o.value = l; o.textContent = l; sel.appendChild(o);
      });
    } else {
      const grp = document.createElement('optgroup');
      grp.label = country;
      locs.forEach(l => {
        const o = document.createElement('option');
        o.value = l; o.textContent = l; grp.appendChild(o);
      });
      sel.appendChild(grp);
    }
  });

  if ([...sel.options].some(o => o.value===cur)) sel.value=cur;
}

function updateCount(n) {
  const y=document.getElementById('year-select').value;
  const m=document.getElementById('month-select').value;
  const reg=document.getElementById('region-select').value;
  const loc=document.getElementById('location-select').value;
  const yN=y==='all'?'all years':y;
  const mN=m==='all'?'all months':new Date(0,+m).toLocaleString('en-US',{month:'long'});
  const rN=reg==='all'?'all regions':reg;
  const lN=loc==='all'?'all locations':loc;
  document.getElementById('event-count').textContent=`${n} event${n===1?'':'s'} · ${yN}, ${mN} · ${rN}, ${lN}`;
}

/* ══════════════════════
   RENDER
══════════════════════ */
function render() {
  const view     = document.getElementById('view-select').value;
  const filtered = getFiltered();
  updateCount(filtered.length);
  hideViews();
  hideEl('loading-state');
  document.getElementById('copy-button').classList.remove('show');

  if      (view==='list')     { showEl('list-view');     renderList(filtered); }
  else if (view==='table')    { showEl('table-view');    renderTable(filtered); if(filtered.length) document.getElementById('copy-button').classList.add('show'); }
  else if (view==='calendar') {
    showEl('calendar-view');
    const sy=document.getElementById('year-select').value;
    const sm=document.getElementById('month-select').value;
    if(sy!=='all') calYear=+sy;
    if(sm!=='all') calMonth=+sm;
    selectedDate=null;
    renderCalendar();
  }
}

/* ══════════════════════
   LIST VIEW
══════════════════════ */
function renderList(events) {
  const el=document.getElementById('list-view');
  if(!events.length){el.innerHTML=emptyHTML();return;}
  el.innerHTML=events.map(ev=>{
    const d=ev._date;
    const past=isPast(d)&&!isToday(d);
    const tod=isToday(d); const up=isUpcoming(d)&&!tod;
    const cls=tod?'is-today':(up?'is-upcoming':(past?'is-past':''));
    const dateBadge=tod
      ?`<span class="badge badge-today">Today</span>`
      :past
        ?`<span class="badge badge-past">${fmtDate(d)}</span>`
        :`<span class="badge badge-upcoming">${fmtDate(d)}</span>`;
    const conf=(ev.Confirmed||'').toLowerCase();
    const confBadge=conf==='yes'
      ?`<span class="badge badge-confirm">Confirmed</span>`
      :(conf?`<span class="badge badge-pending">Pending</span>`:'');
    return `<div class="event-card ${cls}">
      <div class="card-top">
        ${dateBadge}
        ${ev.Time?`<span class="badge badge-time"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${ev.Time}</span>`:''}
        ${confBadge}
      </div>
      <div class="event-title">${ev['Event-Name']||'Untitled Event'}</div>
      <div class="event-meta">
        ${ev['Client-Name']?`<div class="meta-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${ev['Client-Name']}</div>`:''}
        ${ev.Location?`<div class="meta-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${ev.Location}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════
   TABLE VIEW
══════════════════════ */
function renderTable(events) {
  const el=document.getElementById('table-view');
  if(!events.length){el.innerHTML=emptyHTML();return;}
  const tree={};
  events.forEach(ev=>{
    const c=detectCountry(ev); const l=baseLoc(ev.Location);
    if(!tree[c])tree[c]={};
    if(!tree[c][l])tree[c][l]=[];
    tree[c][l].push(ev);
  });
  let html='';
  Object.keys(tree).sort().forEach((country,ci)=>{
    const locs=tree[country];
    const total=Object.values(locs).reduce((s,a)=>s+a.length,0);
    const cId=`cb${ci}`;
    html+=`<div class="country-section">
      <div class="country-header" onclick="toggleSection('${cId}','cc${ci}')">
        <span class="country-label">${country}</span>
        <span class="country-count">${total} event${total===1?'':'s'}</span>
        <svg class="chev open" id="cc${ci}" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="country-body" id="${cId}">`;
    Object.keys(locs).sort().forEach((loc,li)=>{
      const rows=locs[loc];
      const emails=[...new Set(rows.map(e=>e.Reception).filter(Boolean))];
      const lId=`lb${ci}_${li}`;
      const emailHtml=emails.map(em=>`<span class="loc-email"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${em}</span>`).join('');
      html+=`<div class="location-group">
        <div class="location-header" onclick="toggleSection('${lId}','lc${ci}_${li}');event.stopPropagation()">
          <span class="loc-name">${loc}</span>
          ${emailHtml}
          <span class="loc-count">${rows.length}</span>
          <svg class="loc-chev open" id="lc${ci}_${li}" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div class="loc-body" id="${lId}">
          <div class="table-scroll">
            <table class="data-table">
              <thead><tr>
                <th>Date</th><th>Time</th><th>Event Name</th>
                <th>Client Name</th><th>Full Location</th>
                <th style="text-align:center">Confirmed</th>
              </tr></thead>
              <tbody>${rows.map(ev=>{
                const past=isPast(ev._date)&&!isToday(ev._date);
                const conf=(ev.Confirmed||'').toLowerCase()==='yes';
                return `<tr class="${past?'row-past':''}">
                  <td>${fmtDate(ev._date)}</td>
                  <td>${ev.Time||'—'}</td>
                  <td style="font-weight:600">${ev['Event-Name']||''}</td>
                  <td>${ev['Client-Name']||''}</td>
                  <td style="font-size:.85rem;color:#666">${ev.Location||''}</td>
                  <td style="text-align:center"><span class="dot${conf?'':' no'}"></span></td>
                </tr>`;
              }).join('')}</tbody>
            </table>
          </div>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  el.innerHTML=html;
  el.querySelectorAll('.country-body,.loc-body').forEach(b=>{b.style.maxHeight=b.scrollHeight+'px';});
}

function toggleSection(bodyId,chevId){
  const body=document.getElementById(bodyId);
  const chev=document.getElementById(chevId);
  if(!body)return;
  if(!body.classList.contains('closed')){
    body.style.maxHeight=body.scrollHeight+'px';
    requestAnimationFrame(()=>{body.classList.add('closed');if(chev)chev.classList.remove('open');});
  } else {
    body.classList.remove('closed');
    body.style.maxHeight=body.scrollHeight+'px';
    if(chev)chev.classList.add('open');
  }
}

/* ══════════════════════
   CALENDAR VIEW
══════════════════════ */
function renderCalendar() {
  const reg = document.getElementById('region-select').value;
  const loc = document.getElementById('location-select').value;

  const evts = allEvents.filter(ev =>
    ev._date.getFullYear()===calYear && ev._date.getMonth()===calMonth &&
    (reg==='all'||ev.Region===reg) &&
    (loc==='all'||ev.Location===loc)
  );

  document.getElementById('cal-title').textContent = fmtMonth(calYear, calMonth);

  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const total       = Math.ceil((daysInMonth+firstDay)/7)*7;
  const todayStr    = new Date().toDateString();
  const ts          = todayStart();

  let html='';
  for (let i=0; i<total; i++) {
    const day = i - firstDay + 1;
    if (day<1||day>daysInMonth) { html+='<div class="cal-cell is-empty"></div>'; continue; }
    const d       = new Date(calYear, calMonth, day);
    const dStr    = d.toDateString();
    const dayEvts = evts.filter(ev=>ev._date.toDateString()===dStr);
    const dow     = d.getDay(); // 0=Sun, 6=Sat
    const isTod   = dStr===todayStr;
    const past    = d<ts && !isTod;
    const isSel   = selectedDate===dStr;
    const cls     = [
      isTod     ? 'is-today'    : '',
      past      ? 'is-past'     : '',
      dayEvts.length ? 'has-events' : '',
      isSel     ? 'is-selected' : '',
      dow===0   ? 'is-sunday'   : '',
      dow===6   ? 'is-saturday' : '',
    ].filter(Boolean).join(' ');

    const MAX_PIPS = 3;
    const pips = dayEvts.slice(0, MAX_PIPS).map(ev => {
      const pipPast = isPast(ev._date)&&!isToday(ev._date);
      const timeStr = ev.Time ? `<span class="pip-time">${ev.Time.replace(/\s?(AM|PM)/i,'$1')}</span>` : '';
      return `<span class="event-pip${pipPast?' is-past-pip':''}">${timeStr}<span class="pip-name">${ev['Event-Name']||'Event'}</span></span>`;
    }).join('');
    const more = dayEvts.length>MAX_PIPS ? `<div class="more-pip">+${dayEvts.length-MAX_PIPS} more</div>` : '';

    html+=`<div class="cal-cell ${cls}" data-date="${dStr}">
      <div class="day-num">${day}</div>
      ${pips}${more}
    </div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;

  // Re-open selected day panel if date still exists
  if (selectedDate) {
    const dayEvts = evts.filter(ev=>ev._date.toDateString()===selectedDate);
    openDayPanel(selectedDate, dayEvts);
  }

  // Click handler
  document.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
    cell.addEventListener('click', () => {
      const ds   = cell.getAttribute('data-date');
      const list = evts.filter(ev=>ev._date.toDateString()===ds);
      if (selectedDate===ds) {
        // Toggle off
        selectedDate=null;
        cell.classList.remove('is-selected');
        document.getElementById('day-panel').classList.remove('open');
      } else {
        // Deselect previous
        document.querySelectorAll('.cal-cell.is-selected').forEach(c=>c.classList.remove('is-selected'));
        cell.classList.add('is-selected');
        selectedDate=ds;
        openDayPanel(ds, list);
      }
    });
  });
}

function openDayPanel(dateStr, events) {
  const panel  = document.getElementById('day-panel');
  const title  = document.getElementById('day-panel-title');
  const body   = document.getElementById('day-panel-events');
  title.textContent = fmtDate(new Date(dateStr));
  if (!events.length) {
    body.innerHTML = `<p style="color:#aaa;font-size:.95rem;">No events on this day.</p>`;
  } else {
    body.innerHTML = events.map(ev => {
      const conf=(ev.Confirmed||'').toLowerCase()==='yes';
      const confBadge=conf?`<span class="badge badge-confirm" style="font-size:.78rem;">Confirmed</span>`
                          :`<span class="badge badge-pending" style="font-size:.78rem;">Pending</span>`;
      return `<div class="dp-event">
        <div class="dp-event-head">
          ${ev.Time?`<span class="badge badge-time" style="font-size:.82rem;"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${ev.Time}</span>`:''}
          ${confBadge}
        </div>
        <div class="dp-event-title">${ev['Event-Name']||'Untitled'}</div>
        <div class="dp-event-meta">
          ${ev['Client-Name']?`<span class="dp-meta-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${ev['Client-Name']}</span>`:''}
          ${ev.Location?`<span class="dp-meta-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${ev.Location}</span>`:''}
          ${ev.Reception?`<span class="dp-meta-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${ev.Reception}</span>`:''}
        </div>
      </div>`;
    }).join('');
  }
  panel.classList.add('open');
}

/* ══════════════════════
   COPY TABLE
══════════════════════ */
async function copyTable() {
  const filtered=getFiltered();
  const y=document.getElementById('year-select').value;
  const m=document.getElementById('month-select').value;
  const yn=y==='all'?'All Years':y;
  const mn=m==='all'?'All Months':new Date(0,+m).toLocaleString('en-US',{month:'long'});
  const tree={};
  filtered.forEach(ev=>{
    const c=detectCountry(ev),l=baseLoc(ev.Location);
    if(!tree[c])tree[c]={};
    if(!tree[c][l])tree[c][l]=[];
    tree[c][l].push(ev);
  });
  let html=`<div style="font-family:Segoe UI,Arial,sans-serif;"><h2 style="color:#111;font-size:16px;margin:0 0 16px;font-weight:700;">Compass Events — ${yn}, ${mn}</h2>`;
  let txt=`Compass Events — ${yn}, ${mn}\n\n`;
  Object.keys(tree).sort().forEach(country=>{
    html+=`<h3 style="font-size:11px;font-weight:700;color:#555;letter-spacing:.06em;text-transform:uppercase;margin:20px 0 8px;">${country}</h3>`;
    txt+=`${country}\n`;
    Object.keys(tree[country]).sort().forEach(loc=>{
      const rows=tree[country][loc];
      const emails=[...new Set(rows.map(e=>e.Reception).filter(Boolean))];
      const emHtml=emails.length?` | ${emails.join(', ')}`:'';
      const emTxt=emails.length?` [${emails.join(', ')}]`:'';
      html+=`<table style="border-collapse:collapse;width:100%;font-family:Segoe UI,Arial,sans-serif;margin-bottom:18px;font-size:12.5px;">
        <thead>
          <tr><td colspan="6" style="background:#ff6600;color:#fff;padding:9px 13px;font-weight:700;border-radius:6px 6px 0 0;">${loc}${emHtml}</td></tr>
          <tr style="background:#f5f5f5;">
            ${['Date','Time','Event Name','Client','Location','Confirmed'].map(h=>`<th style="border:1px solid #e0e0e0;padding:8px 12px;text-align:left;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#555;">${h}</th>`).join('')}
          </tr>
        </thead>
        <tbody>${rows.map((ev,i)=>`
          <tr style="background:${i%2===0?'#fff':'#f9f9f9'}">
            <td style="border:1px solid #e0e0e0;padding:9px 12px;">${fmtDate(ev._date)}</td>
            <td style="border:1px solid #e0e0e0;padding:9px 12px;">${ev.Time||''}</td>
            <td style="border:1px solid #e0e0e0;padding:9px 12px;font-weight:600;">${ev['Event-Name']||''}</td>
            <td style="border:1px solid #e0e0e0;padding:9px 12px;">${ev['Client-Name']||''}</td>
            <td style="border:1px solid #e0e0e0;padding:9px 12px;color:#666;">${ev.Location||''}</td>
            <td style="border:1px solid #e0e0e0;padding:9px 12px;text-align:center;">${(ev.Confirmed||'').toLowerCase()==='yes'?'Yes':''}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
      txt+=`  ${loc}${emTxt}\n  Date\tTime\tEvent Name\tClient\tLocation\tConfirmed\n`;
      rows.forEach(ev=>{txt+=`  ${fmtDate(ev._date)}\t${ev.Time||''}\t${ev['Event-Name']||''}\t${ev['Client-Name']||''}\t${ev.Location||''}\t${ev.Confirmed||''}\n`;});
      txt+='\n';
    });
  });
  html+='</div>';
  const btn=document.getElementById('copy-button');
  try {
    await navigator.clipboard.write([
      new ClipboardItem({'text/html':new Blob([html],{type:'text/html'}),'text/plain':new Blob([txt],{type:'text/plain'})})
    ]);
  } catch {
    try{await navigator.clipboard.writeText(txt);}
    catch{showToast('Copy failed — please try again');return;}
  }
  showToast('Table copied to clipboard');
  btn.classList.add('copied');
  const orig=btn.innerHTML;
  btn.textContent='Copied!';
  setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove('copied');},2500);
}

   UTILITIES
══════════════════════ */
function showEl(id){document.getElementById(id).style.display='';}
function hideEl(id){document.getElementById(id).style.display='none';}
function hideViews(){['list-view','table-view','calendar-view','error-box','loading-state'].forEach(hideEl);}
function emptyHTML(){
  return`<div class="empty-state">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/>
    </svg>
    <h3>No events found</h3>
    <p>Try adjusting your filters.</p>
  </div>`;
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

/* ══════════════════════
   WIRE UP
══════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  loadEvents();

  ['year-select','month-select'].forEach(id=>
    document.getElementById(id).addEventListener('change',()=>{updateRegionFilter();updateLocationFilter();render();}));
  document.getElementById('region-select').addEventListener('change',()=>{updateLocationFilter();render();});
  document.getElementById('location-select').addEventListener('change',render);
  document.getElementById('view-select').addEventListener('change',render);

  document.getElementById('refresh-btn').addEventListener('click',()=>loadEvents(true));
  document.getElementById('copy-button').addEventListener('click',copyTable);

  // Calendar nav
  document.getElementById('cal-prev').addEventListener('click',()=>{
    if(--calMonth<0){calMonth=11;calYear--;} selectedDate=null; renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click',()=>{
    if(++calMonth>11){calMonth=0;calYear++;} selectedDate=null; renderCalendar();
  });
  document.getElementById('cal-goto-today').addEventListener('click',()=>{
    calYear=new Date().getFullYear(); calMonth=new Date().getMonth();
    selectedDate=null; renderCalendar();
  });
  document.getElementById('day-panel-close').addEventListener('click',()=>{
    selectedDate=null;
    document.querySelectorAll('.cal-cell.is-selected').forEach(c=>c.classList.remove('is-selected'));
    document.getElementById('day-panel').classList.remove('open');
  });

  // Jump to Today in header
  document.getElementById('refresh-btn');
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('day-panel').classList.remove('open');selectedDate=null;}});
});
</script>
</body>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://www.compassoffices.com/wp-content/uploads/2025/09/compassoffices-logo-web-2025_icon-o-scaled.png">
<title>Compass Events Dashboard</title>
<style>
body {
box-sizing: border-box;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
margin: 0;
padding: 20px;
background: #000;
min-height: 100vh;
}
.container {
max-width: 1200px;
margin: 0 auto;
box-shadow: 0 20px 40px rgba(0,0,0,0.1);
overflow: hidden;
padding-bottom: 40px;
}
.logo-banner {
width: 100%;
background: #000;
display: flex;
justify-content: center;
align-items: center;
padding: 16px 0 10px 0;
}
.logo-banner img {
height: 50px;
width: auto;
filter: brightness(100%) contrast(110%);
max-width: 260px;
}
.header {
background: #000;
color: #fff;
padding: 30px 30px 15px 30px;
text-align: center;
position: relative;
}
.header h1 {
margin: 0 0 5px 0;
font-size: 2.3rem;
font-weight: 700;
color: #fff;
}
.header p {
margin: 5px 0 0 0;
font-size: 1.1rem;
opacity: 0.9;
color: #ff6600;
font-weight: 600;
letter-spacing: 0.02em;
}
.event-count {
margin: 12px 0 0 0;
font-size: 1.05rem;
color: #fff;
opacity: 0.85;
font-weight: 500;
}
.selector-group {
margin: 22px 0 0 0;
display: flex;
justify-content: center;
align-items: center;
gap: 15px;
flex-wrap: wrap;
}
.selector-group label {
font-weight: 600;
font-size: 1rem;
color: #fff;
}
.selector-group select {
background: #111;
border: 2px solid #ff6600;
color: #ff6600;
padding: 10px 15px;
border-radius: 25px;
font-size: 1rem;
font-weight: 500;
cursor: pointer;
transition: all 0.3s ease;
outline: none;
}
.selector-group select:focus,
.selector-group select:hover {
background: #ff6600;
color: #fff;
border-color: #ff6600;
}
.selector-group select option {
background: #fff;
color: #222;
padding: 10px;
}
.loading,
.no-events {
text-align: center;
padding: 60px 20px;
color: #333;
font-size: 1.2rem;
}
.spinner {
border: 4px solid #eee;
border-top: 4px solid #ff6600;
border-radius: 50%;
width: 40px;
height: 40px;
animation: spin 1s linear infinite;
margin: 0 auto 20px;
}
@keyframes spin {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}
.events-container {
padding: 36px;
}
.event-card {
background: #f7f7f7;
border-radius: 14px;
padding: 25px;
margin-bottom: 24px;
border-left: 5px solid #222;
transition: all 0.3s ease;
position: relative;
box-shadow: 0 3px 16px rgba(0,0,0,0.06);
}
.event-card.today {
border-left-color: #ff6b6b;
background: #fff6f6;
border: 2px solid #ff6b6b;
box-shadow: 0 4px 16px rgba(255, 107, 107, 0.08);
}
.event-card.today .event-title {
color: #ff6b6b;
}
.event-card.upcoming {
border-left-color: #51cf66;
}
.event-date {
display: flex;
align-items: center;
margin-bottom: 15px;
}
.date-badge {
background: #222;
color: #fff;
padding: 8px 16px;
border-radius: 20px;
font-weight: 600;
font-size: 0.95rem;
margin-right: 15px;
letter-spacing: 0.03em;
}
.today .date-badge { background: #ff6b6b; }
.upcoming .date-badge { background: #51cf66; }
.event-card .date-badge { border: 2px solid #ff6600; }
.time-badge {
background: #ff6600;
color: #fff;
padding: 7px 14px;
border-radius: 15px;
font-size: 0.99rem;
font-weight: 600;
margin-left: 4px;
letter-spacing: 0.02em;
}
.event-title {
font-size: 1.36rem;
font-weight: 700;
color: #1d1d1d;
margin-bottom: 10px;
line-height: 1.22;
}
.event-details {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 15px;
margin-top: 12px;
}
.detail-item {
display: flex;
align-items: center;
min-width: 0;
}
.detail-icon {
width: 20px;
height: 20px;
margin-right: 10px;
opacity: 0.8;
color: #ff6600;
flex-shrink: 0;
}
.detail-text {
color: #222;
font-weight: 600;
word-break: break-word;
}
.calendar-container {
padding: 36px;
background: #f7f7f7;
border-radius: 14px;
margin: 0 36px;
}
.calendar-header {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 5px;
text-align: center;
font-weight: 600;
color: #222;
padding: 10px 0;
border-bottom: 2px solid #ff6600;
}
.calendar-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 5px;
margin-top: 10px;
}
.calendar-day {
background: #fff;
border: 1px solid #ddd;
border-radius: 8px;
min-height: 100px;
padding: 10px;
position: relative;
cursor: pointer;
transition: all 0.3s ease;
overflow-y: auto;
}
.calendar-day:hover {
background: #f0f0f0;
box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.calendar-day.today {
border: 2px solid #ff6b6b;
background: #fff6f6;
}
.calendar-day.has-events {
background: #e6f3ff;
border-color: #51cf66;
}
.day-number {
font-weight: 600;
color: #222;
margin-bottom: 5px;
}
.event-indicator {
background: #ff6600;
color: #fff;
border-radius: 12px;
padding: 2px 8px;
font-size: 0.8rem;
margin: 2px 0;
display: inline-block;
}
.event-modal {
display: none;
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
background: #fff;
border-radius: 14px;
padding: 25px;
box-shadow: 0 4px 16px rgba(0,0,0,0.2);
z-index: 1000;
max-width: 500px;
width: 90%;
max-height: 80vh;
overflow-y: auto;
}
.event-modal-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 20px;
}
.event-modal-header h3 {
margin: 0;
font-size: 1.5rem;
color: #222;
}
.close-modal {
background: none;
border: none;
font-size: 1.2rem;
cursor: pointer;
color: #ff6600;
}
.modal-overlay {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.5);
z-index: 999;
}
.error-message {
background: #ffe6e6;
color: #d63031;
padding: 20px;
margin: 20px;
border-radius: 8px;
border-left: 4px solid #d63031;
}
.no-events h3 {
color: #999;
margin-bottom: 10px;
}
.export-button {
background: #ff6600;
color: #fff;
padding: 10px 20px;
border: none;
border-radius: 25px;
font-size: 1rem;
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
margin: 20px auto;
display: block;
}
.export-button:hover {
background: #e65c00;
}
.location-group {
margin-bottom: 30px;
border: 1px solid #ddd;
border-radius: 10px;
overflow: hidden;
}
.location-header {
background: #ff6600;
color: #fff;
padding: 12px 16px;
font-weight: 600;
font-size: 1.1rem;
}
.location-table {
width: 100%;
border-collapse: collapse;
background: white;
}
.location-table th,
.location-table td {
border: 1px solid #ddd;
padding: 10px 12px;
text-align: left;
}
.location-table th {
background: #f0f0f0;
font-weight: 600;
}
.location-table tr:nth-child(even) {
background: #f9f9f9;
}
@media (max-width: 900px) {
.container { padding-bottom: 15px; }
.events-container { padding: 16px; }
.calendar-container { padding: 16px; margin: 0 16px; }
.calendar-day { min-height: 80px; }
}
@media (max-width: 600px) {
.container { border-radius: 0; }
.events-container { padding: 8px 2px; }
.calendar-container { padding: 8px; margin: 0 8px; }
.header { padding: 18px 6px 8px 6px; }
.event-card { padding: 16px; }
.logo-banner { padding: 11px 0 6px 0; }
.logo-banner img { height: 35px; }
.calendar-day { min-height: 60px; padding: 5px; overflow-y: auto; }
.day-number { font-size: 0.9rem; }
.event-indicator { font-size: 0.7rem; padding: 2px 6px; }
}
</style>
</head>
<body>
<main class="container">
<div class="logo-banner">
<img src="https://www.compassoffices.com/wp-content/themes/compass-offices/assets/images/compassoffices-logo-web-all-in-one-2025_ow.svg"
alt="Compass Offices Logo" />
</div>
<header class="header">
<h1>Compass Events</h1>
<p>Upcoming events and today's schedule</p>
<div id="event-count" class="event-count">Loading events...</div>
<div class="selector-group">
<div class="year-selector">
<label for="year-select">Filter by Year:</label>
<select id="year-select">
<option value="all">All Years</option>
</select>
</div>
<div class="month-selector">
<label for="month-select">Filter by Month:</label>
<select id="month-select">
<option value="all">All Months</option>
<option value="0">January</option>
<option value="1">February</option>
<option value="2">March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>
</div>

<label for="region-select">Filter by Region:</label>
<select id="region-select">
<option value="all">All Regions</option>
</select>
</div>
<div class="location-selector">

</div>
<div id="calendar-container" class="calendar-container" style="display: none;">
<div class="calendar-header">
<div>Sun</div>
<div>Mon</div>

<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>
</div>
<div id="calendar-grid" class="calendar-grid"></div>
</div>

<p>There was an issue fetching data from the Google Sheet. Please ensure the sheet is published and accessible.</p>

</div>

<div id="event-modal" class="event-modal">

<button class="close-modal" id="close-modal-btn">✕</button>
</div>
<div id="modal-events"></div>
</div>
</main>
<script>
// ✅ FIX 1: Use the correct published CSV URL directly
function getCSVUrl() {
  return 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTazGFKOEPVQu77BpCHV9rTo8odUfVeH7_k0xLjio7V4bUXw__hk14JMBJu0iDC3MewNy8Hw3kowOJt/pub?gid=1632866699&single=true&output=csv';
}

// ✅ FIX 2: Handle \r\n Windows line endings from Google Sheets
function parseCSV(csvText) {
  const lines = csvText.split(/\r?\n/); // was split('\n') — caused \r in field values
  const headers = parseCSVLine(lines[0]).map(h => h.trim());
  const data = [];
  for (let i = 1; i < lines.length; i++) {
    if (lines[i].trim()) {
      const values = parseCSVLine(lines[i]);
      const row = {};
      headers.forEach((header, index) => {
        row[header] = (values[index] || '').trim();
      });
      data.push(row);
    }
  }
  return data;
}

// ✅ FIX 3: Handle escaped quotes ("") inside quoted CSV fields
function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"') {
      if (inQuotes && line[i + 1] === '"') {
        current += '"'; // escaped quote: "" → "
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      result.push(current.trim());
      current = '';
    } else {
      current += char;
    }
  }
  result.push(current.trim());
  return result;
}

function parseDate(dateStr) {
  if (!dateStr) return null;
  const formats = [
    /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/,
    /^(\d{4})-(\d{1,2})-(\d{1,2})$/,
    /^(\d{1,2})-(\d{1,2})-(\d{4})$/
  ];
  for (let idx = 0; idx < formats.length; idx++) {
    const match = dateStr.match(formats[idx]);
    if (match) {
      if (idx === 0) return new Date(match[3], match[2] - 1, match[1]);
      if (idx === 1) return new Date(match[1], match[2] - 1, match[3]);
      if (idx === 2) return new Date(match[3], match[1] - 1, match[2]);
    }
  }
  const date = new Date(dateStr);
  return isNaN(date.getTime()) ? null : date;
}

function isToday(date) {
  const today = new Date();
  return date.toDateString() === today.toDateString();
}

function isUpcoming(date) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const eventDate = new Date(date); eventDate.setHours(0, 0, 0, 0);
  return eventDate >= today;
}

function getCurrentMonth() { return new Date().getMonth(); }
function getCurrentYear()  { return new Date().getFullYear(); }

function formatDate(date) {
  return date.toLocaleDateString('en-US', {
    weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
  });
}

function extractBaseLocation(location) {
  if (!location) return 'Unknown';
  return location.split(',')[0].trim();
}

function createEventCard(event, eventDate) {
  const todayClass = isToday(eventDate) ? 'today' : (isUpcoming(eventDate) ? 'upcoming' : '');
  const dateLabel = isToday(eventDate) ? 'Today' : formatDate(eventDate);
  return `
    <div class="event-card ${todayClass}">
      <div class="event-date">
        <span class="date-badge">${dateLabel}</span>
        ${event.Time ? `<span class="time-badge">${event.Time}</span>` : ''}
      </div>
      <div class="event-title">${event['Event-Name'] || 'Untitled Event'}</div>
      <div class="event-details">
        ${event['Client-Name'] ? `
          <div class="detail-item">
            <svg class="detail-icon" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
            </svg>
            <span class="detail-text">${event['Client-Name']}</span>
          </div>` : ''}
        ${event.Location ? `
          <div class="detail-item">
            <svg class="detail-icon" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/>
            </svg>
            <span class="detail-text">${event.Location}</span>
          </div>` : ''}
      </div>
    </div>
  `;
}

function generateCalendar(year, month, events) {
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month + 1, 0);
  const startDay = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  const today = new Date();
  let calendarHTML = '';
  let dayCount = 1;
  const totalCells = Math.ceil((daysInMonth + startDay) / 7) * 7;
  for (let i = 0; i < totalCells; i++) {
    if (i < startDay || dayCount > daysInMonth) {
      calendarHTML += `<div class="calendar-day"></div>`;
    } else {
      const currentDate = new Date(year, month, dayCount);
      const dateStr = currentDate.toDateString();
      const dayEvents = events.filter(e => e.parsedDate.toDateString() === dateStr);
      const isTodayClass   = isToday(currentDate) ? 'today' : '';
      const hasEventsClass = dayEvents.length > 0 ? 'has-events' : '';
      calendarHTML += `
        <div class="calendar-day ${isTodayClass} ${hasEventsClass}" data-date="${dateStr}">
          <div class="day-number">${dayCount}</div>
          ${dayEvents.map(e => `<div class="event-indicator">${e['Event-Name'] || 'Event'}</div>`).join('')}
        </div>`;
      dayCount++;
    }
  }
  return calendarHTML;
}

async function loadEvents() {
  try {
    let csvText = '';
    let success  = false;

    // Primary: correct published CSV URL
    try {
      const response = await fetch(getCSVUrl(), { mode: 'cors' });
      if (response.ok) {
        csvText = await response.text();
        success  = true;
      }
    } catch (e) { console.warn('Primary fetch failed:', e); }

    if (!success) {
      showError();
      return;
    }

    const allEvents = parseCSV(csvText);

    const eventsWithDates = allEvents
      .map(event => ({ ...event, parsedDate: parseDate(event.Date) }))
      .filter(event => event.parsedDate !== null);

    // Deduplicate
    const uniqueEvents = eventsWithDates.filter((event, index, array) =>
      index === array.findIndex(e =>
        e['Event-Name']   === event['Event-Name'] &&
        e.Date            === event.Date &&
        e.Time            === event.Time &&
        e['Client-Name']  === event['Client-Name']
      )
    );

    const sortedEvents = uniqueEvents.sort((a, b) => a.parsedDate - b.parsedDate);
    allEventsData = sortedEvents;

    // Populate year dropdown
    const uniqueYears = [...new Set(sortedEvents.map(e => e.parsedDate.getFullYear()).filter(y => !isNaN(y)))].sort((a, b) => a - b);
    const yearSelect = document.getElementById('year-select');
    uniqueYears.forEach(year => {
      const opt = document.createElement('option');
      opt.value = year;
      opt.textContent = year;
      yearSelect.appendChild(opt);
    });

    // Default to current year/month
    yearSelect.value = getCurrentYear();
    document.getElementById('month-select').value = getCurrentMonth().toString();

    updateRegionFilter();
    updateLocationFilter();
    filterEvents();

    document.getElementById('year-select').addEventListener('change', () => {
      updateRegionFilter(); updateLocationFilter(); filterEvents();
    });
    document.getElementById('month-select').addEventListener('change', () => {
      updateRegionFilter(); updateLocationFilter(); filterEvents();
    });
    document.getElementById('region-select').addEventListener('change', () => {
      updateLocationFilter(); filterEvents();
    });
    document.getElementById('location-select').addEventListener('change', filterEvents);
    document.getElementById('view-select').addEventListener('change', filterEvents);
    document.getElementById('export-button').addEventListener('click', exportToEmail);

    // ✅ FIX 4: Modal close listeners attached once here, not re-added every modal open
    document.getElementById('close-modal-btn').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', closeModal);

  } catch (error) {
    console.error('loadEvents error:', error);
    showError();
  }
}

// ✅ FIX 4 (cont.): Separate close function, no stacking listeners
function closeModal() {
  document.getElementById('event-modal').style.display  = 'none';
  document.getElementById('modal-overlay').style.display = 'none';
}

let allEventsData = [];

function getFilteredBase() {
  const selectedYear   = document.getElementById('year-select').value;
  const selectedMonth  = document.getElementById('month-select').value;
  let filtered = allEventsData;
  if (selectedYear  !== 'all') filtered = filtered.filter(e => e.parsedDate.getFullYear() === parseInt(selectedYear));
  if (selectedMonth !== 'all') filtered = filtered.filter(e => e.parsedDate.getMonth()    === parseInt(selectedMonth));
  return filtered;
}

function updateRegionFilter() {
  const filtered = getFilteredBase();
  const uniqueRegions = [...new Set(filtered.map(e => e.Region).filter(r => r))].sort();
  const regionSelect = document.getElementById('region-select');
  regionSelect.innerHTML = '<option value="all">All Regions</option>';
  uniqueRegions.forEach(reg => {
    const opt = document.createElement('option');
    opt.value = reg; opt.textContent = reg;
    regionSelect.appendChild(opt);
  });
}

function updateLocationFilter() {
  const selectedRegion = document.getElementById('region-select').value;
  let filtered = getFilteredBase();
  if (selectedRegion !== 'all') filtered = filtered.filter(e => e.Region === selectedRegion);
  const uniqueLocations = [...new Set(filtered.map(e => e.Location).filter(l => l))].sort();
  const locationSelect = document.getElementById('location-select');
  locationSelect.innerHTML = '<option value="all">All Locations</option>';
  uniqueLocations.forEach(loc => {
    const opt = document.createElement('option');
    opt.value = loc; opt.textContent = loc;
    locationSelect.appendChild(opt);
  });
}

function updateEventCount(events) {
  const countEl = document.getElementById('event-count');
  if (events.length === 0) {
    countEl.textContent = 'No events found for the selected filters.';
    return;
  }
  const yearName     = document.getElementById('year-select').value === 'all'
    ? 'all years' : document.getElementById('year-select').value;
  const monthVal     = document.getElementById('month-select').value;
  const monthName    = monthVal === 'all' ? 'all months'
    : new Date(0, parseInt(monthVal)).toLocaleString('en-US', { month: 'long' });
  const regionName   = document.getElementById('region-select').value === 'all'
    ? 'all regions' : document.getElementById('region-select').value;
  const locationName = document.getElementById('location-select').value === 'all'
    ? 'all locations' : document.getElementById('location-select').value;
  countEl.textContent = `${events.length} event${events.length === 1 ? '' : 's'} in ${yearName}, ${monthName} at ${regionName}, ${locationName}`;
}

function displayEvents(events) {
  document.getElementById('loading').style.display           = 'none';
  document.getElementById('events-container').style.display  = 'block';
  document.getElementById('calendar-container').style.display = 'none';
  document.getElementById('export-button').style.display     = 'none';
  const listEl = document.getElementById('events-list');
  updateEventCount(events);
  if (events.length === 0) {
    listEl.innerHTML = `<div class="no-events"><h3>No events found</h3><p>There are no events for the selected filters.</p></div>`;
    return;
  }
  listEl.innerHTML = events.map(e => createEventCard(e, e.parsedDate)).join('');
}

function displayTable(events) {
  document.getElementById('loading').style.display           = 'none';
  document.getElementById('events-container').style.display  = 'block';
  document.getElementById('calendar-container').style.display = 'none';
  document.getElementById('export-button').style.display     = events.length > 0 ? 'block' : 'none';
  const listEl = document.getElementById('events-list');
  updateEventCount(events);
  if (events.length === 0) {
    listEl.innerHTML = `<div class="no-events"><h3>No events found</h3><p>There are no events for the selected filters.</p></div>`;
    return;
  }
  const grouped = {};
  events.forEach(event => {
    const baseLoc = extractBaseLocation(event.Location);
    if (!grouped[baseLoc]) grouped[baseLoc] = [];
    grouped[baseLoc].push(event);
  });
  let tableHTML = '';
  Object.keys(grouped).sort().forEach(baseLoc => {
    const groupEvents = grouped[baseLoc];
    tableHTML += `
      <div class="location-group">
        <div class="location-header">${baseLoc}</div>
        <table class="location-table">
          <thead><tr>
            <th>Date</th><th>Time</th><th>Event Name</th><th>Client Name</th><th>Full Location</th>
          </tr></thead>
          <tbody>
            ${groupEvents.map(e => `
              <tr>
                <td>${formatDate(e.parsedDate)}</td>
                <td>${e.Time || ''}</td>
                <td>${e['Event-Name'] || ''}</td>
                <td>${e['Client-Name'] || ''}</td>
                <td>${e.Location || ''}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  });
  listEl.innerHTML = tableHTML;
}

function exportToEmail() {
  const selectedYear     = document.getElementById('year-select').value;
  const selectedMonth    = document.getElementById('month-select').value;
  const selectedRegion   = document.getElementById('region-select').value;
  const selectedLocation = document.getElementById('location-select').value;
  let filtered = allEventsData;
  if (selectedYear     !== 'all') filtered = filtered.filter(e => e.parsedDate.getFullYear() === parseInt(selectedYear));
  if (selectedMonth    !== 'all') filtered = filtered.filter(e => e.parsedDate.getMonth()    === parseInt(selectedMonth));
  if (selectedRegion   !== 'all') filtered = filtered.filter(e => e.Region   === selectedRegion);
  if (selectedLocation !== 'all') filtered = filtered.filter(e => e.Location === selectedLocation);
  const yearName  = selectedYear  === 'all' ? 'All Years'  : selectedYear;
  const monthName = selectedMonth === 'all' ? 'All Months' : new Date(0, parseInt(selectedMonth)).toLocaleString('en-US', { month: 'long' });
  const grouped   = {};
  filtered.forEach(event => {
    const baseLoc = extractBaseLocation(event.Location);
    if (!grouped[baseLoc]) grouped[baseLoc] = [];
    grouped[baseLoc].push(event);
  });
  let emailContent = `Events for ${yearName}, ${monthName}\n\n`;
  Object.keys(grouped).sort().forEach(baseLoc => {
    emailContent += `${baseLoc}\n`;
    emailContent += `Date\tTime\tEvent Name\tClient Name\tFull Location\n`;
    grouped[baseLoc].forEach(e => {
      emailContent += `${formatDate(e.parsedDate)}\t${e.Time || ''}\t${e['Event-Name'] || ''}\t${e['Client-Name'] || ''}\t${e.Location || ''}\n`;
    });
    emailContent += '\n';
  });
  const mailtoLink = `mailto:?subject=Events - ${yearName}, ${monthName}&body=${encodeURIComponent(emailContent)}`;
  window.location.href = mailtoLink;
}

function displayCalendar(events, month, year) {
  document.getElementById('loading').style.display           = 'none';
  document.getElementById('calendar-container').style.display = 'block';
  document.getElementById('events-container').style.display  = 'none';
  document.getElementById('export-button').style.display     = 'none';
  const gridEl = document.getElementById('calendar-grid');
  updateEventCount(events);
  gridEl.innerHTML = generateCalendar(year, month, events);
  document.querySelectorAll('.calendar-day[data-date]').forEach(day => {
    day.addEventListener('click', () => {
      const dateStr  = day.getAttribute('data-date');
      const dayEvents = events.filter(e => e.parsedDate.toDateString() === dateStr);
      showEventModal(dayEvents, dateStr);
    });
  });
}

function showEventModal(events, dateStr) {
  const modal       = document.getElementById('event-modal');
  const overlay     = document.getElementById('modal-overlay');
  const modalEvents = document.getElementById('modal-events');
  const modalDate   = document.getElementById('modal-date');
  modalDate.textContent = formatDate(new Date(dateStr));
  modalEvents.innerHTML = events.length > 0
    ? events.map(e => createEventCard(e, e.parsedDate)).join('')
    : '<p>No events for this day.</p>';
  modal.style.display   = 'block';
  overlay.style.display = 'block';
}

function filterEvents() {
  const selectedYear     = document.getElementById('year-select').value;
  const selectedMonth    = document.getElementById('month-select').value;
  const selectedRegion   = document.getElementById('region-select').value;
  const selectedLocation = document.getElementById('location-select').value;
  const view             = document.getElementById('view-select').value;
  let filtered = allEventsData;
  if (selectedYear     !== 'all') filtered = filtered.filter(e => e.parsedDate.getFullYear() === parseInt(selectedYear));
  if (selectedMonth    !== 'all') filtered = filtered.filter(e => e.parsedDate.getMonth()    === parseInt(selectedMonth));
  if (selectedRegion   !== 'all') filtered = filtered.filter(e => e.Region   === selectedRegion);
  if (selectedLocation !== 'all') filtered = filtered.filter(e => e.Location === selectedLocation);
  filtered.sort((a, b) => {
    const aTod = isToday(a.parsedDate), bTod = isToday(b.parsedDate);
    const aUp  = isUpcoming(a.parsedDate), bUp = isUpcoming(b.parsedDate);
    if (aTod && !bTod) return -1;
    if (!aTod && bTod) return 1;
    if (aUp  && !bUp)  return -1;
    if (!aUp  && bUp)  return 1;
    return a.parsedDate - b.parsedDate;
  });
  if (view === 'list') {
    displayEvents(filtered);
  } else if (view === 'table') {
    displayTable(filtered);
  } else if (view === 'calendar') {
    let calYear  = selectedYear  !== 'all' ? parseInt(selectedYear)  : getCurrentYear();
    let calMonth = selectedMonth !== 'all' ? parseInt(selectedMonth) : getCurrentMonth();
    const calEvents = allEventsData.filter(e =>
      e.parsedDate.getFullYear() === calYear &&
      e.parsedDate.getMonth()    === calMonth &&
      (selectedRegion   === 'all' || e.Region   === selectedRegion) &&
      (selectedLocation === 'all' || e.Location === selectedLocation)
    );
    displayCalendar(calEvents, calMonth, calYear);
  }
}

function showError() {
  document.getElementById('loading').style.display           = 'none';
  document.getElementById('error-container').style.display   = 'block';
  document.getElementById('events-container').style.display  = 'none';
  document.getElementById('calendar-container').style.display = 'none';
  document.getElementById('export-button').style.display     = 'none';
}

document.addEventListener('DOMContentLoaded', loadEvents);
</script>

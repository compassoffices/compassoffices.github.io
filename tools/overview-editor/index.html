<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Compass Offices Overview — Content Editor</title>
<style>
  :root{--o:#FF6600;--ink:#1a1a1a;--mut:#666;--line:#e3e3e6;--bg:#f4f5f7;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:#fff;}
  .ed-top{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 18px;background:#1c1c1c;color:#fff;}
  .ed-top h1{font-size:1rem;margin:0;font-weight:700;}
  .ed-langbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:9px 18px;background:#242424;color:#fff;border-top:1px solid #333;}
  .ed-langbar .ll{font-size:.8rem;color:#9a9a9a;font-weight:700;letter-spacing:.02em;}
  .ed-langbar .ll.note{font-size:.72rem;color:#7c7c7c;font-weight:500;flex:1;min-width:180px;}
  .ed-langbar .trans-prog{font-size:.8rem;color:var(--o);font-weight:800;}
  .ed-btn.sm{padding:5px 10px;font-size:.78rem;}
  .ed-top .sp{flex:1;}
  .ed-btn{border:none;border-radius:9px;padding:10px 14px;font-weight:700;font-size:.86rem;cursor:pointer;background:var(--o);color:#fff;}
  .ed-btn.alt{background:#333;color:#fff;}
  .ed-btn:hover{filter:brightness(1.06);}
  .ed-wrap{display:grid;grid-template-columns:minmax(380px,460px) 1fr;height:calc(100vh - 58px);}
  .ed-panel{overflow:auto;border-right:1px solid var(--line);padding:16px 16px 90px;}
  .ed-prev{background:var(--bg);overflow:hidden;}
  .ed-prev iframe{width:100%;height:100%;border:0;background:#fff;}
  details.ed-sec{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;background:#fff;}
  details.ed-sec>summary{cursor:pointer;list-style:none;padding:12px 14px;font-weight:700;background:#fafafa;display:flex;align-items:center;gap:8px;}
  details.ed-sec>summary::-webkit-details-marker{display:none;}
  details.ed-sec>summary .chev{margin-left:auto;color:#999;transition:transform .2s;}
  details.ed-sec[open]>summary .chev{transform:rotate(90deg);}
  .ed-body{padding:12px 14px;}
  .ed-f{margin-bottom:10px;}
  .ed-f label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);font-weight:700;margin-bottom:4px;}
  .ed-f input,.ed-f textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:.9rem;font-family:inherit;}
  .ed-f textarea{min-height:62px;resize:vertical;}
  .ed-f textarea.ed-oneline{min-height:0;resize:none;overflow:hidden;line-height:1.4;white-space:pre-wrap;word-break:break-word;}
  .ed-f input:focus,.ed-f textarea:focus{outline:none;border-color:var(--o);box-shadow:0 0 0 3px rgba(255,102,0,.12);}
  .ed-item{border:1px dashed var(--line);border-radius:10px;padding:10px;margin-bottom:10px;background:#fcfcfd;}
  .ed-item.dragging{opacity:.45;}
  .ed-item.drag-over{border-style:solid;border-color:var(--o);box-shadow:0 0 0 2px rgba(255,102,0,.18) inset;}
  .ed-item-h{display:flex;gap:6px;align-items:center;margin-bottom:8px;}
  .ed-grip{cursor:grab;user-select:none;color:#bbb;font-size:.9rem;line-height:1;letter-spacing:-3px;padding:2px 4px 2px 0;}
  .ed-grip:hover{color:var(--o);}
  .ed-grip:active{cursor:grabbing;}
  .ed-item-h .t{font-weight:700;font-size:.82rem;color:var(--mut);}
  .ed-logo-row{background:#fff;}
  .ed-logo-body{display:flex;gap:10px;align-items:center;}
  .ed-logo-body textarea{flex:1;}
  .ed-logo-prev{flex:0 0 auto;width:40px;height:40px;border-radius:50%;background:#fff no-repeat center/72%;border:1px solid var(--line);box-shadow:0 2px 6px rgba(0,0,0,.12);}
  .ed-logo-prev.empty{background-image:none;position:relative;}
  .ed-logo-prev.empty::after{content:"○";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:1rem;}
  .ed-mini{margin-left:auto;display:flex;gap:4px;}
  .ed-mini button{border:1px solid var(--line);background:#fff;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:.85rem;line-height:1;}
  .ed-mini button:hover{border-color:var(--o);color:var(--o);}
  .ed-add{border:1px dashed var(--o);color:var(--o);background:#fff6ef;border-radius:9px;padding:8px;width:100%;font-weight:700;cursor:pointer;margin-bottom:6px;}
  .ed-sync{border:1px solid var(--o);border-style:solid;background:var(--o);color:#fff;margin-top:4px;}
  .ed-sync:hover{background:var(--ink);border-color:var(--ink);}
  .ed-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .ed-note{font-size:.78rem;color:var(--mut);background:#fff8f1;border:1px solid #ffe2cc;border-radius:8px;padding:8px 10px;margin-bottom:12px;}
  .ed-sub{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin:4px 0 6px;}
  .ed-showtoggle{display:flex;align-items:center;gap:8px;font-size:.84rem;font-weight:700;color:var(--ink);background:#fff6ef;border:1px solid #ffe2cc;border-radius:9px;padding:9px 11px;margin-bottom:12px;cursor:pointer;}
  .ed-showtoggle input{width:16px;height:16px;accent-color:var(--o);cursor:pointer;}
  .ed-toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1c1c1c;color:#fff;padding:11px 18px;border-radius:10px;font-weight:600;font-size:.9rem;opacity:0;transition:opacity .25s;pointer-events:none;z-index:40;}
  .ed-toast.show{opacity:1;}
  .ed-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:30;padding:20px;}
  .ed-modal.show{display:flex;}
  .ed-modal-box{background:#fff;border-radius:14px;max-width:880px;width:100%;max-height:86vh;display:flex;flex-direction:column;overflow:hidden;}
  .ed-modal-h{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .ed-modal-h h2{margin:0;font-size:1rem;}
  .ed-modal-h .sp{flex:1;}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .seg button{border:0;border-right:1px solid var(--line);background:#fff;padding:8px 14px;font-weight:700;font-size:.82rem;cursor:pointer;color:#444;}
  .seg button:last-child{border-right:0;}
  .seg button.on{background:var(--ink);color:#fff;}
  .modebar{margin-right:auto;}
  .modebar button{padding:9px 16px;}
  .modebar button.on{background:var(--o);color:#fff;}
  .ed-modal textarea{flex:1;border:0;padding:14px 16px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.8rem;resize:none;min-height:340px;}
  .ed-x{border:none;background:#eee;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:1rem;}
  @media(max-width:900px){.ed-wrap{grid-template-columns:1fr;height:auto;}.ed-prev{height:70vh;}.ed-panel{height:auto;}}
</style>
</head>
<body>
  <div class="ed-top">
    <h1>Compass Offices Overview — Content Editor</h1>
    <div class="sp"></div>
    <div class="seg modebar" id="modebar">
      <button data-mode="page" class="on" onclick="setMode('page')">Page</button>
      <button data-mode="deck" onclick="setMode('deck')">Slideshow</button>
    </div>
    <button class="ed-btn alt" onclick="saveJSON()">Save JSON</button>
    <button class="ed-btn alt" onclick="saveAllJSON()">Save all (5)</button>
    <button class="ed-btn alt" onclick="reloadFromGitHub()">Reload from GitHub</button>
    <button class="ed-btn alt" onclick="document.getElementById('importFile').click()">Import JSON</button>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importJSON(event)">
    <button class="ed-btn alt" onclick="resetAll()">Reset</button>
    <button class="ed-btn" onclick="openExport()">Copy for WordPress</button>
  </div>
  <div class="ed-langbar">
    <span class="ll">Language</span>
    <div class="seg" id="langseg">
      <button data-lang="en" class="on" onclick="switchLang('en')">EN</button>
      <button data-lang="zh-CN" onclick="switchLang('zh-CN')">简 SC</button>
      <button data-lang="zh-TW" onclick="switchLang('zh-TW')">繁 TC</button>
      <button data-lang="ja" onclick="switchLang('ja')">日 JP</button>
      <button data-lang="vi" onclick="switchLang('vi')">VN</button>
    </div>
    <button class="ed-btn alt sm" id="retransBtn" onclick="retranslate()" style="display:none">Re-translate</button>
    <span class="trans-prog" id="transProg"></span>
    <span class="ll note">Auto-translation is machine-generated — review names &amp; addresses, then export each language.</span>
  </div>
  <div class="ed-wrap">
    <div class="ed-panel" id="panel"></div>
    <div class="ed-prev"><iframe id="prev" allowfullscreen allow="fullscreen"></iframe></div>
  </div>
  <div class="ed-modal" id="modal"><div class="ed-modal-box">
    <div class="ed-modal-h"><h2>Copy into your block</h2><span id="exportMode" style="font-size:.76rem;color:#888;font-weight:700;"></span><div class="sp"></div>
      <div class="seg" id="seg">
        <button data-tab="html" class="on" onclick="setTab('html')">HTML</button>
        <button data-tab="css" onclick="setTab('css')">CSS</button>
        <button data-tab="js" onclick="setTab('js')">JS</button>
        <button data-tab="inline" onclick="setTab('inline')">Inline</button>
      </div>
      <button class="ed-btn" onclick="copyExport()">Copy</button>
      <button class="ed-x" onclick="closeExport()">✕</button>
    </div>
    <textarea id="exportText" readonly spellcheck="false"></textarea>
  </div></div>
  <div class="ed-toast" id="toast"></div>

    var x=PX(c),y=PY(c),f=Number(c.floors)||0,r=(5+(f/maxF)*8),lp=(c.lp||'r');
    var lx=x,ly=y,anc='start';
    if(lp==='l'){lx=x-r-8;ly=y+fz*0.34;anc='end';}
    else if(lp==='t'){lx=x;ly=y-r-8;anc='middle';}
    else if(lp==='b'){lx=x;ly=y+r+fz+2;anc='middle';}
    else {lx=x+r+8;ly=y+fz*0.34;anc='start';}
    /* keep labels inside the frame (esp. on the tighter portrait crop) */
    var tw=String(c.name).length*fz*0.56;
    if(anc==='end' && (lx-tw)<6){ lx=x+r+8; anc='start'; }
    else if(anc==='start' && (lx+tw)>W-6){ lx=x-r-8; anc='end'; }
    if(anc==='middle'){ if(lx-tw/2<6) lx=tw/2+6; else if(lx+tw/2>W-6) lx=W-6-tw/2; }
    pins+='<g class="mp-pin" tabindex="0" role="button" data-name="'+escAttr(c.name)+'" data-floors="'+escAttr(String(f))+'" aria-label="'+escAttr(c.name+', '+f+' '+floorsWord)+'" style="--d:'+(i*0.13).toFixed(2)+'s">'
      +'<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+r.toFixed(1)+'" class="mp-ring"/>'
      +'<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+r.toFixed(1)+'" class="mp-dot"/>'
      +'<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="'+anc+'" class="mp-label" style="font-size:'+fz+'px">'+esc(c.name)+'</text>'
      +'<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(r+12).toFixed(1)+'" class="mp-hit"/>'
      +'</g>';
  });
  return '<svg class="netmap '+cls+'" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Compass Offices locations across Asia Pacific">'
    +'<path class="mp-land" d="'+M.d+'"/><g class="mp-lines">'+lines+'</g>'+pins+'</svg>';
}
function mapSVG(cities, ui){

}
var CSS="/* ============================================================\n   COMPASS OFFICES — Company Overview + Centres Directory\n   Architectural / editorial direction. Namespaced under .cov.\n   Font is inherited from the host page (the site's master CSS).\n   ============================================================ */\n.cov{\n  --orange:#FF6600;\n  --orange-dk:#E55A00;\n  --tint:#FFD9BD;\n  --ink:#161616;\n  --slate:#5E5E5E;\n  --paper:#FFFFFF;\n  --char:#1A1A1A;\n  --line:rgba(0,0,0,.14);\n  --line-soft:rgba(0,0,0,.08);\n  --line-d:rgba(255,255,255,.16);\n  --max:1180px;\n  color:var(--ink);\n  line-height:1.55;\n  font-variant-numeric:tabular-nums;\n  font-family:inherit;\n}\n.cov *,.cov *::before,.cov *::after{box-sizing:border-box;}\n.cov p{margin:0 0 1rem;color:var(--slate);font-size:1.06rem;}\n.cov img{max-width:100%;display:block;}\n.cov .wrap{max-width:var(--max);margin:0 auto;padding:0 28px;}\n.cov .sec{padding:88px 0;}\n\n.cov .eye{\n  display:inline-flex;align-items:center;gap:10px;\n  font-size:.80rem;letter-spacing:.22em;text-transform:uppercase;\n  font-weight:700;color:var(--orange);margin-bottom:20px;\n}\n.cov .eye svg{width:15px;height:15px;fill:var(--orange);flex:0 0 auto;}\n.cov h2{\n  font-size:clamp(2rem,4.6vw,3.2rem);line-height:1.04;letter-spacing:-.02em;\n  font-weight:800;margin:0 0 20px;color:var(--ink);\n}\n.cov h3{font-size:1.5rem;font-weight:800;letter-spacing:-.01em;margin:0;color:var(--ink);}\n\n/* ---- HERO ------------------------------------------------ */\n.cov .hero{position:relative;overflow:hidden;padding:96px 0 0;}\n.cov .hero .wrap{position:relative;z-index:2;}\n.cov .hero-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:.6;pointer-events:none;}\n.cov .hero-veil{position:absolute;inset:0;z-index:0;pointer-events:none;\n  background:linear-gradient(180deg,rgba(255,255,255,.10) 0%,rgba(255,255,255,.30) 46%,rgba(255,255,255,.82) 100%);}\n.cov .hero-glass{\n  display:inline-block;max-width:660px;margin-bottom:8px;\n  padding:clamp(26px,3vw,40px) clamp(26px,3.4vw,46px);border-radius:22px;\n  background:linear-gradient(180deg,rgba(255,255,255,.84),rgba(255,255,255,.72));\n  border:1px solid rgba(255,255,255,.9);\n  box-shadow:0 18px 50px rgba(20,22,28,.16),inset 0 1px 0 rgba(255,255,255,.85);\n}\n/* Live frosted blur ONLY on the plain scrolling page. The deck's slide track is\n   transformed + clipped (overflow:hidden, will-change:transform); a backdrop-filter\n   inside it breaks compositing in browsers and freezes scroll/slide — so the deck\n   keeps the solid frosted-white panel above instead. */\n.cov:not(.cov-deck) .hero-glass{\n  background:linear-gradient(180deg,rgba(255,255,255,.66),rgba(255,255,255,.52));\n  -webkit-backdrop-filter:blur(16px) saturate(1.3);backdrop-filter:blur(16px) saturate(1.3);\n}\n.cov .hero-glass\u003e*:first-child{margin-top:0;}\n.cov .hero-glass h1{margin-bottom:18px;}\n.cov .hero-glass .hero-lead{margin-bottom:0;max-width:none;}\n.cov .cov-mbr{display:none;}\n.cov .hero h1{\n  font-size:clamp(2.6rem,7vw,5.4rem);line-height:.98;letter-spacing:-.035em;\n  font-weight:800;margin:0 0 26px;max-width:14ch;color:var(--ink);\n}\n.cov .hero h1 .o{color:var(--orange);}\n.cov .hero-lead{font-size:1.18rem;max-width:560px;color:var(--slate);}\n\n.cov .ribbon{margin-top:64px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);}\n.cov .ribbon .r{padding:30px 22px;border-left:1px solid var(--line-soft);}\n.cov .ribbon .r:first-child{border-left:0;}\n.cov .ribbon .rn{font-size:clamp(1.7rem,3vw,2.4rem);font-weight:800;letter-spacing:-.02em;line-height:1;color:var(--ink);}\n.cov .ribbon .rl{display:block;margin-top:10px;font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;color:var(--slate);font-weight:700;}\n@media (max-width:820px){.cov .ribbon{grid-template-columns:repeat(2,1fr);}\n  .cov .ribbon .r:nth-child(odd){border-left:0;}\n  .cov .ribbon .r{border-top:1px solid var(--line-soft);}\n  .cov .ribbon .r:nth-child(-n+2){border-top:0;}}\n\n.cov .strip{margin-top:72px;position:relative;z-index:2;}\n.cov .strip img{width:100%;height:clamp(120px,18vw,220px);object-fit:cover;}\n\n/* ---- APPROACH ------------------------------------------- */\n.cov .approach{display:grid;grid-template-columns:1.05fr 1fr;gap:clamp(36px,6vw,84px);align-items:center;}\n.cov .approach .media{position:relative;}\n.cov .approach .media img{width:100%;aspect-ratio:4/3;object-fit:cover;}\n.cov .approach .media::after{content:\"\";position:absolute;left:0;bottom:-10px;width:64px;height:6px;background:var(--orange);}\n.cov .approach .copy h2{font-size:clamp(1.8rem,3.6vw,2.6rem);}\n.cov .approach .copy strong{color:var(--ink);}\n@media (max-width:780px){.cov .approach{grid-template-columns:1fr;gap:34px;}.cov .approach .media{order:-1;}}\n\n/* ---- OFFER --------------------------------------------- */\n.cov .offer-grid{margin-top:8px;border-top:1px solid var(--ink);display:grid;grid-template-columns:1fr 1fr;}\n.cov .offer{padding:30px 30px 30px 0;border-bottom:1px solid var(--line);display:flex;gap:20px;align-items:flex-start;}\n.cov .offer:nth-child(odd){padding-right:48px;border-right:1px solid var(--line);}\n.cov .offer:nth-child(even){padding-left:48px;}\n.cov .offer .oic{width:50px;height:50px;flex:0 0 auto;border-radius:14px;background:#FFF1E6;display:flex;align-items:center;justify-content:center;}\n.cov .offer .oic svg{width:25px;height:25px;stroke:var(--orange);fill:none;}\n.cov .offer h4{font-size:1.22rem;font-weight:800;margin:2px 0 8px;color:var(--ink);}\n.cov .offer p{margin:0;font-size:1rem;}\n@media (max-width:780px){.cov .offer-grid{grid-template-columns:1fr;}\n  .cov .offer,.cov .offer:nth-child(odd),.cov .offer:nth-child(even){padding:26px 0;border-right:0;}}\n\n/* ---- GALLERY ------------------------------------------- */\n.cov .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(16px,2.2vw,26px);margin-top:10px;}\n.cov .gcard .gimg{overflow:hidden;}\n.cov .gcard .gimg img{width:100%;aspect-ratio:4/3;object-fit:cover;transition:transform .6s ease;}\n.cov .gcard:hover .gimg img{transform:scale(1.05);}\n.cov .gcard h4{font-size:1.14rem;font-weight:800;margin:18px 0 6px;color:var(--ink);position:relative;padding-left:16px;}\n.cov .gcard h4::before{content:\"\";position:absolute;left:0;top:5px;width:6px;height:16px;background:var(--orange);}\n.cov .gcard p{margin:0;font-size:.96rem;}\n@media (max-width:780px){.cov .gallery{grid-template-columns:1fr;gap:30px;}}\n\n/* ---- NETWORK ------------------------------------------- */\n.cov .net{background:var(--char);color:#fff;}\n.cov .net .eye{color:var(--orange);}\n.cov .net h2{color:#fff;margin-bottom:14px;}\n.cov .net p{color:rgba(255,255,255,.66);margin:0;}\n.cov .net-top{display:grid;grid-template-columns:1.15fr .85fr;gap:clamp(28px,5vw,72px);align-items:center;margin-bottom:30px;}\n.cov .net-head{max-width:600px;}\n.cov .net-head h2{margin-bottom:14px;}\n.cov .net-figs{display:flex;flex-direction:column;gap:10px;}\n.cov .net-fig{border:1px solid var(--line-d);border-radius:12px;padding:15px 20px;display:flex;align-items:center;gap:16px;}\n.cov .net-fig .nf{font-size:clamp(1.7rem,2.4vw,2.2rem);font-weight:800;letter-spacing:-.02em;line-height:1;color:var(--orange);flex:0 0 auto;min-width:2.6ch;}\n.cov .net-fig .nl{font-size:.76rem;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.66);font-weight:700;line-height:1.25;}\n\n/* location map (Asia-Pacific, interactive) — full-width, all cities always in frame */\n.cov .netmap-wrap{position:relative;border:1px solid var(--line-d);border-radius:16px;overflow:hidden;\n  background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0));padding:6px;\n  width:100%;margin:0 auto;height:clamp(360px,42vw,580px);}\n.cov .netmap{width:100%;height:100%;display:block;}\n.cov .netmap-m{display:none;}\n.cov .mp-vig{position:absolute;inset:6px;border-radius:12px;pointer-events:none;z-index:2;\n  box-shadow:inset 0 0 46px 14px rgba(26,26,26,.5);}\n.cov .mp-land{fill:rgba(255,255,255,.055);stroke:rgba(255,255,255,.14);stroke-width:.5;stroke-linejoin:round;}\n.cov .mp-line{stroke:var(--orange);stroke-width:1;opacity:.2;stroke-dasharray:3 6;stroke-linecap:round;}\n.cov .mp-dot{fill:var(--orange);filter:drop-shadow(0 0 6px rgba(255,102,0,.85));}\n.cov .mp-ring{fill:var(--orange);opacity:.5;transform-box:fill-box;transform-origin:center;animation:mpPulse 2.8s ease-out infinite;animation-delay:var(--d,0s);}\n.cov .mp-hit{fill:transparent;cursor:pointer;}\n.cov .mp-pin{cursor:pointer;outline:none;}\n.cov .mp-pin:hover .mp-dot,.cov .mp-pin:focus-visible .mp-dot{filter:drop-shadow(0 0 9px rgba(255,102,0,1));}\n.cov .mp-label{fill:#fff;font-weight:700;letter-spacing:.005em;paint-order:stroke;stroke:rgba(20,20,20,.62);stroke-width:3.4px;pointer-events:none;}\n@media (prefers-reduced-motion:reduce){.cov .mp-ring{animation:none;opacity:0;}}\n@keyframes mpPulse{0%{transform:scale(1);opacity:.55;}70%{transform:scale(2.6);opacity:0;}100%{transform:scale(2.6);opacity:0;}}\n.cov .mp-tip{position:absolute;z-index:9;pointer-events:none;background:#fff;color:var(--ink);font-weight:800;font-size:.84rem;padding:8px 13px;border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.32);transform:translate(-50%,calc(-100% - 14px));white-space:nowrap;}\n.cov .mp-tip b{color:var(--orange);font-weight:800;}\n.cov .mp-tip::after{content:\"\";position:absolute;left:50%;top:100%;transform:translateX(-50%);border:7px solid transparent;border-top-color:#fff;}\n.cov .mp-tip.below{transform:translate(-50%,14px);}\n.cov .mp-tip.below::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:#fff;}\n.cov .mp-hint{position:absolute;left:14px;bottom:12px;font-size:.72rem;letter-spacing:.01em;color:rgba(255,255,255,.5);font-weight:600;pointer-events:none;}\n@media (max-width:768px){\n  .cov .net-top{grid-template-columns:1fr;gap:24px;}\n  .cov .mp-hint{display:none;}\n  .cov .netmap-d{display:none;}\n  .cov .netmap-m{display:block;}\n  .cov .netmap-wrap{height:auto;aspect-ratio:780/1032;max-width:460px;}\n  .cov .mp-vig{box-shadow:inset 0 0 34px 10px rgba(26,26,26,.42);}\n}\n\n/* ---- PERKS (beyond the workspace) ---------------------- */\n.cov .perks-head{max-width:760px;}\n.cov .perk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(14px,1.6vw,20px);margin-top:38px;}\n.cov .perk-card{position:relative;aspect-ratio:4/5;border-radius:18px;overflow:hidden;background:#222;}\n.cov .perk-card img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.2,.7,.2,1);}\n.cov .perk-card:hover img{transform:scale(1.07);}\n.cov .perk-card::after{content:\"\";position:absolute;inset:0;background:linear-gradient(transparent 38%,rgba(0,0,0,.74));}\n.cov .perk-label{position:absolute;left:18px;bottom:16px;z-index:2;color:#fff;font-weight:800;font-size:1.04rem;letter-spacing:.03em;text-transform:uppercase;}\n.cov .perk-bubbles{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1;}\n.cov .perk-bubble{position:absolute;top:100%;width:min(52px,calc(var(--lane,25) * var(--fill,.72) * 1%));height:min(52px,calc(var(--lane,25) * var(--fill,.72) * 1%));border-radius:50%;background:#fff;box-shadow:0 6px 16px rgba(0,0,0,.28),0 0 0 1px rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center;opacity:0;transform:translateX(-50%);animation:covPerkRise 5s linear infinite;}\n.cov .perk-bubble img{width:72%;height:72%;object-fit:contain;border-radius:50%;}\n@keyframes covPerkRise{\n  0%{top:100%;opacity:0;transform:translateX(calc(-50% + var(--d0,0%))) scale(.82);}\n  14%{opacity:1;}\n  50%{transform:translateX(calc(-50% + var(--d1,0%))) scale(1);}\n  72%{opacity:1;}\n  100%{top:-18%;opacity:0;transform:translateX(calc(-50% + var(--d2,0%))) scale(1.05);}\n}\n@media (prefers-reduced-motion:reduce){.cov .perk-bubbles{display:none;}}\n@media (max-width:780px){.cov .perk-grid{grid-template-columns:1fr 1fr;}}\n@media (max-width:460px){.cov .perk-grid{grid-template-columns:1fr;}}\n\n/* ---- EVENTS & COMMUNITY (collage) ---------------------- */\n.cov .events{background:var(--char);}\n.cov .events .eye{color:var(--orange);margin-bottom:16px;}\n.cov .events h2{color:#fff;margin-bottom:16px;}\n.cov .events p{color:rgba(255,255,255,.82);margin-bottom:30px;}\n.cov .events-grid{display:grid;grid-template-columns:0.92fr 1.18fr;gap:clamp(28px,4vw,60px);align-items:center;}\n.cov .events-copy{max-width:480px;}\n.cov .events-collage{display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(10px,1.1vw,16px);}\n.cov .events-collage img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:14px;display:block;background:#222;}\n@media (max-width:480px){.cov .events-collage{grid-template-columns:1fr 1fr;gap:8px;}}\n@media (max-width:820px){\n  .cov .events-grid{grid-template-columns:1fr;gap:28px;}\n  .cov .events-copy{max-width:none;}\n}\n\n/* ---- CENTRES ------------------------------------------- */\n.cov .dir-bar{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between;margin:0 0 12px;}\n.cov .filters{display:flex;flex-wrap:wrap;gap:0;border:1px solid var(--line);}\n.cov .filter{border:0;border-right:1px solid var(--line);background:var(--paper);color:var(--ink);padding:11px 18px;font-size:.86rem;font-weight:700;letter-spacing:.02em;cursor:pointer;font-family:inherit;transition:background .18s ease,color .18s ease;}\n.cov .filter:last-child{border-right:0;}\n.cov .filter:hover{color:var(--orange);}\n.cov .filter.is-active{background:var(--ink);color:#fff;}\n.cov .search{position:relative;flex:1 1 240px;max-width:300px;}\n.cov .search input{width:100%;border:1px solid var(--line);border-radius:0;padding:12px 16px 12px 40px;font-size:.95rem;color:var(--ink);background:var(--paper);font-family:inherit;}\n.cov .search input:focus{outline:2px solid var(--orange);outline-offset:-1px;border-color:var(--orange);}\n.cov .search svg var CSS_DECK="\n/* ===== Slideshow shell — wraps the same .cov sections as full slides ===== */\n.cov-deck{position:relative;height:100vh;height:100svh;overflow:hidden;background:var(--paper);}\n.cov-deck .deck-track{display:flex;height:100%;transition:transform .62s cubic-bezier(.7,0,.18,1);will-change:transform;}\n.cov-deck .slide{flex:0 0 100%;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:flex;}\n.cov-deck .slide\u003esection{flex:1 0 auto;display:flex;min-height:100%;}\n.cov-deck .slide\u003esection\u003e.wrap{margin:auto;width:100%;padding-top:clamp(70px,8vh,108px);padding-bottom:clamp(104px,12vh,150px);}\n.cov-deck .hero h1{font-size:clamp(2.3rem,4.7vw,4.3rem);}\n.cov-deck .sec,.cov-deck .net,.cov-deck .cta,.cov-deck .contact,.cov-deck .hero{padding:0;}\n.cov-deck .strip{display:none;}\n.cov-deck .cta .deck-contact{margin:46px 0 0;color:rgba(255,255,255,.74);font-size:.96rem;letter-spacing:.01em;max-width:none;}\n.cov-deck .cta .deck-contact a{color:#fff;text-decoration:none;font-weight:700;border-bottom:1px solid rgba(255,255,255,.4);padding-bottom:1px;transition:color .2s ease,border-color .2s ease;}\n.cov-deck .cta .deck-contact a:hover{color:var(--orange);border-color:var(--orange);}\n\n/* progress bar */\n.cov-deck .deck-bar{position:absolute;top:0;left:0;right:0;height:4px;background:rgba(0,0,0,.08);z-index:7;}\n.cov-deck .deck-bar i{display:block;height:100%;width:0;background:var(--orange);transition:width .55s cubic-bezier(.7,0,.18,1);}\n/* counter — solid white pill */\n.cov-deck .deck-count{position:absolute;top:16px;right:72px;z-index:8;font-weight:800;font-size:.84rem;letter-spacing:.08em;color:var(--slate);background:#fff;padding:7px 13px;border-radius:999px;box-shadow:0 4px 14px rgba(0,0,0,.16);border:1px solid rgba(0,0,0,.05);}\n.cov-deck .deck-count span#covCur{color:var(--orange);}\n.cov-deck .deck-count i{margin:0 5px;font-style:normal;color:var(--line);}\n/* fullscreen button — white, orange icon */\n.cov-deck .deck-fs{position:absolute;top:14px;right:18px;z-index:8;width:42px;height:42px;border-radius:50%;border:1px solid rgba(0,0,0,.07);background:#fff;color:var(--orange);box-shadow:0 4px 14px rgba(0,0,0,.16);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s,border-color .2s,transform .2s;}\n.cov-deck .deck-fs svg{width:18px;height:18px;}\n.cov-deck .deck-fs:hover{background:var(--orange);border-color:var(--orange);color:#fff;transform:scale(1.06);}\n/* fullscreen mode */\n.cov-deck:fullscreen{height:100vh;width:100vw;}\n.cov-deck:-webkit-full-screen{height:100vh;width:100vw;}\n/* arrows — white, orange icon */\n.cov-deck .deck-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:7;width:50px;height:50px;border-radius:50%;border:1px solid rgba(0,0,0,.07);background:#fff;color:var(--orange);box-shadow:0 6px 18px rgba(0,0,0,.18);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s,border-color .2s,opacity .2s;}\n.cov-deck .deck-nav svg{width:19px;height:19px;}\n.cov-deck .deck-nav:hover{background:var(--orange);border-color:var(--orange);color:#fff;}\n.cov-deck .deck-nav.prev{left:20px;}\n.cov-deck .deck-nav.next{right:20px;}\n.cov-deck .deck-nav:disabled{opacity:0;pointer-events:none;}\n/* dots — white pill */\n.cov-deck .deck-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:7;display:flex;align-items:center;gap:9px;\n  background:#fff;padding:8px 13px;border-radius:999px;box-shadow:0 4px 18px rgba(0,0,0,.16);border:1px solid rgba(0,0,0,.05);}\n.cov-deck .deck-dots button{position:relative;width:8px;height:8px;border-radius:999px;border:0;padding:0;background:rgba(0,0,0,.22);cursor:pointer;transition:width .28s cubic-bezier(.2,.7,.2,1),background .25s;}\n.cov-deck .deck-dots button:hover{background:rgba(0,0,0,.4);}\n.cov-deck .deck-dots button.on{width:26px;background:var(--orange);}\n/* dot label tooltip */\n.cov-deck .deck-dots button::after{\n  content:attr(data-label);position:absolute;left:50%;bottom:calc(100% + 12px);\n  transform:translateX(-50%) translateY(4px);white-space:nowrap;\n  font-size:.72rem;font-weight:700;letter-spacing:.02em;line-height:1;\n  padding:6px 10px;border-radius:8px;background:rgba(26,26,26,.92);color:#fff;\n  box-shadow:0 8px 20px rgba(0,0,0,.24);opacity:0;pointer-events:none;\n  transition:opacity .18s ease,transform .18s ease;z-index:9;\n}\n.cov-deck .deck-dots button:hover::after,.cov-deck .deck-dots button:focus-visible::after{\n  opacity:1;transform:translateX(-50%) translateY(0);\n}\n/* customers: give the logo panel a bit more room on the slideshow */\n.cov-deck .cust-top{grid-template-columns:.85fr 1.45fr;}\n/* hint */\n.cov-deck .deck-hint{position:absolute;bottom:18px;right:26px;z-index:7;font-size:.72rem;font-weight:700;letter-spacing:.04em;color:var(--slate);opacity:.9;transition:opacity .4s;}\n.cov-deck .deck-hint.gone{opacity:0;}\n/* dark-slide chrome: white buttons read fine on dark slides too — only the thin\n   progress-bar track needs a lighter colour so it shows against the dark slide. */\n.cov-deck.on-dark .deck-bar{background:rgba(255,255,255,.18);}\n.cov-deck.on-dark .deck-hint{color:rgba(255,255,255,.78);}\n\n/* ---- theme-proof chrome (the WP theme restyles button/svg/a — force our look to win) ----\n   High specificity + !important. Base + hover both !important so the orange hover still works. */\n.cov.cov-deck .deck-nav,\n.cov.cov-deck .deck-fs{background:#fff !important;color:var(--orange) !important;border:1px solid rgba(0,0,0,.07) !important;}\n.cov.cov-deck .deck-nav:hover,\n.cov.cov-deck .deck-fs:hover{background:var(--orange) !important;color:#fff !important;border-color:var(--orange) !important;}\n.cov.cov-deck .deck-nav svg,.cov.cov-deck .deck-fs svg{stroke:currentColor !important;}\n.cov.cov-deck .deck-count{background:#fff !important;color:var(--slate) !important;}\n.cov.cov-deck .deck-count #covCur{color:var(--orange) !important;}\n.cov.cov-deck .deck-dots{background:#fff !important;}\n.cov.cov-deck .deck-dots button{background:rgba(0,0,0,.22) !important;}\n.cov.cov-deck .deck-dots button.on{background:var(--orange) !important;}\n.cov.cov-deck .deck-hint{color:rgba(255,255,255,.9) !important;}\n\n/* staggered slide entrance — the deck drives motion, so neutralize page reveal */\n.cov-deck .rv{opacity:1;transform:none;transition:none;}\n.cov-deck .slide .wrap\u003e*{opacity:0;transform:translateY(22px);}\n.cov-deck .slide.active .wrap\u003e*{opacity:1;transform:none;transition:opacity .6s cubic-bezier(.2,.7,.2,1),transform .6s cubic-bezier(.2,.7,.2,1);}\n.cov-deck .slide.active .wrap\u003e*:nth-child(1){transition-delay:.05s;}\n.cov-deck .slide.active .wrap\u003e*:nth-child(2){transition-delay:.12s;}\n.cov-deck .slide.active .wrap\u003e*:nth-child(3){transition-delay:.19s;}\n.cov-deck .slide.active .wrap\u003e*:nth-child(4){transition-delay:.26s;}\n.cov-deck .slide.active .wrap\u003e*:nth-child(5){transition-delay:.33s;}\n.cov-deck .slide.active .wrap\u003e*:nth-child(6){transition-delay:.40s;}\n\n/* ambient motion */\n.cov-deck .net .wrap{display:flex;flex-direction:column;height:100%;}\n.cov-deck .net .net-top{flex:0 0 auto;margin-bottom:18px;}\n.cov-deck .netmap-wrap{flex:1 1 auto;min-height:0;height:auto;margin:0;}\n@keyframes covFloat{from{transform:translateY(-8px);}to{transform:translateY(10px);}}\n@keyframes covRise{from{opacity:.35;}to{opacity:1;}}\n.cov-deck .gcard{transition:transform .45s cubic-bezier(.2,.7,.2,1);}\n.cov-deck .gcard:hover{transform:translateY(-8px);}\n.cov-deck .offer{transition:background .25s ease,transform .25s ease;}\n.cov-deck .offer:hover{transform:translateX(4px);}\n\n/* ===== MOBILE (\u003c=768px): render the slideshow as a normal scrolling page ===== */\n@media (max-width:768px){\n  .cov-deck{height:auto!important;min-height:0;overflow:visible;background:var(--paper);}\n  .cov-deck .deck-track{display:block;transform:none!important;transition:none;height:auto;width:auto;}\n  .cov-deck .slide{width:auto;height:auto;min-height:0;display:block;overflow:visible;}\n  .cov-deck .slide\u003esection{display:block;min-height:0;}\n  .cov-deck .slide\u003esection\u003e.wrap{margin:0 auto;padding-top:62px;padding-bottom:62px;}\n  /* show everything; remove slide stagger + hero fade */\n  .cov-deck .slide .wrap\u003e*{opacity:1!important;transform:none!important;}\n  .cov-deck .hero{padding:84px 0 0;}\n  /* network: unflex, full-width map that fills (no empty letterbox) */\n  .cov-deck .net .wrap{display:block;height:auto;}\n  .cov-deck .net-top{grid-template-columns:1fr;gap:22px;}\n  .cov-deck .netmap-wrap{flex:none;height:auto;aspect-ratio:780/1032;max-width:460px;margin:6px auto 0;}\n  /* customers: stack, larger logo panel */\n  .cov-deck .cust-top{grid-template-columns:1fr;gap:22px;}\n  /* hide every slideshow control */\n  .cov-deck .deck-bar,.cov-deck .deck-count,.cov-deck .deck-nav,\n  .cov-deck .deck-dots,.cov-deck .deck-hint,.cov-deck .deck-fs{display:none!important;}\n}\n@media (prefers-reduced-motion:reduce){\n  .cov-deck .deck-track{transition:none;}\n  .cov-deck .slide .wrap\u003e*{opacity:1;transform:none;}\n  .cov-deck .slide.active .wrap\u003e*{transition:none;}\n}";
var JS_DECK="(function(){\n  var deck=document.querySelector('.cov-deck'); if(!deck) return;\n  /* On mobile the deck renders as a plain scrolling page (see CSS), so skip all slideshow wiring. */\n  if(window.matchMedia && window.matchMedia('(max-width:768px)').matches){ return; }\n  var track=deck.querySelector('#covTrack'); if(!track) return;\n  var slides=Array.prototype.slice.call(track.children), n=slides.length, idx=0;\n  var prog=deck.querySelector('#covProg'), cur=deck.querySelector('#covCur'),\n      prev=deck.querySelector('#covPrev'), next=deck.querySelector('#covNext'),\n      dotsWrap=deck.querySelector('#covDots'), hint=deck.querySelector('#covHint'),\n      fsBtn=deck.querySelector('#covFs');\n  function pad(i){ return (i+1\u003c10?'0':'')+(i+1); }\n  var DOT_LABELS={hero:'Overview',approach:'Our approach',offer:'What we offer',gallery:'Inside our centres',perks:'Perks',events:'Events & community',network:'Our network',centres:'Our centres',customers:'Our customers',cta:'Get started'};\n  var dots=slides.map(function(s,i){\n    var key=s.getAttribute('data-key')||'';\n    var label=(s.getAttribute('data-label')||'').trim()||DOT_LABELS[key]||(key?key.charAt(0).toUpperCase()+key.slice(1):'Slide '+(i+1));\n    var b=document.createElement('button'); b.type='button';\n    b.setAttribute('data-label',label);\n    b.setAttribute('aria-label','Go to: '+label);\n    b.addEventListener('click',function(){ dismissHint(); go(i); }); dotsWrap.appendChild(b); return b;\n  });\n  function update(){\n    track.style.transform='translateX('+(-idx*100)+'%)';\n    if(prog) prog.style.width=((idx+1)/n*100)+'%';\n    if(cur) cur.textContent=pad(idx);\n    dots.forEach(function(d,i){ d.classList.toggle('on',i===idx); });\n    if(prev) prev.disabled=(idx===0);\n    if(next) next.disabled=(idx===n-1);\n    deck.classList.toggle('on-dark', slides[idx].classList.contains('dark'));\n    deck.classList.toggle('at-hero', idx===0);\n    slides.forEach(function(s,i){ s.classList.toggle('active',i===idx); if(i!==idx) s.scrollTop=0; });\n  }\n  function go(i){ idx=Math.max(0,Math.min(n-1,i)); update(); }\n  function nextS(){ go(idx+1); } function prevS(){ go(idx-1); }\n  function dismissHint(){ if(hint){ hint.classList.add('gone'); } }\n  if(next) next.addEventListener('click',function(){ dismissHint(); nextS(); });\n  if(prev) prev.addEventListener('click',function(){ dismissHint(); prevS(); });\n\n  /* Keyboard: only Left/Right arrows, and only while the deck is in view or fullscreen,\n     so it never steals the page's own scroll keys (Space, PageDown, Home, End). */\n  function deckInView(){\n    if(document.fullscreenElement===deck||document.webkitFullscreenElement===deck) return true;\n    var r=deck.getBoundingClientRect(), vh=window.innerHeight||document.documentElement.clientHeight;\n    return r.top\u003cvh*0.5 && r.bottom\u003evh*0.5;\n  }\n  document.addEventListener('keydown',function(e){\n    if(e.key!=='ArrowLeft'&&e.key!=='ArrowRight') return;\n    if(!deckInView()) return;\n    e.preventDefault(); dismissHint();\n    if(e.key==='ArrowRight') nextS(); else prevS();\n  });\n\n  /* Horizontal swipe only — vertical gestures fall through so the page scrolls normally.\n     There is deliberately NO wheel/scroll handler, so scrolling never changes slides. */\n  var sx=0,sy=0,on=false;\n  deck.addEventListener('touchstart',function(e){ var t=e.touches[0]; sx=t.clientX; sy=t.clientY; on=true; },{passive:true});\n  deck.addEventListener('touchend',function(e){\n    if(!on) return; on=false;\n    var t=e.changedTouches[0], dx=t.clientX-sx, dy=t.clientY-sy;\n    if(Math.abs(dx)\u003e55 && Math.abs(dx)\u003eMath.abs(dy)*1.5){ dismissHint(); if(dx\u003c0) nextS(); else prevS(); }\n  },{passive:true});\n\n  /* Fullscreen toggle */\n  var EXPAND='\u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\u003e\u003cpath d=\"M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3\"/\u003e\u003c/svg\u003e';\n  var SHRINK='\u003csvg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\u003e\u003cpath d=\"M3 8h3a2 2 0 0 0 2-2V3M16 3v3a2 2 0 0 0 2 2h3M21 16h-3a2 2 0 0 0-2 2v3M8 21v-3a2 2 0 0 0-2-2H3\"/\u003e\u003c/svg\u003e';\n  function isFs(){ return document.fullscreenElement===deck||document.webkitFullscreenElement===deck; }\n  function syncFs(){ if(fsBtn){ fsBtn.innerHTML=isFs()?SHRINK:EXPAND; fsBtn.setAttribute('aria-label',isFs()?'Exit full screen':'View full screen'); } }\n  if(fsBtn){\n    fsBtn.addEventListener('click',function(){\n      if(isFs()){ (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document); }\n      else { (deck.requestFullscreen||deck.webkitRequestFullscreen||function(){}).call(deck); }\n    });\n    document.addEventListener('fullscreenchange',function(){ syncFs(); update(); });\n    document.addEventListener('webkitfullscreenchange',function(){ syncFs(); update(); });\n    syncFs();\n  }\n  window.addEventListener('resize',update);\n  update();\n})();";

function cssFor(){ return mode==='deck' ? (CSS+'\n\n'+CSS_DECK) : CSS; }
function jsFor(){  return mode==='deck' ? (JS+'\n\n'+JS_DECK) : JS; }
function lbl(){ return mode==='deck' ? 'slideshow' : 'overview'; }

function previewDoc(){
  var shell = (mode==='deck' ? 'html,body{margin:0;height:100%;overflow:hidden;}' : 'body{margin:0;}')+'body{font-family:"Neue Haas Grotesk Display Pro",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}';
  var fix = mode==='deck' ? '' : '.cov .rv{opacity:1!important;transform:none!important;} .cov .skyline .bar{height:var(--h)!important;}';
  return '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">'+
    '<link href="https://fonts.cdnfonts.com/css/neue-haas-grotesk-display-pro" rel="stylesheet">'+
    '<style>'+shell+'</style>'+
    '<style>'+cssFor()+'</style>'+
    '<style>'+fix+'</style>'+
    '</head><body>'+genFor()+'<scr'+'ipt>'+jsFor()+'</scr'+'ipt></body></html>';
}
function refresh(){ document.getElementById('prev').srcdoc = previewDoc(); }
var rt=null; function scheduleRefresh(){clearTimeout(rt);rt=setTimeout(refresh,250);}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1700);}
/* copy the current language's perk logos to every other loaded language (overwrite, so all match) */
function syncLogosAllLangs(){
  if(!S.perks||!Array.isArray(S.perks.items)){toast('No perks to sync');return;}
  var others=Object.keys(langData).filter(function(c){return c!==curLang;});
  if(!others.length){toast('No other languages loaded \u2014 use \u201CReload from GitHub\u201D first');return;}
  if(!confirm('Copy the perk logos from the current language to all other languages ('+others.length+')? Every language\u2019s perk logos will be set to match this one.'))return;
  var src=S.perks.items.map(function(it){return Array.isArray(it.logos)?it.logos.filter(function(u){return u&&String(u).trim();}):[];});
  var nLang=0;
  others.forEach(function(c){
    var d=langData[c];if(!d||!d.perks||!Array.isArray(d.perks.items))return;
    src.forEach(function(logos,i){ if(d.perks.items[i]){ d.perks.items[i].logos=logos.slice(); } });
    nLang++;
  });
  toast('Logos copied to '+nLang+' other language'+(nLang!==1?'s':''));
}

/* export builders (follow the selected mode) */
function readyWrap(js){return '(function(){function __init(){\n'+js+'\n}if(document.readyState!=="loading"){__init();}else{document.addEventListener("DOMContentLoaded",__init);}})();';}
function exportHTML(){return '<!-- Compass Offices '+lbl()+' — HTML tab (CSS + JS live in their own tabs). -->\n\n'+genFor()+'\n';}
function exportCSS(){return cssFor()+'\n';}
function exportJS(){return readyWrap(jsFor())+'\n';}
function exportInline(){
  var id=(mode==='deck')?'covCodeDeck':'covCodePage';
  var holder='<scr'+'ipt type="text/template" id="'+id+'">\n'+readyWrap(jsFor())+'\n</scr'+'ipt>';
  var boot='(function(){var A=String.fromCharCode(38);var enc=A+"#038;";var el=document.getElementById("'+id+'");if(!el)return;var code=el.textContent.split(enc).join(A);var s=document.createElement("script");s.text=code;(document.body||document.documentElement).appendChild(s);})();';
  return '<!-- Compass Offices '+lbl()+' — self-contained single block. Paste into ONE Custom HTML block, then view the PUBLISHED page. -->\n\n<style>\n'+cssFor()+'\n</style>\n\n'+genFor()+'\n\n'+holder+'\n<scr'+'ipt>'+boot+'</scr'+'ipt>\n';
}
function currentExport(){ if(exportTab==='css')return exportCSS(); if(exportTab==='js')return exportJS(); if(exportTab==='inline')return exportInline(); return exportHTML(); }
function setTab(t){exportTab=t;var seg=document.getElementById('seg');Array.prototype.forEach.call(seg.children,function(b){b.classList.toggle('on',b.getAttribute('data-tab')===t);});document.getElementById('exportText').value=currentExport();}
function setMode(m){
  mode=m;
  var mb=document.getElementById('modebar');
  if(mb){Array.prototype.forEach.call(mb.children,function(b){b.classList.toggle('on',b.getAttribute('data-mode')===m);});}
  var em=document.getElementById('exportMode'); if(em){em.textContent=(m==='deck'?'Slideshow':'Page')+' output';}
  refresh();
  if(document.getElementById('modal').classList.contains('show')){document.getElementById('exportText').value=currentExport();}
  toast(m==='deck'?'Slideshow preview':'Page preview');
}
function openExport(){var em=document.getElementById('exportMode');if(em){em.textContent=(mode==='deck'?'Slideshow':'Page')+' output';}setTab('html');document.getElementById('modal').classList.add('show');}
function closeExport(){document.getElementById('modal').classList.remove('show');}
function copyExport(){var t=document.getElementById('exportText');t.select();try{document.execCommand('copy');}catch(e){}if(navigator.clipboard){navigator.clipboard.writeText(t.value).catch(function(){});}toast((exportTab.toUpperCase())+' copied');}

/* ---------- editor UI helpers ---------- */
function field(label,val,onin,multi){
  var wrap=document.createElement('div');wrap.className='ed-f';
  var lb=document.createElement('label');lb.textContent=label;wrap.appendChild(lb);
  var inp=document.createElement('textarea');
  if(!multi){ inp.rows=1; inp.className='ed-oneline'; }
  inp.value=val==null?'':val;
  function grow(){ if(!multi){ inp.style.height='auto'; inp.style.height=Math.max(inp.scrollHeight,20)+'px'; } }
  inp.addEventListener('input',function(){onin(inp.value);grow();scheduleRefresh();});
  wrap.appendChild(inp);
  setTimeout(grow,0);
  return wrap;
}
function row(a,b){var r=document.createElement('div');r.className='ed-row';r.appendChild(a);r.appendChild(b);return r;}
function sub(t){var d=document.createElement('div');d.className='ed-sub';d.textContent=t;return d;}
var SEC_STATE={first:true,open:{}};
var DRAG=null;
function sec(title,open){
  var d=document.createElement('details');d.className='ed-sec';d.setAttribute('data-secid',title);
  d.open = SEC_STATE.first ? !!open : !!SEC_STATE.open[title];
  var s=document.createElement('summary');s.innerHTML=title+'<span class="chev">\u203a</span>';
  d.appendChild(s);var body=document.createElement('div');body.className='ed-body';d.appendChild(body);
  d._body=body;return d;
}
function toggleNote(t){var n=document.createElement('div');n.className='ed-note';n.innerHTML=t;return n;}
function miniBtns(arr,idx,onchange){
  var wrap=document.createElement('div');wrap.className='ed-mini';
  var up=document.createElement('button');up.textContent='\u2191';up.title='Move up';
  up.onclick=function(){if(idx>0){var t=arr[idx-1];arr[idx-1]=arr[idx];arr[idx]=t;onchange();}};
  var dn=document.createElement('button');dn.textContent='\u2193';dn.title='Move down';
  dn.onclick=function(){if(idx<arr.length-1){var t=arr[idx+1];arr[idx+1]=arr[idx];arr[idx]=t;onchange();}};
  var rm=document.createElement('button');rm.textContent='\u2715';rm.title='Remove';
  rm.onclick=function(){arr.splice(idx,1);onchange();};
  wrap.appendChild(up);wrap.appendChild(dn);wrap.appendChild(rm);return wrap;
}
function itemHead(label,arr,i){
  var hd=document.createElement('div');hd.className='ed-item-h';
  var grip=document.createElement('span');grip.className='ed-grip';grip.textContent='\u22EE\u22EE';grip.title='Drag to reorder';grip.setAttribute('draggable','true');
  var t=document.createElement('span');t.className='t';t.textContent=label+' '+(i+1);
  hd.appendChild(grip);hd.appendChild(t);
  hd.appendChild(miniBtns(arr,i,build));
  grip.addEventListener('dragstart',function(e){
    var item=hd.closest('.ed-item');
    DRAG={arr:arr,from:i};
    try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',String(i));if(item)e.dataTransfer.setDragImage(item,14,14);}catch(_){}
    if(item)item.classList.add('dragging');
  });
  grip.addEventListener('dragend',function(){var item=hd.closest('.ed-item');if(item)item.classList.remove('dragging');DRAG=null;
    document.querySelectorAll('.ed-item.drag-over').forEach(function(el){el.classList.remove('drag-over');});});
  /* wire the parent .ed-item as a drop target once it's attached */
  setTimeout(function(){
    var item=hd.closest('.ed-item');if(!item||item._dnd)return;item._dnd=1;
    item.addEventListener('dragover',function(e){ if(DRAG&&DRAG.arr===arr){ e.preventDefault();try{e.dataTransfer.dropEffect='move';}catch(_){}item.classList.add('drag-over'); } });
    item.addEventListener('dragleave',function(){ item.classList.remove('drag-over'); });
    item.addEventListener('drop',function(e){
      item.classList.remove('drag-over');
      if(DRAG&&DRAG.arr===arr&&DRAG.from!==i){ e.preventDefault(); var m=DRAG.arr.splice(DRAG.from,1)[0]; DRAG.arr.splice(i,0,m); DRAG=null; build(); }
    });
  },0);
  return hd;
}
function listAdd(label,onclick){var b=document.createElement('button');b.className='ed-add';b.textContent=label;b.onclick=onclick;return b;}
function perkLogoRow(arr,i){
  var wrap=document.createElement('div');wrap.className='ed-item ed-logo-row';
  wrap.appendChild(itemHead('Logo',arr,i));
  var body=document.createElement('div');body.className='ed-logo-body';
  var prev=document.createElement('span');prev.className='ed-logo-prev';
  function setPrev(u){u=u&&String(u).trim();prev.style.backgroundImage=u?('url("'+u.replace(/["\\]/g,'')+'")'):'';prev.classList.toggle('empty',!u);}
  setPrev(arr[i]);
  var inp=document.createElement('textarea');inp.className='ed-oneline';inp.rows=1;inp.value=arr[i]==null?'':arr[i];inp.placeholder='Logo image URL';
  inp.addEventListener('input',function(){arr[i]=inp.value;setPrev(inp.value);scheduleRefresh();});
  body.appendChild(prev);body.appendChild(inp);
  wrap.appendChild(body);return wrap;
}
function statRows(host,arr,label){
  arr.forEach(function(s,i){var it=document.createElement('div');it.className='ed-item';it.appendChild(itemHead(label,arr,i));
    it.appendChild(field('Label',s.label,function(v){arr[i].label=v;}));
    it.appendChild(row(field('Number',s.count,function(v){arr[i].count=v;}),field('Suffix (+ % etc.)',s.suffix,function(v){arr[i].suffix=v;})));
    host.appendChild(it);});
}
function showToggle(obj){
  var w=document.createElement('label');w.className='ed-showtoggle';
  var cb=document.createElement('input');cb.type='checkbox';cb.checked=obj.show!==false;
  cb.addEventListener('change',function(){obj.show=cb.checked;build();});
  var t=document.createElement('span');t.textContent='Show this slide';
  w.appendChild(cb);w.appendChild(t);return w;
}

/* save / import / reset */
var LANG_FILE={'en':'en','zh-CN':'sc','zh-TW':'tc','ja':'jp','vi':'vn'};
/* fill any keys missing from a loaded file (e.g. a new "ui" block) from DEFAULT,
   so older JSON files keep working and gain new fields to translate */
function withDefaults(o){
  function dd(over,base){
    if(over===undefined||over===null) return JSON.parse(JSON.stringify(base));
    if(Array.isArray(over)||typeof over!=='object') return over;
    if(typeof base!=='object'||base===null||Array.isArray(base)) return over;
    var out={},keys={};
    Object.keys(base).forEach(function(k){keys[k]=1;});
    Object.keys(over).forEach(function(k){keys[k]=1;});
    Object.keys(keys).forEach(function(k){ out[k]=dd(over[k],base[k]); });
    return out;
  }
  return dd(o,DEFAULT);
}
function dlJSON(obj,fname){
  var blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;
  document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120);
}
function saveJSON(){
  try{var code=LANG_FILE[curLang]||'en';var fn='compass-overview-content-'+code+'.json';
    dlJSON(S,fn);toast('Saved '+fn);
  }catch(e){alert('Could not save JSON: '+e.message);}
}
function saveAllJSON(){
  try{
    var codes=Object.keys(langData);if(!codes.length){saveJSON();return;}
    var i=0;
    (function next(){
      if(i>=codes.length){toast('Saved '+codes.length+' language file(s) — upload them to /json');return;}
      var lc=codes[i++],fc=LANG_FILE[lc]||lc;
      dlJSON(langData[lc],'compass-overview-content-'+fc+'.json');
      setTimeout(next,300);
    })();
  }catch(e){alert('Could not save: '+e.message);}
}
function importJSON(ev){
  var f=ev.target.files&&ev.target.files[0];if(!f){return;}
  var r=new FileReader();
  r.onload=function(){
    try{var obj=JSON.parse(r.result);if(!obj||typeof obj!=='object'){throw new Error('not an object');}
      obj=withDefaults(obj);
      for(var k in S){if(Object.prototype.hasOwnProperty.call(S,k))delete S[k];}
      Object.assign(S,obj);build();toast('JSON imported');
    }catch(e){alert('That does not look like a valid editor JSON file.\n\n'+e.message);}
    ev.target.value='';
  };
  r.readAsText(f);
}
function resetAll(){if(confirm('Reset all content to the default?')){S=JSON.parse(JSON.stringify(DEFAULT));langData={en:S};curLang='en';setLangActive();build();}}

/* ---------------- auto-translation (SC / TC / JP / VN) ---------------- */
var langData={en:S}, curLang='en';
var TR_SKIP={img:1,strip:1,video:1,btnHref:1,logoImg:1,css_url:1,js_url:1,icon:1,show:1,count:1,suffix:1,lat:1,lng:1,lp:1,key:1,badge:1,images:1};
var LANG_NAMES={'en':'English','zh-CN':'Simplified Chinese','zh-TW':'Traditional Chinese','ja':'Japanese','vi':'Vietnamese'};
function trCollect(o,set){
  if(typeof o==='string'){var t=o.trim();if(t&&!/^https?:\/\//.test(t)&&!/^[0-9.+%\\/-]+$/.test(t))set[o]=true;return;}
  if(Array.isArray(o)){o.forEach(function(v){trCollect(v,set);});return;}
  if(o&&typeof o==='object'){for(var k in o){if(TR_SKIP[k])continue;trCollect(o[k],set);}return;}
}
function trApply(o,map){
  if(Array.isArray(o)){for(var i=0;i<o.length;i++){if(typeof o[i]==='string'){if(map[o[i]]!=null)o[i]=map[o[i]];}else trApply(o[i],map);}return;}
  if(o&&typeof o==='object'){for(var k in o){if(TR_SKIP[k])continue;var v=o[k];if(typeof v==='string'){if(map[v]!=null)o[k]=map[v];}else trApply(v,map);}return;}
}
function trDecode(s){var d=document.createElement('textarea');d.innerHTML=s;return d.value;}
function mmTranslate(text,target){
  var url='https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair='+encodeURIComponent('en|'+target);
  return fetch(url).then(function(r){return r.json();}).then(function(j){
    var t=(j&&j.responseData&&j.responseData.translatedText)?j.responseData.translatedText:'';
    if(!t||/MYMEMORY WARNING|QUOTA|QUERY LENGTH|INVALID/i.test(t))return text;
    return trDecode(t);
  }).catch(function(){return text;});
}
function setTransProgress(t){var el=document.getElementById('transProg');if(el)el.textContent=t||'';}
function translateTo(code){
  var clone=JSON.parse(JSON.stringify(langData.en));
  var set={};trCollect(clone,set);
  var texts=Object.keys(set),total=texts.length,done=0,i=0,map={};
  setTransProgress('Translating 0/'+total+'\u2026');
  function worker(){
    if(i>=texts.length)return Promise.resolve();
    var txt=texts[i++];
    return mmTranslate(txt,code).then(function(tr){map[txt]=tr;done++;setTransProgress('Translating '+done+'/'+total+'\u2026');return worker();});
  }
  var ws=[];for(var w=0;w<4;w++)ws.push(worker());
  return Promise.all(ws).then(function(){trApply(clone,map);langData[code]=clone;});
}
function setLangActive(){
  var seg=document.getElementById('langseg');
  if(seg)Array.prototype.forEach.call(seg.children,function(b){b.classList.toggle('on',b.getAttribute('data-lang')===curLang);});
  var rb=document.getElementById('retransBtn');if(rb)rb.style.display=(curLang==='en')?'none':'';
}
function switchLang(code){
  if(code===curLang)return;
  if(langData[code]){curLang=code;S=langData[code];setLangActive();build();return;}
  var seg=document.getElementById('langseg');if(seg)seg.style.pointerEvents='none';
  setTransProgress('Translating to '+LANG_NAMES[code]+'\u2026');
  translateTo(code).then(function(){
    curLang=code;S=langData[code];setLangActive();build();
    setTransProgress('');toast('Translated to '+LANG_NAMES[code]);
    if(seg)seg.style.pointerEvents='';
  }).catch(function(){
    setTransProgress('');toast('Translation failed — please try again');
    if(seg)seg.style.pointerEvents='';
  });
}
function retranslate(){
  if(curLang==='en')return;
  var c=curLang;delete langData[c];curLang='en';S=langData.en;
  switchLang(c);
}

/* ---------------- load default content from the /json files on GitHub ---------------- */
function ghURL(code){ return String(GH_JSON_BASE).replace(/\/?$/,'/')+'compass-overview-content-'+(LANG_FILE[code]||code)+'.json'; }
function fetchJSON(url){ return fetch(url,{cache:'no-store'}).then(function(r){ if(!r.ok)throw new Error(r.status); return r.json(); }); }
function loadFromGitHub(){
  setTransProgress('Loading content from GitHub\u2026');
  return Promise.resolve().then(function(){ return fetchJSON(ghURL('en')); }).then(function(en){
    if(en&&typeof en==='object'&&!Array.isArray(en)){ langData={en:withDefaults(en)}; S=langData.en; }
    var others=['zh-CN','zh-TW','ja','vi'];
    return Promise.all(others.map(function(code){
      return fetchJSON(ghURL(code)).then(function(d){ if(d&&typeof d==='object'&&!Array.isArray(d)) langData[code]=withDefaults(d); }).catch(function(){});
    }));
  });
}
function reloadFromGitHub(){
  var seg=document.getElementById('langseg');if(seg)seg.style.pointerEvents='none';
  loadFromGitHub().then(function(){
    curLang='en';setLangActive();build();setTransProgress('');toast('Reloaded content from GitHub');
    if(seg)seg.style.pointerEvents='';
  }).catch(function(e){
    setTransProgress('');toast('GitHub load failed — '+(e&&e.message||'check the URL'));
    if(seg)seg.style.pointerEvents='';
  });
}

(function boot(){
  loadFromGitHub().then(function(){
    curLang='en';setLangActive();build();setTransProgress('');toast('Loaded content from GitHub');
  }).catch(function(){
    /* GitHub not reachable (wrong path, opened from file://, files not uploaded yet) — use the built-in default */
    setTransProgress('');setLangActive();build();
  });
})();

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Compass Partnership — Power Editor</title>
<style>

*{box-sizing:border-box;}
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#161616;background:#f4f4f5;}
.ed-top{height:58px;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 18px;background:#1A1A1A;color:#fff;position:sticky;top:0;z-index:10;}
.ed-brand{font-weight:800;letter-spacing:.01em;font-size:.95rem;}
.ed-brand b{color:#FF6600;}
.ed-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ed-seg{display:flex;border:1px solid rgba(255,255,255,.22);border-radius:9px;overflow:hidden;margin-right:6px;}
.ed-seg button{background:transparent;color:rgba(255,255,255,.7);border:0;padding:7px 14px;font-size:.8rem;font-weight:600;cursor:pointer;}
.ed-seg button.on{background:#FF6600;color:#fff;}
.ed-btn{background:#2a2a2a;color:#fff;border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:8px 13px;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .2s,border-color .2s;}
.ed-btn:hover{background:#333;}
.ed-btn.primary{background:#FF6600;border-color:#FF6600;}
.ed-btn.primary:hover{background:#e55a00;}
.ed-btn.ghost{background:transparent;}
.ed-sel{background:#FF6600;color:#fff;border:1px solid #FF6600;border-radius:9px;padding:8px 12px;font-size:.82rem;font-weight:700;cursor:pointer;margin-right:4px;}
.ed-sel option{color:#161616;background:#fff;}
.ed-main{display:grid;grid-template-columns:430px 1fr;height:calc(100vh - 58px);}
.ed-form{overflow-y:auto;padding:14px;border-right:1px solid #e3e3e5;background:#fafafa;}
.ed-preview{position:relative;background:#e9e9eb;}
.ed-preview iframe{width:100%;height:100%;border:0;background:#fff;}
.panel{border:1px solid #e3e3e5;border-radius:12px;margin-bottom:10px;background:#fff;overflow:hidden;}
.panel-h{width:100%;display:flex;align-items:center;justify-content:space-between;background:#fff;border:0;padding:13px 15px;font-size:.92rem;font-weight:800;cursor:pointer;color:#161616;text-align:left;}
.panel-h:hover{background:#fafafa;}
.panel-chev{color:#FF6600;transition:transform .2s;font-size:.8rem;}
.panel.open .panel-chev{transform:rotate(90deg);}
.panel-b{display:none;padding:4px 15px 15px;}
.panel.open .panel-b{display:block;}
.f-field{margin:0 0 12px;}
.f-label{display:block;font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#777;margin:0 0 5px;}
.f-input{width:100%;border:1px solid #d8d8dc;border-radius:8px;padding:8px 10px;font-size:.86rem;font-family:inherit;color:#161616;background:#fff;}
.f-input:focus{outline:none;border-color:#FF6600;box-shadow:0 0 0 3px rgba(255,102,0,.12);}
.f-area{min-height:64px;resize:vertical;line-height:1.45;}
.f-check{width:18px;height:18px;accent-color:#FF6600;}
.f-thumb{display:none;max-width:100%;max-height:90px;margin-top:8px;border-radius:6px;border:1px solid #e3e3e5;object-fit:contain;}
.f-colorrow{display:flex;align-items:center;gap:7px;}
.f-colorrow .f-input{flex:1;}
.f-sw{width:42px;height:34px;padding:0;border:1px solid #d8d8dc;border-radius:7px;cursor:pointer;background:none;flex:0 0 auto;}
.f-qsw{width:24px;height:24px;border-radius:6px;border:1px solid #d8d8dc;cursor:pointer;flex:0 0 auto;padding:0;}
.f-sub{border:1px solid #ececee;border-radius:10px;padding:11px 12px;margin:0 0 12px;background:#fbfbfc;}
.f-sub-h{font-size:.74rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#FF6600;margin:0 0 9px;}
.f-arr{margin:0 0 12px;}
.f-arr-h{font-size:.74rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#555;margin:0 0 8px;}
.f-arr-item{border:1px solid #e8e8ea;border-radius:10px;padding:11px 12px;margin:0 0 9px;background:#fff;}
.f-arr-itemh{display:flex;align-items:center;justify-content:space-between;font-size:.76rem;font-weight:700;color:#999;margin:0 0 9px;}
.f-arr-ctrls{display:flex;gap:4px;}
.f-mini{width:24px;height:24px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:.8rem;line-height:1;color:#555;}
.f-mini:hover{background:#f3f3f3;}
.f-del:hover{background:#ffe8e0;border-color:#FF6600;color:#FF6600;}
.f-add{width:100%;border:1px dashed #c8c8cc;border-radius:8px;background:#fff;color:#FF6600;font-weight:700;font-size:.8rem;padding:9px;cursor:pointer;}
.f-add:hover{background:#fff6f1;border-color:#FF6600;}
.ed-hint{font-size:.74rem;color:#888;padding:2px 4px 12px;line-height:1.5;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#161616;color:#fff;padding:10px 18px;border-radius:10px;font-size:.84rem;font-weight:600;opacity:0;transition:opacity .25s;z-index:50;pointer-events:none;}
.toast.show{opacity:1;}
@media (max-width:820px){.ed-main{grid-template-columns:1fr;height:auto;}.ed-form{max-height:50vh;}.ed-preview{height:60vh;}}

</style>
</head>

const CSS = String.raw`/* ============================================================
   COMPASS OFFICES — Strategic Partnership deck.
   Editorial "investment prospectus, warmed by hospitality".
   Namespaced under .cov. Font inherited from the host theme.
   ============================================================ */
.cov{
  --orange:#FF6600;
  --orange-dk:#E55A00;
  --tint:#FFF1E6;
  --tint-2:#FFD9BD;
  --ink:#161616;
  --slate:#5E5E5E;
  --mute:#8A8A8A;
  --paper:#FFFFFF;
  --linen:#FAF8F5;
  --char:#1A1A1A;
  --char-2:#232323;
  --navy:#1E3340;
  --navy-tint:#EAF0F2;
  --line:rgba(0,0,0,.13);
  --line-soft:rgba(0,0,0,.07);
  --line-d:rgba(255,255,255,.16);
  --mono:inherit;
  --max:1200px;
  color:var(--ink);
  line-height:1.55;
  font-variant-numeric:tabular-nums;
  font-family:inherit;
  background:var(--paper);
}
.cov *,.cov *::before,.cov *::after{box-sizing:border-box;}
.cov p{margin:0 0 1rem;color:var(--slate);font-size:1.05rem;}
.cov img{max-width:100%;display:block;}
.cov a{color:inherit;}
.cov .wrap{max-width:var(--max);margin:0 auto;padding:0 32px;width:100%;}
.cov .sec{padding:92px 0;position:relative;}
.cov .sec.linen{background:var(--linen);}
.cov .sec.dark{background:var(--char);color:#fff;}

/* ---- running prospectus index (the signature) ---------------- */
.cov .kick{display:flex;align-items:center;gap:13px;margin:0 0 30px;}
.cov .kick .glyph{flex:0 0 auto;width:19px;height:17px;fill:var(--orange);display:block;}
.cov .kick .no{font-family:var(--mono);font-size:.84rem;font-weight:600;letter-spacing:.1em;color:var(--ink);}
.cov .kick .tick{width:26px;height:2px;background:var(--orange);border-radius:2px;}
.cov .kick .nm{font-family:var(--mono);font-size:.7rem;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--mute);}
.cov .dark .kick .no{color:#fff;}
.cov .dark .kick .nm{color:rgba(255,255,255,.62);}

/* ---- shared type ------------------------------------------- */
.cov h2{font-size:clamp(2.05rem,4.6vw,3.35rem);line-height:1.03;letter-spacing:-.025em;font-weight:800;margin:0 0 22px;color:var(--ink);}
.cov .dark h2{color:#fff;}
.cov h2 .o{color:var(--orange);}
.cov h3{font-size:1.32rem;font-weight:800;letter-spacing:-.01em;margin:0;color:var(--ink);}
.cov .lead{font-size:clamp(1.05rem,1.5vw,1.22rem);line-height:1.6;color:var(--slate);max-width:48ch;}
.cov .fp .lead,.cov .eco .lead{max-width:none;}
.cov .dark .lead{color:rgba(255,255,255,.78);}
.cov .eyebrow{font-family:var(--mono);font-size:.72rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--orange);margin:0 0 16px;}

/* chevron-A bullet list */
.cov .alist{list-style:none;margin:0;padding:0;}
.cov .shift .alist li{border-bottom:1px solid var(--line-soft);padding-bottom:13px;margin-bottom:13px;}
.cov .shift .alist li:last-child{border-bottom:0;padding-bottom:0;margin-bottom:0;}
.cov .alist li{position:relative;padding:0 0 0 26px;margin:0 0 11px;color:var(--slate);font-size:1.02rem;line-height:1.5;}
.cov .alist li::before{content:"";position:absolute;left:0;top:.42em;width:13px;height:11px;
  background:var(--orange);-webkit-mask:var(--av) center/contain no-repeat;mask:var(--av) center/contain no-repeat;}
.cov{--av:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 44'><polygon points='49.16 43.29 35.89 43.29 25.44 24.54 14.61 43.29 .84 43.29 25.44 .74 49.16 43.29'/></svg>");}
.cov .dark .alist li{color:rgba(255,255,255,.8);}

/* reveal */
.cov .rv{opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);}
.cov .rv.in{opacity:1;transform:none;}

/* ---- image placeholder (swaps to <img> when a URL is supplied) ---- */
.cov .ph{position:relative;width:100%;height:100%;border-radius:16px;overflow:hidden;background:var(--linen);
  border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;}
.cov .ph.cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.cov .ph .ph-in{display:flex;flex-direction:column;align-items:center;gap:9px;text-align:center;padding:22px;}
.cov .ph .ph-glyph{width:26px;height:23px;fill:var(--tint-2);}
.cov .ph .ph-lab{font-family:var(--mono);font-size:.7rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);}
.cov .ph .ph-dim{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;color:var(--tint-2);}
.cov .ph.dark{background:var(--char-2);border-color:rgba(255,255,255,.1);}
.cov .ph.dark .ph-glyph{fill:rgba(255,255,255,.2);}
.cov .ph.dark .ph-lab{color:rgba(255,255,255,.5);}
.cov .ph.dark .ph-dim{color:rgba(255,255,255,.22);}

/* =========================================================================
   HERO  (dark bookend)
   ========================================================================= */
.cov .hero{position:relative;overflow:hidden;background:var(--char);color:#fff;padding:0;}
.cov .hero .hero-grid{display:grid;grid-template-columns:1.2fr .8fr;min-height:clamp(560px,86vh,860px);}
.cov .hero .hero-copy{display:flex;flex-direction:column;justify-content:center;padding:clamp(72px,11vh,150px) clamp(32px,5vw,90px) clamp(56px,8vh,104px);position:relative;z-index:2;}
.cov .hero .hero-brand{display:flex;align-items:center;gap:11px;margin-bottom:auto;padding-top:8px;}
.cov .hero .hero-brand .glyph{width:30px;height:26px;}
.cov .hero .hero-brand .glyph polygon{fill:var(--orange);}
.cov .hero .hero-brand .wm{font-weight:800;font-size:.84rem;letter-spacing:.16em;line-height:1.05;text-transform:uppercase;color:#fff;}
.cov .hero .hero-tag{font-family:var(--mono);font-size:.74rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);margin:0 0 22px;}
.cov .hero h1{font-size:clamp(2.5rem,5.4vw,4.6rem);line-height:1.0;letter-spacing:-.035em;font-weight:800;margin:0 0 26px;color:#fff;max-width:16ch;}
.cov .hero h1 .o{color:var(--orange);}
.cov .hero .hero-sub{font-size:clamp(1rem,1.4vw,1.18rem);color:rgba(255,255,255,.74);max-width:40ch;margin:0 0 40px;line-height:1.55;}
.cov .hero .hero-foot{margin-top:clamp(34px,5vh,56px);display:flex;align-items:flex-start;gap:clamp(12px,1.5vw,22px);flex-wrap:wrap;padding-top:clamp(26px,3.4vh,40px);border-top:1px solid rgba(255,255,255,.16);}
.cov .hero .hero-foot .stat{display:flex;flex-direction:column;gap:7px;}
.cov .hero .hero-foot .stat b{display:flex;align-items:flex-start;font-size:clamp(3.2rem,5.8vw,6rem);font-weight:800;color:#fff;letter-spacing:-.04em;line-height:.9;}
.cov .hero .hero-foot .stat b .pls{color:var(--orange);font-size:.5em;font-weight:800;line-height:1.2;margin-left:2px;}
.cov .hero .hero-foot .stat>span{font-size:.74rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.6);}
.cov .hero .hero-foot .div{align-self:stretch;width:1px;background:rgba(255,255,255,.16);margin:2px 0;}
.cov .hero .hero-media{position:relative;}
.cov .hero .hero-media .ph{border-radius:0;border:0;}
.cov .hero .hero-media::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(90deg,var(--char) 0%,rgba(26,26,26,.0) 18%);}

/* =========================================================================
   SHIFT — the case for flexibility (evidence cards)
   ========================================================================= */
.cov .shift .shift-grid{display:grid;grid-template-columns:.92fr 1.28fr;gap:clamp(34px,4vw,68px);align-items:stretch;}
.cov .shift .shift-right{display:flex;flex-direction:column;}
.cov .shift .shift-media{position:relative;margin-top:clamp(18px,2.4vh,28px);flex:1 1 auto;min-height:300px;border-radius:16px;overflow:hidden;}
.cov .shift .shift-vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;background:var(--linen);}
.cov .shift .shift-media .ph{height:100%;}
.cov .shift .shift-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.cov .shift-card{border:1px solid var(--line);border-radius:16px;padding:24px 22px;background:var(--paper);display:flex;flex-direction:column;gap:14px;transition:transform .35s cubic-bezier(.2,.7,.2,1),box-shadow .35s;}
.cov .shift-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(20,22,28,.09);}
.cov .shift-card .ic{width:34px;height:34px;border-radius:9px;background:var(--tint);display:flex;align-items:center;justify-content:center;}
.cov .shift-card .ic svg{width:19px;height:19px;stroke:var(--orange-dk);fill:none;stroke-width:1.8;}
.cov .shift-card .big{font-size:2.5rem;font-weight:800;letter-spacing:-.03em;line-height:1;color:var(--ink);}
.cov .shift-card .big .u{font-size:1.1rem;color:var(--orange);font-weight:700;margin-left:2px;}
.cov .shift-card .ttl{font-family:var(--mono);font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);}
.cov .shift-card p{font-size:.92rem;margin:0;color:var(--slate);line-height:1.5;}
.cov .shift .src{font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin-top:20px;}

/* =========================================================================
   HOST — landlord to host (split + value rows)
   ========================================================================= */
.cov .host .host-grid{display:grid;grid-template-columns:1.02fr .98fr;gap:clamp(34px,4vw,72px);align-items:center;}
.cov .host .host-media{aspect-ratio:4/5;}
.cov .host .arrow{display:inline-flex;align-items:center;gap:12px;font-weight:800;font-size:1.04rem;letter-spacing:-.01em;color:var(--ink);margin:6px 0 28px;}
.cov .host .arrow .from{color:var(--mute);text-decoration:line-through;text-decoration-color:var(--tint-2);}
.cov .host .arrow svg{width:26px;height:14px;stroke:var(--orange);fill:none;stroke-width:2;}
.cov .host .arrow .to{color:var(--orange);}
.cov .vrow{display:grid;grid-template-columns:38px 1fr;gap:16px;padding:20px 0;border-top:1px solid var(--line-soft);}
.cov .vrow:last-child{border-bottom:1px solid var(--line-soft);}
.cov .vrow .vi{width:38px;height:38px;border-radius:10px;background:var(--linen);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;}
.cov .vrow .vi svg{width:20px;height:20px;stroke:var(--ink);fill:none;stroke-width:1.7;}
.cov .vrow .vt{font-family:var(--mono);font-size:.68rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);margin:0 0 5px;}
.cov .vrow p{margin:0;font-size:1rem;color:var(--slate);line-height:1.5;}

/* =========================================================================
   SOLUTION — big statement
   ========================================================================= */
.cov .solution{background:var(--linen);}
.cov .solution .sol-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:clamp(34px,4vw,76px);align-items:center;}
.cov .solution h2{font-size:clamp(2.2rem,4.9vw,3.8rem);max-width:15ch;}
.cov .solution .sol-media{aspect-ratio:5/6;}
.cov .solution .tags{display:flex;flex-wrap:wrap;gap:9px;margin:28px 0 0;}
.cov .solution .tags span{font-family:var(--mono);font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);border:1px solid var(--line);border-radius:999px;padding:8px 15px;background:var(--paper);}

/* =========================================================================
   ECOSYSTEM — product cards
   ========================================================================= */
.cov .eco .eco-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:8px;}
.cov .eco-card{border:1px solid var(--line);border-radius:16px;padding:26px 24px;background:var(--paper);display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.2,.7,.2,1),box-shadow .35s,border-color .35s;}
.cov .eco-card:hover{transform:translateY(-6px);box-shadow:0 18px 44px rgba(20,22,28,.1);border-color:var(--tint-2);}
.cov .eco-card.wide{grid-column:span 4;flex-direction:row;align-items:center;gap:26px;background:var(--ink);border-color:var(--ink);}
.cov .eco-card .eic{width:46px;height:46px;border-radius:12px;background:var(--tint);display:flex;align-items:center;justify-content:center;margin-bottom:20px;flex:0 0 auto;}
.cov .eco-card .eic svg{width:24px;height:24px;stroke:var(--orange-dk);fill:none;stroke-width:1.7;}
.cov .eco-card.wide .eic{margin-bottom:0;width:54px;height:54px;background:rgba(255,255,255,.1);}
.cov .eco-card.wide .eic svg{stroke:var(--orange);}
.cov .eco-card h3{margin:0 0 9px;font-size:1.16rem;}
.cov .eco-card.wide h3{color:#fff;font-size:1.3rem;}
.cov .eco-card p{font-size:.94rem;margin:0;color:var(--slate);line-height:1.5;}
.cov .eco-card.wide>div:not(.eic){flex:1;}
.cov .eco-card.wide p{color:rgba(255,255,255,.74);max-width:none;text-wrap:balance;}
.cov .eco-card .num{font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;color:var(--mute);margin-bottom:auto;}

/* =========================================================================
   PERKS — partner privileges (three category columns)
   ========================================================================= */
.cov .perks{background:var(--linen);}
.cov .perks .perk-head{max-width:none;margin-bottom:34px;}
.cov .perks .perk-head .lead{max-width:62rem;text-wrap:balance;}

/* =========================================================================
   2) PAGE JS  (reveal, count-up, region tabs)  — content-agnostic
   ========================================================================= */
const JS = String.raw`(function(){
  var root=document.querySelector('.cov'); if(!root) return;
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  /* reveal on scroll */
  var rvs=[].slice.call(root.querySelectorAll('.rv'));
  if(reduce||!('IntersectionObserver'in window)){ rvs.forEach(function(e){e.classList.add('in');}); }
  else{
    var io=new IntersectionObserver(function(es){es.forEach(function(en){if(en.isIntersecting){en.target.classList.add('in');io.unobserve(en.target);}});},{rootMargin:'0px 0px -8% 0px',threshold:.12});
    rvs.forEach(function(e){io.observe(e);});
  }

  /* count-up for [data-count] (keeps prefix/suffix text) */
  function animate(el){
    var target=parseFloat(el.getAttribute('data-count')); if(isNaN(target)) return;
    var pre=el.getAttribute('data-pre')||'', suf=el.getAttribute('data-suf')||'';
    if(reduce){ el.textContent=pre+target+suf; return; }
    var dur=1100,t0=null;
    function step(ts){ if(!t0)t0=ts; var p=Math.min(1,(ts-t0)/dur); var e=1-Math.pow(1-p,3);
      var val=Math.round(target*e); el.textContent=pre+val+suf; if(p<1)requestAnimationFrame(step); }
    requestAnimationFrame(step);
  }
  var nums=[].slice.call(root.querySelectorAll('[data-count]'));
  if(!('IntersectionObserver'in window)){ nums.forEach(animate); }
  else{
    var io2=new IntersectionObserver(function(es){es.forEach(function(en){if(en.isIntersecting){animate(en.target);io2.unobserve(en.target);}});},{threshold:.6});
    nums.forEach(function(e){io2.observe(e);});
  }

  /* region tabs (locations) */
  [].slice.call(root.querySelectorAll('.loc')).forEach(function(scope){
    var tabs=[].slice.call(scope.querySelectorAll('.loc-tab'));
    var panels=[].slice.call(scope.querySelectorAll('.loc-panel'));
    if(!tabs.length) return;
    tabs.forEach(function(tab){
      tab.addEventListener('click',function(){
        var k=tab.getAttribute('data-region');
        tabs.forEach(function(t){t.classList.toggle('on',t===tab);});
        panels.forEach(function(p){p.classList.toggle('on',p.getAttribute('data-region')===k);});
      });
    });
  });

  /* APAC geo-map — hover / tap a city to show its floor count */
  [].slice.call(root.querySelectorAll('.netmap-wrap')).forEach(function(mwrap){
    var tip=mwrap.querySelector('#covTip'); if(!tip) return;
    var floorWord=mwrap.getAttribute('data-floor')||'floor';
    var floorsWord=mwrap.getAttribute('data-floors')||'floors';
    var ge=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
    var showTip=function(pin){
      var nm=pin.getAttribute('data-name')||'', f=pin.getAttribute('data-floors')||'0';
      var unit=(f==='1')?floorWord:floorsWord;
      tip.innerHTML=ge(nm)+' &middot; <b>'+ge(f)+' '+unit+'</b>';
      var hit=pin.querySelector('.mp-hit')||pin;
      var pr=hit.getBoundingClientRect(), wr=mwrap.getBoundingClientRect();
      var cx=pr.left+pr.width/2-wr.left, cy=pr.top+pr.height/2-wr.top;
      tip.style.left=cx+'px'; tip.style.top=cy+'px';
      tip.classList.toggle('below', cy<66); tip.hidden=false;
    };
    var hideTip=function(){tip.hidden=true;};
    mwrap.querySelectorAll('.mp-pin').forEach(function(pin){
      pin.addEventListener('mouseenter',function(){showTip(pin);});
      pin.addEventListener('mouseleave',hideTip);
      pin.addEventListener('focus',function(){showTip(pin);});
      pin.addEventListener('blur',hideTip);
      pin.addEventListener('click',function(e){e.stopPropagation();showTip(pin);});
      pin.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();showTip(pin);}});
    });
    document.addEventListener('click',hideTip);
    window.addEventListener('resize',hideTip);
  });
})();`;

/* ---- APAC geo-map: real landmass + floor-count pins (mirrors the overview) ----
   data schema {W,H,a,b,c,e,d}; projection PX=a*lng+b, PY=c*lat+e.
   A user-supplied apac.json / apac-portrait.json (uploads or build dir) overrides
   the bundled default, so you can drop in your exact overview map files. */
function loadMap(name){
  var paths=['/mnt/user-data/uploads/'+name, __dirname+'/'+name, '/home/claude/'+name];
  for(var i=0;i<paths.length;i++){ try{ return JSON.parse(fs.readFileSync(paths[i],'utf8')); }catch(e){} }
  return null;
}
var WMAP=__MAPS.apac;
var WMAP_M=__MAPS.portrait||WMAP;
function buildMapSVG(M, cls, fzDiv, cities){
  if(!M) return '';
  var W=M.W,H=M.H,fz=Math.round(W/fzDiv);
  var fls=cities.map(function(c){return Number(c.floors)||0;});
  var maxF=fls.length?Math.max.apply(null,fls):1; if(!maxF)maxF=1;
  function PX(c){return M.a*(Number(c.lng)||0)+M.b;}
  function PY(c){return M.c*(Number(c.lat)||0)+M.e;}
  var hub=cities[0]; cities.forEach(function(c){if(/hong kong/i.test(c.name))hub=c;});
  var lines='',pins='';
  if(hub){var hx=PX(hub),hy=PY(hub);
    cities.forEach(function(c){if(c===hub)return; lines+='<line x1="'+hx.toFixed(1)+'" y1="'+hy.toFixed(1)+'" x2="'+PX(c).toFixed(1)+'" y2="'+PY(c).toFixed(1)+'" class="mp-line"/>';});
  }
  cities.forEach(function(c,i){
    var x=PX(c),y=PY(c),f=Number(c.floors)||0,r=(5+(f/maxF)*8),lp=(c.lp||'r');
    var lx=x,ly=y,anc='start';
    if(lp==='l'){lx=x-r-8;ly=y+fz*0.34;anc='end';}
    else if(lp==='t'){lx=x;ly=y-r-8;anc='middle';}
    else if(lp==='b'){lx=x;ly=y+r+fz+2;anc='middle';}
    else {lx=x+r+8;ly=y+fz*0.34;anc='start';}
    var tw=String(c.name).length*fz*0.56;
    if(anc==='end' && (lx-tw)<6){ lx=x+r+8; anc='start'; }
    else if(anc==='start' && (lx+tw)>W-6){ lx=x-r-8; anc='end'; }
    if(anc==='middle'){ if(lx-tw/2<6) lx=tw/2+6; else if(lx+tw/2>W-6) lx=W-6-tw/2; }
    pins+='<g class="mp-pin" tabindex="0" role="button" data-name="'+escAttr(c.name)+'" data-floors="'+escAttr(String(f))+'" aria-label="'+escAttr(c.name+', '+f+' floors')+'" style="--d:'+(i*0.13).toFixed(2)+'s">'
      +'<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+r.toFixed(1)+'" class="mp-ring"/>'
      +'<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+r.toFixed(1)+'" class="mp-dot"/>'
      +'<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="'+anc+'" class="mp-label" style="font-size:'+fz+'px">'+esc(c.name)+'</text>'
      +'<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(r+12).toFixed(1)+'" class="mp-hit"/>'
      +'</g>';
  });
  return '<svg class="netmap '+cls+'" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Compass Offices locations across Asia Pacific">'
    +'<path class="mp-land" d="'+M.d+'"/><g class="mp-lines">'+lines+'</g>'+pins+'</svg>';
}
function mapSVG(cities, hint){
  cities=cities||[];
  return '<div class="netmap-wrap rv" data-floor="floor" data-floors="floors">'
    + buildMapSVG(WMAP, 'netmap-d', 42, cities)
    + buildMapSVG(WMAP_M, 'netmap-m', 32, cities)
    + '<div class="mp-vig" aria-hidden="true"></div>'
    + '<div class="mp-tip" id="covTip" hidden></div><div class="mp-hint">'+esc(hint||'Tap a city for floor count')+'</div></div>';
}

/* placeholder that swaps to an <img> when src is set */
function ph(src,label,dim,dark){
  var inner;
  if(src){ inner='<img src="'+escAttr(src)+'" alt="'+escAttr(label||'')+'">'; }
  else{
    inner='<div class="ph-in">'+GLYPH.replace('class="glyph"','class="ph-glyph"')
      +'<span class="ph-lab">'+esc(label||'Image')+'</span>'
      +(dim?'<span class="ph-dim">'+esc(dim)+'</span>':'')+'</div>';
  }
  return '<div class="ph'+(src?' cover':'')+(dark?' dark':'')+'">'+inner+'</div>';
}
/* small logo cell (perks / customers) */
function logoCell(src,name){
  if(src) return '<img src="'+escAttr(src)+'" alt="'+escAttr(name||'')+'">';
  return '<span>'+esc(name||'')+'</span>';
}
function kick(no,nm){
  return '<div class="kick rv">'+GLYPH+'<span class="no">'+esc(no)+'</span><span class="tick"></span><span class="nm">'+esc(nm)+'</span></div>';
}

  /* ---- PERKS ---- */
  (function(){

      }).join('');
      return '<div class="perk-col"><div class="pc-head"><div class="pc-ic">'+icon(col.icon)+'</div><div class="pc-t">'+esc(col.t)+'</div></div>'+items+'</div>';
    }).join('');
    var html='<section class="sec perks" data-key="perks"><div class="wrap">'
      +kick('06','Perks')
      +'<div class="perk-head rv"><div class="eyebrow">'+esc(p.eyebrow)+'</div><h2>'+hl(p.h2)+'</h2><p class="lead">'+esc(p.lead)+'</p></div>'
      +'<div class="perk-cols rv">'+cols+'</div>'
      +'</div></section>';
    P.push({key:'perks',dark:false,html:html});
  })();

  /* ---- FOOTPRINT ---- */
  (function(){
    var f=S.footprint;
    var stats=(f.stats||[]).map(function(s){
      var n=esc(s.n).replace('+','<span class="pls">+</span>');
      return '<div class="stat-card '+(s.style||'')+'"><b>'+n+'</b><span>'+esc(s.l)+'</span></div>';
    }).join('');
    var html='<section class="sec fp" data-key="footprint"><div class="wrap">'
      +kick('07','Footprint')
      +'<div class="rv"><h2>'+hl(f.h2)+'</h2><p class="lead">'+esc(f.lead)+'</p></div>'
      +'<div class="fp-grid rv">'

        +'<div class="fp-stats">'+stats+'</div>'
      +'</div></div></section>';
    P.push({key:'footprint',dark:false,html:html});
  })();

  /* ---- PERFORMANCE ---- */
  (function(){
    var pf=S.performance;
    var mets=(pf.metrics||[]).map(function(m){
      return '<div class="pmet'+(m.hero?' hero-m':'')+'"><b data-count="'+escAttr(m.v)+'" data-suf="'+escAttr(m.suf||'')+'">0'+esc(m.suf||'')+'</b>'
        +'<div class="pl">'+esc(m.l)+'</div><div class="sub">'+esc(m.sub)+'</div></div>';
    }).join('');
    var html='<section class="sec perf" data-key="performance"><div class="wrap">'
      +kick('08','Performance')
      +'<div class="perf-grid">'
        +'<div class="rv"><div class="head-2">'+hl(pf.head)+'</div><p class="perf-lead">'+esc(pf.lead)+'</p></div>'
        +'<div class="pmetrics rv">'+mets+'</div>'
      +'</div></div></section>';

  /* ---- CUSTOMERS ---- */
  (function(){

      ? '<div class="cust-figure rv"><img src="'+escAttr(c.logoImage)+'" alt="Compass Offices clients"></div>'

      +'<div class="cust-grid">'
        +'<div class="rv"><h2>'+hl(c.h2)+'</h2><p class="lead">'+esc(c.lead)+'</p></div>'
        + fig
      +'</div></div></section>';
    P.push({key:'customers',dark:false,html:html});
  })();

  /* ---- LOCATIONS (region tabs) ---- */
  (function(){
    var L=S.locations;
    var tabs=(L.regions||[]).map(function(r,i){
      return '<button class="loc-tab'+(i===0?' on':'')+'" type="button" data-region="'+escAttr(r.key)+'">'+esc(r.tab)+'</button>';
    }).join('');
    var panels=(L.regions||[]).map(function(r,i){
      var blds='<div class="loc-blds">'+(r.buildings||[]).map(function(b){return '<div class="b">'+esc(b)+'</div>';}).join('')+'</div>';
      var photos=(r.photos||['','','']);

      +kick('10','Locations')
      +'<div class="rv"><h2>'+hl(L.h2)+'</h2></div>'
      +'<div class="loc-tabs rv">'+tabs+'</div>'
      +'<div class="rv">'+panels+'</div>'
      +'</div></section>';
    P.push({key:'locations',dark:false,html:html});
  })();

  /* ---- PARTNERSHIP (closing) ---- */
  (function(){
    var p=S.partnership, co=S.contact||{};
    var pts=(p.points||[]).map(function(x){
      return '<div class="ptp">'+icon(x.icon)+'<div><div class="ptt">'+esc(x.t)+'</div><div class="ptd">'+esc(x.d)+'</div></div></div>';
    }).join('');
    var contact=co.email?'<p class="deck-contact">'+esc(co.text)+' <a href="mailto:'+escAttr(co.email)+'">'+esc(co.email)+'</a></p>':'';
    var html='<section class="pt sec" data-key="partnership"><div class="wrap"><div class="pt-grid">'
      +'<div class="rv"><div class="pt-tag">'+esc(p.tag)+'</div><h2>'+hl(p.h2)+'</h2>'

        +'<a class="pt-cta" href="'+escAttr(p.ctaHref)+'">'+esc(p.cta)+chevR('#fff')+'</a></div>'
      +'<div class="rv"><div class="pt-points">'+pts+'</div>'+contact+'</div>'
      +'</div></div></section>';
    P.push({key:'partnership',dark:true,html:html});
  })();

  return P;
}

function gen(S){
  return '<div class="cov">'+sectionParts(S).map(function(p){return p.html;}).join('')+'</div>';
}

/* =========================================================================
   6) SLIDESHOW  — wrap each section as a full slide + chrome
   ========================================================================= */
function genDeck(S){
  var ps=sectionParts(S);
  var SL=(S.ui&&S.ui.slideLabels)||{};
  var slides=ps.map(function(o,i){
    return '<div class="slide'+(o.dark?' dark':'')+(i===0?' active':'')+'" data-key="'+o.key+'" data-label="'+escAttr(SL[o.key]||'')+'">'+o.html+'</div>';
  }).join('');
  var hint=(S.ui&&S.ui.deckHint)||'';
  return '<div class="cov cov-deck at-hero'+(ps.length&&ps[0].dark?' on-dark':'')+'">'
    +'<div class="deck-bar"><i id="covProg"></i></div>'
    +'<div class="deck-count"><span id="covCur">01</span><i>/</i><span id="covTot">'+ps.length+'</span></div>'
    +'<button class="deck-fs" id="covFs" type="button" aria-label="View full screen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>'
    +'<div class="deck-track" id="covTrack">'+slides+'</div>'
    +'<button class="deck-nav prev" id="covPrev" aria-label="Previous slide">'+chevL()+'</button>'
    +'<button class="deck-nav next" id="covNext" aria-label="Next slide">'+chevR()+'</button>'
    +'<div class="deck-dots" id="covDots"></div>'
    +'<div class="deck-hint" id="covHint">'+esc(hint)+'</div>'
    +'</div>';
}

/* ---- deck chrome JS (identical mechanics to the overview deck) ---- */
const JS_DECK = String.raw`(function(){
  var deck=document.querySelector('.cov-deck'); if(!deck) return;
  if(window.matchMedia && window.matchMedia('(max-width:768px)').matches){ return; }
  var track=deck.querySelector('#covTrack'); if(!track) return;
  var slides=Array.prototype.slice.call(track.children), n=slides.length, idx=0;
  var prog=deck.querySelector('#covProg'), cur=deck.querySelector('#covCur'),
      prev=deck.querySelector('#covPrev'), next=deck.querySelector('#covNext'),
      dotsWrap=deck.querySelector('#covDots'), hint=deck.querySelector('#covHint'),
      fsBtn=deck.querySelector('#covFs');
  function pad(i){ return (i+1<10?'0':'')+(i+1); }
  var dots=slides.map(function(s,i){
    var key=s.getAttribute('data-key')||'';
    var label=(s.getAttribute('data-label')||'').trim()||(key?key.charAt(0).toUpperCase()+key.slice(1):'Slide '+(i+1));
    var b=document.createElement('button'); b.type='button';
    b.setAttribute('data-label',label); b.setAttribute('aria-label','Go to: '+label);
    b.addEventListener('click',function(){ dismissHint(); go(i); }); dotsWrap.appendChild(b); return b;
  });
  function update(){
    track.style.transform='translateX('+(-idx*100)+'%)';
    if(prog) prog.style.width=((idx+1)/n*100)+'%';
    if(cur) cur.textContent=pad(idx);
    dots.forEach(function(d,i){ d.classList.toggle('on',i===idx); });
    if(prev) prev.disabled=(idx===0);
    if(next) next.disabled=(idx===n-1);
    deck.classList.toggle('on-dark', slides[idx].classList.contains('dark'));
    deck.classList.toggle('at-hero', idx===0);
    slides.forEach(function(s,i){ s.classList.toggle('active',i===idx); if(i!==idx) s.scrollTop=0; });
  }
  function go(i){ idx=Math.max(0,Math.min(n-1,i)); update(); }
  function nextS(){ go(idx+1); } function prevS(){ go(idx-1); }
  function dismissHint(){ if(hint){ hint.classList.add('gone'); } }
  if(next) next.addEventListener('click',function(){ dismissHint(); nextS(); });
  if(prev) prev.addEventListener('click',function(){ dismissHint(); prevS(); });
  function deckInView(){
    if(document.fullscreenElement===deck||document.webkitFullscreenElement===deck) return true;
    var r=deck.getBoundingClientRect(), vh=window.innerHeight||document.documentElement.clientHeight;
    return r.top<vh*0.5 && r.bottom>vh*0.5;
  }
  document.addEventListener('keydown',function(e){
    if(e.key!=='ArrowLeft'&&e.key!=='ArrowRight') return;
    if(!deckInView()) return;
    e.preventDefault(); dismissHint();
    if(e.key==='ArrowRight') nextS(); else prevS();
  });
  var sx=0,sy=0,on=false;
  deck.addEventListener('touchstart',function(e){ var t=e.touches[0]; sx=t.clientX; sy=t.clientY; on=true; },{passive:true});
  deck.addEventListener('touchend',function(e){
    if(!on) return; on=false;
    var t=e.changedTouches[0], dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.5){ dismissHint(); if(dx<0) nextS(); else prevS(); }
  },{passive:true});
  var EXPAND='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>';
  var SHRINK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h3a2 2 0 0 0 2-2V3M16 3v3a2 2 0 0 0 2 2h3M21 16h-3a2 2 0 0 0-2 2v3M8 21v-3a2 2 0 0 0-2-2H3"/></svg>';
  function isFs(){ return document.fullscreenElement===deck||document.webkitFullscreenElement===deck; }
  function syncFs(){ if(fsBtn){ fsBtn.innerHTML=isFs()?SHRINK:EXPAND; fsBtn.setAttribute('aria-label',isFs()?'Exit full screen':'View full screen'); } }
  if(fsBtn){
    fsBtn.addEventListener('click',function(){
      if(isFs()){ (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document); }
      else { (deck.requestFullscreen||deck.webkitRequestFullscreen||function(){}).call(deck); }
    });
    document.addEventListener('fullscreenchange',function(){ syncFs(); update(); });
    document.addEventListener('webkitfullscreenchange',function(){ syncFs(); update(); });
    syncFs();
  }
  window.addEventListener('resize',update);
  update();
})();`;

  function lbl(k){ return String(k).replace(/([A-Z])/g,' $1').replace(/[_\-]/g,' ').replace(/^./,function(m){return m.toUpperCase();}).trim(); }
  function isUrlKey(k){ return /image|logo|img|url|src|photo/i.test(k||''); }
  function isColorKey(k){ return /bg$|background|colou?r/i.test(k||''); }
  function isLong(v){ return typeof v==='string' && (v.length>54 || /\n/.test(v)); }
  function E(t,c,txt){ var e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e; }

  var formEl, prev, mode='page', tmr=null;
  function schedule(){ clearTimeout(tmr); tmr=setTimeout(render,350); }

  function primField(key, path){
    var v=getPath(path);
    var wrap=E('div','f-field');
    if(key!=null) wrap.appendChild(E('label','f-label',lbl(key)));
    if(typeof v==='boolean'){
      var cb=E('input','f-check'); cb.type='checkbox'; cb.checked=!!v;
      cb.addEventListener('change',function(){ setPath(path,cb.checked); schedule(); });
      wrap.appendChild(cb); return wrap;
    }
    var long=isLong(v);
    var color=isColorKey(key);
    var inp=E(long?'textarea':'input','f-input'+(long?' f-area':''));
    if(!long) inp.type='text';
    inp.value=(v==null?'':v);
    var thumb=null;
    if(!color && isUrlKey(key)){ thumb=E('img','f-thumb'); }
    function refl(){ if(thumb){ var u=inp.value.trim(); if(u){thumb.src=u;thumb.style.display='block';}else{thumb.style.display='none';} } }
    var sw=null;
    if(color){
      sw=E('input','f-sw'); sw.type='color';
      sw.value=/^#[0-9a-f]{6}$/i.test(inp.value)? inp.value : '#000000';
      sw.addEventListener('input',function(){ inp.value=sw.value; setPath(path,sw.value); schedule(); });
      inp.placeholder='#000000, black, or brand colour — blank = default';
    }
    inp.addEventListener('input',function(){
      var nv=inp.value;
      if(typeof v==='number' && nv!=='' && !isNaN(+nv)) nv=+nv;
      setPath(path,nv); refl(); if(sw && /^#[0-9a-f]{6}$/i.test(nv)) sw.value=nv; schedule();
    });
    if(color){
      var rowc=E('div','f-colorrow');
      ['#000000','#FFFFFF','#FF6600'].forEach(function(c){
        var q=E('button','f-qsw'); q.type='button'; q.style.background=c; q.title=c;
        q.addEventListener('click',function(){ inp.value=c; setPath(path,c); if(sw)sw.value=c; schedule(); });
        rowc.appendChild(q);
      });
      rowc.appendChild(sw); rowc.appendChild(inp);
      wrap.appendChild(rowc);
    } else {
      wrap.appendChild(inp);
      if(thumb){ refl(); wrap.appendChild(thumb); }
    }
    return wrap;
  }
  function objFields(obj, path){
    var frag=document.createDocumentFragment();
    Object.keys(obj).forEach(function(k){
      var val=obj[k], p=path.concat(k);
      if(Array.isArray(val)) frag.appendChild(arrField(k,p));
      else if(val && typeof val==='object') frag.appendChild(subObj(k,val,p));
      else frag.appendChild(primField(k,p));
    });
    return frag;
  }
  function subObj(key,obj,path){
    var box=E('div','f-sub'); box.appendChild(E('div','f-sub-h',lbl(key)));
    box.appendChild(objFields(obj,path)); return box;
  }
  function arrField(key,path){
    var arr=getPath(path);
    var box=E('div','f-arr'); box.appendChild(E('div','f-arr-h',lbl(key)));
    arr.forEach(function(item,i){
      var it=E('div','f-arr-item');
      var hd=E('div','f-arr-itemh');
      hd.appendChild(E('span','',lbl(key).replace(/s$/,'')+' '+(i+1)));
      var ctr=E('div','f-arr-ctrls');
      var up=E('button','f-mini','\u2191'); up.onclick=function(){ var a=getPath(path); if(i>0){var t=a[i-1];a[i-1]=a[i];a[i]=t;rebuild();schedule();} };
      var dn=E('button','f-mini','\u2193'); dn.onclick=function(){ var a=getPath(path); if(i<a.length-1){var t=a[i+1];a[i+1]=a[i];a[i]=t;rebuild();schedule();} };
      var rm=E('button','f-mini f-del','\u00d7'); rm.onclick=function(){ getPath(path).splice(i,1); rebuild(); schedule(); };
      ctr.appendChild(up); ctr.appendChild(dn); ctr.appendChild(rm); hd.appendChild(ctr); it.appendChild(hd);
      if(item && typeof item==='object') it.appendChild(objFields(item, path.concat(i)));
      else it.appendChild(primField(null, path.concat(i)));
      box.appendChild(it);
    });
    var add=E('button','f-add','+ Add '+lbl(key).replace(/s$/,''));
    add.onclick=function(){ var a=getPath(path); var tpl=a.length?(typeof a[a.length-1]==='object'?JSON.parse(JSON.stringify(a[a.length-1])):''):''; a.push(tpl); rebuild(); schedule(); };
    box.appendChild(add); return box;
  }
  function rebuild(){
    formEl.innerHTML='';
    formEl.appendChild(E('div','ed-hint','Edit any field below. The preview updates live. When done, click "Copy Slideshow HTML" and paste into one WordPress Custom HTML block.'));
    Object.keys(content).forEach(function(sec,idx){
      var panel=E('div','panel'+(idx===0?' open':''));
      var head=E('button','panel-h');
      head.appendChild(E('span','',lbl(sec)));
      head.appendChild(E('span','panel-chev','\u25b8'));
      head.onclick=function(){ panel.classList.toggle('open'); };
      var body=E('div','panel-b');
      var val=content[sec];
      if(Array.isArray(val)) body.appendChild(arrField(sec,[sec]));
      else if(val && typeof val==='object') body.appendChild(objFields(val,[sec]));
      else body.appendChild(primField(sec,[sec]));
      panel.appendChild(head); panel.appendChild(body); formEl.appendChild(panel);
    });
  }
  function standalone(){
    if(mode==='deck'){
      return '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">'+fontLink+'<style>html,body{margin:0;height:100%;overflow:hidden;}</style><style>'+deckCSS+'</style></head><body>'+genDeck(content)+'<script>'+deckJS+'<\/script></body></html>';
    }
    return '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">'+fontLink+'<style>'+CSS_ALL+'</style></head><body>'+gen(content)+'<script>'+JS+'<\/script></body></html>';
  }
  function render(){ prev.srcdoc=standalone(); }
  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},1600); }
  function copy(txt,msg){ navigator.clipboard.writeText(txt).then(function(){toast(msg);},function(){ var ta=E('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');toast(msg);}catch(e){toast('Copy failed');} document.body.removeChild(ta); }); }
  function dl(name,txt){ var b=new Blob([txt],{type:'text/html'}); var a=E('a'); a.href=URL.createObjectURL(b); a.download=name; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
  function exportDeck(){ return '<!-- Compass Offices - A Strategic Partnership SLIDESHOW. Paste into ONE WordPress Custom HTML block on a blank / full-width template, then VIEW THE PUBLISHED PAGE. -->\n'+safeBlock(deckCSS, genDeck(content), domReady(deckJS),'covCodeDeck'); }
  function exportPage(){ return '<!-- Compass Offices - A Strategic Partnership (scrolling page). Paste into ONE WordPress Custom HTML block, then VIEW THE PUBLISHED PAGE. -->\n'+safeBlock(CSS_ALL, gen(content), domReady(JS),'covCodePage'); }

  function loadGitHub(){
    if(!GH_JSON) return;
    function applyAll(j){ var any=false; if(j&&typeof j==='object'){ LANGS.forEach(function(l){ if(j[l[0]]){ store[l[0]]=j[l[0]]; any=true; } }); } return any; }
    fetch(GH_JSON+'content-all.json',{cache:'no-store'})
      .then(function(r){ return r.ok? r.json():null; }).catch(function(){ return null; })
      .then(function(all){
        var got=applyAll(all), done=0;
        LANGS.forEach(function(l){
          var code=l[0];
          fetch(GH_JSON+code+'.json',{cache:'no-store'})
            .then(function(r){ if(!r.ok) throw 0; return r.json(); })
            .then(function(j){ store[code]=j; got=true; })
            .catch(function(){})
            .then(function(){ if(++done===LANGS.length){ content=store[lang]; rebuild(); render(); toast(got? 'Loaded defaults from GitHub' : 'Using built-in defaults (no GitHub /json files yet)'); } });
        });
      });
  }

  function mount(){
    formEl=document.getElementById('form'); prev=document.getElementById('prev');
    var sel=document.getElementById('langSel');
    LANGS.forEach(function(l){ var o=E('option'); o.value=l[0]; o.textContent=l[1]; sel.appendChild(o); });
    sel.value=lang;
    sel.onchange=function(){ lang=sel.value; content=store[lang]; rebuild(); render(); toast('Editing '+sel.options[sel.selectedIndex].text); };
    document.getElementById('mPage').onclick=function(){ mode='page'; this.classList.add('on'); document.getElementById('mDeck').classList.remove('on'); render(); };
    document.getElementById('mDeck').onclick=function(){ mode='deck'; this.classList.add('on'); document.getElementById('mPage').classList.remove('on'); render(); };
    document.getElementById('copyDeck').onclick=function(){ copy(exportDeck(),lang.toUpperCase()+' Slideshow HTML copied — paste into a Custom HTML block'); };
    document.getElementById('copyPage').onclick=function(){ copy(exportPage(),lang.toUpperCase()+' Page HTML copied — paste into a Custom HTML block'); };
    document.getElementById('dl').onclick=function(){ var base=mode==='deck'?'compass-partnership-slideshow-inline-':'compass-partnership-inline-'; dl(base+lang+'.html', mode==='deck'?exportDeck():exportPage()); };
    document.getElementById('expJson').onclick=function(){ dl('compass-partnership-content-all.json', JSON.stringify(store,null,2)); };
    document.getElementById('impJson').onchange=function(e){ var f=e.target.files[0]; if(!f)return; var r=new FileReader(); r.onload=function(){ try{ var j=JSON.parse(r.result); if(j && (j.en||j.tc||j.sc||j.jp||j.vn)){ LANGS.forEach(function(l){ if(j[l[0]]) store[l[0]]=j[l[0]]; }); } else { store[lang]=j; } content=store[lang]; rebuild(); render(); toast('Content imported'); }catch(err){ toast('Invalid JSON'); } }; r.readAsText(f); };
    document.getElementById('reset').onclick=function(){ if(confirm('Reset the '+lang.toUpperCase()+' content to defaults?')){ store[lang]=JSON.parse(JSON.stringify(DEFAULT)); content=store[lang]; rebuild(); render(); } };
    rebuild(); render(); loadGitHub();
  }
  if(document.readyState!=='loading') mount(); else document.addEventListener('DOMContentLoaded',mount);
})();

</script>
</body>
</html>

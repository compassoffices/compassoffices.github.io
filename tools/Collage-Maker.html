<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compass Collage Maker</title>
  <link rel="icon" type="image/png" href="https://www.compassoffices.com/wp-content/uploads/2025/09/compassoffices-logo-web-2025_icon-o-scaled.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --orange:#ff6600;
      --orange-dark:#e55a00;
      --header-h:90px;
      --footer-h:64px;
      --sidebar-w:300px;
    }
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#fff;height:100dvh;overflow:hidden;}

    /* ── HEADER ── */
    .header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:#000;border-bottom:2px solid #333;display:flex;align-items:center;justify-content:center;gap:16px;z-index:200;padding:0 20px;}
    .logo{height:50px;}
    .title{font-size:1.4rem;font-weight:600;color:#fff;}

    /* ── LAYOUT ── */
    .app-body{position:fixed;top:var(--header-h);bottom:var(--footer-h);left:0;right:0;display:flex;}

    /* ── SIDEBAR ── */
    .sidebar{width:var(--sidebar-w);background:#1a1a1a;border-right:2px solid #333;overflow-y:auto;overflow-x:hidden;flex-shrink:0;padding-bottom:20px;}
    .sidebar::-webkit-scrollbar{width:4px;}
    .sidebar::-webkit-scrollbar-thumb{background:#444;border-radius:2px;}

    .section{padding:18px 16px;border-bottom:1px solid #2a2a2a;}
    .section-title{font-size:0.75rem;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}

    /* URL input */
    .url-row{display:flex;gap:6px;margin-bottom:10px;}
    .url-input{flex:1;padding:8px 10px;background:#2a2a2a;border:1px solid #444;border-radius:6px;color:#fff;font-size:0.82rem;min-width:0;}
    .url-input::placeholder{color:#666;}
    .url-input:focus{outline:none;border-color:var(--orange);}
    .add-url-btn{padding:8px 12px;background:var(--orange);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:0.78rem;white-space:nowrap;}
    .add-url-btn:hover{background:var(--orange-dark);}
    .url-error{color:#ff4444;font-size:0.72rem;margin-top:4px;display:none;}

    /* Upload zone */
    .upload-zone{border:2px dashed #555;border-radius:8px;padding:20px;text-align:center;background:#222;cursor:pointer;transition:.2s;margin-bottom:12px;}
    .upload-zone:hover,.upload-zone.dragover{border-color:var(--orange);background:#2a2a2a;}
    .upload-zone p{color:#aaa;font-size:0.82rem;margin-bottom:4px;}
    .upload-zone small{color:#666;font-size:0.72rem;}

    /* Image list */
    .image-list{display:flex;flex-direction:column;gap:8px;}
    .image-item{display:flex;align-items:center;background:#222;border-radius:6px;padding:7px;border:1px solid #333;cursor:grab;gap:8px;}
    .image-item:active{cursor:grabbing;}
    .image-thumb{width:36px;height:36px;object-fit:cover;border-radius:4px;flex-shrink:0;}
    .image-name{flex:1;font-size:0.75rem;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
    .img-actions{display:flex;gap:3px;flex-shrink:0;}
    .order-btn{background:#444;color:#fff;border:none;border-radius:3px;width:22px;height:22px;font-size:0.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .order-btn:hover{background:#666;}
    .order-btn:disabled{opacity:0.3;cursor:not-allowed;}
    .remove-btn{background:var(--orange);color:#fff;border:none;border-radius:3px;width:22px;height:22px;font-size:0.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .remove-btn:hover{background:var(--orange-dark);}
    .clear-btn{width:100%;padding:8px;background:#333;color:#aaa;border:none;border-radius:6px;cursor:pointer;font-size:0.8rem;margin-top:10px;display:none;}
    .clear-btn:hover{background:#444;}

    /* Layout buttons */
    .layout-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
    .layout-btn{padding:9px 8px;background:#222;color:#aaa;border:1px solid #444;border-radius:6px;cursor:pointer;font-size:0.8rem;font-weight:500;transition:.15s;}
    .layout-btn:hover{border-color:var(--orange);background:#2a2a2a;color:#fff;}
    .layout-btn.active{border-color:var(--orange);background:var(--orange);color:#fff;}

    /* Adjustments */
    .adj-panel{background:#1e1e1e;border-radius:6px;padding:12px;display:none;}
    .adj-panel.visible{display:block;}
    .adj-title{font-size:0.72rem;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
    .adj-item{margin-bottom:12px;}
    .adj-label{font-size:0.75rem;color:#aaa;margin-bottom:5px;display:block;}
    .adj-slider{width:100%;height:3px;background:#444;outline:none;-webkit-appearance:none;border-radius:2px;cursor:pointer;}
    .adj-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--orange);cursor:pointer;}
    .angle-btns{display:flex;flex-direction:column;gap:5px;}
    .angle-btn{padding:7px 10px;background:#2a2a2a;color:#aaa;border:1px solid #444;border-radius:5px;cursor:pointer;font-size:0.78rem;text-align:left;transition:.15s;}
    .angle-btn:hover{border-color:var(--orange);color:#fff;}
    .angle-btn.active{background:var(--orange);border-color:var(--orange);color:#fff;}

    /* Canvas settings */
    .preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
    .preset-btn{padding:8px 6px;background:#222;color:#aaa;border:1px solid #444;border-radius:6px;cursor:pointer;font-size:0.75rem;text-align:center;transition:.15s;line-height:1.3;}
    .preset-btn:hover{border-color:var(--orange);background:#2a2a2a;}
    .preset-btn.active{border-color:var(--orange);background:var(--orange);color:#fff;}
    .preset-btn small{display:block;font-size:0.65rem;opacity:0.8;}
    .custom-size{margin-top:10px;}
    .size-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .size-label{font-size:0.75rem;color:#888;width:14px;flex-shrink:0;}
    .size-val{font-size:0.72rem;color:var(--orange);width:36px;flex-shrink:0;text-align:right;}
    .size-num{width:52px;flex-shrink:0;background:#2a2a2a;border:1px solid #444;border-radius:5px;color:var(--orange);font-size:0.72rem;padding:3px 5px;text-align:center;outline:none;-moz-appearance:textfield;}
    .size-num::-webkit-inner-spin-button,.size-num::-webkit-outer-spin-button{-webkit-appearance:none;}
    .size-num:focus{border-color:var(--orange);}
    .size-slider{flex:1;height:3px;background:#444;outline:none;-webkit-appearance:none;border-radius:2px;cursor:pointer;}
    .size-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--orange);cursor:pointer;}
    .ratio-lock{display:flex;align-items:center;gap:6px;font-size:0.72rem;color:#888;margin-top:4px;}
    .ratio-lock input{accent-color:var(--orange);}

    /* ── CANVAS AREA ── */
    .canvas-area{flex:1;background:#111;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
    .canvas-area::before{content:'';position:absolute;inset:0;background-image:linear-gradient(#1a1a1a 1px,transparent 1px),linear-gradient(90deg,#1a1a1a 1px,transparent 1px);background-size:32px 32px;pointer-events:none;}

    .canvas-outer{position:relative;z-index:1;transform-origin:center center;flex-shrink:0;}
    .canvas-container{position:relative;border-radius:4px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.08);}
    #collageCanvas{display:block;}
    .canvas-overlay{position:absolute;top:0;left:0;pointer-events:none;z-index:10;}

    /* image boxes */
    .image-box{position:absolute;border:2px dashed rgba(255,102,0,0.6);background:rgba(255,102,0,0.04);cursor:grab;pointer-events:all;user-select:none;transition:background .15s;}
    .image-box:hover{background:rgba(255,102,0,0.08);}
    .image-box.selected{border-color:var(--orange);background:rgba(255,102,0,0.12);}
    .resize-handle{position:absolute;width:12px;height:12px;background:var(--orange);border:2px solid #fff;border-radius:50%;cursor:nw-resize;pointer-events:all;transform:translate(-50%,-50%);}

    /* zoom controls */
    .zoom-bar{position:absolute;bottom:20px;right:20px;display:flex;align-items:center;gap:6px;z-index:20;background:rgba(0,0,0,0.6);border:1px solid #444;border-radius:8px;padding:6px 10px;backdrop-filter:blur(4px);}
    .zoom-btn{width:28px;height:28px;background:transparent;color:#ccc;border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;}
    .zoom-btn:hover{color:#fff;background:rgba(255,102,0,0.4);}
    .zoom-label{font-size:0.72rem;color:#888;min-width:36px;text-align:center;}

    /* canvas hint */
    .canvas-hint{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);border:1px solid #333;border-radius:20px;padding:5px 14px;font-size:0.7rem;color:#888;z-index:20;white-space:nowrap;backdrop-filter:blur(4px);}

    /* ── STICKY FOOTER ── */
    .footer{position:fixed;bottom:0;left:0;right:0;height:var(--footer-h);background:#111;border-top:2px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:200;}
    .footer-info{font-size:0.78rem;color:#555;display:flex;gap:20px;}
    .footer-info span{display:flex;align-items:center;gap:5px;}
    .footer-info .dot{width:6px;height:6px;border-radius:50%;background:#333;display:inline-block;}
    .footer-info .dot.green{background:#22c55e;}
    .download-btn{display:flex;align-items:center;gap:9px;background:var(--orange);color:#fff;font-size:14px;font-weight:700;padding:12px 28px;border-radius:8px;border:none;cursor:pointer;transition:.15s;letter-spacing:.02em;}
    .download-btn:hover{background:var(--orange-dark);}
    .download-btn:active{transform:scale(0.97);}
    .download-btn:disabled{background:#444;cursor:not-allowed;transform:none;}
    .download-btn svg{width:16px;height:16px;flex-shrink:0;}

    /* btn util */
    .btn{padding:10px 16px;background:var(--orange);color:#fff;border:none;border-radius:6px;font-weight:600;cursor:pointer;transition:.15s;font-size:0.85rem;}
    .btn:hover{background:var(--orange-dark);}
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <img src="https://www.compassoffices.com/wp-content/themes/compass-offices/assets/images/compassoffices-logo-web-all-in-one-2025_ow.svg" alt="Compass Offices" class="logo" onerror="this.style.display='none'">
  <h1 class="title" id="appTitle">Collage Maker</h1>
</div>

<!-- BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- Upload -->
    <div class="section">
      <div class="section-title">Upload Images</div>
      <div class="url-row">
        <input type="text" id="urlInput" class="url-input" placeholder="Paste image URL, comma-separated">
        <button id="addUrlBtn" class="add-url-btn">Add</button>
      </div>
      <div id="urlError" class="url-error"></div>
      <div class="upload-zone" id="uploadZone">
        <p id="uploadText">Drop images here or click</p>
        <small>JPG, PNG, GIF, WEBP</small>
      </div>
      <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
      <div class="image-list" id="imageList"></div>
      <button class="clear-btn" id="clearBtn">Clear All</button>
    </div>

    <!-- Layout -->
    <div class="section">
      <div class="section-title">Layout</div>
      <div class="layout-grid">
        <button class="layout-btn active" data-layout="single">Single</button>
        <button class="layout-btn" data-layout="two">Two</button>
        <button class="layout-btn" data-layout="big-small">Big + Small</button>
        <button class="layout-btn" data-layout="three">Three</button>
        <button class="layout-btn" data-layout="four">Four</button>
        <button class="layout-btn" data-layout="big-three">Big + 3</button>
      </div>
      <div class="adj-panel" id="adjPanel">
        <div class="adj-title">Adjust Layout</div>
        <div id="adjControls"></div>
      </div>
    </div>

    <!-- Canvas Settings -->
    <div class="section">
      <div class="section-title">Canvas Settings</div>
      <div class="preset-grid">
        <button class="preset-btn active" data-w="1080" data-h="1350">
          1080 × 1350
          <small>IG Portrait (4:5)</small>
        </button>
        <button class="preset-btn" data-w="864" data-h="1080">
          864 × 1080
          <small>Medium (4:5)</small>
        </button>
        <button class="preset-btn" data-w="720" data-h="900">
          720 × 900
          <small>Small (4:5)</small>
        </button>
        <button class="preset-btn" data-w="1080" data-h="1080">
          1080 × 1080
          <small>Square (1:1)</small>
        </button>
      </div>
      <div class="custom-size">
        <div class="adj-title" style="margin-bottom:8px;">Custom Size</div>
        <div class="size-row">
          <span class="size-label">W</span>
          <input type="range" class="size-slider" id="widthSlider" min="400" max="2000" step="10" value="1080">
          <input type="number" class="size-num" id="widthNum" min="400" max="2000" step="10" value="1080">
        </div>
        <div class="size-row">
          <span class="size-label">H</span>
          <input type="range" class="size-slider" id="heightSlider" min="400" max="2000" step="10" value="1350">
          <input type="number" class="size-num" id="heightNum" min="400" max="2000" step="10" value="1350">
        </div>
        <label class="ratio-lock">
          <input type="checkbox" id="ratioLock" checked>
          Lock 4:5 ratio
        </label>
      </div>
    </div>

  </div><!-- /sidebar -->

  <!-- CANVAS AREA -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-hint" id="canvasHint">Drag to pan · Scroll to zoom · Right-click for options</div>
    <div class="canvas-outer" id="canvasOuter">
      <div class="canvas-container" id="canvasContainer">
        <canvas id="collageCanvas" width="1080" height="1350"></canvas>
        <div class="canvas-overlay" id="canvasOverlay"></div>
      </div>
    </div>
    <div class="zoom-bar">
      <button class="zoom-btn" id="zoomOut" title="Zoom out">−</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button class="zoom-btn" id="zoomIn" title="Zoom in">+</button>
      <button class="zoom-btn" id="resetZoom" title="Fit to screen" style="font-size:11px;width:36px;">Fit</button>
    </div>
  </div>

</div><!-- /app-body -->

<!-- STICKY FOOTER -->
<div class="footer">
  <div class="footer-info">
    <span><span class="dot" id="statusDot"></span><span id="statusText">No images loaded</span></span>
    <span id="footerSize">1080 × 1350 px · 4:5</span>
  </div>
  <button class="download-btn" id="downloadBtn" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Download JPG
  </button>
</div>

<input type="file" id="fileInput2" accept="image/*" multiple style="display:none">

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let canvas, ctx, overlay;
let uploadedImages  = [];
let imageBoxes      = [];
let selectedBox     = null;
let isDragging      = false;
let isResizing      = false;
let dragOffset      = {x:0, y:0};
let viewScale       = 1;   // CSS display scale
let currentLayout   = 'single';
let layoutAdj       = {};

// ═══════════════════════════════════════════════
// LAYOUT CONFIGS
// ═══════════════════════════════════════════════
const LAYOUTS = {
  single:      { adj:{} },
  two:         { adj:{
    split: {label:'Split Position', min:0.1, max:0.9, value:0.5, step:0.01},
    angle: {label:'Cut Angle', value:0, isButtons:true, options:[
      {label:'— Horizontal (0°)',  value:0},
      {label:'⟋ Diagonal (45°)',  value:45},
      {label:'| Vertical (90°)',   value:90}
    ]}
  }},
  'big-small': { adj:{
    mainWidth:  {label:'Main Width',   min:0.5, max:0.8, value:0.67, step:0.01},
    smallSplit: {label:'Side Split',   min:0.2, max:0.8, value:0.5,  step:0.01}
  }},
  three:       { adj:{
    topHeight:   {label:'Top Height',  min:0.2, max:0.6, value:0.33, step:0.01},
    bottomSplit: {label:'Bottom Split',min:0.2, max:0.8, value:0.5,  step:0.01}
  }},
  four:        { adj:{
    verticalSplit:  {label:'Vertical Split',  min:0.2, max:0.8, value:0.5, step:0.01},
    horizontalSplit:{label:'Horizontal Split',min:0.2, max:0.8, value:0.5, step:0.01}
  }},
  'big-three': { adj:{
    bigWidth: {label:'Big Width',       min:0.4, max:0.8, value:0.65, step:0.01},
    topSplit: {label:'Top Height',      min:0.15,max:0.5, value:0.33, step:0.01},
    midSplit: {label:'Middle Height',   min:0.15,max:0.5, value:0.33, step:0.01}
  }}
};

// ═══════════════════════════════════════════════
// CANVAS INIT + RESPONSIVE SCALING
// ═══════════════════════════════════════════════
function initCanvas() {
  canvas  = document.getElementById('collageCanvas');
  ctx     = canvas.getContext('2d');
  overlay = document.getElementById('canvasOverlay');
  syncOverlay();
  clearCanvas();
  fitCanvas();
}

function syncOverlay() {
  overlay.style.width  = canvas.width  + 'px';
  overlay.style.height = canvas.height + 'px';
}

function clearCanvas() {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function fitCanvas() {
  const area   = document.getElementById('canvasArea');
  const pad    = 40;
  const availW = area.clientWidth  - pad;
  const availH = area.clientHeight - pad;
  viewScale    = Math.min(1, availW / canvas.width, availH / canvas.height);
  const outer  = document.getElementById('canvasOuter');
  outer.style.transform = `scale(${viewScale})`;
  // Collapse phantom space from scale
  outer.style.width  = canvas.width  * viewScale + 'px';
  outer.style.height = canvas.height * viewScale + 'px';
  // But the inner container stays at real px size
  document.getElementById('canvasContainer').style.width  = canvas.width  + 'px';
  document.getElementById('canvasContainer').style.height = canvas.height + 'px';
  document.getElementById('canvasOuter').style.transformOrigin = 'top left';
  document.getElementById('zoomLabel').textContent = Math.round(viewScale * 100) + '%';
}

window.addEventListener('resize', fitCanvas);

// Manual zoom buttons adjust viewScale on top of fit
function applyZoom(delta) {
  const area   = document.getElementById('canvasArea');
  const pad    = 40;
  const minFit = Math.min(1, (area.clientWidth - pad) / canvas.width, (area.clientHeight - pad) / canvas.height);
  viewScale    = Math.max(minFit, Math.min(3, viewScale + delta));
  const outer  = document.getElementById('canvasOuter');
  outer.style.transform      = `scale(${viewScale})`;
  outer.style.width          = canvas.width  * viewScale + 'px';
  outer.style.height         = canvas.height * viewScale + 'px';
  outer.style.transformOrigin = 'top left';
  document.getElementById('zoomLabel').textContent = Math.round(viewScale * 100) + '%';
}

// ═══════════════════════════════════════════════
// COORDINATE CONVERSION (client → canvas px)
// ═══════════════════════════════════════════════
function clientToCanvas(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (cx - rect.left) * (canvas.width  / rect.width),
    y: (cy - rect.top)  * (canvas.height / rect.height)
  };
}

// ═══════════════════════════════════════════════
// CLAMP PAN (image must always cover its box)
// ═══════════════════════════════════════════════
// Helper: get the effective visible region (w,h) for a box in the 'two' layout
function twoBoxRegion(boxIdx) {
  const deg   = layoutAdj.angle ?? 0;
  const split = layoutAdj.split ?? 0.5;
  const W = canvas.width, H = canvas.height;
  if (deg === 90) {
    // Vertical cut — each side is split*W or (1-split)*W wide, full height
    return boxIdx === 0
      ? { w: split * W,         h: H }
      : { w: (1 - split) * W,   h: H };
  } else if (deg === 0) {
    // Horizontal cut — full width, each side is split*H or (1-split)*H tall
    return boxIdx === 0
      ? { w: W, h: split * H }
      : { w: W, h: (1 - split) * H };
  } else {
    // Diagonal 45° — use the smaller bounding box of the visible triangle
    return { w: W * 0.7, h: H * 0.7 };
  }
}

function clampPan(box, panVal, axis) {
  if (!box.image) return panVal;
  const iw = box.image.naturalWidth  || box.image.width;
  const ih = box.image.naturalHeight || box.image.height;
  const imgAspect = iw / ih;

  // For 'two' layout use the effective visible half-region for clamping
  let effW, effH;
  if (currentLayout === 'two') {
    const region = twoBoxRegion(box.index);
    effW = region.w; effH = region.h;
  } else {
    effW = box.width; effH = box.height;
  }

  const effAspect = effW / effH;
  let drawW, drawH;
  if (imgAspect > effAspect) { drawH = effH * box.zoom; drawW = drawH * imgAspect; }
  else                       { drawW = effW * box.zoom; drawH = drawW / imgAspect; }

  if (axis === 'x') {
    const maxPan = Math.max(0, (drawW - effW) / 2);
    return Math.max(-maxPan, Math.min(maxPan, panVal));
  } else {
    const maxPan = Math.max(0, (drawH - effH) / 2);
    return Math.max(-maxPan, Math.min(maxPan, panVal));
  }
}

// Minimum zoom for a box — image must cover its effective visible region
function minZoomFor(box) {
  if (!box.image) return 1;
  const iw = box.image.naturalWidth  || box.image.width;
  const ih = box.image.naturalHeight || box.image.height;
  const imgAspect = iw / ih;
  let effW, effH;
  if (currentLayout === 'two') {
    const region = twoBoxRegion(box.index);
    effW = region.w; effH = region.h;
  } else {
    effW = box.width; effH = box.height;
  }
  const effAspect = effW / effH;
  // At zoom=1 the cover scale is: max(effW/imgW_natural, effH/imgH_natural) but
  // we track zoom relative to the cover-fit baseline, so zoom=1 already covers.
  // minZoom=1 ensures the drawn size >= effW/effH in the constraining dimension.
  return 1;
}

// ═══════════════════════════════════════════════
// IMAGE BOX CLASS
// ═══════════════════════════════════════════════
class ImageBox {
  constructor(x, y, w, h, index) {
    this.id = Date.now() + Math.random();
    this.x = x; this.y = y; this.width = w; this.height = h;
    this.index = index; this.image = null;
    this.zoom = 1; this.panX = 0; this.panY = 0; this.rotation = 0;
    this.isPanning = false;
    this.panStartX = 0; this.panStartY = 0;
    this.panOriginX = 0; this.panOriginY = 0;
    this.element = null; this.handle = null;
    this._build();
  }

  _build() {
    this.element = document.createElement('div');
    this.element.className = 'image-box';
    this.handle  = document.createElement('div');
    this.handle.className  = 'resize-handle';
    this.element.appendChild(this.handle);
    overlay.appendChild(this.element);
    this._sync();
    this._events();
  }

  _sync() {
    // For 'two' layout hide the individual box overlays — interaction is handled
    // directly on the canvas via pickTwoBox(). We still keep the elements in the
    // DOM so the rest of the code doesn't break, but make them invisible/non-interactive.
    if (currentLayout === 'two') {
      this.element.style.cssText = 'display:none;position:absolute;';
      return;
    }
    this.element.style.cssText = `left:${this.x}px;top:${this.y}px;width:${this.width}px;height:${this.height}px;position:absolute;`;
    this.element.classList.add('image-box');
    this.handle.style.left = this.width  + 'px';
    this.handle.style.top  = this.height + 'px';
  }
  update() { this._sync(); }

  _events() {
    this.element.addEventListener('mousedown', e => {
      if (e.target === this.handle) return;
      e.preventDefault();
      this._select();
      const p = clientToCanvas(e.clientX, e.clientY);
      if (e.shiftKey) {
        isDragging = true;
        dragOffset = {x: p.x - this.x, y: p.y - this.y};
      } else if (this.image) {
        this.isPanning  = true;
        this.panStartX  = p.x; this.panStartY  = p.y;
        this.panOriginX = this.panX; this.panOriginY = this.panY;
        this.element.style.cursor = 'grabbing';
      }
    });

    this.handle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      this._select(); isResizing = true;
    });

    this.element.addEventListener('dblclick', () => this._nextImage());

    this.element.addEventListener('wheel', e => {
      if (!this.image) return;
      e.preventDefault();
      const minZ = minZoomFor(this);
      this.zoom = Math.max(minZ, Math.min(5, this.zoom * (e.deltaY > 0 ? 0.92 : 1.08)));
      this.panX = clampPan(this, this.panX, 'x');
      this.panY = clampPan(this, this.panY, 'y');
      updateCanvas();
    }, {passive:false});

    this.element.addEventListener('contextmenu', e => {
      e.preventDefault();
      this._ctxMenu(e.clientX, e.clientY);
    });

    this.element.addEventListener('mouseenter', () => {
      if (!this.isPanning) this.element.style.cursor = this.image ? 'grab' : 'crosshair';
    });
  }

  _select() {
    selectedBox = this;
    imageBoxes.forEach(b => b.element.classList.remove('selected'));
    this.element.classList.add('selected');
  }

  _nextImage() {
    if (!uploadedImages.length) return;
    const i = uploadedImages.indexOf(this.image);
    this.image    = uploadedImages[(i + 1) % uploadedImages.length];
    this.zoom     = 1; this.panX = 0; this.panY = 0; this.rotation = 0;
    updateCanvas();
  }

  _ctxMenu(cx, cy) {
    document.querySelector('.ctx-menu')?.remove();
    const menu = document.createElement('div');
    menu.className = 'ctx-menu';
    menu.style.cssText = `position:fixed;left:${cx}px;top:${cy}px;background:#1e1e1e;border:1px solid #444;
      border-radius:8px;padding:10px;z-index:2000;display:flex;flex-direction:column;gap:8px;
      box-shadow:0 8px 24px rgba(0,0,0,0.6);min-width:220px;`;

    // Zoom row
    const zr = document.createElement('div');
    zr.style.cssText = 'display:flex;gap:6px;';
    zr.append(
      this._mkBtn('＋ Zoom In',  () => { this.zoom = Math.min(5, this.zoom * 1.2); updateCanvas(); }),
      this._mkBtn('－ Zoom Out', () => {
        const minZ = minZoomFor(this);
        this.zoom = Math.max(minZ, this.zoom / 1.2);
        this.panX = clampPan(this, this.panX, 'x');
        this.panY = clampPan(this, this.panY, 'y');
        updateCanvas();
      }),
      this._mkBtn('↺ Reset', () => { this.zoom=1;this.panX=0;this.panY=0;this.rotation=0;updateCanvas(); })
    );
    menu.appendChild(zr);

    // Rotation
    const rr = document.createElement('div');
    rr.style.cssText = 'display:flex;align-items:center;gap:6px;';
    const rs = document.createElement('input');
    rs.type='range';rs.min='0';rs.max='359';rs.step='1';rs.value=this.rotation;
    rs.style.cssText='flex:1;height:3px;background:#444;-webkit-appearance:none;border-radius:2px;cursor:pointer;accent-color:#ff6600;';
    const rv = document.createElement('span');
    rv.style.cssText='font-size:0.72rem;color:#aaa;width:32px;text-align:right;flex-shrink:0;';
    rv.textContent = this.rotation+'°';
    rs.addEventListener('input', () => { this.rotation = +rs.value; rv.textContent=this.rotation+'°'; updateCanvas(); });
    rr.append(
      this._mkBtn('↺', () => { this.rotation=(this.rotation-1+360)%360;rs.value=this.rotation;rv.textContent=this.rotation+'°';updateCanvas(); }),
      rs,
      this._mkBtn('↻', () => { this.rotation=(this.rotation+1)%360;rs.value=this.rotation;rv.textContent=this.rotation+'°';updateCanvas(); }),
      rv
    );
    menu.appendChild(rr);
    menu.appendChild(this._mkBtn('⟳ Change Image', () => this._nextImage()));

    document.body.appendChild(menu);
    setTimeout(() => document.addEventListener('click', () => menu.remove(), {once:true}), 50);
  }

  _mkBtn(txt, fn) {
    const b = document.createElement('button');
    b.textContent = txt;
    b.style.cssText='background:#ff6600;color:#fff;border:none;border-radius:4px;padding:5px 8px;cursor:pointer;font-size:11px;white-space:nowrap;';
    b.onmouseenter=()=>b.style.background='#e55a00';
    b.onmouseleave=()=>b.style.background='#ff6600';
    b.addEventListener('click', fn);
    return b;
  }

  remove() { this.element?.remove(); }
}

// ═══════════════════════════════════════════════
// LAYOUT SLOTS
// ═══════════════════════════════════════════════
function calcSlots() {
  const a=layoutAdj, w=canvas.width, h=canvas.height;
  switch(currentLayout) {
    case 'single': return [{x:0,y:0,w,h}];
    case 'two':    return [{x:0,y:0,w,h},{x:0,y:0,w,h}]; // clipped at draw time
    case 'big-small': {
      const mw=(a.mainWidth||0.67)*w, sw=w-mw, ss=(a.smallSplit||0.5)*h;
      return [{x:0,y:0,w:mw,h},{x:mw,y:0,w:sw,h:ss},{x:mw,y:ss,w:sw,h:h-ss}];
    }
    case 'three': {
      const th=(a.topHeight||0.33)*h, bh=h-th, bs=(a.bottomSplit||0.5)*w;
      return [{x:0,y:0,w,h:th},{x:0,y:th,w:bs,h:bh},{x:bs,y:th,w:w-bs,h:bh}];
    }
    case 'four': {
      const vx=(a.verticalSplit||0.5)*w, hy=(a.horizontalSplit||0.5)*h;
      return [{x:0,y:0,w:vx,h:hy},{x:vx,y:0,w:w-vx,h:hy},{x:0,y:hy,w:vx,h:h-hy},{x:vx,y:hy,w:w-vx,h:h-hy}];
    }
    case 'big-three': {
      const bw=(a.bigWidth||0.65)*w, rw=w-bw;
      const y1=(a.topSplit||0.33)*h, y2=y1+(a.midSplit||0.33)*h;
      return [{x:0,y:0,w:bw,h},{x:bw,y:0,w:rw,h:y1},{x:bw,y:y1,w:rw,h:y2-y1},{x:bw,y:y2,w:rw,h:h-y2}];
    }
    default: return [{x:0,y:0,w:canvas.width,h:canvas.height}];
  }
}

// For the 'two' layout: determine which box (0 or 1) the canvas point belongs to
function pickTwoBox(canvasX, canvasY) {
  const split = layoutAdj.split ?? 0.5;
  const deg   = layoutAdj.angle ?? 0;
  const W = canvas.width, H = canvas.height;
  let side; // negative = box 0 side, positive = box 1 side

  if (deg === 90) {
    // Vertical cut: left of split*W = box0, right = box1
    side = canvasX - split * W;
  } else if (deg === 0) {
    // Horizontal cut: above split*H = box0, below = box1
    side = canvasY - split * H;
  } else {
    // Diagonal 45°: pivot at (W/2, split*H), line direction (cos45,sin45)
    const px = W / 2, py = split * H;
    const rad = deg * Math.PI / 180;
    const nx = -Math.sin(rad), ny = Math.cos(rad);
    side = nx * (canvasX - px) + ny * (canvasY - py);
  }
  // side < 0 → box 0, side >= 0 → box 1
  return side < 0 ? imageBoxes[0] : imageBoxes[1];
}

function createLayout() {
  imageBoxes.forEach(b=>b.remove());
  imageBoxes=[];
  calcSlots().forEach((s,i)=>{
    const box=new ImageBox(s.x,s.y,s.w,s.h,i);
    if(uploadedImages[i]) box.image=uploadedImages[i];
    imageBoxes.push(box);
  });
  updateCanvas();
  updateStatus();
}

// ═══════════════════════════════════════════════
// ADJUSTMENT CONTROLS
// ═══════════════════════════════════════════════
function buildAdjControls() {
  const panel   = document.getElementById('adjPanel');
  const container = document.getElementById('adjControls');
  const cfg     = LAYOUTS[currentLayout];
  container.innerHTML = '';
  layoutAdj = {};

  const entries = Object.entries(cfg.adj);
  if (!entries.length) { panel.classList.remove('visible'); return; }
  panel.classList.add('visible');

  entries.forEach(([key, adj]) => {
    layoutAdj[key] = adj.value;
    const wrap = document.createElement('div');
    wrap.className = 'adj-item';

    if (adj.isButtons) {
      const lbl = document.createElement('span');
      lbl.className = 'adj-label'; lbl.textContent = adj.label;
      const btnWrap = document.createElement('div');
      btnWrap.className = 'angle-btns';
      adj.options.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'angle-btn' + (opt.value===adj.value?' active':'');
        b.textContent = opt.label;
        b.onclick = () => {
          layoutAdj[key] = opt.value;
          btnWrap.querySelectorAll('.angle-btn').forEach(x=>x.classList.remove('active'));
          b.classList.add('active');
          createLayout();
        };
        btnWrap.appendChild(b);
      });
      wrap.append(lbl, btnWrap);
    } else {
      const lbl = document.createElement('label');
      lbl.className = 'adj-label';
      lbl.textContent = `${adj.label}: ${Math.round(adj.value*100)}%`;
      const sl = document.createElement('input');
      sl.type='range'; sl.className='adj-slider';
      sl.min=adj.min; sl.max=adj.max; sl.step=adj.step; sl.value=adj.value;
      sl.addEventListener('input',()=>{
        const v=parseFloat(sl.value);
        layoutAdj[key]=v;
        lbl.textContent=`${adj.label}: ${Math.round(v*100)}%`;
        createLayout();
      });
      wrap.append(lbl, sl);
    }
    container.appendChild(wrap);
  });
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function updateCanvas() {
  clearCanvas();
  imageBoxes.forEach((box, idx) => {
    if (!box.image) return;
    const img = box.image;
    const iw = img.naturalWidth||img.width, ih = img.naturalHeight||img.height;
    const imgAsp = iw/ih, boxAsp = box.width/box.height;
    let bw, bh;
    if (imgAsp>boxAsp) { bh=box.height; bw=bh*imgAsp; }
    else               { bw=box.width;  bh=bw/imgAsp; }
    const dw=bw*box.zoom, dh=bh*box.zoom;
    const cx=box.x+box.width/2, cy=box.y+box.height/2;
    ctx.save();

    if (currentLayout==='two') {
      // diagonal / horizontal / vertical clip
      const split=layoutAdj.split??0.5, deg=layoutAdj.angle??0;
      const W=canvas.width, H=canvas.height, far=Math.max(W,H)*4;
      let px,py,dx,dy,nx,ny;
      if (deg===90) {
        px=split*W; py=H/2; dx=0; dy=1; nx=1; ny=0;
      } else {
        px=W/2; py=split*H;
        const r=deg*Math.PI/180;
        dx=Math.cos(r); dy=Math.sin(r); nx=-Math.sin(r); ny=Math.cos(r);
      }
      const sign=idx===0?-1:1;
      ctx.beginPath();
      ctx.moveTo(px-dx*far,              py-dy*far);
      ctx.lineTo(px+dx*far,              py+dy*far);
      ctx.lineTo(px+dx*far+nx*far*sign,  py+dy*far+ny*far*sign);
      ctx.lineTo(px-dx*far+nx*far*sign,  py-dy*far+ny*far*sign);
      ctx.closePath(); ctx.clip();
      ctx.translate(cx,cy);
      ctx.rotate(box.rotation*Math.PI/180);
      ctx.drawImage(img, -dw/2+box.panX, -dh/2+box.panY, dw, dh);
    } else {
      ctx.translate(cx,cy);
      ctx.rotate(box.rotation*Math.PI/180);
      ctx.beginPath(); ctx.rect(-box.width/2,-box.height/2,box.width,box.height); ctx.clip();
      ctx.drawImage(img, -dw/2+box.panX, -dh/2+box.panY, dw, dh);
    }
    ctx.restore();
  });
  drawDividers();
  document.getElementById('downloadBtn').disabled = !imageBoxes.some(b=>b.image);
  updateStatus();
}

function drawDividers() {
  if (imageBoxes.length<=1) return;
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=6; ctx.lineCap='square';
  const a=layoutAdj, w=canvas.width, h=canvas.height;
  const L=(x1,y1,x2,y2)=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();};

  switch(currentLayout) {
    case 'two': {
      const split=a.split??0.5, deg=a.angle??0, far=Math.max(w,h)*2;
      let px,py,dx,dy;
      if(deg===90){px=split*w;py=h/2;dx=0;dy=1;}
      else{px=w/2;py=split*h;const r=deg*Math.PI/180;dx=Math.cos(r);dy=Math.sin(r);}
      L(px-dx*far,py-dy*far,px+dx*far,py+dy*far); break;
    }
    case 'big-small': {
      const mx=(a.mainWidth||0.67)*w, sy=(a.smallSplit||0.5)*h;
      L(mx,0,mx,h); L(mx,sy,w,sy); break;
    }
    case 'three': {
      const ty=(a.topHeight||0.33)*h, bx=(a.bottomSplit||0.5)*w;
      L(0,ty,w,ty); L(bx,ty,bx,h); break;
    }
    case 'four': {
      const vx=(a.verticalSplit||0.5)*w, hy=(a.horizontalSplit||0.5)*h;
      L(vx,0,vx,h); L(0,hy,w,hy); break;
    }
    case 'big-three': {
      const bx=(a.bigWidth||0.65)*w, y1=(a.topSplit||0.33)*h, y2=y1+(a.midSplit||0.33)*h;
      L(bx,0,bx,h); L(bx,y1,w,y1); L(bx,y2,w,y2); break;
    }
  }
}

// ═══════════════════════════════════════════════
// STATUS BAR
// ═══════════════════════════════════════════════
function updateStatus() {
  const n = uploadedImages.length;
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (n===0) { dot.className='dot'; txt.textContent='No images loaded'; }
  else { dot.className='dot green'; txt.textContent=`${n} image${n>1?'s':''} loaded`; }
  document.getElementById('footerSize').textContent =
    `${canvas.width} × ${canvas.height} px`;
}

// ═══════════════════════════════════════════════
// IMAGE LOADING
// ═══════════════════════════════════════════════
function loadImageFromUrl(url, cb) {
  const img=new Image(); img.crossOrigin='anonymous';
  img.onload=()=>{ img.fileName=url.split('/').pop().split('?')[0]||`Image_${uploadedImages.length+1}`; cb(img); };
  img.onerror=()=>cb(null);
  img.src=url;
}

function handleUrls(input) {
  const urls=input.split(',').map(u=>u.trim()).filter(Boolean);
  const err=document.getElementById('urlError'); err.style.display='none';
  if(!urls.length) return;
  let done=0,fail=0;
  urls.forEach(url=>{
    loadImageFromUrl(url,img=>{
      done++;
      if(img){ uploadedImages.push(img); const e=imageBoxes.find(b=>!b.image); if(e)e.image=img; updateImageList(); updateCanvas(); }
      else fail++;
      if(done===urls.length&&fail){ err.textContent=`${fail} image(s) failed.`; err.style.display='block'; }
    });
  });
}

function handleFiles(files) {
  Array.from(files).forEach(file=>{
    if(!file.type.startsWith('image/')) return;
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{ img.fileName=file.name; uploadedImages.push(img); const eb=imageBoxes.find(b=>!b.image); if(eb)eb.image=img; updateImageList(); updateCanvas(); };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

// ═══════════════════════════════════════════════
// IMAGE LIST
// ═══════════════════════════════════════════════
function updateImageList() {
  const list=document.getElementById('imageList');
  const clearBtn=document.getElementById('clearBtn');
  list.innerHTML='';
  let dragSrcIdx=-1;

  uploadedImages.forEach((img,i)=>{
    const item=document.createElement('div');
    item.className='image-item'; item.draggable=true; item.dataset.idx=i;

    const thumb=document.createElement('canvas'); thumb.width=36;thumb.height=36; thumb.className='image-thumb';
    const tc=thumb.getContext('2d');
    const sz=Math.min(img.naturalWidth||img.width,img.naturalHeight||img.height);
    const sx=((img.naturalWidth||img.width)-sz)/2, sy=((img.naturalHeight||img.height)-sz)/2;
    tc.drawImage(img,sx,sy,sz,sz,0,0,36,36);

    const name=document.createElement('div'); name.className='image-name';
    name.textContent=img.fileName||`Image ${i+1}`;

    const acts=document.createElement('div'); acts.className='img-actions';
    const up=document.createElement('button'); up.className='order-btn'; up.innerHTML='↑'; up.disabled=i===0; up.onclick=()=>moveImg(i,i-1);
    const dn=document.createElement('button'); dn.className='order-btn'; dn.innerHTML='↓'; dn.disabled=i===uploadedImages.length-1; dn.onclick=()=>moveImg(i,i+1);
    const rm=document.createElement('button'); rm.className='remove-btn'; rm.innerHTML='×';
    rm.onclick=()=>{ uploadedImages.splice(i,1); imageBoxes.forEach((b,j)=>{b.image=uploadedImages[j]||null;}); updateImageList(); updateCanvas(); };
    acts.append(up,dn,rm);
    item.append(thumb,name,acts);
    list.appendChild(item);
  });

  // Drag-reorder on the list element (event delegation)
  list.addEventListener('dragstart',e=>{
    const it=e.target.closest('.image-item'); if(!it)return;
    dragSrcIdx=parseInt(it.dataset.idx); e.dataTransfer.effectAllowed='move';
    setTimeout(()=>it.style.opacity='0.4',0);
  });
  list.addEventListener('dragenter',e=>{ e.preventDefault(); const it=e.target.closest('.image-item'); if(it&&+it.dataset.idx!==dragSrcIdx)it.style.borderTop='2px solid #ff6600'; });
  list.addEventListener('dragover',e=>e.preventDefault());
  list.addEventListener('dragleave',e=>{ const it=e.target.closest('.image-item'); if(it)it.style.borderTop=''; });
  list.addEventListener('drop',e=>{ e.preventDefault(); const it=e.target.closest('.image-item'); if(!it)return; const ti=+it.dataset.idx; if(dragSrcIdx!==-1&&dragSrcIdx!==ti)moveImg(dragSrcIdx,ti); it.style.borderTop=''; dragSrcIdx=-1; });
  list.addEventListener('dragend',()=>{ list.querySelectorAll('.image-item').forEach(x=>{x.style.opacity='';x.style.borderTop='';}); dragSrcIdx=-1; });

  clearBtn.style.display=uploadedImages.length?'block':'none';
  updateStatus();
}

function moveImg(from,to) {
  if(from<0||to<0||from>=uploadedImages.length||to>=uploadedImages.length) return;
  const [m]=uploadedImages.splice(from,1); uploadedImages.splice(to,0,m);
  imageBoxes.forEach((b,i)=>{b.image=uploadedImages[i]||null;});
  updateImageList(); updateCanvas();
}

// ═══════════════════════════════════════════════
// CANVAS SIZE
// ═══════════════════════════════════════════════
function applySize(w, h) {
  w = Math.max(400, Math.min(2000, Math.round(w / 10) * 10));
  h = Math.max(400, Math.min(2000, Math.round(h / 10) * 10));
  canvas.width=w; canvas.height=h;
  syncOverlay();
  document.getElementById('widthSlider').value = w;
  document.getElementById('heightSlider').value = h;
  document.getElementById('widthNum').value = w;
  document.getElementById('heightNum').value = h;
  // Update active preset
  document.querySelectorAll('.preset-btn').forEach(b=>{
    b.classList.toggle('active', +b.dataset.w===w && +b.dataset.h===h);
  });
  createLayout();
  fitCanvas();
  updateStatus();
}

function download() {
  try {
    const a=document.createElement('a');
    a.download=`compass-collage-${Date.now()}.jpg`;
    a.href=canvas.toDataURL('image/jpeg',0.92);
    a.click();
  } catch(err) {
    alert('Download failed — cross-origin images may be restricted. Upload files directly instead of using URLs.');
    console.error(err);
  }
}

// ═══════════════════════════════════════════════
// URL PARAM PRELOAD
// ═══════════════════════════════════════════════
function preloadFromParams() {
  const raw=new URLSearchParams(location.search).get('image');
  if(!raw) return;
  raw.split(',').map(u=>u.trim()).filter(Boolean).forEach(url=>{
    loadImageFromUrl(url,img=>{ if(img){uploadedImages.push(img);updateImageList();updateCanvas();} });
  });
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', ()=>{
  initCanvas();

  // URL input
  const urlInput=document.getElementById('urlInput');
  document.getElementById('addUrlBtn').onclick=()=>{ if(urlInput.value.trim()){handleUrls(urlInput.value);urlInput.value='';} };
  urlInput.onkeydown=e=>{ if(e.key==='Enter')document.getElementById('addUrlBtn').click(); };

  // Upload zone
  const zone=document.getElementById('uploadZone'), fi=document.getElementById('fileInput');
  zone.onclick=()=>fi.click();
  zone.ondragover=e=>{ e.preventDefault(); zone.classList.add('dragover'); };
  zone.ondragleave=()=>zone.classList.remove('dragover');
  zone.ondrop=e=>{ e.preventDefault(); zone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); };
  fi.onchange=e=>{ handleFiles(e.target.files); fi.value=''; };

  // Layout buttons
  document.querySelectorAll('.layout-btn').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelector('.layout-btn.active')?.classList.remove('active');
      btn.classList.add('active');
      currentLayout=btn.dataset.layout;
      buildAdjControls();
      createLayout();
    };
  });

  // Preset size buttons
  document.querySelectorAll('.preset-btn').forEach(btn=>{
    btn.onclick=()=>applySize(+btn.dataset.w, +btn.dataset.h);
  });

  // Custom size — sliders + number inputs, both synced
  const ws=document.getElementById('widthSlider'),  hs=document.getElementById('heightSlider');
  const wn=document.getElementById('widthNum'),      hn=document.getElementById('heightNum');
  const lock=document.getElementById('ratioLock');

  function setW(w) {
    w = Math.max(400, Math.min(2000, w));
    if (lock.checked) { const h = Math.round(w * 5 / 4 / 10) * 10; applySize(w, h); }
    else applySize(w, canvas.height);
  }
  function setH(h) {
    h = Math.max(400, Math.min(2000, h));
    if (lock.checked) { const w = Math.round(h * 4 / 5 / 10) * 10; applySize(w, h); }
    else applySize(canvas.width, h);
  }

  ws.oninput = () => setW(+ws.value);
  hs.oninput = () => setH(+hs.value);

  // Number inputs: update on Enter or blur
  wn.addEventListener('change', () => setW(+wn.value));
  wn.addEventListener('keydown', e => { if (e.key === 'Enter') { wn.blur(); setW(+wn.value); } });
  hn.addEventListener('change', () => setH(+hn.value));
  hn.addEventListener('keydown', e => { if (e.key === 'Enter') { hn.blur(); setH(+hn.value); } });

  // Clear
  document.getElementById('clearBtn').onclick=()=>{
    uploadedImages=[]; imageBoxes.forEach(b=>{b.image=null;}); updateImageList(); updateCanvas();
  };

  // Download
  document.getElementById('downloadBtn').onclick=download;

  // Canvas zoom buttons
  document.getElementById('zoomIn').onclick =()=>applyZoom(+0.1);
  document.getElementById('zoomOut').onclick=()=>applyZoom(-0.1);
  document.getElementById('resetZoom').onclick=()=>fitCanvas();

  // Canvas direct interaction for 'two' layout (both boxes are full-canvas overlaps)
  const canvasEl = document.getElementById('collageCanvas');

  canvasEl.addEventListener('mousedown', e => {
    if (currentLayout !== 'two') return;
    e.preventDefault();
    const p = clientToCanvas(e.clientX, e.clientY);
    const box = pickTwoBox(p.x, p.y);
    if (!box) return;
    // Visual selection feedback via outline on canvas
    selectedBox = box;
    imageBoxes.forEach(b => b.element.classList.remove('selected'));
    if (box.image) {
      box.isPanning  = true;
      box.panStartX  = p.x; box.panStartY  = p.y;
      box.panOriginX = box.panX; box.panOriginY = box.panY;
    }
  });

  canvasEl.addEventListener('wheel', e => {
    if (currentLayout !== 'two') return;
    e.preventDefault();
    const p = clientToCanvas(e.clientX, e.clientY);
    const box = pickTwoBox(p.x, p.y);
    if (!box || !box.image) return;
    const minZ = minZoomFor(box);
    box.zoom = Math.max(minZ, Math.min(5, box.zoom * (e.deltaY > 0 ? 0.92 : 1.08)));
    box.panX = clampPan(box, box.panX, 'x');
    box.panY = clampPan(box, box.panY, 'y');
    updateCanvas();
  }, {passive: false});

  canvasEl.addEventListener('dblclick', e => {
    if (currentLayout !== 'two') return;
    const p = clientToCanvas(e.clientX, e.clientY);
    const box = pickTwoBox(p.x, p.y);
    if (box) { box._nextImage(); }
  });

  canvasEl.addEventListener('contextmenu', e => {
    if (currentLayout !== 'two') return;
    e.preventDefault();
    const p = clientToCanvas(e.clientX, e.clientY);
    const box = pickTwoBox(p.x, p.y);
    if (box) { selectedBox = box; box._ctxMenu(e.clientX, e.clientY); }
  });

  // Global mousemove
  document.addEventListener('mousemove',e=>{
    if(!selectedBox) return;
    const p=clientToCanvas(e.clientX,e.clientY);
    if(isDragging){
      selectedBox.x=Math.max(0,Math.min(canvas.width -selectedBox.width, p.x-dragOffset.x));
      selectedBox.y=Math.max(0,Math.min(canvas.height-selectedBox.height,p.y-dragOffset.y));
      selectedBox.update(); updateCanvas();
    } else if(isResizing){
      selectedBox.width =Math.max(50,Math.min(p.x-selectedBox.x,canvas.width -selectedBox.x));
      selectedBox.height=Math.max(50,Math.min(p.y-selectedBox.y,canvas.height-selectedBox.y));
      selectedBox.update(); updateCanvas();
    } else if(selectedBox.isPanning){
      const rawX = selectedBox.panOriginX + (p.x - selectedBox.panStartX);
      const rawY = selectedBox.panOriginY + (p.y - selectedBox.panStartY);
      selectedBox.panX = clampPan(selectedBox, rawX, 'x');
      selectedBox.panY = clampPan(selectedBox, rawY, 'y');
      updateCanvas();
    }
  });

  document.addEventListener('mouseup',()=>{
    isDragging=false; isResizing=false;
    if(selectedBox){ selectedBox.isPanning=false; selectedBox.element.style.cursor=selectedBox.image?'grab':'crosshair'; }
  });

  // Dismiss canvas-hint after 4s
  setTimeout(()=>{ const h=document.getElementById('canvasHint'); if(h) h.style.opacity='0'; h.style.transition='opacity .5s'; }, 4000);

  preloadFromParams();
  buildAdjControls();
  createLayout();
  updateStatus();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compass Instagram Layout</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.min.js"></script>
  <style>
    @import url('https://fonts.cdnfonts.com/css/neue-haas-grotesk-display-pro');
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --header-h: 60px;
      --footer-h: 64px;
      --nhg: 'Neue Haas Grotesk Display Pro', 'Arial Black', sans-serif;
    }

    body {
      background: #f1f5f9;
      font-family: var(--nhg);
      overflow: hidden;
      height: 100dvh;
    }

    /* ══ HEADER ══ */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      z-index: 100;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    header::-webkit-scrollbar { display: none; }

    .logo {
      font-family: var(--nhg);
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .sep {
      width: 1px; height: 26px;
      background: #e2e8f0;
      flex-shrink: 0;
    }

    .hbtn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-family: var(--nhg);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      border: none;
      transition: background 0.15s;
    }
    .hbtn-primary { background: #3b82f6; color: white; }
    .hbtn-primary:hover { background: #2563eb; }
    .hbtn-ghost { background: #f1f5f9; color: #334155; border: 1px solid #e2e8f0; }
    .hbtn-ghost:hover { background: #e2e8f0; }

    .hlabel {
      font-size: 12px;
      color: #94a3b8;
      font-family: var(--nhg);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hselect {
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: white;
      font-family: var(--nhg);
      font-size: 13px;
      color: #334155;
      cursor: pointer;
      flex-shrink: 0;
      outline: none;
    }
    .hselect:focus { border-color: #3b82f6; }

    /* ══ SCROLL / VIEWPORT AREA ══ */
    .scroll-area {
      position: fixed;
      top: var(--header-h);
      bottom: var(--footer-h);
      left: 0; right: 0;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      background: #f1f5f9;
    }

    /* canvas-outer scale is set by JS — transform-origin top-left so
       negative margin trick collapses the blank space below */
    .canvas-outer {
      flex-shrink: 0;
      transform-origin: top left;
    }

    /* ══ CANVAS — pixel dimensions never change ══ */
    #capture-area {
      width: 1080px;
      height: 1350px;
      position: relative;
      background: #e5e7eb;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      cursor: grab;
    }
    #capture-area:active { cursor: grabbing; }

    /* photo layer */
    .photo-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }
    #photo-img {
      position: absolute;
      pointer-events: none;
      user-select: none;
      display: block;
    }
    .photo-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 30%);
      pointer-events: none;
      z-index: 2;
    }

    /* upload placeholder */
    .upload-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.18);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 3;
      pointer-events: none;
    }
    .upload-overlay p {
      font-family: var(--nhg);
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      line-height: 1.5;
    }
    .upload-overlay.hidden { display: none; }

    /* ══ TEXT BLOCK ══ */
    .text-container {
      position: absolute;
      left: 80px;
      right: 80px;
      bottom: 150px;
      z-index: 7;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      pointer-events: none;
    }

    .line-editor {
      display: block;
      max-width: 920px;
      font-family: var(--nhg);
      font-size: 60px;
      line-height: 1;
      letter-spacing: 0;
      font-weight: 700;
      padding: 20px 60px;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      outline: none;
      border: none;
      pointer-events: all;
      cursor: text;
    }

    /* ══ FOOTER ══ */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--footer-h);
      background: white;
      box-shadow: 0 -1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }
    .footer-meta {
      font-family: var(--nhg);
      font-size: 12px;
      color: #94a3b8;
    }
    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #16a34a;
      color: white;
      font-family: var(--nhg);
      font-size: 14px;
      font-weight: 700;
      padding: 11px 26px;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .dl-btn:hover  { background: #15803d; }
    .dl-btn:active { transform: scale(0.97); }

    /* ══ TOAST ══ */
    #toast {
      position: fixed;
      bottom: 80px; right: 24px;
      background: #1e293b;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-family: var(--nhg);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.22s, transform 0.22s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast svg { width: 15px; height: 15px; flex-shrink: 0; color: #4ade80; }

    input[type=file] { display: none; }
  </style>
</head>
<body>

<!-- ══ HEADER TOOLBAR ══ -->
<header>
  <span class="logo">Compass Instagram Layout</span>
  <div class="sep"></div>

  <button class="hbtn hbtn-primary" id="upload-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    Upload Image
  </button>

  <div class="sep"></div>

  <span class="hlabel">Box</span>
  <select class="hselect" id="box-color">
    <option value="">Random</option>
    <option value="#ffffff">White</option>
    <option value="#000000">Black</option>
    <option value="#ff6600">Orange</option>
  </select>

  <span class="hlabel">Text</span>
  <select class="hselect" id="text-color">
    <option value="">Random</option>
    <option value="#000000">Black</option>
    <option value="#ffffff">White</option>
    <option value="#ff6600">Orange</option>
  </select>

  <button class="hbtn hbtn-ghost" id="random-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <polyline points="16 3 21 3 21 8"/>
      <line x1="4" y1="20" x2="21" y2="3"/>
      <polyline points="21 16 21 21 16 21"/>
      <line x1="15" y1="15" x2="21" y2="21"/>
    </svg>
    Random Colors
  </button>
</header>

<!-- ══ CANVAS VIEWPORT ══ -->
<div class="scroll-area" id="scroll-area">
  <div class="canvas-outer" id="canvas-outer">
    <div id="capture-area">

      <div class="photo-layer">
        <img id="photo-img" src="" alt="" draggable="false">
        <div class="photo-gradient"></div>
      </div>

      <div class="upload-overlay" id="upload-overlay">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <p>Upload a background image<br>Drag &amp; scroll to adjust</p>
      </div>

      <div class="text-container" id="text-container"></div>
    </div>
  </div>
</div>

<!-- ══ STICKY FOOTER ══ -->
<footer>
  <span class="footer-meta" id="footer-meta">1080 × 1350 px · Scroll to zoom · Drag to pan</span>
  <button class="dl-btn" id="download-btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Download JPG
  </button>
</footer>

<div id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-text">Done!</span>
</div>

<input type="file" id="file-input" accept="image/*">

<script>
// ── constants
const CANVAS_W = 1080, CANVAS_H = 1350;

// ── elements
const captureArea   = document.getElementById('capture-area');
const canvasOuter   = document.getElementById('canvas-outer');
const scrollArea    = document.getElementById('scroll-area');
const photoImg      = document.getElementById('photo-img');
const uploadOverlay = document.getElementById('upload-overlay');
const textContainer = document.getElementById('text-container');
const boxColorSel   = document.getElementById('box-color');
const textColorSel  = document.getElementById('text-color');

// ══ RESPONSIVE CANVAS SCALING ══
// Canvas pixel size is always 1080×1350. We CSS-scale the wrapper to fit
// the available viewport, compensating margins so the layout doesn't break.
function fitCanvas() {
  const HEADER = 60, FOOTER = 64, PAD = 48;
  const availW = window.innerWidth  - PAD;
  const availH = window.innerHeight - HEADER - FOOTER - PAD;
  const scale  = Math.min(1, availW / CANVAS_W, availH / CANVAS_H);

  canvasOuter.style.transform = `scale(${scale})`;
  // Collapse the "phantom space" that CSS scale leaves behind
  canvasOuter.style.marginBottom = `-${CANVAS_H * (1 - scale)}px`;
  canvasOuter.style.marginRight  = `-${CANVAS_W * (1 - scale)}px`;

  // Update footer hint with current display %
  const pct = Math.round(scale * 100);
  document.getElementById('footer-meta').textContent =
    `1080 × 1350 px · ${pct}% view · Scroll to zoom · Drag to pan`;
}

fitCanvas();
window.addEventListener('resize', fitCanvas);

// ══ COLOURS ══
const BOX_COLORS = ['#ffffff','#000000','#ff6600'];
const COMBOS = {
  '#ffffff': ['#000000','#ff6600'],
  '#ff6600': ['#000000','#ffffff'],
  '#000000': ['#ffffff','#ff6600'],
};
let curBox = '#ffffff', curText = '#000000';

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function resolveColors() {
  let box = boxColorSel.value || rand(BOX_COLORS);
  let txt = textColorSel.value;
  if (!txt || !COMBOS[box]?.includes(txt)) txt = rand(COMBOS[box] || ['#000000']);
  curBox = box; curText = txt;
  applyColorsAll();
}
function applyColorsAll() {
  textContainer.querySelectorAll('.line-editor').forEach(el => {
    el.style.backgroundColor = curBox;
    el.style.color = curText;
  });
}
boxColorSel.onchange  = resolveColors;
textColorSel.onchange = resolveColors;
document.getElementById('random-btn').onclick = () => {
  boxColorSel.value = ''; textColorSel.value = '';
  resolveColors();
};

// ══ TEXT LINES ══
function createLine(text) {
  const el = document.createElement('div');
  el.className = 'line-editor';
  el.contentEditable = 'true';
  el.spellcheck = false;
  el.style.backgroundColor = curBox;
  el.style.color = curText;
  el.textContent = text;

  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const next = createLine('');
      el.after(next);
      focusStart(next);
    }
    if (e.key === 'Backspace') {
      const sel = window.getSelection();
      const rng = sel.rangeCount ? sel.getRangeAt(0) : null;
      if (rng?.collapsed && rng.startOffset === 0) {
        const prev = el.previousElementSibling;
        if (prev) { e.preventDefault(); focusEnd(prev); el.remove(); }
      }
    }
  });

  el.addEventListener('paste', e => {
    e.preventDefault();
    const plain = (e.clipboardData || window.clipboardData).getData('text/plain');
    const parts = plain.split(/\r?\n/);
    document.execCommand('insertText', false, parts[0]);
    let cur = el;
    for (let i = 1; i < parts.length; i++) {
      const nl = createLine(parts[i]);
      cur.after(nl);
      cur = nl;
    }
  });

  el.addEventListener('input', () => {
    if (el.innerHTML === '<br>') el.innerHTML = '';
  });

  return el;
}

function focusStart(el) {
  el.focus();
  const r = document.createRange();
  r.setStart(el, 0); r.collapse(true);
  const s = window.getSelection();
  s.removeAllRanges(); s.addRange(r);
}
function focusEnd(el) {
  el.focus();
  const r = document.createRange();
  r.selectNodeContents(el); r.collapse(false);
  const s = window.getSelection();
  s.removeAllRanges(); s.addRange(r);
}

// initial line
textContainer.appendChild(createLine('Enter your text here...'));
resolveColors();

// ══ IMAGE STATE ══
let natW = 0, natH = 0, minScale = 1, imgScale = 1, imgX = 0, imgY = 0;

function computeMinScale(w, h) { return Math.max(CANVAS_W / w, CANVAS_H / h); }

function clampXY() {
  const sw = natW * imgScale, sh = natH * imgScale;
  const maxX = (sw - CANVAS_W) / 2, maxY = (sh - CANVAS_H) / 2;
  imgX = Math.max(-maxX, Math.min(maxX, imgX));
  imgY = Math.max(-maxY, Math.min(maxY, imgY));
}

function applyTransform() {
  if (!natW) return;
  clampXY();
  const sw = natW * imgScale, sh = natH * imgScale;
  photoImg.style.width  = sw + 'px';
  photoImg.style.height = sh + 'px';
  photoImg.style.left   = ((CANVAS_W - sw) / 2 + imgX) + 'px';
  photoImg.style.top    = ((CANVAS_H - sh) / 2 + imgY) + 'px';
}

function loadImageSrc(src) {
  const probe = new Image();
  probe.onload = () => {
    natW = probe.naturalWidth; natH = probe.naturalHeight;
    minScale = computeMinScale(natW, natH);
    imgScale = minScale; imgX = 0; imgY = 0;
    photoImg.src = src;
    uploadOverlay.classList.add('hidden');
    applyTransform();
    showToast('Image loaded');
  };
  probe.src = src;
}

// upload
document.getElementById('upload-btn').onclick = () => document.getElementById('file-input').click();
document.getElementById('file-input').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => loadImageSrc(ev.target.result);
  r.readAsDataURL(file);
};

// drag & drop onto canvas
captureArea.addEventListener('dragover', e => e.preventDefault());
captureArea.addEventListener('drop', e => {
  e.preventDefault();
  const file = [...e.dataTransfer.files].find(f => f.type.startsWith('image/'));
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => loadImageSrc(ev.target.result);
  r.readAsDataURL(file);
});

// ══ DRAG TO PAN ══
let dragging = false, dragSX, dragSY, dragOX, dragOY;

captureArea.addEventListener('mousedown', e => {
  if (e.target.classList.contains('line-editor')) return;
  if (!natW) return;
  dragging = true;
  dragSX = e.clientX; dragSY = e.clientY;
  dragOX = imgX;      dragOY = imgY;
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const sc = getDisplayScale();
  imgX = dragOX + (e.clientX - dragSX) / sc;
  imgY = dragOY + (e.clientY - dragSY) / sc;
  applyTransform();
});
document.addEventListener('mouseup', () => { dragging = false; });

// ══ SCROLL TO ZOOM ══
captureArea.addEventListener('wheel', e => {
  e.preventDefault();
  if (!natW) return;
  const factor = e.deltaY > 0 ? 0.96 : 1.04;
  imgScale = Math.max(minScale, Math.min(minScale * 5, imgScale * factor));
  applyTransform();
}, { passive: false });

// ══ PINCH ZOOM ══
let pinchDist = 0, pinchScale0 = 1;
captureArea.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    pinchDist = hypot2(e.touches); pinchScale0 = imgScale;
  }
}, { passive: false });
captureArea.addEventListener('touchmove', e => {
  if (e.touches.length !== 2 || !natW) return;
  e.preventDefault();
  const d = hypot2(e.touches);
  imgScale = Math.max(minScale, Math.min(minScale * 5, pinchScale0 * (d / pinchDist)));
  applyTransform();
}, { passive: false });

function hypot2(t) { return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY); }

function getDisplayScale() {
  return new DOMMatrix(getComputedStyle(canvasOuter).transform).a || 1;
}

// ══ DOWNLOAD ══
document.getElementById('download-btn').onclick = async () => {
  showToast('Rendering…');
  const lines = textContainer.querySelectorAll('.line-editor');
  lines.forEach(l => { l.contentEditable = 'false'; l.style.caretColor = 'transparent'; });
  try {
    const dataUrl = await htmlToImage.toJpeg(captureArea, {
      quality: 0.92,
      pixelRatio: 1,
      canvasWidth: CANVAS_W,
      canvasHeight: CANVAS_H,
      backgroundColor: '#e5e7eb',
      cacheBust: true,
    });
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `photo-${Date.now()}.jpg`;
    a.click();
    showToast('Downloaded!');
  } catch (err) {
    console.error(err);
    showToast('Export failed');
  } finally {
    lines.forEach(l => { l.contentEditable = 'true'; l.style.caretColor = ''; });
  }
};

// ══ TOAST ══
let toastTimer;
function showToast(msg) {
  document.getElementById('toast-text').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass Offices – Hong Kong Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --orange: #ff6600;
    --black:  #0a0a0a;
    --white:  #ffffff;
    --light:  #f4f4f4;
    --mid:    #e8e8e8;
    --text:   #1a1a1a;
    --muted:  #888;
    --card-radius: 18px;
    --events-per-page: 6;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--black);
    min-height: 100vh;
    color: var(--text);
  }

  /* ── Controls bar ── */
  .controls-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--black);
    border-bottom: 1px solid #222;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .controls-bar .logo-wrap img {
    height: 36px;
    width: auto;
    display: block;
  }
  .controls-bar .sep {
    width: 1px; height: 28px;
    background: #333;
    flex-shrink: 0;
  }
  .controls-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.08em;
    color: var(--orange);
    flex: 1;
    white-space: nowrap;
  }
  .ctrl-select {
    background: #111;
    border: 1.5px solid #333;
    color: #ccc;
    padding: 8px 14px;
    border-radius: 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    outline: none;
    transition: border-color .2s, color .2s;
  }
  .ctrl-select:hover, .ctrl-select:focus {
    border-color: var(--orange);
    color: var(--orange);
  }
  .ctrl-select option { background: #1a1a1a; color: #fff; }

  .btn-download {
    background: var(--orange);
    color: var(--white);
    border: none;
    padding: 9px 20px;
    border-radius: 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background .2s, transform .15s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .btn-download:hover { background: #e05500; transform: scale(1.03); }
  .btn-download svg { width: 15px; height: 15px; }

  .page-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #888;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .page-nav button {
    background: #1a1a1a;
    border: 1.5px solid #333;
    color: #ccc;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .2s, color .2s;
  }
  .page-nav button:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); }
  .page-nav button:disabled { opacity: 0.3; cursor: default; }

  /* ── Main stage ── */
  .stage {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    min-height: calc(100vh - 65px);
  }

  /* ── The shareable card / page ── */
  .event-page {
    width: 900px;
    max-width: 100%;
    background: var(--white);
    border-radius: var(--card-radius);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }

  /* Page header */
  .page-header {
    background: var(--black);
    padding: 28px 36px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }
  .page-header .hdr-logo img {
    height: 42px;
    width: auto;
    display: block;
  }
  .page-header .hdr-title {
    text-align: right;
  }
  .page-header .hdr-title h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    color: var(--white);
    line-height: 1;
  }
  .page-header .hdr-title .hdr-sub {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--orange);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* Orange accent strip */
  .orange-strip {
    height: 5px;
    background: var(--orange);
  }

  /* Events list */
  .events-body {
    padding: 0;
  }

  .event-row {
    display: flex;
    align-items: center;
    gap: 0;
    border-bottom: 1px solid var(--mid);
    transition: background .2s;
    min-height: 100px;
  }
  .event-row:last-child { border-bottom: none; }

  /* Alternate rows: odd = white, even = light */
  .event-row:nth-child(even) { background: var(--light); }
  .event-row:nth-child(odd)  { background: var(--white); }

  /* Date column */
  .ev-date {
    width: 90px;
    flex-shrink: 0;
    text-align: center;
    padding: 20px 10px;
    border-right: 1px solid var(--mid);
  }
  .ev-date .ev-month {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .ev-date .ev-day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    line-height: 1;
    color: var(--orange);
  }

  /* Icon column */
  .ev-icon {
    width: 72px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 10px;
  }
  .ev-icon .compass-o {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    background: var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .ev-icon .compass-o img {
    width: 34px;
    height: 34px;
    object-fit: contain;
  }

  /* Info column */
  .ev-info {
    flex: 1;
    padding: 18px 20px 18px 10px;
    min-width: 0;
  }
  .ev-info .ev-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .ev-info .ev-name {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ev-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .ev-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--mid);
    border-radius: 30px;
    padding: 5px 12px;
    font-size: 0.78rem;
    font-weight: 600;
    color: #444;
    white-space: nowrap;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ev-pill svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* QR column */
  .ev-qr {
    width: 110px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px 16px;
    border-left: 1px solid var(--mid);
    gap: 6px;
  }
  .ev-qr .qr-box {
    width: 74px;
    height: 74px;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
    border: 2px solid var(--mid);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* html2canvas renders canvas; qrcode.js injects canvas or img inside .qr-box */
  .ev-qr .qr-box canvas,
  .ev-qr .qr-box img {
    width: 70px !important;
    height: 70px !important;
    display: block;
  }
  .ev-qr .qr-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
  }

  /* Page footer */
  .page-footer {
    background: var(--black);
    padding: 14px 36px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .page-footer .ft-site {
    font-size: 0.78rem;
    font-weight: 600;
    color: #666;
    letter-spacing: 0.08em;
  }
  .page-footer .ft-page {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── Loading / Empty states ── */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    text-align: center;
    color: #555;
    min-height: 400px;
  }
  .spinner {
    width: 42px; height: 42px;
    border: 4px solid #222;
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 18px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-box p { font-size: 1rem; font-weight: 500; color: #666; }

  /* ── Responsive ── */
  @media (max-width: 680px) {
    .event-page { border-radius: 10px; }
    .page-header { padding: 20px 18px 16px; }
    .page-header .hdr-title h1 { font-size: 1.4rem; }
    .ev-date { width: 68px; }
    .ev-date .ev-day { font-size: 2.2rem; }
    .ev-icon { width: 54px; }
    .ev-qr { width: 86px; padding: 10px; }
    .ev-qr .qr-box { width: 58px; height: 58px; }
    .ev-qr .qr-box canvas,
    .ev-qr .qr-box img { width: 54px !important; height: 54px !important; }
    .ev-info .ev-name { font-size: 0.98rem; }
    .page-footer { padding: 12px 18px; }
  }

  /* Downloading state – hide controls inside card while capturing */
  .capturing .page-header,
  .capturing .page-footer { /* keep as-is */ }
</style>
</head>
<body>

<!-- Controls bar -->
<div class="controls-bar" id="controls-bar">
  <div class="logo-wrap">
    <img src="https://www.compassoffices.com/wp-content/themes/compass-offices/assets/images/compassoffices-logo-web-all-in-one-2025_ow.svg"
         alt="Compass Offices">
  </div>
  <div class="sep"></div>
  <div class="controls-title">HK EVENTS</div>

  <select class="ctrl-select" id="year-sel"></select>
  <select class="ctrl-select" id="month-sel">
    <option value="all">All Months</option>
    <option value="0">January</option><option value="1">February</option>
    <option value="2">March</option><option value="3">April</option>
    <option value="4">May</option><option value="5">June</option>
    <option value="6">July</option><option value="7">August</option>
    <option value="8">September</option><option value="9">October</option>
    <option value="10">November</option><option value="11">December</option>
  </select>

  <div class="page-nav">
    <button id="btn-prev" title="Previous page">&#8592;</button>
    <span id="page-indicator">– / –</span>
    <button id="btn-next" title="Next page">&#8594;</button>
  </div>

  <button class="btn-download" id="btn-dl">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    SAVE AS JPG
  </button>
</div>

<!-- Main stage -->
<div class="stage">
  <div id="event-page" class="event-page">
    <div class="state-box" id="loading-state">
      <div class="spinner"></div>
      <p>Loading Hong Kong events…</p>
    </div>
  </div>
</div>

<script>
/* ─── Config ─── */
const EVENTS_PER_PAGE = 6;
const HK_KEYWORDS     = ['hong kong', 'hk', 'hong-kong'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const MONTHS_SHORT = ['JAN','FEB','MAR','APR','MAY','JUN',
                      'JUL','AUG','SEP','OCT','NOV','DEC'];

/* ─── State ─── */
let allEvents    = [];
let pages        = [];   // array of event arrays
let currentPage  = 0;

/* ─── CSV fetch (same sheet, same approach) ─── */
async function fetchCSV() {
  const urls = [
    'https://docs.google.com/spreadsheets/d/1vTazGFKOEPVQu77BpCHV9rTo8odUfVeH7_k0xLjio7V4bUXw__hk14JMBJu0iDC3MewNy8Hw3kowOJt/export?format=csv&gid=1632866699',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vTazGFKOEPVQu77BpCHV9rTo8odUfVeH7_k0xLjio7V4bUXw__hk14JMBJu0iDC3MewNy8Hw3kowOJt/pub?gid=1632866699&single=true&output=csv'
  ];
  for (const url of urls) {
    try {
      const r = await fetch(url, { mode: 'cors' });
      if (r.ok) { const t = await r.text(); if (t.trim()) return t; }
    } catch(_) {}
  }
  // Sample fallback – Hong Kong events
  return [
    'Time,Date,Client-Name,Region,Event-Name,Location,Reception,Details,trigger,Confirmed,Quarter',
    '10:00 AM,01/04/2026,ABC Corp,Hong Kong,Annual Strategy Summit,"Lee Garden 2, 16/F, Conference Room A",Yes,Year-end planning,Email,Yes,Q2',
    '2:00 PM,03/04/2026,XYZ Financial,Hong Kong,Q2 Investor Briefing,"Two Pacific Place, 23/F, Boardroom",Yes,Investment update,Phone,Yes,Q2',
    '9:30 AM,07/04/2026,Global Ventures,Hong Kong,Leadership Workshop,"Exchange Square, 38/F, Training Room",Yes,Leadership training,Online,Yes,Q2',
    '3:00 PM,10/04/2026,Pacific Group,Hong Kong,Product Demo & Networking,"Langham Place Office Tower, 12/F",Yes,New product showcase,Email,Yes,Q2',
    '11:00 AM,14/04/2026,Asia Markets,Hong Kong,Regional Sales Conference,"One Island East, 45/F",Yes,Sales strategy Q2,Email,Yes,Q2',
    '5:30 PM,16/04/2026,Heritage Fund,Hong Kong,Board Meeting,"Central Plaza, 18/F, Meeting Room 3",Yes,Quarterly review,Phone,Yes,Q2',
    '9:00 AM,21/04/2026,Harbour Capital,Hong Kong,Innovation Forum,"IFC Two, 55/F, Sky Lounge",Yes,Tech innovation,Email,Yes,Q2',
    '2:30 PM,24/04/2026,Peak Solutions,Hong Kong,Client Appreciation Day,"The Center, 99/F, VIP Suite",Yes,Client event,Online,Yes,Q2',
  ].join('\n');
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else { inQ = !inQ; } }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

function parseCSV(text) {
  const lines   = text.split('\n');
  const headers = parseCSVLine(lines[0]).map(h => h.trim());
  return lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = parseCSVLine(l);
    const row  = {};
    headers.forEach((h, i) => { row[h] = (vals[i] || '').trim(); });
    return row;
  });
}

function parseDate(s) {
  if (!s) return null;
  let m;
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);   if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);   if (m) return new Date(+m[3], +m[1]-1, +m[2]);
  const d = new Date(s); return isNaN(d) ? null : d;
}

function isHK(event) {
  const region   = (event.Region   || '').toLowerCase();
  const location = (event.Location || '').toLowerCase();
  return HK_KEYWORDS.some(kw => region.includes(kw) || location.includes(kw));
}

/* ─── QR Code generation ─── */
function makeQR(container, event) {
  // Encode key event info as a plain-text vEvent summary
  // (replace with actual booking URL if available in data)
  const info = [
    event['Event-Name'],
    event.Date,
    event.Time,
    event.Location,
    'compassoffices.com'
  ].filter(Boolean).join(' | ');

  try {
    new QRCode(container, {
      text:           info,
      width:          70,
      height:         70,
      colorDark:      '#0a0a0a',
      colorLight:     '#ffffff',
      correctLevel:   QRCode.CorrectLevel.M
    });
  } catch(e) {
    container.innerHTML = '<span style="font-size:0.6rem;color:#aaa;padding:4px;display:block;text-align:center">QR unavailable</span>';
  }
}

/* ─── Page rendering ─── */
function buildPageHTML(events, pageNum, totalPages, yearLabel, monthLabel) {
  const heading = monthLabel === 'All Months'
    ? `${yearLabel} Events`
    : `${monthLabel} ${yearLabel} Events`;

  const rows = events.map((ev, i) => {
    const d = ev.parsedDate;
    const monthShort = MONTHS_SHORT[d.getMonth()];
    const day        = d.getDate();
    const clientName = ev['Client-Name'] || '';
    const evName     = ev['Event-Name']  || 'Untitled Event';
    const time       = ev.Time           || '';
    const loc        = ev.Location       || '';
    const label      = clientName ? clientName : 'EVENT';

    return `
      <div class="event-row" data-idx="${i}">
        <div class="ev-date">
          <div class="ev-month">${monthShort}</div>
          <div class="ev-day">${day}</div>
        </div>
        <div class="ev-icon">
          <div class="compass-o">
            <img src="https://www.compassoffices.com/wp-content/uploads/2025/09/compassoffices-logo-web-2025_icon-o-scaled.png"
                 alt="Compass O" onerror="this.style.display='none'">
          </div>
        </div>
        <div class="ev-info">
          <div class="ev-label">${label}</div>
          <div class="ev-name" title="${evName}">${evName}</div>
          <div class="ev-pills">
            ${time ? `
            <span class="ev-pill">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              ${time}
            </span>` : ''}
            ${loc ? `
            <span class="ev-pill" title="${loc}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
              ${loc.length > 45 ? loc.slice(0, 44) + '…' : loc}
            </span>` : ''}
          </div>
        </div>
        <div class="ev-qr">
          <div class="qr-box" id="qr-${pageNum}-${i}"></div>
          <div class="qr-label">Scan to RSVP</div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="page-header">
      <div class="hdr-logo">
        <img src="https://www.compassoffices.com/wp-content/themes/compass-offices/assets/images/compassoffices-logo-web-all-in-one-2025_ow.svg"
             alt="Compass Offices Logo">
      </div>
      <div class="hdr-title">
        <h1>${heading.toUpperCase()}</h1>
        <div class="hdr-sub">Hong Kong &nbsp;·&nbsp; Upcoming Events</div>
      </div>
    </div>
    <div class="orange-strip"></div>
    <div class="events-body">${rows}</div>
    <div class="page-footer">
      <div class="ft-site">compassoffices.com</div>
      <div class="ft-page">Page ${pageNum} of ${totalPages}</div>
    </div>`;
}

function renderPage(idx) {
  if (!pages.length) return;
  currentPage = idx;

  const yearSel  = document.getElementById('year-sel');
  const monthSel = document.getElementById('month-sel');
  const yearLbl  = yearSel.value === 'all' ? new Date().getFullYear().toString() : yearSel.value;
  const monthLbl = monthSel.value === 'all'
    ? 'All Months'
    : MONTHS[+monthSel.value];

  const pageEl = document.getElementById('event-page');
  pageEl.innerHTML = buildPageHTML(pages[idx], idx + 1, pages.length, yearLbl, monthLbl);

  // Generate QR codes
  pages[idx].forEach((ev, i) => {
    const container = document.getElementById(`qr-${idx+1}-${i}`);
    if (container) makeQR(container, ev);
  });

  // Update nav
  document.getElementById('page-indicator').textContent = `${idx + 1} / ${pages.length}`;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === pages.length - 1;
}

function rebuildPages(events) {
  pages = [];
  for (let i = 0; i < events.length; i += EVENTS_PER_PAGE) {
    pages.push(events.slice(i, i + EVENTS_PER_PAGE));
  }
  currentPage = 0;
  if (pages.length === 0) {
    document.getElementById('event-page').innerHTML = `
      <div class="state-box">
        <p>No Hong Kong events found for the selected filters.</p>
      </div>`;
    document.getElementById('page-indicator').textContent = '0 / 0';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
    return;
  }
  renderPage(0);
}

/* ─── Filter & populate ─── */
function getFiltered() {
  const yr = document.getElementById('year-sel').value;
  const mo = document.getElementById('month-sel').value;
  return allEvents.filter(e => {
    if (yr !== 'all' && e.parsedDate.getFullYear() !== +yr) return false;
    if (mo !== 'all' && e.parsedDate.getMonth()    !== +mo) return false;
    return true;
  });
}

function refresh() { rebuildPages(getFiltered()); }

/* ─── Download as JPG ─── */
async function downloadJPG() {
  const pageEl = document.getElementById('event-page');
  const btn    = document.getElementById('btn-dl');
  const origText = btn.innerHTML;
  btn.textContent = 'Generating…';
  btn.disabled    = true;

  try {
    const canvas = await html2canvas(pageEl, {
      scale:           2,
      useCORS:         true,
      allowTaint:      true,
      backgroundColor: '#ffffff',
      logging:         false,
    });

    const link    = document.createElement('a');
    const yearSel = document.getElementById('year-sel').value;
    const moSel   = document.getElementById('month-sel').value;
    const moName  = moSel === 'all' ? 'events' : MONTHS[+moSel].toLowerCase();
    link.download = `compass-hk-${moName}-${yearSel}-page${currentPage+1}.jpg`;
    link.href     = canvas.toDataURL('image/jpeg', 0.92);
    link.click();
  } catch(err) {
    alert('Could not generate image. Please try again.');
    console.error(err);
  } finally {
    btn.innerHTML = origText;
    btn.disabled  = false;
  }
}

/* ─── Init ─── */
async function init() {
  const csvText = await fetchCSV();
  const rows    = parseCSV(csvText);

  allEvents = rows
    .map(r => ({ ...r, parsedDate: parseDate(r.Date) }))
    .filter(r => r.parsedDate !== null && isHK(r))
    .sort((a, b) => a.parsedDate - b.parsedDate);

  // Populate year selector
  const years  = [...new Set(allEvents.map(e => e.parsedDate.getFullYear()))].sort((a,b)=>a-b);
  const yearSel = document.getElementById('year-sel');
  yearSel.innerHTML = '<option value="all">All Years</option>';
  years.forEach(y => {
    const o = document.createElement('option');
    o.value = o.textContent = y;
    yearSel.appendChild(o);
  });

  // Default to current year / month if data exists
  const curYear  = new Date().getFullYear();
  const curMonth = new Date().getMonth();
  yearSel.value  = years.includes(curYear) ? curYear : 'all';
  document.getElementById('month-sel').value = curMonth.toString();

  refresh();

  document.getElementById('year-sel').addEventListener('change', refresh);
  document.getElementById('month-sel').addEventListener('change', refresh);
  document.getElementById('btn-prev').addEventListener('click', () => renderPage(currentPage - 1));
  document.getElementById('btn-next').addEventListener('click', () => renderPage(currentPage + 1));
  document.getElementById('btn-dl').addEventListener('click', downloadJPG);
}

document.addEventListener('DOMContentLoaded', init);
</script>

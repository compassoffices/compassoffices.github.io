<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="https://www.compassoffices.com/wp-content/uploads/2025/09/compassoffices-logo-web-2025_icon-o-scaled.png">
  <title>Compass Poster</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.mjs" type="module"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container { max-width: 900px; width: 100%; }
    #preview-area {
      width: 595px;
      height: 842px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      overflow: hidden;
      margin: 24px auto;
      border-radius: 8px;
      transition: all 0.2s ease;
      position: relative;
      cursor: pointer;
    }
    #preview-area.drag-over {
      border: 3px dashed #3b82f6;
      background: #eff6ff;
    }
    #image-container {
      width: 595px;
      height: 752px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #main-image {
      max-width: 595px;
      max-height: 752px;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    #footer-area {
      width: 595px;
      height: 90px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid #e2e8f0;
      overflow: hidden;
    }
    #footer-image {
      max-width: 595px;
      max-height: 90px;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    #drop-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 1.2rem;
      pointer-events: none;
      z-index: 10;
      text-align: center;
      padding: 20px;
    }
    #file-input { display: none; }
  </style>
</head>
<body>

<div class="container">
  <h1 class="text-2xl font-bold mb-6 text-center">Drag & Drop file or Image → Compass Offices Poster</h1>

  <div id="preview-area">
    <div id="image-container">
      <img id="main-image" src="" alt="" style="display:none;">
      <div id="drop-hint">
        Drag & drop image (PNG/JPG/WEBP) or PDF here<br>
        or click to select file<br>
        (PDF: only first page used)
      </div>
    </div>
    <div id="footer-area">
      <img id="footer-image" 
           src="https://www.compassoffices.com/wp-content/uploads/2025/10/poster-footer-1.jpg"
           alt="Footer">
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*,.pdf">

  <div class="text-center mt-8">
    <button id="download-btn" 
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-4 rounded-xl text-lg font-semibold shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
            disabled>
      Download A4 JPG (2480 × 3508 px)
    </button>
  </div>

  <p class="text-center text-sm text-gray-500 mt-6">
    Works with PNG, JPG, WEBP, PDF (first page) • Image centered with white borders if needed • Footer fully visible
  </p>
</div>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.mjs';

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.worker.min.mjs';

const A4_WIDTH_PX  = 2480;
const A4_HEIGHT_PX = 3508;
const FOOTER_PX    = 375;  // ≈90px @ 300dpi

const previewArea  = document.getElementById('preview-area');
const fileInput    = document.getElementById('file-input');
const mainImg      = document.getElementById('main-image');
const dropHint     = document.getElementById('drop-hint');
const downloadBtn  = document.getElementById('download-btn');

let currentImageSrc = ''; // data URL for preview & high-res

// Click to select
previewArea.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
  const file = e.target.files?.[0];
  if (!file) return;
  handleFile(file);
});

// Drag & drop
['dragenter', 'dragover'].forEach(ev => previewArea.addEventListener(ev, e => {
  e.preventDefault();
  previewArea.classList.add('drag-over');
}));

['dragleave', 'drop'].forEach(ev => previewArea.addEventListener(ev, e => {
  e.preventDefault();
  previewArea.classList.remove('drag-over');
}));

previewArea.addEventListener('drop', e => {
  const file = e.dataTransfer.files?.[0];
  if (!file) return;
  handleFile(file);
});

async function handleFile(file) {
  if (!file.type.startsWith('image/') && file.type !== 'application/pdf') {
    alert('Please select an image or PDF file.');
    return;
  }

  downloadBtn.disabled = true;
  dropHint.textContent = 'Processing...';

  try {
    if (file.type === 'application/pdf') {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      if (pdf.numPages < 1) throw new Error('Empty PDF');

      const page = await pdf.getPage(1);
      const scale = 2.0; // good quality
      const viewport = page.getViewport({ scale });

      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const context = canvas.getContext('2d');

      await page.render({
        canvasContext: context,
        viewport: viewport
      }).promise;

      currentImageSrc = canvas.toDataURL('image/png');
    } else {
      // Regular image
      currentImageSrc = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = ev => resolve(ev.target.result);
        reader.readAsDataURL(file);
      });
    }

    mainImg.src = currentImageSrc;
    mainImg.style.display = 'block';
    dropHint.style.display = 'none';
    downloadBtn.disabled = false;
  } catch (err) {
    console.error(err);
    alert('Error processing file: ' + (err.message || 'Unknown error'));
    dropHint.textContent = 'Drag & drop image or PDF here\nor click to select file';
  }
}

downloadBtn.addEventListener('click', async () => {
  downloadBtn.textContent = "Generating…";
  downloadBtn.disabled = true;

  await new Promise(r => setTimeout(r, 400));
  window.dispatchEvent(new Event('resize'));

  try {
    const canvas = await html2canvas(previewArea, {
      scale: A4_WIDTH_PX / 595,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false,
      windowWidth: 595,
      windowHeight: 842,
      dpi: 300
    });

    const link = document.createElement('a');
    link.download = 'a4-poster-with-footer.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.96);
    link.click();
  } catch (err) {
    console.error(err);
    alert("Generation failed – try again or smaller file.");
  }

  downloadBtn.textContent = "Download A4 JPG (2480 × 3508 px)";
  downloadBtn.disabled = false;
});
</script>
</body>
</html>

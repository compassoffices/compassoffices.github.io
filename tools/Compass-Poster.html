<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A4 Poster with Footer – Drag & Drop</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container { max-width: 900px; width: 100%; }
    #preview-area {
      width: 595px;                /* fixed px for better matching */
      height: 842px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      overflow: hidden;
      margin: 24px auto;
      border-radius: 8px;
      transition: all 0.2s ease;
      position: relative;
    }
    #preview-area.drag-over {
      border: 3px dashed #3b82f6;
      background: #eff6ff;
    }
    #image-container {
      width: 595px;
      height: 752px;               /* 842 - 90 */
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #main-image {
      max-width: 595px;
      max-height: 752px;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    #footer-area {
      width: 595px;
      height: 90px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid #e2e8f0;
      overflow: hidden;
    }
    #footer-image {
      max-width: 595px;
      max-height: 90px;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    #drop-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 1.2rem;
      pointer-events: none;
      z-index: 10;
    }
    #file-input { display: none; }
  </style>
</head>
<body>

<div class="container">
  <h1 class="text-2xl font-bold mb-6 text-center">Drag & Drop Image → A4 + Footer</h1>

  <div id="preview-area">
    <div id="image-container">
      <img id="main-image" src="" alt="" style="display:none;">
      <div id="drop-hint">
        Drag & drop image here<br>or click to select
      </div>
    </div>
    <div id="footer-area">
      <img id="footer-image" 
           src="https://www.compassoffices.com/wp-content/uploads/2025/10/poster-footer-1.jpg"
           alt="Footer">
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*">

  <div class="text-center mt-8">
    <button id="download-btn" 
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-4 rounded-xl text-lg font-semibold shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
            disabled>
      Download A4 JPG (2480 × 3508 px)
    </button>
  </div>
</div>

<script>
const A4_WIDTH_PX  = 2480;
const A4_HEIGHT_PX = 3508;
const FOOTER_PX    = 375;  // ≈90px @ 300dpi (90 * 300 / 72 ≈ 375)

const previewArea  = document.getElementById('preview-area');
const fileInput    = document.getElementById('file-input');
const mainImg      = document.getElementById('main-image');
const dropHint     = document.getElementById('drop-hint');
const downloadBtn  = document.getElementById('download-btn');

let imageLoaded = false;

// Click → file select
previewArea.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
  const file = e.target.files?.[0];
  if (!file || !file.type.startsWith('image/')) return;
  loadImage(file);
});

// Drag & drop
['dragenter', 'dragover'].forEach(ev => previewArea.addEventListener(ev, e => {
  e.preventDefault();
  previewArea.classList.add('drag-over');
}));

['dragleave', 'drop'].forEach(ev => previewArea.addEventListener(ev, e => {
  e.preventDefault();
  previewArea.classList.remove('drag-over');
}));

previewArea.addEventListener('drop', e => {
  const file = e.dataTransfer.files?.[0];
  if (!file || !file.type.startsWith('image/')) return;
  loadImage(file);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    mainImg.src = ev.target.result;
    mainImg.style.display = 'block';
    dropHint.style.display = 'none';
    imageLoaded = true;
    downloadBtn.disabled = false;
  };
  reader.readAsDataURL(file);
}

downloadBtn.addEventListener('click', async () => {
  downloadBtn.textContent = "Generating…";
  downloadBtn.disabled = true;

  // Force reflow + wait for images
  await new Promise(r => setTimeout(r, 400));
  window.dispatchEvent(new Event('resize')); // helps html2canvas sometimes

  try {
    const canvas = await html2canvas(previewArea, {
      scale: A4_WIDTH_PX / 595,     // exact scale to 300 dpi
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false,
      windowWidth: 595,
      windowHeight: 842,
      dpi: 300,
      onclone: (doc) => {
        // Ensure cloned elements have explicit sizes
        const clonedMain = doc.getElementById('main-image');
        const clonedFooter = doc.getElementById('footer-image');
        if (clonedMain) clonedMain.style.imageRendering = 'crisp-edges';
        if (clonedFooter) clonedFooter.style.imageRendering = 'crisp-edges';
      }
    });

    const link = document.createElement('a');
    link.download = 'a4-poster-with-footer.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.96); // higher quality
    link.click();
  } catch (err) {
    console.error(err);
    alert("Generation failed. Try a different browser or smaller image.\nCommon cause: cross-origin footer image.");
  }

  downloadBtn.textContent = "Download A4 JPG (2480 × 3508 px)";
  downloadBtn.disabled = false;
});
</script>
</body>
</html>

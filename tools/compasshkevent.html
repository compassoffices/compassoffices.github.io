<style>
:root {
  --orange: #ff6600; --od: #cc5200;
  --black: #0a0a0a; --white: #ffffff;
  --light: #f8f8f8; --border: #e4e4e4;
  --text: #111111; --muted: #999999; --radius: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--black); min-height: 100vh; color: var(--text); -webkit-font-smoothing: antialiased; }

/* Controls */
.ctrl-bar { position: sticky; top: 0; z-index: 100; background: #0f0f0f; border-bottom: 1px solid #1e1e1e; padding: 11px 22px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.ctrl-logo img { height: 32px; width: auto; display: block; }
.ctrl-sep { width: 1px; height: 24px; background: #2a2a2a; flex-shrink: 0; }
.ctrl-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; letter-spacing: 0.1em; color: var(--orange); flex: 1; white-space: nowrap; }
select.pill { background: #161616; border: 1.5px solid #2c2c2c; color: #aaa; padding: 6px 13px; border-radius: 40px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; outline: none; transition: border-color .18s, color .18s; -webkit-appearance: none; appearance: none; }
select.pill:hover, select.pill:focus { border-color: var(--orange); color: var(--orange); }
select.pill option { background: #1a1a1a; color: #fff; }

/* Page nav */
.page-nav { display: flex; align-items: center; gap: 7px; color: #555; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.05em; }
.nav-btn { background: #161616; border: 1.5px solid #2c2c2c; color: #777; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; transition: border-color .18s, color .18s; user-select: none; }
.nav-btn:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }

/* Refresh button */
.btn-refresh { background: transparent; border: 1.5px solid #2c2c2c; color: #666; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color .18s, color .18s; flex-shrink: 0; }
.btn-refresh:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); }
.btn-refresh:disabled { opacity: 0.4; cursor: default; }
.btn-refresh svg { width: 14px; height: 14px; }
.btn-refresh.spinning svg { animation: spin .7s linear infinite; }

/* Download buttons */
.dl-group { display: flex; align-items: center; gap: 7px; }
.btn-dl { border: none; padding: 8px 15px; border-radius: 40px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; display: flex; align-items: center; gap: 5px; white-space: nowrap; transition: background .18s, opacity .18s; }
.btn-dl-jpg { background: var(--orange); color: #fff; }
.btn-dl-jpg:hover:not(:disabled) { background: var(--od); }
.btn-dl-pdf { background: #1e1e1e; color: #ccc; border: 1.5px solid #333; }
.btn-dl-pdf:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); }
.btn-dl:disabled { opacity: 0.5; cursor: wait; }
.btn-dl svg { width: 13px; height: 13px; flex-shrink: 0; }

/* Stage */
.stage { display: flex; justify-content: center; align-items: flex-start; padding: 36px 16px 60px; min-height: calc(100vh - 54px); }

/* Event page card */
.event-page { width: 860px; max-width: 100%; background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.3); }

/* Card header */
.page-header { background: var(--black); padding: 20px 28px 16px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
.hdr-logo img { height: 36px; width: auto; display: block; object-fit: contain; }
.hdr-right { text-align: right; }
.hdr-right h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.75rem; letter-spacing: 0.12em; color: #fff; line-height: 1; }
.hdr-sub { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.24em; color: var(--orange); margin-top: 5px; text-transform: uppercase; }
.accent-bar { height: 4px; background: linear-gradient(90deg, var(--orange), #ff9a00); }

/* Event rows */
.events-body { padding: 0; }
.event-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); min-height: 108px; }
.event-row:last-child { border-bottom: none; }
.event-row:nth-child(odd)  { background: var(--white); }
.event-row:nth-child(even) { background: var(--light); }
.event-row.is-today { background: #fff9f5 !important; border-left: 3px solid var(--orange); }

/* Date col */
.ev-date { width: 76px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 14px 6px; border-right: 1px solid var(--border); text-align: center; }
.ev-wd   { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
.ev-day  { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; line-height: 1; color: var(--orange); }
.ev-mon  { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-top: 1px; }
.today-badge { background: var(--orange); color: #fff; font-size: 0.5rem; font-weight: 700; letter-spacing: 0.08em; border-radius: 4px; padding: 2px 5px; margin-top: 4px; text-transform: uppercase; }

/* Thumbnail col — 2:1 ratio, no distortion */
.ev-thumb { width: 144px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 10px; border-right: 1px solid var(--border); }
.ev-thumb-box { width: 122px; height: 61px; border-radius: 8px; overflow: hidden; flex-shrink: 0; position: relative; display: flex; align-items: center; justify-content: center; }
.ev-thumb-box img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
.ev-thumb-box.g0 { background: linear-gradient(135deg,#ff6600,#ff9a00); }
.ev-thumb-box.g1 { background: linear-gradient(135deg,#cc4400,#ff6600); }
.ev-thumb-box.g2 { background: linear-gradient(135deg,#ff7700,#ffcc00); }
.ev-thumb-box.g3 { background: linear-gradient(135deg,#e84000,#ff7b00); }
.ev-thumb-box.g4 { background: linear-gradient(135deg,#ff6600,#ff3300); }
.ev-thumb-box.g5 { background: linear-gradient(135deg,#ff8800,#ffbb44); }
.ev-thumb-box.no-img::after { content: 'C'; font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: rgba(255,255,255,0.22); line-height: 1; user-select: none; pointer-events: none; }

/* Info col */
.ev-info { flex: 1; min-width: 0; padding: 13px 16px 13px 14px; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
.ev-type { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.22em; color: var(--muted); text-transform: uppercase; }
.ev-name { font-size: 1.05rem; font-weight: 700; color: var(--text); line-height: 1.25; word-break: break-word; }
.ev-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.ev-pill { display: inline-flex; align-items: flex-start; gap: 4px; background: #eeeeee; border-radius: 10px; padding: 4px 9px; font-size: 0.71rem; font-weight: 600; color: #555; white-space: normal; word-break: break-word; line-height: 1.4; }
.ev-pill svg { width: 11px; height: 11px; flex-shrink: 0; margin-top: 2px; opacity: 0.65; }

/* QR col — only rendered when URL present */
.ev-qr { width: 100px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 12px; border-left: 1px solid var(--border); gap: 5px; }
.qr-box { width: 68px; height: 68px; border-radius: 7px; overflow: hidden; background: #fff; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.qr-box canvas, .qr-box img { width: 64px !important; height: 64px !important; display: block; }
.qr-lbl { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; text-align: center; }

/* Card footer */
.page-footer { background: var(--black); padding: 11px 28px; display: flex; justify-content: space-between; align-items: center; }
.ft-l { display: flex; align-items: center; gap: 8px; }
.ft-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--orange); }
.ft-site { font-size: 0.7rem; font-weight: 600; color: #444; letter-spacing: 0.1em; }
.ft-page { font-size: 0.65rem; font-weight: 700; color: var(--orange); letter-spacing: 0.18em; text-transform: uppercase; }

/* States */
.state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 24px; min-height: 360px; text-align: center; gap: 14px; }
.spinner { width: 36px; height: 36px; border: 3px solid #e8e8e8; border-top-color: var(--orange); border-radius: 50%; animation: spin .85s linear infinite; }
.state-box p { font-size: 0.9rem; color: #999; font-weight: 500; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Overlay */
.gen-overlay { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.78); backdrop-filter: blur(5px); flex-direction: column; align-items: center; justify-content: center; }
.gen-overlay.on { display: flex; }
.gen-box { background: #141414; border: 1px solid #272727; border-radius: 16px; padding: 30px 44px; text-align: center; min-width: 240px; }
.gen-spinner { width: 34px; height: 34px; border: 3px solid #222; border-top-color: var(--orange); border-radius: 50%; animation: spin .85s linear infinite; margin: 0 auto 14px; }
.gen-lbl { font-size: 0.88rem; font-weight: 600; color: #ccc; letter-spacing: 0.05em; }
.gen-sub { font-size: 0.7rem; color: #555; margin-top: 5px; }

/* Responsive */
@media (max-width: 640px) {
  .ev-date { width: 62px; } .ev-day { font-size: 2rem; }
  .ev-thumb { width: 110px; padding: 8px; } .ev-thumb-box { width: 90px; height: 45px; }

  .qr-box canvas, .qr-box img { width: 54px !important; height: 54px !important; }
  .ev-name { font-size: 0.92rem; }
}
</style>

/* ─── Image helpers ─── */
async function urlToBase64(url) {
  if (!url) return null;
  try {
    const res = await fetch(url, { mode:'cors' });
    if (!res.ok) return null;
    const blob = await res.blob();
    return await new Promise(r => {
      const rd = new FileReader();
      rd.onload  = () => r(rd.result);
      rd.onerror = () => r(null);
      rd.readAsDataURL(blob);
    });
  } catch(_) { return null; }
}

async function svgToPng(svgUrl, h=80) {
  try {
    const res = await fetch(svgUrl, { mode:'cors' });
    if (!res.ok) return null;
    const txt  = await res.text();
    const doc  = new DOMParser().parseFromString(txt, 'image/svg+xml');
    const el   = doc.querySelector('svg');
    let W = parseFloat(el?.getAttribute('width')||'0');
    let H = parseFloat(el?.getAttribute('height')||'0');
    if (!W||!H) {
      const vb = (el?.getAttribute('viewBox')||'').split(/[\s,]+/).map(Number);
      if (vb.length>=4){W=vb[2];H=vb[3];}
    }
    if (!W||!H){W=300;H=60;}
    const pH = h, pW = Math.round(h*(W/H));
    const burl = URL.createObjectURL(new Blob([txt],{type:'image/svg+xml'}));
    return await new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width=pW*2; c.height=pH*2;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        URL.revokeObjectURL(burl);
        resolve(c.toDataURL('image/png'));
      };
      img.onerror = () => { URL.revokeObjectURL(burl); resolve(null); };
      img.src = burl;
    });
  } catch(_){ return null; }
}

async function thumbToB64(url, tW, tH) {
  if (!url) return null;
  return await new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      try {
        const c = document.createElement('canvas');
        c.width=tW; c.height=tH;
        const ctx = c.getContext('2d');
        const s = Math.max(tW/img.naturalWidth, tH/img.naturalHeight);
        const dw=img.naturalWidth*s, dh=img.naturalHeight*s;
        ctx.drawImage(img,(tW-dw)/2,(tH-dh)/2,dw,dh);
        resolve(c.toDataURL('image/png'));
      } catch(_){ resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = url;
    setTimeout(()=>resolve(null), 8000);
  });
}

/* ─── CSV fetch ─── */

  ].join('\n');

/* ─── STREAMING CSV PARSER ───────────────────────────────────────────
   Processes the ENTIRE text character by character.
   This correctly handles quoted fields containing newlines — a common
   issue with Google Sheets where cells like Details contain \n.
   A line-by-line approach splits those rows in two, pushing thumbnail /
   register-url / type onto a phantom row with no Date that gets filtered.
──────────────────────────────────────────────────────────────────── */
function parseCSV(txt) {
  // Normalise: strip BOM, unify line endings
  const src = txt.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  // Characters to strip from parsed values (invisible/control chars)
  const STRIP = /[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F-\u009F\uFEFF\u200B-\u200D\u2028\u2029\uFFFE\uFFFF]/g;

  const allRows = [];
  let fields = [], cur = '', inQ = false;

  for (let i = 0; i <= src.length; i++) {
    const ch = i < src.length ? src[i] : '\n'; // sentinel: flush last row

    if (ch === '"') {
      if (inQ && src[i+1] === '"') { cur += '"'; i++; }  // escaped ""
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      fields.push(cur);
      cur = '';
    } else if (ch === '\n' && !inQ) {
      fields.push(cur);
      cur = '';
      const cleaned = fields.map(f => f.replace(STRIP, '').trim());
      if (cleaned.some(f => f)) allRows.push(cleaned);
      fields = [];
    } else {
      cur += ch;
    }
  }

  if (!allRows.length) return [];

  // Headers: trim + remove invisible chars (handles ' Location' space prefix)
  const hdrs = allRows[0].map(h => h.trim());
  console.log('[CSV] ' + allRows.length + ' rows, ' + hdrs.length + ' cols:', hdrs);

  return allRows.slice(1)
    // Skip formula-error rows (#N/A, #REF!, etc.) and rows with no date
    .filter(r => {
      const date = r[1] || '';
      const time = r[0] || '';
      return date.trim() && !date.startsWith('#') && !time.startsWith('#');
    })
    .map(r => {
      const obj = {};
      hdrs.forEach((h, i) => { obj[h] = r[i] || ''; });
      return obj;
    });
}

function parseDate(s) {
  if (!s) return null;
  let m;
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); if(m) return new Date(+m[3],+m[2]-1,+m[1]);
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);   if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);   if(m) return new Date(+m[3],+m[1]-1,+m[2]);
  const d = new Date(s); return isNaN(d) ? null : d;
}

function isHK(ev) {
  const r = (ev.Region   || '').toLowerCase();
  // Location header has a leading space in the sheet — trim handles it in the parser,
  // but we also check the space-prefixed key as a belt-and-braces guard.
  const l = (ev.Location || ev[' Location'] || '').toLowerCase();
  return HK_KW.some(kw => r.includes(kw) || l.includes(kw));
}

function isToday(d) {
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}

function getQRUrl(ev) {
  // Use exact column name from sheet
  const v = ev['register-url'];
  return (v && v.trim()) ? v.trim() : null;
}

/* ─── HTML builder ─── */
function buildPage(slice, pageNum, total, yearLbl, monthLbl, logoSrc, thumbMap) {
  const heading = monthLbl==='All Months' ? `${yearLbl} Events` : `${monthLbl} ${yearLbl} Events`;
  const logoUrl = logoSrc || 'https://www.compassoffices.com/wp-content/themes/compass-offices/assets/images/compassoffices-logo-web-all-in-one-2025_ow.svg';

  const rows = slice.map((ev, i) => {
    const d        = ev.parsedDate;
    const type     = (ev.type     || '').trim() || 'Event';
    const name     = (ev['Event-Name'] || 'Untitled Event').trim();
    const time     = (ev.Time     || '').trim();
    const loc      = (ev.Location || ev[' Location'] || '').trim();
    const qrUrl    = getQRUrl(ev);
    const rawThumb = (ev.thumbnail || '').trim();
    const today    = isToday(d);

    // Export: use pre-fetched base64; live: use raw URL
    const thumbSrc = thumbMap ? (thumbMap.get(rawThumb) || null) : rawThumb;
    const gradCls  = `g${i % GRAD_N}`;
    const thumbEl  = thumbSrc
      ? `<div class="ev-thumb-box ${gradCls}"><img src="${thumbSrc}" alt="" onerror="this.style.display='none'"></div>`
      : `<div class="ev-thumb-box ${gradCls} no-img"></div>`;

    return `
<div class="event-row${today?' is-today':''}">
  <div class="ev-date">
    <div class="ev-wd">${WEEKDAYS[d.getDay()]}</div>
    <div class="ev-day">${d.getDate()}</div>
    <div class="ev-mon">${MONTHS_S[d.getMonth()]}</div>
    ${today?'<div class="today-badge">Today</div>':''}
  </div>
  <div class="ev-thumb">${thumbEl}</div>
  <div class="ev-info">
    <div class="ev-type">${type}</div>
    <div class="ev-name">${name}</div>
    <div class="ev-pills">
      ${time?`<span class="ev-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${time}</span>`:''}
      ${loc ?`<span class="ev-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${loc}</span>`:''}
    </div>
  </div>
  ${qrUrl?`<div class="ev-qr"><div class="qr-box" data-url="${encodeURIComponent(qrUrl)}" id="qr-p${pageNum}-r${i}"></div><div class="qr-lbl">Scan&nbsp;to&nbsp;RSVP</div></div>`:''}
</div>`;
  }).join('');

  return `
<div class="page-header">
  <div class="hdr-logo"><img src="${logoUrl}" alt="Compass Offices" style="height:36px;width:auto;display:block;object-fit:contain;"></div>
  <div class="hdr-right"><h1>${heading.toUpperCase()}</h1><div class="hdr-sub">Hong Kong &nbsp;·&nbsp; Upcoming Events</div></div>
</div>
<div class="accent-bar"></div>
<div class="events-body">${rows}</div>
<div class="page-footer">
  <div class="ft-l"><div class="ft-dot"></div><div class="ft-site">compassoffices.com</div></div>
  <div class="ft-page">Page ${pageNum} of ${total}</div>
</div>`;
}

function attachQR(root) {
  const boxes = [...root.querySelectorAll('.qr-box[data-url]')];
  if (!boxes.length) return Promise.resolve();
  return Promise.all(boxes.map(box => new Promise(resolve => {
    const url = decodeURIComponent(box.getAttribute('data-url'));
    try {
      new QRCode(box, { text:url, width:80, height:80, colorDark:'#111111', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M });
      requestAnimationFrame(() => requestAnimationFrame(resolve));
    } catch(_) { resolve(); }
  })));
}

/* ─── Live rendering ─── */
function getLabels() {
  const yr = document.getElementById('year-sel').value;
  const mo = document.getElementById('month-sel').value;
  return { yr, mo,
    yearLbl:  yr==='all' ? new Date().getFullYear().toString() : yr,
    monthLbl: mo==='all' ? 'All Months' : MONTHS[+mo],
    moName:   mo==='all' ? 'events' : MONTHS[+mo].toLowerCase() };
}

function renderPage(idx) {
  if (!pages.length) return;
  curPage = idx;
  const { yearLbl, monthLbl } = getLabels();
  const el = document.getElementById('event-page');
  el.innerHTML = buildPage(pages[idx], idx+1, pages.length, yearLbl, monthLbl, null, null);
  attachQR(el); // fire-and-forget for live view
  document.getElementById('page-indicator').textContent = `${idx+1} / ${pages.length}`;
  document.getElementById('btn-prev').disabled = idx===0;
  document.getElementById('btn-next').disabled = idx===pages.length-1;
}

function rebuildPages(events) {
  pages = [];
  for (let i=0; i<events.length; i+=EVENTS_PER_PAGE) pages.push(events.slice(i,i+EVENTS_PER_PAGE));
  curPage = 0;
  if (!pages.length) {
    const { monthLbl, yearLbl } = getLabels();
    document.getElementById('event-page').innerHTML = `<div class="state-box"><div style="font-size:2rem">📭</div><p>No events for ${monthLbl==='All Months'?yearLbl:monthLbl+' '+yearLbl}</p></div>`;
    document.getElementById('page-indicator').textContent = '0 / 0';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
    return;
  }
  renderPage(0);
}

function getFiltered() {
  const { yr, mo } = getLabels();
  return allEvents.filter(e => {
    if (yr!=='all' && e.parsedDate.getFullYear()!==+yr) return false;
    if (mo!=='all' && e.parsedDate.getMonth()!==+mo)   return false;
    return true;
  });
}
function refresh() { rebuildPages(getFiltered()); }

// Auto-select the earliest upcoming month
function autoSelectMonth() {
  const now = new Date(); now.setHours(0,0,0,0);
  const upcoming = allEvents.filter(e => e.parsedDate >= now);
  if (upcoming.length) {
    upcoming.sort((a,b) => a.parsedDate - b.parsedDate);
    const f = upcoming[0].parsedDate;
    document.getElementById('year-sel').value  = f.getFullYear().toString();
    document.getElementById('month-sel').value = f.getMonth().toString();
  } else {
    const cy = new Date().getFullYear();
    const yrs = [...new Set(allEvents.map(e=>e.parsedDate.getFullYear()))];
    document.getElementById('year-sel').value  = yrs.includes(cy) ? cy : 'all';
    document.getElementById('month-sel').value = 'all';
  }
}

/* ─── Export helpers ─── */
const THUMB_W = 244, THUMB_H = 122;

async function prefetchAssets() {
  if (!logoB64) {
    overlay.show('Fetching logo…','');
    logoB64 = await svgToPng('https://www.compassoffices.com/wp-content/themes/compass-offices/assets/images/compassoffices-logo-web-all-in-one-2025_ow.svg', 80);
    if (!logoB64) logoB64 = await urlToBase64('https://www.compassoffices.com/wp-content/uploads/2025/09/compassoffices-logo-web-2025_icon-o-scaled.png');
  }
  const urls = new Set();
  pages.forEach(pg => pg.forEach(ev => { const u=(ev.thumbnail||'').trim(); if(u&&!thumbCache.has(u)) urls.add(u); }));
  if (urls.size) {
    overlay.show('Loading thumbnails…',`${urls.size} image${urls.size>1?'s':''}`);
    await Promise.all([...urls].map(async url => {
      const b64 = await thumbToB64(url, THUMB_W, THUMB_H);
      thumbCache.set(url, b64);
    }));
  }
  const thumbMap = new Map();
  pages.forEach(pg => pg.forEach(ev => { const u=(ev.thumbnail||'').trim(); if(u) thumbMap.set(u, thumbCache.get(u)||null); }));
  return { thumbMap, logoSrc: logoB64 };
}

async function renderAllToCanvases(cardW, thumbMap, logoSrc, scale) {
  const { yearLbl, monthLbl } = getLabels();
  const off = document.createElement('div');
  off.style.cssText = `position:fixed;left:-9999px;top:0;width:${cardW}px;background:#fff;overflow:visible;z-index:-1;`;
  document.body.appendChild(off);
  const canvases = [];
  try {
    for (let p=0; p<pages.length; p++) {
      overlay.show(`Rendering ${p+1}/${pages.length}…`,`${scale.toFixed(1)}× · ${Math.round(cardW*scale)}px`);
      off.innerHTML = buildPage(pages[p],p+1,pages.length,yearLbl,monthLbl,logoSrc,thumbMap);
      // Wait for images to load
      await Promise.all([...off.querySelectorAll('img')].map(img =>
        img.complete ? Promise.resolve() :
        new Promise(res => { img.onload=res; img.onerror=res; setTimeout(res,5000); })
      ));
      // Wait for QR codes
      await attachQR(off);
      await new Promise(r => requestAnimationFrame(()=>requestAnimationFrame(r)));
      const c = await html2canvas(off, {
        scale, useCORS:false, allowTaint:true,
        backgroundColor:'#ffffff', logging:false,
        width:cardW, scrollX:0, scrollY:0, imageTimeout:15000,
        onclone: d => { d.querySelectorAll('.qr-box canvas').forEach(c=>c.style.display='block'); }
      });
      canvases.push(c);
    }
  } finally { document.body.removeChild(off); }
  return canvases;
}

function stitch(canvases) {
  const W=canvases[0].width, H=canvases.reduce((s,c)=>s+c.height,0);
  const out=document.createElement('canvas'); out.width=W; out.height=H;
  const ctx=out.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  let y=0; for(const c of canvases){ctx.drawImage(c,0,y);y+=c.height;}
  return out;
}

async function deliverFile(blob, name) {
  if (navigator.share && navigator.canShare) {
    try {
      const f = new File([blob], name, {type:blob.type});
      if (navigator.canShare({files:[f]})) {
        await navigator.share({files:[f], title:'Compass Offices – HK Events'});
        return;
      }
    } catch(e) { if(e.name==='AbortError') return; }
  }
  const url = URL.createObjectURL(blob);
  const a   = Object.assign(document.createElement('a'), {href:url, download:name, style:'display:none'});
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 10000);
}

/* ─── Download JPG ─── */
async function downloadJPG() {
  if (!pages.length) return;
  const [j,p] = [document.getElementById('btn-jpg'),document.getElementById('btn-pdf')];
  j.disabled=p.disabled=true;
  try {
    const {thumbMap,logoSrc} = await prefetchAssets();
    const cardW = document.getElementById('event-page').offsetWidth;
    const scale = Math.max(1, JPG_W/cardW);
    const canvases = await renderAllToCanvases(cardW,thumbMap,logoSrc,scale);
    overlay.show('Stitching…',`${canvases.length} page${canvases.length>1?'s':''}`);
    const out = stitch(canvases);
    const jpgBlob = await new Promise(res=>out.toBlob(res,'image/jpeg',0.94));
    const {moName,yr} = getLabels();
    await deliverFile(jpgBlob, `compass-hk-${moName}-${yr}.jpg`);
  } catch(err){ console.error(err); alert('Could not generate JPG.\n'+err.message); }
  finally { overlay.hide(); j.disabled=p.disabled=false; }
}

/* ─── Download PDF ─── */
async function downloadPDF() {
  if (!pages.length) return;
  const [j,p] = [document.getElementById('btn-jpg'),document.getElementById('btn-pdf')];
  j.disabled=p.disabled=true;
  try {
    const {thumbMap,logoSrc} = await prefetchAssets();
    const cardW = document.getElementById('event-page').offsetWidth;
    const canvases = await renderAllToCanvases(cardW,thumbMap,logoSrc,2);
    overlay.show('Building PDF…',`${canvases.length} A4 page${canvases.length>1?'s':''}`);
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
    const m=8, uw=PDF_W-m*2, uh=PDF_H-m*2;
    canvases.forEach((c,idx)=>{
      if(idx>0) doc.addPage();
      const ca=c.width/c.height, ua=uw/uh;
      const [dw,dh] = ca>=ua ? [uw,uw/ca] : [uh*ca,uh];
      doc.addImage(c.toDataURL('image/png'),'PNG',m+(uw-dw)/2,m+(uh-dh)/2,dw,dh);
    });
    const {moName,yr} = getLabels();
    await deliverFile(doc.output('blob'), `compass-hk-${moName}-${yr}.pdf`);
  } catch(err){ console.error(err); alert('Could not generate PDF.\n'+err.message); }
  finally { overlay.hide(); j.disabled=p.disabled=false; }
}

/* ─── Load data (init + refresh) ─── */
async function loadData(isRefresh=false) {
  const btn = document.getElementById('btn-refresh');
  btn.disabled=true; btn.classList.add('spinning');
  document.getElementById('event-page').innerHTML = `<div class="state-box"><div class="spinner"></div><p>${isRefresh?'Refreshing data…':'Loading Hong Kong events…'}</p></div>`;
  document.getElementById('page-indicator').textContent='– / –';
  document.getElementById('btn-prev').disabled=true;
  document.getElementById('btn-next').disabled=true;
  if (isRefresh) thumbCache.clear();
  try {
    const csv = await fetchCSV();
    const rows = parseCSV(csv);
    allEvents = rows
      .map(r => ({...r, parsedDate:parseDate(r.Date)}))
      .filter(r => r.parsedDate!==null && isHK(r))
      .sort((a,b) => a.parsedDate-b.parsedDate);

    // Populate year dropdown
    const yrs = [...new Set(allEvents.map(e=>e.parsedDate.getFullYear()))].sort((a,b)=>a-b);
    const ySel = document.getElementById('year-sel');
    ySel.innerHTML='<option value="all">All Years</option>';
    yrs.forEach(y=>{ const o=document.createElement('option'); o.value=o.textContent=y; ySel.appendChild(o); });

    autoSelectMonth();
    refresh();
  } finally {
    btn.disabled=false; btn.classList.remove('spinning');
  }
}

/* ─── Init ─── */
function init() {
  // Warm logo in background
  svgToPng('https://www.compassoffices.com/wp-content/themes/compass-offices/assets/images/compassoffices-logo-web-all-in-one-2025_ow.svg',80).then(b=>{ if(b) logoB64=b; });

  // Wire listeners ONCE
  document.getElementById('year-sel').addEventListener('change', refresh);
  document.getElementById('month-sel').addEventListener('change', refresh);
  document.getElementById('btn-prev').addEventListener('click', ()=>renderPage(curPage-1));
  document.getElementById('btn-next').addEventListener('click', ()=>renderPage(curPage+1));
  document.getElementById('btn-jpg').addEventListener('click', downloadJPG);
  document.getElementById('btn-pdf').addEventListener('click', downloadPDF);
  document.getElementById('btn-refresh').addEventListener('click', ()=>loadData(true));

  loadData(false);
}

document.addEventListener('DOMContentLoaded', init);
</script>

<style>
:root {
  --orange:  #ff6600;
  --od:      #cc5200;
  --black:   #0a0a0a;
  --white:   #ffffff;
  --light:   #f8f8f8;
  --border:  #e4e4e4;
  --text:    #111111;
  --muted:   #999999;
  --radius:  20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--black);
  min-height: 100vh;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── Controls bar ── */
.ctrl-bar {
  position: sticky; top: 0; z-index: 100;
  background: #0f0f0f; border-bottom: 1px solid #1e1e1e;
  padding: 11px 22px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.ctrl-logo img { height: 32px; width: auto; display: block; }
.ctrl-sep { width: 1px; height: 24px; background: #2a2a2a; flex-shrink: 0; }
.ctrl-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.15rem; letter-spacing: 0.1em; color: var(--orange);
  flex: 1; white-space: nowrap;
}
select.pill {
  background: #161616; border: 1.5px solid #2c2c2c; color: #aaa;
  padding: 6px 13px; border-radius: 40px;
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
  cursor: pointer; outline: none; transition: border-color .18s, color .18s;
  -webkit-appearance: none; appearance: none;
}
select.pill:hover, select.pill:focus { border-color: var(--orange); color: var(--orange); }
select.pill option { background: #1a1a1a; color: #fff; }

.page-nav { display: flex; align-items: center; gap: 7px; color: #555; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.05em; }
.nav-btn {
  background: #161616; border: 1.5px solid #2c2c2c; color: #777;
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; transition: border-color .18s, color .18s; user-select: none;
}
.nav-btn:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }

/* Download buttons */
.dl-group { display: flex; align-items: center; gap: 7px; }
.btn-dl {
  border: none; padding: 8px 15px; border-radius: 40px;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 700;
  cursor: pointer; letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
  transition: background .18s, opacity .18s;
}
.btn-dl-jpg { background: var(--orange); color: #fff; }
.btn-dl-jpg:hover:not(:disabled) { background: var(--od); }
.btn-dl-pdf { background: #1e1e1e; color: #ccc; border: 1.5px solid #333; }
.btn-dl-pdf:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); }
.btn-dl:disabled { opacity: 0.5; cursor: wait; }
.btn-dl svg { width: 13px; height: 13px; flex-shrink: 0; }

/* ── Stage ── */
.stage {
  display: flex; justify-content: center; align-items: flex-start;
  padding: 36px 16px 60px; min-height: calc(100vh - 54px);
}

/* ── Event page card ── */
.event-page {
  width: 860px; max-width: 100%;
  background: var(--white); border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.3);
}

/* Card header */

  background: var(--black); padding: 20px 28px 16px;
  display: flex; justify-content: space-between; align-items: center; gap: 16px;
}

.hdr-logo img {
  height: 36px; width: auto;
  display: block;
  object-fit: contain; /* never stretch */
}
.hdr-right { text-align: right; }
.hdr-right h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.75rem; letter-spacing: 0.12em; color: #fff; line-height: 1;
}
.hdr-sub {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.24em;
  color: var(--orange); margin-top: 5px; text-transform: uppercase;
}
.accent-bar { height: 4px; background: linear-gradient(90deg, var(--orange) 0%, #ff9a00 100%); }

/* Event rows */
.events-body { padding: 0; }
.event-row {
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--border); min-height: 108px;
}
.event-row:last-child { border-bottom: none; }
.event-row:nth-child(odd)  { background: var(--white); }
.event-row:nth-child(even) { background: var(--light); }
.event-row.is-today {
  background: #fff9f5 !important;
  border-left: 3px solid var(--orange);
}

/* Date col */
.ev-date {
  width: 76px; flex-shrink: 0;

  padding: 14px 6px; border-right: 1px solid var(--border); text-align: center;

.ev-day  { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; line-height: 1; color: var(--orange); }
.ev-mon  { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-top: 1px; }
.today-badge {
  background: var(--orange); color: #fff;
  font-size: 0.5rem; font-weight: 700; letter-spacing: 0.08em;
  border-radius: 4px; padding: 2px 5px; margin-top: 4px; text-transform: uppercase;
}

/* Thumbnail col — fixed 2:1 aspect, no distortion */
.ev-thumb {
  width: 144px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 10px 10px; border-right: 1px solid var(--border);
}
.ev-thumb-box {
  width: 122px;
  height: 61px; /* exactly 2:1 */
  border-radius: 8px; overflow: hidden;
  flex-shrink: 0; position: relative;
  display: flex; align-items: center; justify-content: center;
}
/* Gradient fallbacks — cycling orange palette */
.ev-thumb-box.g0 { background: linear-gradient(135deg,#ff6600,#ff9a00); }
.ev-thumb-box.g1 { background: linear-gradient(135deg,#cc4400,#ff6600); }
.ev-thumb-box.g2 { background: linear-gradient(135deg,#ff7700,#ffcc00); }
.ev-thumb-box.g3 { background: linear-gradient(135deg,#e84000,#ff7b00); }
.ev-thumb-box.g4 { background: linear-gradient(135deg,#ff6600,#ff3300); }
.ev-thumb-box.g5 { background: linear-gradient(135deg,#ff8800,#ffbb44); }
.ev-thumb-box img {
  /* Cover the box exactly — no stretching, no distortion */
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  display: block;
}
/* Watermark C on gradient fallback */
.ev-thumb-box.no-img::after {
  content: 'C'; font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem; color: rgba(255,255,255,0.22); line-height: 1;
  user-select: none; pointer-events: none;
}

   Image helpers
══════════════════════════════════════ */

/** Fetch any URL and return base64 data-URL, or null on failure */
async function urlToBase64(url) {
  if (!url || !url.trim()) return null;
  if (thumbCache.has(url)) return thumbCache.get(url);
  try {
    const res = await fetch(url, { mode: 'cors' });
    if (!res.ok) return null;
    const blob = await res.blob();
    return await new Promise(resolve => {
      const r = new FileReader();
      r.onload  = () => resolve(r.result);
      r.onerror = () => resolve(null);
      r.readAsDataURL(blob);
    });
  } catch (_) { return null; }
}

/**
 * Convert an SVG URL → PNG base64 via an offscreen canvas.
 * This makes html2canvas render the logo reliably (SVG src often blocked).
 * logoH: desired pixel height of the PNG output.
 */
async function svgUrlToPngBase64(svgUrl, logoH = 80) {
  try {
    // 1. Fetch SVG source text
    const res = await fetch(svgUrl, { mode: 'cors' });
    if (!res.ok) return null;
    const svgText = await res.text();

    // 2. Parse natural SVG dimensions for aspect ratio
    const parser = new DOMParser();
    const doc    = parser.parseFromString(svgText, 'image/svg+xml');
    const svgEl  = doc.querySelector('svg');
    let svgW = parseFloat(svgEl?.getAttribute('width')  || '0');
    let svgH = parseFloat(svgEl?.getAttribute('height') || '0');

    // Fallback to viewBox if width/height attrs are missing or 0
    if (!svgW || !svgH) {
      const vb = (svgEl?.getAttribute('viewBox') || '').trim().split(/[\s,]+/).map(Number);
      if (vb.length >= 4) { svgW = vb[2]; svgH = vb[3]; }
    }
    if (!svgW || !svgH) { svgW = 300; svgH = 60; } // last resort

    const aspect  = svgW / svgH;
    const pxH     = logoH;
    const pxW     = Math.round(pxH * aspect);

    // 3. Embed the SVG into a canvas via an Image element
    const svgBlob = new Blob([svgText], { type: 'image/svg+xml' });
    const blobUrl = URL.createObjectURL(svgBlob);

    return await new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const c   = document.createElement('canvas');
        c.width   = pxW * 2; // 2× for crispness
        c.height  = pxH * 2;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, c.width, c.height);
        URL.revokeObjectURL(blobUrl);
        resolve(c.toDataURL('image/png'));
      };
      img.onerror = () => { URL.revokeObjectURL(blobUrl); resolve(null); };
      img.src = blobUrl;
    });
  } catch (_) { return null; }
}

/**
 * Convert a thumbnail URL → base64, but draw it at EXACTLY the target
 * dimensions using a canvas — guarantees correct aspect-ratio cropping
 * (same as CSS object-fit:cover) regardless of the source image shape.
 */
async function thumbToBase64Cropped(url, targetW, targetH) {
  const raw = await urlToBase64(url);
  if (!raw) return null;
  return await new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width  = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext('2d');

      // object-fit:cover logic
      const scaleX = targetW / img.naturalWidth;
      const scaleY = targetH / img.naturalHeight;
      const scale  = Math.max(scaleX, scaleY);
      const drawW  = img.naturalWidth  * scale;
      const drawH  = img.naturalHeight * scale;
      const offX   = (targetW - drawW) / 2;
      const offY   = (targetH - drawH) / 2;

      ctx.drawImage(img, offX, offY, drawW, drawH);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => resolve(null);
    img.src = raw;
  });
}

    '9:00 AM,21/04/2026,Harbour Capital,Hong Kong,Innovation Forum,"Two IFC, 55/F Sky Lounge, Finance Street, Central",Yes,Tech innovation,Email,Yes,Q2,EVT007,,,,Kate Ma,kate@co.com,,,,Yes,https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=400&q=80,https://compassoffices.com/events/7,HD Projector,Forum',
    '2:30 PM,24/04/2026,Peak Solutions,Hong Kong,Client Appreciation Day,"The Center, 99/F VIP Suite, 99 Queen\'s Road Central",Yes,Client event,Online,Yes,Q2,EVT008,,,,Mike Lam,mike@co.com,,,,,,,Sound System,Networking',
  ];
  return [HDR, ...ROWS].join('\n');
}

function parseCSVLine(line) {
  const r = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else { inQ = !inQ; } }
    else if (c === ',' && !inQ) { r.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  r.push(cur.trim()); return r;
}
function parseCSV(txt) {
  const lines = txt.split('\n');
  const hdrs  = parseCSVLine(lines[0]).map(h => h.trim());
  return lines.slice(1).filter(l => l.trim()).map(l => {
    const v = parseCSVLine(l); const row = {};
    hdrs.forEach((h, i) => { row[h] = (v[i] || '').trim(); });
    return row;
  });
}
function parseDate(s) {
  if (!s) return null;
  let m;
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); if (m) return new Date(+m[3],+m[2]-1,+m[1]);
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);   if (m) return new Date(+m[1],+m[2]-1,+m[3]);
  m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);   if (m) return new Date(+m[3],+m[1]-1,+m[2]);
  const d = new Date(s); return isNaN(d) ? null : d;
}
function isHK(ev) {
  const r=(ev.Region||'').toLowerCase(), l=(ev.Location||'').toLowerCase();
  return HK_KW.some(kw => r.includes(kw) || l.includes(kw));
}
function isToday(d) {
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}
function getQRUrl(ev) {
  // Primary: exact column name from sheet
  if (ev['register-url'] && ev['register-url'].trim()) return ev['register-url'].trim();
  // Legacy fallbacks
  for (const k of ['QR','URL','Link','Booking','RSVP']) {
    if (ev[k] && ev[k].trim()) return ev[k].trim();
  }
  return null;
}

/* ══════════════════════════════════════
   HTML builder
   thumbMap: null = live mode (raw URLs); Map<url,base64> = export mode
══════════════════════════════════════ */
function buildPage(slice, pageNum, total, yearLbl, monthLbl, logoSrc, thumbMap) {
  const heading = monthLbl === 'All Months'
    ? `${yearLbl} Events` : `${monthLbl} ${yearLbl} Events`;

  const logoUrl = logoSrc ||
    'https://www.compassoffices.com/wp-content/themes/compass-offices/assets/images/compassoffices-logo-web-all-in-one-2025_ow.svg';

  const rows = slice.map((ev, i) => {
    const d       = ev.parsedDate;
    const type     = (ev.type || '').trim() || 'Event';
    const name     = (ev['Event-Name'] || 'Untitled Event').trim();
    const time     = (ev.Time || '').trim();
    const loc      = (ev.Location || '').trim();
    const qrUrl    = getQRUrl(ev);
    const rawThumb = (ev.thumbnail || '').trim();
    const aircon   = (ev.aircon || '').trim();
    const equip    = (ev.equipment || '').trim();
    const today    = isToday(d);

    // In export mode use pre-processed base64; in live mode use raw URL
    const thumbSrc = thumbMap
      ? (thumbMap.get(rawThumb) || null)  // null → gradient fallback
      : rawThumb;

    const gradCls = `g${i % GRAD_N}`;
    const thumbEl = thumbSrc
      ? `<div class="ev-thumb-box ${gradCls}">
           <img src="${thumbSrc}" alt="" width="122" height="61">
         </div>`
      : `<div class="ev-thumb-box ${gradCls} no-img"></div>`;

    return `
<div class="event-row${today ? ' is-today' : ''}">
  <div class="ev-date">
    <div class="ev-wd">${WEEKDAYS[d.getDay()]}</div>
    <div class="ev-day">${d.getDate()}</div>
    <div class="ev-mon">${MONTHS_S[d.getMonth()]}</div>
    ${today ? '<div class="today-badge">Today</div>' : ''}
  </div>
  <div class="ev-thumb">${thumbEl}</div>
  <div class="ev-info">
    <div class="ev-type">${type}</div>
    <div class="ev-name">${name}</div>
    <div class="ev-pills">
      ${time ? `<span class="ev-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${time}</span>` : ''}
      ${loc  ? `<span class="ev-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${loc}</span>` : ''}
      ${aircon ? `<span class="ev-pill ev-pill-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="2"/><path d="M9 12h6M7 12h.01M17 12h.01"/></svg>A/C: ${aircon}</span>` : ''}
      ${equip ? `<span class="ev-pill ev-pill-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>${equip}</span>` : ''}
    </div>
  </div>
  ${qrUrl ? `<div class="ev-qr">
    <div class="qr-box" data-url="${encodeURIComponent(qrUrl)}" id="qr-p${pageNum}-r${i}"></div>
    <div class="qr-lbl">Scan&nbsp;to&nbsp;RSVP</div>
  </div>` : ''}
</div>`;
  }).join('');

  return `
<div class="page-header">
  <div class="hdr-logo"><img src="${logoUrl}" alt="Compass Offices" width="auto" height="36" style="height:36px;width:auto;display:block;object-fit:contain;"></div>
  <div class="hdr-right">
    <h1>${heading.toUpperCase()}</h1>
    <div class="hdr-sub">Hong Kong &nbsp;·&nbsp; Upcoming Events</div>
  </div>
</div>
<div class="accent-bar"></div>
<div class="events-body">${rows}</div>
<div class="page-footer">
  <div class="ft-l"><div class="ft-dot"></div><div class="ft-site">compassoffices.com</div></div>
  <div class="ft-page">Page ${pageNum} of ${total}</div>
</div>`;
}

function attachQR(root) {
  root.querySelectorAll('.qr-box[data-url]').forEach(box => {
    const url = decodeURIComponent(box.getAttribute('data-url'));
    try {
      new QRCode(box, {
        text: url, width: 64, height: 64,
        colorDark: '#111', colorLight: '#fff',
        correctLevel: QRCode.CorrectLevel.M,
      });
    } catch (_) {}
  });
}

/* ══════════════════════════════════════
   Live rendering
══════════════════════════════════════ */
function getLabels() {
  const yr = document.getElementById('year-sel').value;
  const mo = document.getElementById('month-sel').value;
  return {
    yr, mo,
    yearLbl:  yr === 'all' ? new Date().getFullYear().toString() : yr,
    monthLbl: mo === 'all' ? 'All Months' : MONTHS[+mo],
    moName:   mo === 'all' ? 'events' : MONTHS[+mo].toLowerCase(),
  };
}
function renderPage(idx) {
  if (!pages.length) return;
  curPage = idx;
  const { yearLbl, monthLbl } = getLabels();
  const el = document.getElementById('event-page');
  el.innerHTML = buildPage(pages[idx], idx+1, pages.length, yearLbl, monthLbl, null, null);
  attachQR(el);
  document.getElementById('page-indicator').textContent = `${idx+1} / ${pages.length}`;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === pages.length - 1;
}
function rebuildPages(events) {
  pages = [];
  for (let i = 0; i < events.length; i += EVENTS_PER_PAGE)
    pages.push(events.slice(i, i + EVENTS_PER_PAGE));
  curPage = 0;
  if (!pages.length) {
    document.getElementById('event-page').innerHTML =
      '<div class="state-box"><p>No Hong Kong events found for the selected filters.</p></div>';
    document.getElementById('page-indicator').textContent = '0 / 0';
    ['btn-prev','btn-next'].forEach(id => { document.getElementById(id).disabled = true; });
    return;
  }
  renderPage(0);
}
function getFiltered() {
  const { yr, mo } = getLabels();
  return allEvents.filter(e => {
    if (yr !== 'all' && e.parsedDate.getFullYear() !== +yr) return false;
    if (mo !== 'all' && e.parsedDate.getMonth()    !== +mo) return false;
    return true;
  });
}
function refresh() { rebuildPages(getFiltered()); }

/* ══════════════════════════════════════
   Overlay helpers
══════════════════════════════════════ */
const overlay = {
  show(lbl, sub = '') {
    document.getElementById('gen-overlay').classList.add('on');
    document.getElementById('gen-lbl').textContent = lbl;

/* ══════════════════════════════════════
   Shared pre-fetch routine
   Returns { thumbMap, logoSrc } ready for buildPage()
══════════════════════════════════════ */
// Thumbnail pixel size for pre-processing: 2× the CSS display size
const THUMB_CSS_W = 122, THUMB_CSS_H = 61;
const THUMB_PX_W  = THUMB_CSS_W * 2, THUMB_PX_H = THUMB_CSS_H * 2;

async function prefetchAssets() {
  // Logo: SVG → PNG base64 (so html2canvas can render it without CORS/SVG issues)
  if (!logoB64) {
    overlay.show('Fetching logo…', 'Converting to high-res PNG');
    logoB64 = await svgUrlToPngBase64(
      'https://www.compassoffices.com/wp-content/themes/compass-offices/assets/images/compassoffices-logo-web-all-in-one-2025_ow.svg',
      80 // output height in px (2× the 36px CSS height = 72px; use 80 for extra headroom)
    );
    // If SVG conversion fails, fall back to the PNG icon
    if (!logoB64) {
      logoB64 = await urlToBase64(
        'https://www.compassoffices.com/wp-content/uploads/2025/09/compassoffices-logo-web-2025_icon-o-scaled.png'
      );
    }
  }

  // Thumbnails: fetch + crop to exact 2:1 ratio
  const urls = new Set();
  pages.forEach(pg => pg.forEach(ev => {
    const u = (ev.thumbnail || ev.Thumbnail || '').trim();
    if (u && !thumbCache.has(u)) urls.add(u);
  }));

  if (urls.size > 0) {
    overlay.show('Loading thumbnails…', `Fetching ${urls.size} image${urls.size !== 1 ? 's' : ''}`);
    await Promise.all([...urls].map(async url => {
      const b64 = await thumbToBase64Cropped(url, THUMB_PX_W, THUMB_PX_H);
      // Store in cache regardless (null = gradient fallback)
      thumbCache.set(url, b64);
    }));
  }

  // Build thumbMap for current pages
  const thumbMap = new Map();
  pages.forEach(pg => pg.forEach(ev => {
    const u = (ev.thumbnail || ev.Thumbnail || '').trim();
    if (u) thumbMap.set(u, thumbCache.get(u) || null);
  }));

  return { thumbMap, logoSrc: logoB64 };
}

/* ══════════════════════════════════════
   Offscreen page renderer
   Returns array of HTMLCanvasElement, one per page
══════════════════════════════════════ */
async function renderAllToCanvases(cardW, thumbMap, logoSrc, scale) {
  const { yearLbl, monthLbl } = getLabels();

  const off = document.createElement('div');
  off.style.cssText = [
    'position:fixed', 'left:-9999px', 'top:0',
    `width:${cardW}px`, 'background:#fff',
    'overflow:visible', 'z-index:-1',
  ].join(';');
  document.body.appendChild(off);

  const canvases = [];
  try {
    for (let p = 0; p < pages.length; p++) {
      overlay.show(
        `Rendering page ${p+1} of ${pages.length}…`,
        `${scale}× scale · ${Math.round(cardW * scale)}px wide`
      );
      off.innerHTML = buildPage(pages[p], p+1, pages.length, yearLbl, monthLbl, logoSrc, thumbMap);
      attachQR(off);
      await new Promise(r => setTimeout(r, 160)); // let QR + images paint

      const c = await html2canvas(off, {
        scale, useCORS: true, allowTaint: true,
        backgroundColor: '#ffffff', logging: false,
        width: cardW, scrollX: 0, scrollY: 0, imageTimeout: 0,
      });
      canvases.push(c);
    }
  } finally {
    document.body.removeChild(off);
  }
  return canvases;
}

/* ══════════════════════════════════════
   Stitch canvases into one tall canvas
══════════════════════════════════════ */
function stitchCanvases(canvases) {
  const W = canvases[0].width;
  const H = canvases.reduce((s, c) => s + c.height, 0);
  const out = document.createElement('canvas');
  out.width = W; out.height = H;
  const ctx = out.getContext('2d');
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
  let y = 0;
  for (const c of canvases) { ctx.drawImage(c, 0, y); y += c.height; }
  return out;
}

/* ══════════════════════════════════════
   Deliver file: download on desktop, new tab on mobile
══════════════════════════════════════ */

        : `<div class="tip">📸 <strong>To save:</strong> Long-press the image → <strong>Save to Photos</strong><br>

/* ══════════════════════════════════════
   Download JPG
   Target: JPG_TARGET_W px wide (phone-share quality)
══════════════════════════════════════ */
async function downloadJPG() {
  if (!pages.length) return;
  const btn = document.getElementById('btn-jpg');
  btn.disabled = document.getElementById('btn-pdf').disabled = true;

  try {
    const { thumbMap, logoSrc } = await prefetchAssets();
    const cardW = document.getElementById('event-page').offsetWidth;

    // Calculate scale so output width = JPG_TARGET_W
    const scale = Math.max(1, JPG_TARGET_W / cardW);

    const canvases = await renderAllToCanvases(cardW, thumbMap, logoSrc, scale);

    overlay.show('Stitching pages…', `${pages.length} page${pages.length !== 1 ? 's' : ''} → one image`);
    const out = stitchCanvases(canvases);

    overlay.show('Saving…', `${out.width} × ${out.height} px`);
    await new Promise(r => setTimeout(r, 100));

    const { moName, yr } = getLabels();
    const jpg = out.toDataURL('image/jpeg', 0.94);
    deliverDataUrl(jpg, `compass-hk-${moName}-${yr}.jpg`, 'JPG');

  } catch (err) {
    console.error(err);
    alert('Could not generate JPG — please try again.\n' + err.message);
  } finally {
    overlay.hide();
    btn.disabled = document.getElementById('btn-pdf').disabled = false;
  }
}

/* ══════════════════════════════════════
   Download PDF — A4 pages
   Each rendered page fits within A4 (no cropping, no distortion).
══════════════════════════════════════ */
async function downloadPDF() {
  if (!pages.length) return;
  const btn = document.getElementById('btn-pdf');
  btn.disabled = document.getElementById('btn-jpg').disabled = true;

  try {
    const { thumbMap, logoSrc } = await prefetchAssets();
    const cardW = document.getElementById('event-page').offsetWidth;

    // Render at 2× for crisp PDF quality
    const PDF_SCALE = 2;
    const canvases  = await renderAllToCanvases(cardW, thumbMap, logoSrc, PDF_SCALE);

    overlay.show('Building PDF…', `${pages.length} A4 page${pages.length !== 1 ? 's' : ''}`);
    await new Promise(r => setTimeout(r, 80));

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

    // A4 usable area (leave small margins to avoid clipping)
    const marginMM = 8;
    const usableW  = PDF_W_MM - marginMM * 2; // 194mm
    const usableH  = PDF_H_MM - marginMM * 2; // 281mm

    canvases.forEach((c, idx) => {
      if (idx > 0) doc.addPage();

      // Calculate how to fit this canvas into the A4 usable area
      // maintaining aspect ratio (letterbox / fit — never stretch)
      const cAspect    = c.width / c.height;
      const usableAspect = usableW / usableH;

      let drawW, drawH;
      if (cAspect >= usableAspect) {
        // wider than A4 usable → fit by width
        drawW = usableW;
        drawH = usableW / cAspect;
      } else {
        // taller than A4 usable → fit by height
        drawH = usableH;
        drawW = usableH * cAspect;
      }

      // Centre on the page
      const x = marginMM + (usableW - drawW) / 2;
      const y = marginMM + (usableH - drawH) / 2;

      const imgData = c.toDataURL('image/png'); // PNG for crisp lines in PDF
      doc.addImage(imgData, 'PNG', x, y, drawW, drawH);
    });

    const { moName, yr } = getLabels();
    const pdfName = `compass-hk-${moName}-${yr}.pdf`;

    // jsPDF output: 'datauristring' gives a data URL we can deliver uniformly
    const pdfDataUrl = doc.output('datauristring');
    deliverDataUrl(pdfDataUrl, pdfName, 'PDF');

  } catch (err) {
    console.error(err);
    alert('Could not generate PDF — please try again.\n' + err.message);
  } finally {
    overlay.hide();
    btn.disabled = document.getElementById('btn-jpg').disabled = false;
  }
}

/* ══════════════════════════════════════
   Init
══════════════════════════════════════ */
async function init() {
  // Warm logo fetch in background while CSV loads
  const [csvText] = await Promise.all([
    fetchCSV(),
    svgUrlToPngBase64(
      'https://www.compassoffices.com/wp-content/themes/compass-offices/assets/images/compassoffices-logo-web-all-in-one-2025_ow.svg', 80
    ).then(b => { if (b) logoB64 = b; }),
  ]);

  const rows = parseCSV(csvText);
  allEvents  = rows
    .map(r => ({ ...r, parsedDate: parseDate(r.Date) }))
    .filter(r => r.parsedDate !== null && isHK(r))
    .sort((a, b) => a.parsedDate - b.parsedDate);

  // Populate year dropdown
  const years   = [...new Set(allEvents.map(e => e.parsedDate.getFullYear()))].sort((a,b) => a-b);
  const yearSel = document.getElementById('year-sel');
  yearSel.innerHTML = '<option value="all">All Years</option>';
  years.forEach(y => { const o=document.createElement('option'); o.value=o.textContent=y; yearSel.appendChild(o); });
  const cy = new Date().getFullYear();
  yearSel.value = years.includes(cy) ? cy : 'all';
  document.getElementById('month-sel').value = new Date().getMonth().toString();

  refresh();

  yearSel.addEventListener('change', refresh);
  document.getElementById('month-sel').addEventListener('change', refresh);
  document.getElementById('btn-prev').addEventListener('click', () => renderPage(curPage - 1));
  document.getElementById('btn-next').addEventListener('click', () => renderPage(curPage + 1));
  document.getElementById('btn-jpg').addEventListener('click', downloadJPG);
  document.getElementById('btn-pdf').addEventListener('click', downloadPDF);
}

document.addEventListener('DOMContentLoaded', init);

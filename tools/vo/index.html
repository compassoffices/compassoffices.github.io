<style>
/* ============ scoped: .vopl ============ */
.vopl{
  --co-orange:#FF6600;      --co-orange-dk:#E55A00;
  --co-orange-wash:#FFF3EB; --co-orange-tint:#FFD9BD;
  --co-ink:#1A1A1A;         --co-ink-deep:#161616;
  --co-text:#333333;        --co-text-2:#555555;
  --co-muted:#888888;       --co-faint:#BBBBBB;
  --co-line:#E5E5E5;        --co-line-soft:rgba(0,0,0,.08);
  --co-bg:#F5F5F5;          --co-fill:#EFEFEF;      --co-paper:#FFFFFF;
  --co-radius:10px;         --co-radius-pill:999px;
  color:var(--co-ink);
  font-family:'Hanken Grotesk','Noto Sans TC','Noto Sans SC','Noto Sans JP',sans-serif;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  background:var(--co-bg);
  margin:0; min-height:100vh;
}
.vopl *,.vopl *::before,.vopl *::after{box-sizing:border-box;}

/* ---- toolbar ---- */
.vopl-bar{position:sticky;top:0;z-index:50;background:var(--co-paper);border-bottom:1px solid var(--co-line);
  padding:12px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.vopl-bar-logo{height:26px;width:auto;display:block;}
.vopl-bar label{font-size:12px;font-weight:600;color:var(--co-text-2);margin-right:2px;}
.vopl-sel{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--co-line);border-radius:8px;
  background:var(--co-paper);color:var(--co-ink);cursor:pointer;}
.vopl-langs{display:flex;border:1px solid var(--co-line);border-radius:var(--co-radius-pill);overflow:hidden;}
.vopl-lang{font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 13px;border:0;background:var(--co-paper);
  color:var(--co-text-2);cursor:pointer;}
.vopl-lang.on{background:var(--co-orange);color:#fff;}
.vopl-lang:disabled{opacity:.35;cursor:not-allowed;}
.vopl-chk{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--co-text-2);cursor:pointer;}
.vopl-chk input{accent-color:#FF6600;cursor:pointer;}
.vopl-btn{font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:var(--co-radius-pill);
  border:1px solid var(--co-line);background:var(--co-paper);color:var(--co-ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
.vopl-btn:hover{border-color:var(--co-faint);}
.vopl-btn.primary{background:var(--co-orange);border-color:var(--co-orange);color:#fff;}
.vopl-btn.primary:hover{background:var(--co-orange-dk);border-color:var(--co-orange-dk);}
.vopl-btn:disabled{opacity:.45;cursor:not-allowed;}
.vopl-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.vopl-status{font-size:12px;color:var(--co-muted);margin-left:auto;max-width:340px;}
.vopl-status.err{color:#C0392B;}
.vopl-status.ok{color:#2E7D32;}
.vopl-file{display:none;}

/* ---- page stage ---- */
.vopl-stage{padding:28px 12px 60px;display:flex;flex-direction:column;align-items:center;gap:24px;}
.vopl-page{width:794px;height:1123px;background:var(--co-paper);position:relative;
  box-shadow:0 4px 24px rgba(0,0,0,.10);padding:46px 48px 64px;display:flex;flex-direction:column;overflow:hidden;}
.vopl-phead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;flex:0 0 auto;}
.vopl-phead-logo{width:190px;height:auto;display:block;margin-top:6px;}
.vopl-ptitle{text-align:right;}
.vopl-ptitle .t1{font-size:40px;font-weight:800;color:var(--co-orange);line-height:1.05;letter-spacing:.5px;}
.vopl-ptitle .t2{font-size:26px;font-weight:300;color:var(--co-ink);line-height:1.15;letter-spacing:.5px;}
.vopl-pbody{flex:1 1 auto;overflow:hidden;}
.vopl-pfoot{position:absolute;left:48px;right:48px;bottom:28px;display:flex;justify-content:space-between;
  font-size:9px;color:var(--co-muted);}
.vopl-pfoot span{margin-right:18px;}

/* ---- VO price table ---- */
.vopl-cols{display:grid;grid-template-columns:1fr 128px 128px 128px;}
.vopl-chead{padding:8px 6px 10px;text-align:center;font-weight:700;font-size:13.5px;color:var(--co-orange);}
.vopl-chead.lbl{text-align:left;}
.vopl-vline{border-left:1px solid var(--co-line);}
.vopl-city{grid-column:1 / -1;padding:10px 0 4px;font-size:15px;font-weight:800;color:var(--co-ink);
  letter-spacing:.4px;border-top:1px solid var(--co-ink);}
.vopl-dist{grid-column:1 / -1;padding:7px 0 3px;font-size:13.5px;font-weight:700;color:var(--co-ink);
  border-top:1px solid var(--co-faint);}
.vopl-dist.first,.vopl-city.first{border-top:1px solid var(--co-ink);}
.vopl-grp-l{padding:5px 8px 5px 0;border-top:1px dotted var(--co-line);}
.vopl-grp-l.nodot{border-top:0;}
.vopl-grp-l .lv,.vopl-grp-l .ad{font-size:10.5px;color:var(--co-text);line-height:1.45;}
.vopl-grp-l .bd{font-size:11.5px;font-weight:700;color:var(--co-orange);line-height:1.45;}
.vopl-price{display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;
  color:var(--co-ink);border-top:1px dotted var(--co-line);}
.vopl-price.nodot{border-top:0;}
.vopl-endline{grid-column:1 / -1;border-top:1px solid var(--co-ink);}

/* ---- VO features table ---- */
.vopl-fcat{grid-column:1 / -1;padding:16px 0 6px;font-size:13px;font-weight:700;color:var(--co-ink);border-top:1px solid var(--co-line);}
.vopl-fcat.first{border-top:1px solid var(--co-ink);padding-top:12px;}
.vopl-frow-l{padding:7px 10px 7px 0;font-size:11px;color:var(--co-text);border-top:1px dotted var(--co-line);line-height:1.5;}
.vopl-fval{display:flex;align-items:center;justify-content:center;font-size:11px;border-top:1px dotted var(--co-line);color:var(--co-ink);}
.vopl-fval .dot,.vopl-mx .dot{width:6px;height:6px;border-radius:50%;background:var(--co-orange);display:inline-block;}
.vopl-fval .dash{width:14px;height:2px;background:var(--co-ink);display:inline-block;}
.vopl-fval .txt{font-weight:700;font-size:10.5px;text-align:center;}
.vopl-fnotes{margin-top:26px;border-top:1px dotted var(--co-faint);padding-top:14px;}
.vopl-fnote{font-size:8.8px;color:var(--co-text);line-height:1.6;}
.vopl-fnote.b{font-weight:700;}
.vopl-fnote.i{padding-left:10px;}

/* ---- MR pricing ---- */
.vopl-mrsec{margin-bottom:8px;}
.vopl-mrtitle{font-size:14.5px;font-weight:700;color:var(--co-ink);padding:14px 0 6px;}
.vopl-mrt{display:grid;}
.vopl-mrt .h{padding:8px 6px;text-align:center;font-weight:700;font-size:12.5px;color:var(--co-orange);}
.vopl-mrt .h.lbl{text-align:left;color:var(--co-orange);font-size:13px;}
.vopl-mrt .bld{grid-column:1 / -1;padding:8px 0 2px;font-size:12px;font-weight:700;color:var(--co-orange);}
.vopl-mrt .rl{padding:8px 8px 8px 0;font-size:11px;color:var(--co-text);border-top:1px solid var(--co-line);}
.vopl-mrt .rv{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  color:var(--co-ink);border-top:1px solid var(--co-line);}
.vopl-mrt .bot{grid-column:1 / -1;border-top:1px solid var(--co-line);}
.vopl-vc{font-size:12px;font-weight:700;font-style:italic;color:var(--co-ink);padding:20px 0 4px;line-height:1.6;}
.vopl-mrbottom{display:flex;gap:14px;margin-top:26px;border-top:1px dotted var(--co-faint);padding-top:14px;align-items:flex-start;}
.vopl-tc{flex:1.35;}
.vopl-tc .tt{font-size:10px;font-weight:700;color:var(--co-ink);margin-bottom:3px;}
.vopl-tc .ln{font-size:8.8px;color:var(--co-text);line-height:1.6;}
.vopl-card{flex:1;border:1px solid var(--co-line);border-radius:8px;padding:12px 14px;background:var(--co-paper);}
.vopl-card .tt{font-size:11px;font-weight:700;color:var(--co-orange);margin-bottom:6px;line-height:1.35;}
.vopl-card .ln{font-size:9.5px;color:var(--co-text);line-height:1.75;}

/* ---- MR availability matrix ---- */
.vopl-mx .h{padding:8px 6px 10px;text-align:center;font-weight:700;font-size:12px;color:var(--co-orange);white-space:pre-line;}
.vopl-mx .h.lbl{text-align:left;}
.vopl-mx-dist{grid-column:1 / -1;padding:12px 0 2px;font-size:13px;font-weight:700;color:var(--co-muted);border-top:1px solid var(--co-line);}
.vopl-mx-dist.first{border-top:1px solid var(--co-ink);}
.vopl-mx .bname{padding:7px 8px 7px 0;font-size:12px;font-weight:700;color:var(--co-orange);}
.vopl-mx .bname.cont{border-top:0;}
.vopl-mx .lvl{padding:7px 8px;font-size:11px;font-weight:700;color:var(--co-ink);}
.vopl-mx .dcell{display:flex;align-items:center;justify-content:center;}
.vopl-mx .sep{grid-column:1 / -1;border-top:1px solid var(--co-line);margin:5px 0 4px;}

.vopl-empty{padding:60px 20px;text-align:center;color:var(--co-muted);font-size:14px;}
@media (max-width:840px){.vopl-page{transform:scale(.44);transform-origin:top center;margin-bottom:-600px;}}
</style>
</head>

</div>

<script>
/* =====================================================================
   CONFIG — edit these
   ===================================================================== */
var SCRIPT_URL = "";  // <-- paste your Apps Script Web App URL here after deploying Code.gs

var MARKETS = {
  "Hong Kong":        { currency:"HK$", featuresTab:"Data",  mrTab:"HongKong", mrInfoTab:"info",
                        contact:{ t:"+852 3796 7188", e:"HKsales@compassoffices.com" } },
  "Japan":            { currency:"\u00A5", featuresTab:"Data", mrTab:"Japan", mrInfoTab:"info", contact:{ t:"", e:"" } },
  "Australia":        { currency:"AU$",  featuresTab:"Data-au", order:"building-first", mrTab:"Australia", mrInfoTab:"info-au", contact:{ t:"", e:"" } },
  "Singapore":        { currency:"S$",   featuresTab:"Data", mrTab:"Singapore", mrInfoTab:"info", contact:{ t:"", e:"" } },
  "Manila":           { currency:"\u20B1", featuresTab:"Data", mrTab:"Manila", mrInfoTab:"info", contact:{ t:"", e:"" } },
  "Kuala Lumpur":     { currency:"RM",   featuresTab:"Data", mrTab:"Kuala Lumpur", mrInfoTab:"info", contact:{ t:"", e:"" } },
  "Ho Chi Minh City": { currency:"\u20AB", featuresTab:"Data", mrTab:"Ho Chi Minh City", mrInfoTab:"info", contact:{ t:"", e:"" } }
};
// TODO: fill in each market's sales phone/email above (footer shows website only when blank).

var WEBSITE = "www.compassoffices.com";

/* Column offsets of each language block in the VO market tabs */
var LANG_BLOCKS = {
  "EN": { col:0,  label:"EN" },
  "TC": { col:7,  label:"\u7E41" },
  "SC": { col:14, label:"\u7C21" },
  "JP": { col:21, label:"\u65E5" },
  "VI": { col:28, label:"VI" }
};

/* Marker rows that split the VO features (Data) tab into language sections */
var FEATURE_MARKERS = { "\u7E41\u9AD4":"TC", "\u7C21\u9AD4":"SC", "\u7C21\u4F53":"SC", "\u65E5\u6587":"JP", "Viet":"VI" };

/* info / info-au tab column per language (T&C + booking cards fallback) */
var INFO_COLS = { EN:0, JP:1, SC:2, TC:3, VI:4 };

/* Page titles per language — confirm translations with the team */
var TITLES_VO = {
  EN: { t1:"VIRTUAL OFFICE", t2:"SOLUTIONS" },
  TC: { t1:"\u865B\u64EC\u8FA6\u516C\u5BA4", t2:"\u670D\u52D9\u65B9\u6848" },
  SC: { t1:"\u865A\u62DF\u529E\u516C\u5BA4", t2:"\u670D\u52A1\u65B9\u6848" },
  JP: { t1:"\u30D0\u30FC\u30C1\u30E3\u30EB\u30AA\u30D5\u30A3\u30B9", t2:"\u30BD\u30EA\u30E5\u30FC\u30B7\u30E7\u30F3" },
  VI: { t1:"V\u0102N PH\u00D2NG \u1EA2O", t2:"GI\u1EA2I PH\u00C1P" }
};
var TITLES_MR = {
  EN: { t1:"MEETING ROOM", t2:"SOLUTIONS" },
  TC: { t1:"\u6703\u8B70\u5BA4", t2:"\u670D\u52D9\u65B9\u6848" },
  SC: { t1:"\u4F1A\u8BAE\u5BA4", t2:"\u670D\u52A1\u65B9\u6848" },
  JP: { t1:"\u4F1A\u8B70\u5BA4", t2:"\u30BD\u30EA\u30E5\u30FC\u30B7\u30E7\u30F3" },
  VI: { t1:"PH\u00D2NG H\u1ECCP", t2:"GI\u1EA2I PH\u00C1P" }
};

/* =====================================================================
   STATE
   ===================================================================== */
var DATA = { vo:null, mr:null };
var curMarket = "Hong Kong";
var curLang = "EN";
var LEVEL_RE = /^level\b|\u6A13|\u697C|\u968E|^t\u1EA7ng|^\d+\s*f\b/i;
var PAX_RE = /pax|\d\s*\u4F4D|\u540D\u7528|private\s*room|\u79C1\u4EBA/i;
var MR_PRICING_RE = /meeting and conference rooms|\u6703\u8B70\u5BA4|\u4F1A\u8BAE\u5BA4|\u4F1A\u8B70\u5BA4|D\u1ECACH V\u1EE4 PH\u00D2NG H\u1ECCP/i;
var VC_RE = /video conferencing|\u8996\u50CF\u6703\u8B70|\u89C6\u50CF\u4F1A\u8BAE|\u30D3\u30C7\u30AA\u4F1A\u8B70|h\u1ED9i ngh\u1ECB truy\u1EC1n h\u00ECnh/i;
var TC_ANCHOR_RE = /^terms and conditions|\u689D\u6B3E|\u6761\u6B3E|\u4F7F\u7528\u6761\u6B3E|\u3054\u5229\u7528\u6761\u4EF6|\u5951\u7D04\u6761\u4EF6|\u0110i\u1EC1u kho\u1EA3n/i;
var INCL_RE = /what is included|\u670D\u52D9\u5957\u9910\u5305\u62EC|\u670D\u52A1\u5957\u9910\u5305\u62EC|\u3054\u4E88\u7D04\u306B\u542B\u307E\u308C\u308B|\u5305\u542B\u7684\u5185\u5BB9|BAO G\u1ED2M/i;
var AVAIL_RE = /what is available|\u5982\u6709\u9700\u8981|\u30EA\u30AF\u30A8\u30B9\u30C8|\u53EF\u6839\u636E\u9700\u6C42|Y\u00CAU C\u1EA6U/i;

/* =====================================================================
   BOOT
   ===================================================================== */
var mktSel = document.getElementById("mkt");
Object.keys(MARKETS).forEach(function(m){
  var o = document.createElement("option"); o.value = m; o.textContent = m; mktSel.appendChild(o);
});
mktSel.addEventListener("change", function(){ curMarket = mktSel.value; render(); });

var langsEl = document.getElementById("langs");
Object.keys(LANG_BLOCKS).forEach(function(k){
  var b = document.createElement("button");
  b.className = "vopl-lang"; b.textContent = LANG_BLOCKS[k].label; b.dataset.lang = k;
  b.addEventListener("click", function(){ curLang = k; render(); });
  langsEl.appendChild(b);
});

document.getElementById("btnRefresh").addEventListener("click", fetchData);
document.getElementById("btnLoad").addEventListener("click", function(){ document.getElementById("fileIn").click(); });
document.getElementById("fileIn").addEventListener("change", loadXlsx);
document.getElementById("btnPdf").addEventListener("click", function(){ exportPdf(false); });
document.getElementById("btnDrive").addEventListener("click", function(){ exportPdf(true); });
document.getElementById("secVO").addEventListener("change", render);
document.getElementById("secMR").addEventListener("change", render);

function setStatus(msg, cls){
  var el = document.getElementById("status");
  el.textContent = msg; el.className = "vopl-status" + (cls ? " " + cls : "");
}

if (SCRIPT_URL) { fetchData(); }
else { setStatus("Set SCRIPT_URL in the file, or Load XLSX to test offline."); }

/* =====================================================================
   DATA LOADING
   ===================================================================== */
function fetchData(){
  if (!SCRIPT_URL) { setStatus("SCRIPT_URL is not set — deploy Code.gs first.", "err"); return; }
  setStatus("Fetching from Google Sheets\u2026");
  fetch(SCRIPT_URL + (SCRIPT_URL.indexOf("?")>-1 ? "&" : "?") + "action=data")
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok) throw new Error(j.error || "backend error");
      if (j.vo) DATA.vo = normalizeAll(j.vo);
      if (j.mr) DATA.mr = normalizeAll(j.mr);
      setStatus("Loaded" + (DATA.vo ? " VO" : "") + (DATA.mr ? " MR" : "") + " \u00B7 " + new Date().toLocaleTimeString(), "ok");
      render();
    })
    .catch(function(err){ setStatus("Fetch failed: " + err.message, "err"); });
}

function classifyWorkbook(sheets){
  var names = Object.keys(sheets);
  if (names.indexOf("info") > -1 || names.indexOf("HongKong") > -1) return "mr";
  return "vo";
}

function loadXlsx(ev){
  var files = Array.prototype.slice.call(ev.target.files || []);
  if (!files.length) return;
  var pending = files.length, loaded = [];
  files.forEach(function(f){
    var rd = new FileReader();
    rd.onload = function(e){
      try{
        var wb = XLSX.read(new Uint8Array(e.target.result), { type:"array" });
        var sheets = {};
        wb.SheetNames.forEach(function(n){
          sheets[n] = XLSX.utils.sheet_to_json(wb.Sheets[n], { header:1, raw:true, defval:null });
        });
        var kind = classifyWorkbook(sheets);
        DATA[kind] = normalizeAll(sheets);
        loaded.push(kind.toUpperCase() + " (" + f.name + ")");
      }catch(err){ loaded.push("FAILED: " + f.name); }
      if (--pending === 0){ setStatus("Loaded " + loaded.join(", "), "ok"); render(); }
    };
    rd.readAsArrayBuffer(f);
  });
  ev.target.value = "";
}

function normalizeAll(sheets){
  var out = {};
  Object.keys(sheets).forEach(function(n){
    out[n] = sheets[n].map(function(row){
      return (row || []).map(function(v){
        if (v === "" || v === undefined) return null;
        if (typeof v === "string") { var t = v.trim(); return t === "" ? null : t; }
        return v;
      });
    });
  });
  return out;
}

/* =====================================================================
   SHARED HELPERS
   ===================================================================== */
function cell(rows, r, c){ return (rows[r] && rows[r][c] !== undefined) ? rows[r][c] : null; }

function fmtPrice(v, prefix){
  if (v === null || v === undefined || v === "") return "";
  var num = (typeof v === "number") ? v : parseFloat(String(v).replace(/[^\d.]/g, ""));
  if (isNaN(num)) return String(v);
  return prefix + Math.round(num).toLocaleString("en-US");
}

function esc(s){
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
}

/* Detect the language of a text snippet (for anchor-based MR parsing) */
function sniffLang(s){
  s = String(s);
  if (/[\u3040-\u30FF]/.test(s)) return "JP";                                    // kana
  if (/[\u0102\u0103\u1EA0-\u1EF9\u01A0\u01A1\u01AF\u01B0]/.test(s) || /ph\u00F2ng|h\u1ECDp|t\u1EA7ng|d\u1ECBch|m\u1ED7i/i.test(s)) return "VI";
  var trad = /[\u6703\u52D9\u6A13\u689D\u50F9\u512A\u8FA6\u65BC\u8B49\u7E73\u9810\u8996\u6236\u9418\u8B70\u5011]/.test(s);
  var simp = /[\u4F1A\u52A1\u697C\u6761\u4EF7\u4F18\u529E\u4E8E\u8BC1\u7F34\u9884\u89C6\u6237\u949F\u8BAE\u4EEC]/.test(s);
  if (trad && !simp) return "TC";
  if (simp && !trad) return "SC";
  if (trad) return "TC";
  if (simp) return "SC";
  return "EN";
}

function blankRow(rows, r){
  if (!rows[r]) return true;
  for (var c = 0; c < rows[r].length; c++) if (rows[r][c] !== null) return false;
  return true;
}

/* =====================================================================
   VO PARSERS (pattern-based, per language block)
   ===================================================================== */
function parsePriceBlock(rows, base){
  var items = [], r = 1;
  var n = rows.length;
  while (r < n){
    var label = cell(rows, r, base);
    if (label === null){ r++; continue; }
    var g = cell(rows, r, base+1), p = cell(rows, r, base+2), d = cell(rows, r, base+3);
    if (g !== null){
      var lines = [String(label)], j = r + 1;
      while (j < n && lines.length < 3){
        var nl = cell(rows, j, base);
        if (nl === null || cell(rows, j, base+1) !== null) break;
        lines.push(String(nl)); j++;
      }
      items.push({ type:"group", lines:lines, prices:[g, p, d] });
      r = j;
    } else {
      items.push({ type:"header", text:String(label) });
      r++;
    }
  }
  for (var i = 0; i < items.length - 1; i++){
    if (items[i].type === "header" && items[i+1].type === "header") items[i].type = "city";
  }
  return items;
}

function splitGroup(lines, forced){
  if (lines.length < 3) return { pre:lines[0]||"", bld:lines[1]||"", post:lines[2]||"", order:"lbp" };
  var bf = forced ? (forced === "building-first") : !LEVEL_RE.test(lines[0]);
  if (bf) return { pre:lines[1], bld:lines[0], post:lines[2], order:"building-first" };
  return { pre:lines[0], bld:lines[1], post:lines[2], order:"level-first" };
}

function parseFeatures(rows, lang){
  var sections = { EN:{ start:0, end:rows.length } }, cur = "EN";
  for (var r = 0; r < rows.length; r++){
    var a = cell(rows, r, 0);
    if (a !== null && FEATURE_MARKERS[String(a).trim()]){
      sections[cur].end = r;
      cur = FEATURE_MARKERS[String(a).trim()];
      sections[cur] = { start:r + 1, end:rows.length };
    }
  }
  var sec = sections[lang] || sections.EN;
  var heads = null, feats = [], lastVal = -1;
  for (var r2 = sec.start; r2 < sec.end; r2++){
    var lbl = cell(rows, r2, 0), v1 = cell(rows, r2, 1);
    if (lbl === null && v1 !== null && !heads){
      heads = [String(v1), String(cell(rows, r2, 2)||""), String(cell(rows, r2, 3)||"")]; continue;
    }
    if (lbl === null) continue;
    if (v1 !== null){
      feats.push({ type:"feat", label:String(lbl),
        vals:[v1, cell(rows, r2, 2), cell(rows, r2, 3)].map(function(x){ return x === null ? "" : String(x); }) });
      lastVal = feats.length - 1;
    } else {
      feats.push({ type:"cat", label:String(lbl) });
    }
  }
  var notes = [];
  if (lastVal > -1){
    notes = feats.slice(lastVal + 1).map(function(x){ return x.label; });
    feats = feats.slice(0, lastVal + 1);
    while (feats.length && feats[feats.length-1].type === "cat") feats.pop();
  }
  return { heads: heads || ["Gold","Platinum","Diamond"], feats:feats, notes:notes };
}

/* =====================================================================
   MR PARSERS (anchor-based: rows can move freely, columns define blocks)
   ===================================================================== */

/* Find all anchor cells of a kind, each tagged with its language */
function findAnchors(rows, re){
  var out = [];
  for (var r = 0; r < rows.length; r++){
    if (!rows[r]) continue;
    for (var c = 0; c < rows[r].length; c++){
      var v = rows[r][c];
      if (v !== null && typeof v === "string" && re.test(v)){
        out.push({ r:r, c:c, text:v, lang:sniffLang(v) });
      }
    }
  }
  return out;
}

/* Parse one MR pricing table below its anchor.
   Header row = first row within 3 that has pax cells right of the anchor col.
   Rows: label at anchor col; values under header cols; label-only = building. */
function parseMrTable(rows, anchor, inherit){
  var hr = -1, cols = [], heads = null;
  for (var r = anchor.r; r <= anchor.r + 3 && r < rows.length; r++){
    var cand = [];
    for (var c = anchor.c + 1; c <= anchor.c + 8; c++){
      var v = cell(rows, r, c);
      if (v !== null && PAX_RE.test(String(v))) cand.push(c);
    }
    if (cand.length){
      var run = [cand[0]];
      for (var k = 1; k < cand.length; k++){
        if (cand[k] - run[run.length-1] > 2) break;
        run.push(cand[k]);
      }
      hr = r; cols = run; break;
    }
  }
  if (hr < 0){
    if (!inherit) return null;             // e.g. External table reusing the Internal header
    hr = anchor.r; cols = inherit.cols; heads = inherit.heads;
  }
  if (!heads) heads = cols.map(function(c){ return String(cell(rows, hr, c)).replace(/\(.*?\)/g, "").trim(); });
  var body = [], consumed = [hr];
  var labelAtHr = cell(rows, hr, anchor.c);
  var r2 = hr + 1, blanks = 0;
  while (r2 < rows.length){
    var lbl = cell(rows, r2, anchor.c);
    var vals = cols.map(function(c){ return cell(rows, r2, c); });
    var hasVal = vals.some(function(v){ return v !== null; });
    if (lbl === null && !hasVal){
      blanks++;
      if (blanks >= 2) break;
      r2++; continue;
    }
    var rowText = (lbl !== null ? String(lbl) + " " : "") + vals.map(function(v){ return v === null ? "" : String(v); }).join(" ");
    if (lbl !== null && (MR_PRICING_RE.test(String(lbl)) || TC_ANCHOR_RE.test(String(lbl)) || INCL_RE.test(String(lbl)))) break;
    if (VC_RE.test(rowText)) break;
    if (vals.some(function(v){ return v !== null && PAX_RE.test(String(v)); })) break;
    blanks = 0;
    if (lbl !== null && !hasVal) body.push({ type:"bld", label:String(lbl) });
    else body.push({ type:"row", label:lbl === null ? "" : String(lbl), vals:vals });
    consumed.push(r2);
    r2++;
  }
  var showLbl = (hr !== anchor.r) && labelAtHr !== null && !PAX_RE.test(String(labelAtHr));
  return { title:anchor.text, allCentres: showLbl ? String(labelAtHr) : null,
           heads:heads, body:body, consumed:consumed, headerRow:hr, cols:cols };
}

/* Text block below an anchor (T&C / cards): same column, until blank gap or next anchor */
function parseTextBlock(rows, anchor, stopRes){
  var lines = [], r = anchor.r + 1, blanks = 0;
  while (r < rows.length){
    var v = cell(rows, r, anchor.c);
    if (v === null){
      blanks++;
      if (blanks >= 2) break;
      r++; continue;
    }
    var sv = String(v);
    if (!/^[\u2022\u00B7*\u30FB-]/.test(sv.trim())){
      var stop = false;
      for (var i = 0; i < stopRes.length; i++){
        if (!stopRes[i].test(sv)) continue;
        if (stopRes[i] === PAX_RE && sv.length > 24) continue;  // prose mentioning rooms, not a header cell
        stop = true; break;
      }
      if (stop) break;
    }
    blanks = 0;
    lines.push(sv);
    r++;
  }
  return lines;
}

/* MR bottom info (T&C + two cards) for a language: inline on the market tab
   if present, else from the info/info-au tab (fixed column per language). */
function mrInfo(rows, infoRows, lang){
  function pick(anchors, contentRe){
    var best = null;
    for (var i = 0; i < anchors.length; i++){
      var a = anchors[i];
      if (a.lang !== lang) continue;
      var lines = parseTextBlock(rows, a, [MR_PRICING_RE, TC_ANCHOR_RE, INCL_RE, AVAIL_RE, PAX_RE]);
      if (!lines.length) continue;
      if (contentRe && !contentRe.test(lines.join(" "))) continue;
      return { title:a.text, lines:lines };
    }
    return best;
  }
  var out = {
    tc:    pick(findAnchors(rows, TC_ANCHOR_RE), /surcharge|non-office|meeting|\u6703\u8B70|\u4F1A\u8B70|\u4F1A\u8BAE|ph\u00F2ng h\u1ECDp/i),
    incl:  pick(findAnchors(rows, INCL_RE), null),
    avail: pick(findAnchors(rows, AVAIL_RE), null)
  };
  if (infoRows){
    var col = INFO_COLS[lang] !== undefined ? INFO_COLS[lang] : 0;
    function fromInfo(re){
      var a = findAnchors(infoRows, re).filter(function(x){ return x.c === col; })[0];
      if (!a){ a = findAnchors(infoRows, re).filter(function(x){ return x.c === 0; })[0]; }
      return a ? { title:a.text, lines:parseTextBlock(infoRows, a, [TC_ANCHOR_RE, INCL_RE, AVAIL_RE]) } : null;
    }
    if (!out.tc)    out.tc    = fromInfo(TC_ANCHOR_RE);
    if (!out.incl)  out.incl  = fromInfo(INCL_RE);
    if (!out.avail) out.avail = fromInfo(AVAIL_RE);
  }
  return out;
}

/* Availability matrices: pax-header rows not consumed by pricing tables.
   Blocks within a row split on column gaps; language sniffed from the level
   column below; the LAST region per language wins (earlier ones = drafts). */
function parseMatrices(rows, consumedRows){
  var headerRows = [];
  for (var r = 0; r < rows.length; r++){
    if (consumedRows[r] || !rows[r]) continue;
    var pax = [];
    for (var c = 0; c < rows[r].length; c++){
      var v = rows[r][c];
      if (v !== null && PAX_RE.test(String(v))) pax.push(c);
    }
    if (pax.length >= 2) headerRows.push({ r:r, cols:pax });
  }
  var regions = {};
  headerRows.forEach(function(h){
    // split header cols into blocks on gaps > 2
    var blocks = [[h.cols[0]]];
    for (var i = 1; i < h.cols.length; i++){
      if (h.cols[i] - h.cols[i-1] > 2) blocks.push([]);
      blocks[blocks.length-1].push(h.cols[i]);
    }
    blocks.forEach(function(cols){
      var labelC = Math.max(0, cols[0] - 2), levelC = cols[0] - 1;
      var heads = cols.map(function(c){ return String(cell(rows, h.r, c)).replace(/\(.*?\)/g, "").trim(); });
      var items = [], r2 = h.r + 1, blanks = 0, lang = null;
      while (r2 < rows.length){
        var lbl = cell(rows, r2, labelC), lvl = cell(rows, r2, levelC);
        var dots = cols.map(function(c){ var v = cell(rows, r2, c); return v !== null && String(v).indexOf("\u2022") > -1; });
        var hasDot = dots.some(function(x){ return x; });
        if (lbl === null && lvl === null && !hasDot){
          blanks++;
          if (blanks >= 4) break;
          r2++; continue;
        }
        if (lbl !== null && (TC_ANCHOR_RE.test(String(lbl)) || MR_PRICING_RE.test(String(lbl)) || INCL_RE.test(String(lbl)))) break;
        var isPaxRow = false;
        for (var c2 = 0; c2 < cols.length; c2++){
          var hv = cell(rows, r2, cols[c2]);
          if (hv !== null && PAX_RE.test(String(hv))) isPaxRow = true;
        }
        if (isPaxRow){ r2++; blanks = 0; continue; } // repeated inline headers
        blanks = 0;
        if (lvl !== null && lang === null) lang = sniffLang(String(lvl));
        if (lbl !== null && lvl === null && !hasDot) items.push({ type:"dist", label:String(lbl) });
        else items.push({ type:"row", bld:(lbl !== null ? String(lbl) : null), lvl:(lvl !== null ? String(lvl) : ""), dots:dots });
        r2++;
      }
      if (!items.some(function(x){ return x.type === "row" && x.dots.some(function(d){ return d; }); })) return;
      regions[lang || "EN"] = { heads:heads, items:items }; // later regions overwrite earlier
    });
  });
  return regions;
}

/* Appends items (html + isHeader flag) into pages; container built per page. */
function paginateItems(stage, titles, market, items, makeContainer){
  var page = newPage(titles, market);
  stage.appendChild(page);
  var body = page.querySelector(".vopl-pbody");
  var box = makeContainer();
  body.appendChild(box);
  function overflowed(){ return body.scrollHeight > body.clientHeight + 1; }
  items.forEach(function(it){
    var frag = document.createElement("template");
    frag.innerHTML = it.html;
    var nodes = Array.prototype.slice.call(frag.content.childNodes);
    nodes.forEach(function(nd){ box.appendChild(nd); });
    if (overflowed()){
      nodes.forEach(function(nd){ box.removeChild(nd); });
      var carry = [];
      while (box.lastElementChild && box.lastElementChild.dataset && box.lastElementChild.dataset.hdr === "1"){
        carry.unshift(box.lastElementChild);
        box.removeChild(box.lastElementChild);
      }
      page = newPage(titles, market);
      stage.appendChild(page);
      body = page.querySelector(".vopl-pbody");
      box = makeContainer();
      body.appendChild(box);
      carry.forEach(function(nd){ nd.classList.add("first"); box.appendChild(nd); });
      var frag2 = document.createElement("template");
      frag2.innerHTML = it.html;
      Array.prototype.slice.call(frag2.content.childNodes).forEach(function(nd){ box.appendChild(nd); });
    }
  });
  return box;
}

/* =====================================================================
   RENDER
   ===================================================================== */
function langAvailable(lang){
  var rows = DATA.vo && DATA.vo[curMarket];
  if (!rows) return true;
  var base = LANG_BLOCKS[lang].col;
  for (var r = 0; r < Math.min(rows.length, 200); r++){ if (cell(rows, r, base) !== null) return true; }
  return false;
}

function render(){
  var btns = langsEl.querySelectorAll(".vopl-lang");
  btns.forEach(function(b){
    b.classList.toggle("on", b.dataset.lang === curLang);
    b.disabled = !langAvailable(b.dataset.lang);
  });

  var stage = document.getElementById("stage");
  stage.innerHTML = "";
  var wantVO = document.getElementById("secVO").checked;
  var wantMR = document.getElementById("secMR").checked;
  var did = false;

  if (wantVO && DATA.vo){ renderVO(stage); did = true; }
  if (wantMR && DATA.mr){ renderMR(stage); did = true; }

  if (!did){
    stage.innerHTML = '<div class="vopl-empty">' +
      (DATA.vo || DATA.mr ? "Nothing selected \u2014 tick Virtual Office and/or Meeting Room." :
       "No data loaded.") + '</div>';
  }
}

/* ---------- VO pages ---------- */
function renderVO(stage){
  var rows = DATA.vo[curMarket];
  if (!rows) return;
  var mkt = MARKETS[curMarket];
  var titles = TITLES_VO[curLang] || TITLES_VO.EN;
  var base = LANG_BLOCKS[curLang].col;
  var items = parsePriceBlock(rows, base);
  var heads = [cell(rows,0,base+1), cell(rows,0,base+2), cell(rows,0,base+3)]
      .map(function(h,i){ return h === null ? ["Gold","Platinum","Diamond"][i] : String(h); });

  var headHtml = '<div class="vopl-chead lbl" data-hdr="1"></div>' +
    heads.map(function(h){ return '<div class="vopl-chead vopl-vline" data-hdr="1">' + esc(h) + '</div>'; }).join("");

  var prevType = "head", firstSection = true;
  var list = [];
  items.forEach(function(it){
    if (it.type === "city"){
      list.push({ html:'<div class="vopl-city' + (firstSection ? " first" : "") + '" data-hdr="1">' + esc(it.text) + '</div>' });
      firstSection = false; prevType = "head"; return;
    }
    if (it.type === "header"){
      list.push({ html:'<div class="vopl-dist' + (firstSection ? " first" : "") + '" data-hdr="1">' + esc(it.text) + '</div>' });
      firstSection = false; prevType = "head"; return;
    }
    var sp = splitGroup(it.lines, mkt.order);
    var nodot = (prevType !== "group") ? " nodot" : "";
    var h = '<div class="vopl-grp-l' + nodot + '">';
    if (sp.order === "building-first"){
      h += '<div class="bd">' + esc(sp.bld) + '</div><div class="lv">' + esc(sp.pre) + '</div>';
    } else {
      h += '<div class="lv">' + esc(sp.pre) + '</div><div class="bd">' + esc(sp.bld) + '</div>';
    }
    h += '<div class="ad">' + esc(sp.post) + '</div></div>';
    for (var i = 0; i < 3; i++){
      h += '<div class="vopl-price vopl-vline' + nodot + '">' + esc(fmtPrice(it.prices[i], mkt.currency)) + '</div>';
    }
    list.push({ html:h });
    prevType = "group";
  });

  var box = paginateItems(stage, titles, curMarket, list, function(){
    var g = document.createElement("div"); g.className = "vopl-cols"; g.innerHTML = headHtml; return g;
  });
  box.insertAdjacentHTML("beforeend", '<div class="vopl-endline"></div>');

  /* features page */
  var ftab = DATA.vo[mkt.featuresTab] ? mkt.featuresTab : (DATA.vo["Data"] ? "Data" : null);
  if (!ftab) return;
  var F = parseFeatures(DATA.vo[ftab], curLang);
  var fp = newPage(titles, curMarket);
  stage.appendChild(fp);
  var fbody = fp.querySelector(".vopl-pbody");
  var fg = document.createElement("div");
  fg.className = "vopl-cols";
  var fh = '<div class="vopl-chead lbl"></div>' + F.heads.map(function(h){
    return '<div class="vopl-chead vopl-vline">' + esc(h) + '</div>'; }).join("");
  var firstCat = true;
  F.feats.forEach(function(x){
    if (x.type === "cat"){
      fh += '<div class="vopl-fcat' + (firstCat ? " first" : "") + '">' + esc(x.label) + '</div>';
      firstCat = false;
    } else {
      fh += '<div class="vopl-frow-l">' + esc(x.label) + '</div>';
      x.vals.forEach(function(v){
        var vv = v.trim(), inner;
        if (vv === "\u2022") inner = '<span class="dot"></span>';
        else if (vv === "\u2014" || vv === "-" || vv === "\u2013") inner = '<span class="dash"></span>';
        else if (vv === "") inner = "";
        else inner = '<span class="txt">' + esc(vv) + '</span>';
        fh += '<div class="vopl-fval vopl-vline">' + inner + '</div>';
      });
    }
  });
  fh += '<div class="vopl-endline"></div>';
  fg.innerHTML = fh;
  fbody.appendChild(fg);
  if (F.notes.length){
    var nt = document.createElement("div");
    nt.className = "vopl-fnotes";
    nt.innerHTML = F.notes.map(function(x, idx){
      var bold = /^\*/.test(x) || /[:\uFF1A]\s*$/.test(x) || idx === F.notes.length - 1;
      return '<div class="vopl-fnote ' + (bold ? "b" : "i") + '">' + esc(x) + '</div>';
    }).join("");
    fbody.appendChild(nt);
  }
}

/* ---------- MR pages ---------- */
function mrLangOrFallback(anchors){
  var langs = {};
  anchors.forEach(function(a){ langs[a.lang] = true; });
  return langs[curLang] ? curLang : "EN";
}

function renderMR(stage){
  var mkt = MARKETS[curMarket];
  var rows = DATA.mr[mkt.mrTab];
  if (!rows) return;
  var infoRows = DATA.mr[mkt.mrInfoTab] || DATA.mr["info"] || null;

  var priceAnchors = findAnchors(rows, MR_PRICING_RE)
    .filter(function(a){
      return !TC_ANCHOR_RE.test(a.text) && !VC_RE.test(a.text) &&
             !/^[\u2022\u00B7*\-\u30FB]/.test(a.text.trim()) &&
             !/\u79C1\u4EBA|^private/i.test(a.text.trim());
    });
  var lang = mrLangOrFallback(priceAnchors);
  var titles = TITLES_MR[lang] || TITLES_MR.EN;
  if (lang !== curLang) setStatus("Meeting Room: '" + curLang + "' not in sheet \u2014 using " + lang + ".", "");

  /* pricing tables: parse every anchor, resolve each table's language from its
     body labels (titles are sometimes untranslated), then keep the leftmost
     matching table per anchor row. */
  var consumed = {};
  var list = [];
  var nCols = 3;
  var parsed = [];
  var lastByCol = {};
  priceAnchors.sort(function(x, y){ return x.r - y.r || x.c - y.c; }).forEach(function(a){
    var t = parseMrTable(rows, a, lastByCol[a.c] || null);
    if (!t) return;
    lastByCol[a.c] = { cols:t.cols, heads:t.heads };
    var bodyText = t.body.map(function(b){ return b.label; }).join(" ");
    t.lang = bodyText.trim() ? sniffLang(bodyText) : a.lang;
    t.r = a.r; t.c = a.c;
    parsed.push(t);
  });
  // every parsed table's rows are structural — exclude them all from matrix detection
  parsed.forEach(function(t){ t.consumed.forEach(function(r){ consumed[r] = true; }); consumed[t.r] = true; });
  var byRow = {};
  parsed.forEach(function(t){
    if (t.lang !== lang) return;
    if (!byRow[t.r] || t.c < byRow[t.r].c) byRow[t.r] = t;
  });
  Object.keys(byRow).sort(function(a,b){ return a - b; }).map(function(k){ return byRow[k]; }).forEach(function(t){
    nCols = Math.max(nCols, t.heads.length);
    var w = t.heads.length <= 3 ? 118 : 74;
    var grid = 'style="grid-template-columns:1fr repeat(' + t.heads.length + ',' + w + 'px)"';
    var h = '<div class="vopl-mrtitle" data-hdr="1">' + esc(t.title) + '</div>';
    h += '<div class="vopl-mrt" ' + grid + '>';
    h += '<div class="h lbl">' + (t.allCentres ? esc(t.allCentres) : "") + '</div>';
    t.heads.forEach(function(x){ h += '<div class="h vopl-vline">' + esc(x) + '</div>'; });
    t.body.forEach(function(b){
      if (b.type === "bld"){ h += '<div class="bld">' + esc(b.label) + '</div>'; return; }
      h += '<div class="rl">' + esc(b.label) + '</div>';
      b.vals.forEach(function(v){
        h += '<div class="rv vopl-vline">' + esc(fmtPrice(v, mkt.currency)) + '</div>';
      });
    });
    h += '<div class="bot"></div></div>';
    list.push({ html:'<div class="vopl-mrsec">' + h + '</div>' });
  });

  /* video conferencing lines: per row, keep the leftmost anchor in the selected language */
  var vcAll = findAnchors(rows, VC_RE).filter(function(a){
    return !consumed[a.r] && !/^[\u2022\u00B7*\-\u30FB]/.test(a.text.trim());
  });
  var vcByRow = {};
  vcAll.forEach(function(a){
    if (a.lang !== lang) return;
    if (!vcByRow[a.r] || a.c < vcByRow[a.r].c) vcByRow[a.r] = a;
  });
  var vcs = Object.keys(vcByRow).sort(function(x,y){ return x - y; }).map(function(k){ return vcByRow[k]; });
  vcs.forEach(function(a){
    var pre = "";
    if (a.c > 0){
      var lbl = cell(rows, a.r, a.c - 1);
      if (lbl !== null && !VC_RE.test(String(lbl))) pre = String(lbl) + " \u2014 ";
      else {
        var lbl0 = cell(rows, a.r, 0);
        if (a.c > 1 && lbl0 !== null && !VC_RE.test(String(lbl0)) && sniffLang(a.text) === lang) pre = String(lbl0) + " \u2014 ";
      }
    }
    list.push({ html:'<div class="vopl-vc">' + esc(pre + a.text) + '</div>' });
  });

  /* T&C + cards */
  var info = mrInfo(rows, infoRows, lang);
  var bottom = "";
  if (info.tc || info.incl || info.avail){
    bottom = '<div class="vopl-mrbottom">';
    if (info.tc){
      bottom += '<div class="vopl-tc"><div class="tt">' + esc(info.tc.title) + '</div>' +
        info.tc.lines.map(function(l){ return '<div class="ln">' + esc(l) + '</div>'; }).join("") + '</div>';
    }
    [info.incl, info.avail].forEach(function(card){
      if (!card) return;
      bottom += '<div class="vopl-card"><div class="tt">' + esc(card.title) + '</div>' +
        card.lines.map(function(l){ return '<div class="ln">' + esc(l) + '</div>'; }).join("") + '</div>';
    });
    bottom += '</div>';
    list.push({ html:bottom });
  }

  if (list.length){
    paginateItems(stage, titles, curMarket, list, function(){
      var d = document.createElement("div"); return d;
    });
  }

  /* availability matrix pages */
  var regions = parseMatrices(rows, consumed);
  var region = regions[lang] || regions["EN"];
  if (!region) return;
  var w2 = region.heads.length <= 4 ? 108 : 84;
  var gridStyle = "grid-template-columns:1fr 95px repeat(" + region.heads.length + "," + w2 + "px)";
  var headHtml = '<div class="h lbl" data-hdr="1"></div><div class="h" data-hdr="1"></div>' +
    region.heads.map(function(x){ return '<div class="h vopl-vline" data-hdr="1">' + esc(x) + '</div>'; }).join("");

  var mlist = [];
  var firstDist = true, lastWasRow = false;
  region.items.forEach(function(it){
    if (it.type === "dist"){
      mlist.push({ html:'<div class="vopl-mx-dist' + (firstDist ? " first" : "") + '" data-hdr="1">' + esc(it.label) + '</div>' });
      firstDist = false; lastWasRow = false; return;
    }
    var h = "";
    if (it.bld !== null && lastWasRow) h += '<div class="sep"></div>';
    h += '<div class="bname' + (it.bld === null ? " cont" : "") + '">' + (it.bld !== null ? esc(it.bld) : "") + '</div>';
    h += '<div class="lvl">' + esc(it.lvl) + '</div>';
    it.dots.forEach(function(d){
      h += '<div class="dcell vopl-vline">' + (d ? '<span class="dot"></span>' : "") + '</div>';
    });
    mlist.push({ html:h });
    lastWasRow = true;
  });

  var mbox = paginateItems(stage, titles, curMarket, mlist, function(){
    var g = document.createElement("div"); g.className = "vopl-cols vopl-mx";
    g.style.cssText = gridStyle; g.innerHTML = headHtml; return g;
  });
  mbox.insertAdjacentHTML("beforeend", '<div class="vopl-endline"></div>');
}

/* =====================================================================
   PDF EXPORT + SAVE TO DRIVE
   ===================================================================== */
function pdfFilename(){
  return curMarket.replace(/\s+/g, "") + "-" + curLang + ".pdf";
}

function exportPdf(toDrive){
  var pages = document.querySelectorAll(".vopl-page");
  if (!pages.length){ setStatus("Nothing to export.", "err"); return; }
  if (toDrive && !SCRIPT_URL){ setStatus("SCRIPT_URL is not set — cannot save to Drive.", "err"); return; }
  setStatus("Rendering PDF\u2026");
  document.getElementById("btnPdf").disabled = true;
  document.getElementById("btnDrive").disabled = true;

  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ unit:"pt", format:"a4", orientation:"portrait" });
  var W = 595.28, H = 841.89;
  var idx = 0;

  function next(){
    if (idx >= pages.length){ finish(); return; }
    pages[idx].getBoundingClientRect();
    html2canvas(pages[idx], { scale:2.2, useCORS:true, backgroundColor:"#FFFFFF", logging:false })
      .then(function(cv){
        if (idx > 0) doc.addPage();
        doc.addImage(cv.toDataURL("image/jpeg", 0.95), "JPEG", 0, 0, W, H);
        idx++; next();
      })
      .catch(function(err){ setStatus("Capture failed: " + err.message, "err"); unlock(); });
  }

  function finish(){
    var name = pdfFilename();
    if (!toDrive){
      doc.save(name);
      setStatus("Downloaded " + name, "ok");
      unlock();
      return;
    }
    setStatus("Uploading to Drive\u2026");
    var b64 = doc.output("datauristring").split(",")[1];
    fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action:"savePdf", filename:name, pdfBase64:b64 })
    })
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok) throw new Error(j.error || "backend error");
      setStatus("Saved to Drive: " + name, "ok");
      unlock();
    })
    .catch(function(err){ setStatus("Drive save failed: " + err.message, "err"); unlock(); });
  }

  function unlock(){
    document.getElementById("btnPdf").disabled = false;
    document.getElementById("btnDrive").disabled = false;
  }
  next();
}
</script>

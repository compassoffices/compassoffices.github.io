<style>
/* ============ scoped: .vopl ============ */
.vopl{
  --co-orange:#FF6600;      --co-orange-dk:#E55A00;
  --co-orange-wash:#FFF3EB; --co-orange-tint:#FFD9BD;
  --co-ink:#1A1A1A;         --co-ink-deep:#161616;
  --co-text:#333333;        --co-text-2:#555555;
  --co-muted:#888888;       --co-faint:#BBBBBB;
  --co-line:#E5E5E5;        --co-line-soft:rgba(0,0,0,.08);
  --co-bg:#F5F5F5;          --co-fill:#EFEFEF;      --co-paper:#FFFFFF;
  --co-radius:10px;         --co-radius-pill:999px;
  color:var(--co-ink);
  font-family:'Hanken Grotesk','Noto Sans TC','Noto Sans SC','Noto Sans JP',sans-serif;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  background:var(--co-bg);
  margin:0; min-height:100vh;
}
.vopl *,.vopl *::before,.vopl *::after{box-sizing:border-box;}

/* ---- toolbar ---- */
.vopl-bar{position:sticky;top:0;z-index:50;background:var(--co-paper);border-bottom:1px solid var(--co-line);
  padding:12px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.vopl-bar-logo{height:26px;width:auto;display:block;}
.vopl-bar label{font-size:12px;font-weight:600;color:var(--co-text-2);margin-right:2px;}
.vopl-sel{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--co-line);border-radius:8px;
  background:var(--co-paper);color:var(--co-ink);cursor:pointer;}
.vopl-langs{display:flex;border:1px solid var(--co-line);border-radius:var(--co-radius-pill);overflow:hidden;}
.vopl-lang{font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 13px;border:0;background:var(--co-paper);
  color:var(--co-text-2);cursor:pointer;}
.vopl-lang.on{background:var(--co-orange);color:#fff;}
.vopl-lang:disabled{opacity:.35;cursor:not-allowed;}
.vopl-btn{font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:var(--co-radius-pill);
  border:1px solid var(--co-line);background:var(--co-paper);color:var(--co-ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
.vopl-btn:hover{border-color:var(--co-faint);}
.vopl-btn.primary{background:var(--co-orange);border-color:var(--co-orange);color:#fff;}
.vopl-btn.primary:hover{background:var(--co-orange-dk);border-color:var(--co-orange-dk);}
.vopl-btn:disabled{opacity:.45;cursor:not-allowed;}
.vopl-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.vopl-status{font-size:12px;color:var(--co-muted);margin-left:auto;max-width:340px;}
.vopl-status.err{color:#C0392B;}
.vopl-status.ok{color:#2E7D32;}
.vopl-file{display:none;}

/* ---- page stage ---- */
.vopl-stage{padding:28px 12px 60px;display:flex;flex-direction:column;align-items:center;gap:24px;}
.vopl-page{width:794px;height:1123px;background:var(--co-paper);position:relative;
  box-shadow:0 4px 24px rgba(0,0,0,.10);padding:46px 48px 64px;display:flex;flex-direction:column;overflow:hidden;}
.vopl-phead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;flex:0 0 auto;}
.vopl-phead-logo{width:190px;height:auto;display:block;margin-top:6px;}
.vopl-ptitle{text-align:right;}
.vopl-ptitle .t1{font-size:40px;font-weight:800;color:var(--co-orange);line-height:1.05;letter-spacing:.5px;}
.vopl-ptitle .t2{font-size:26px;font-weight:300;color:var(--co-ink);line-height:1.15;letter-spacing:.5px;}
.vopl-pbody{flex:1 1 auto;overflow:hidden;}
.vopl-pfoot{position:absolute;left:48px;right:48px;bottom:28px;display:flex;justify-content:space-between;
  font-size:9px;color:var(--co-muted);}
.vopl-pfoot span{margin-right:18px;}

/* ---- price table ---- */
.vopl-cols{display:grid;grid-template-columns:1fr 128px 128px 128px;}
.vopl-chead{padding:8px 6px 10px;text-align:center;font-weight:700;font-size:13.5px;color:var(--co-orange);}
.vopl-chead.lbl{text-align:left;}
.vopl-vline{border-left:1px solid var(--co-line);}
.vopl-city{grid-column:1 / -1;padding:10px 0 4px;font-size:15px;font-weight:800;color:var(--co-ink);
  letter-spacing:.4px;border-top:1px solid var(--co-ink);}
.vopl-dist{grid-column:1 / -1;padding:7px 0 3px;font-size:13.5px;font-weight:700;color:var(--co-ink);
  border-top:1px solid var(--co-faint);}
.vopl-dist.first,.vopl-city.first{border-top:1px solid var(--co-ink);}
.vopl-grp-l{padding:5px 8px 5px 0;border-top:1px dotted var(--co-line);}
.vopl-grp-l.nodot{border-top:0;}
.vopl-grp-l .lv,.vopl-grp-l .ad{font-size:10.5px;color:var(--co-text);line-height:1.45;}
.vopl-grp-l .bd{font-size:11.5px;font-weight:700;color:var(--co-orange);line-height:1.45;}
.vopl-price{display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;
  color:var(--co-ink);border-top:1px dotted var(--co-line);}
.vopl-price.nodot{border-top:0;}
.vopl-endline{grid-column:1 / -1;border-top:1px solid var(--co-ink);}

/* ---- features table ---- */
.vopl-fcat{grid-column:1 / -1;padding:16px 0 6px;font-size:13px;font-weight:700;color:var(--co-ink);border-top:1px solid var(--co-line);}
.vopl-fcat.first{border-top:1px solid var(--co-ink);padding-top:12px;}
.vopl-frow-l{padding:7px 10px 7px 0;font-size:11px;color:var(--co-text);border-top:1px dotted var(--co-line);line-height:1.5;}
.vopl-fval{display:flex;align-items:center;justify-content:center;font-size:11px;border-top:1px dotted var(--co-line);color:var(--co-ink);}
.vopl-fval .dot{width:6px;height:6px;border-radius:50%;background:var(--co-orange);display:inline-block;}
.vopl-fval .dash{width:14px;height:2px;background:var(--co-ink);display:inline-block;}
.vopl-fval .txt{font-weight:700;font-size:10.5px;text-align:center;}
.vopl-fnotes{margin-top:26px;border-top:1px dotted var(--co-faint);padding-top:14px;}
.vopl-fnote{font-size:8.8px;color:var(--co-text);line-height:1.6;padding-left:0;}
.vopl-fnote.b{font-weight:700;}
.vopl-fnote.i{padding-left:10px;}

.vopl-empty{padding:60px 20px;text-align:center;color:var(--co-muted);font-size:14px;}
@media (max-width:840px){.vopl-page{transform:scale(.44);transform-origin:top center;margin-bottom:-600px;}}
</style>
</head>

/* =====================================================================
   DATA LOADING
   ===================================================================== */
function fetchData(){
  if (!SCRIPT_URL) { setStatus("SCRIPT_URL is not set — deploy Code.gs first.", "err"); return; }
  setStatus("Fetching from Google Sheet\u2026");
  fetch(SCRIPT_URL + (SCRIPT_URL.indexOf("?")>-1 ? "&" : "?") + "action=data")
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok) throw new Error(j.error || "backend error");
      DATA = normalizeAll(j.sheets);
      setStatus("Data loaded " + new Date().toLocaleTimeString(), "ok");
      render();
    })
    .catch(function(err){ setStatus("Fetch failed: " + err.message, "err"); });
}

function loadXlsx(ev){
  var f = ev.target.files[0]; if (!f) return;
  var rd = new FileReader();
  rd.onload = function(e){
    try{
      var wb = XLSX.read(new Uint8Array(e.target.result), { type:"array" });
      var sheets = {};
      wb.SheetNames.forEach(function(n){
        sheets[n] = XLSX.utils.sheet_to_json(wb.Sheets[n], { header:1, raw:true, defval:null });
      });
      DATA = normalizeAll(sheets);
      setStatus("Loaded " + f.name, "ok");
      render();
    }catch(err){ setStatus("XLSX parse failed: " + err.message, "err"); }
  };
  rd.readAsArrayBuffer(f);
  ev.target.value = "";
}

function normalizeAll(sheets){
  var out = {};
  Object.keys(sheets).forEach(function(n){
    out[n] = sheets[n].map(function(row){
      return (row || []).map(function(v){
        if (v === "" || v === undefined) return null;
        if (typeof v === "string") { var t = v.trim(); return t === "" ? null : t; }
        return v;
      });
    });
  });
  return out;
}

/* =====================================================================
   PARSERS
   ===================================================================== */
function cell(rows, r, c){ return (rows[r] && rows[r][c] !== undefined) ? rows[r][c] : null; }

/* Price list: walk one language block. Priced row starts a 3-line group;
   standalone unpriced rows are headers (two consecutive = city + district). */
function parsePriceBlock(rows, base){
  var items = [], r = 1; // row 0 = column headers
  var n = rows.length;
  while (r < n){
    var label = cell(rows, r, base);
    if (label === null){ r++; continue; }
    var g = cell(rows, r, base+1), p = cell(rows, r, base+2), d = cell(rows, r, base+3);
    if (g !== null){
      var lines = [String(label)], j = r + 1;
      while (j < n && lines.length < 3){
        var nl = cell(rows, j, base);
        if (nl === null || cell(rows, j, base+1) !== null) break;
        lines.push(String(nl)); j++;
      }
      items.push({ type:"group", lines:lines, prices:[g, p, d] });
      r = j;
    } else {
      items.push({ type:"header", text:String(label) });
      r++;
    }
  }
  // mark city headers (header immediately followed by another header)
  for (var i = 0; i < items.length - 1; i++){
    if (items[i].type === "header" && items[i+1].type === "header") items[i].type = "city";
  }
  return items;
}

/* Split a group's 3 lines into level / building(orange) / address.
   Auto-detects by line 1; a market can pin it via MARKETS[m].order. */
function splitGroup(lines, forced){
  if (lines.length < 3) return { pre:lines[0]||"", bld:lines[1]||"", post:lines[2]||"", order:"lbp" };
  var bf = forced ? (forced === "building-first") : !LEVEL_RE.test(lines[0]);
  if (bf) return { pre:lines[1], bld:lines[0], post:lines[2], order:"building-first" };
  return { pre:lines[0], bld:lines[1], post:lines[2], order:"level-first" };
}

/* Features tab: language sections split by marker rows; each section =
   header row + categories + feature rows + trailing footnotes. */
function parseFeatures(rows, lang){
  var sections = { EN:{ start:0, end:rows.length } }, cur = "EN";
  for (var r = 0; r < rows.length; r++){
    var a = cell(rows, r, 0);
    if (a !== null && FEATURE_MARKERS[String(a).trim()]){
      sections[cur].end = r;
      cur = FEATURE_MARKERS[String(a).trim()];
      sections[cur] = { start:r + 1, end:rows.length };
    }
  }
  var sec = sections[lang] || sections.EN;
  var heads = null, feats = [], lastVal = -1;
  for (var r2 = sec.start; r2 < sec.end; r2++){
    var lbl = cell(rows, r2, 0), v1 = cell(rows, r2, 1);
    if (lbl === null && v1 !== null && !heads){
      heads = [String(v1), String(cell(rows, r2, 2)||""), String(cell(rows, r2, 3)||"")]; continue;
    }
    if (lbl === null) continue;
    if (v1 !== null){
      feats.push({ type:"feat", label:String(lbl),
        vals:[v1, cell(rows, r2, 2), cell(rows, r2, 3)].map(function(x){ return x === null ? "" : String(x); }) });
      lastVal = feats.length - 1;
    } else {
      feats.push({ type:"cat", label:String(lbl) });
    }
  }
  // everything after the last valued row = footnotes (they parsed as "cat")
  var notes = [];
  if (lastVal > -1){
    notes = feats.slice(lastVal + 1).map(function(x){ return x.label; });
    feats = feats.slice(0, lastVal + 1);
    // drop trailing categories that had no rows (defensive)
    while (feats.length && feats[feats.length-1].type === "cat") feats.pop();
  }
  return { heads: heads || ["Gold","Platinum","Diamond"], feats:feats, notes:notes };
}

/* =====================================================================
   RENDER
   ===================================================================== */
function fmtPrice(v, prefix){
  if (v === null || v === undefined || v === "") return "";
  var num = (typeof v === "number") ? v : parseFloat(String(v).replace(/[^\d.]/g, ""));
  if (isNaN(num)) return String(v);
  return prefix + num.toLocaleString("en-US");
}

function esc(s){
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function langAvailable(lang){
  if (!DATA || !DATA[curMarket]) return false;
  var base = LANG_BLOCKS[lang].col, rows = DATA[curMarket];
  for (var r = 0; r < Math.min(rows.length, 200); r++){ if (cell(rows, r, base) !== null) return true; }
  return false;
}

function priceHeaderRow(heads){
  return '<div class="vopl-chead lbl"></div>' +
    heads.map(function(h, i){ return '<div class="vopl-chead vopl-vline">' + esc(h) + '</div>'; }).join("");
}

function render(){
  // language buttons state
  var btns = langsEl.querySelectorAll(".vopl-lang");
  btns.forEach(function(b){
    b.classList.toggle("on", b.dataset.lang === curLang);
    b.disabled = DATA ? !langAvailable(b.dataset.lang) : false;
  });

  var stage = document.getElementById("stage");
  stage.innerHTML = "";
  if (!DATA){ stage.innerHTML = '<div class="vopl-empty">No data loaded.</div>'; return; }
  if (!DATA[curMarket]){ stage.innerHTML = '<div class="vopl-empty">Tab "' + esc(curMarket) + '" not found in the sheet.</div>'; return; }

  var mkt = MARKETS[curMarket];
  var titles = TITLES[curLang] || TITLES.EN;
  var rows = DATA[curMarket];
  var base = LANG_BLOCKS[curLang].col;
  var items = parsePriceBlock(rows, base);
  var headsRow0 = [cell(rows,0,base+1), cell(rows,0,base+2), cell(rows,0,base+3)]
      .map(function(h,i){ return h === null ? ["Gold","Platinum","Diamond"][i] : String(h); });

  /* ---- PRICE PAGES (measured pagination) ---- */
  var page = newPage(titles, curMarket);
  stage.appendChild(page);
  var body = page.querySelector(".vopl-pbody");
  var grid = document.createElement("div");
  grid.className = "vopl-cols";
  grid.innerHTML = priceHeaderRow(headsRow0);
  body.appendChild(grid);

  var firstSection = true, prevType = "head";
  function overflowed(){ return body.scrollHeight > body.clientHeight; }
  function startNewPage(){
    page = newPage(titles, curMarket);
    stage.appendChild(page);
    body = page.querySelector(".vopl-pbody");
    grid = document.createElement("div");
    grid.className = "vopl-cols";
    grid.innerHTML = priceHeaderRow(headsRow0);
    body.appendChild(grid);
    firstSection = true; prevType = "head";
  }
  function itemHtml(it){
    if (it.type === "city")   return '<div class="vopl-city' + (firstSection ? " first" : "") + '">' + esc(it.text) + '</div>';
    if (it.type === "header") return '<div class="vopl-dist' + (firstSection ? " first" : "") + '">' + esc(it.text) + '</div>';
    var sp = splitGroup(it.lines, mkt.order);
    var nodot = (prevType !== "group") ? " nodot" : "";
    var h = '<div class="vopl-grp-l' + nodot + '">';
    if (sp.order === "building-first"){
      h += '<div class="bd">' + esc(sp.bld) + '</div><div class="lv">' + esc(sp.pre) + '</div>';
    } else {
      h += '<div class="lv">' + esc(sp.pre) + '</div><div class="bd">' + esc(sp.bld) + '</div>';
    }
    h += '<div class="ad">' + esc(sp.post) + '</div></div>';
    for (var i = 0; i < 3; i++){
      h += '<div class="vopl-price vopl-vline' + nodot + '">' + esc(fmtPrice(it.prices[i], mkt.currency)) + '</div>';
    }
    return h;
  }
  for (var i = 0; i < items.length; i++){
    var it = items[i];
    var frag = document.createElement("template");
    frag.innerHTML = itemHtml(it);
    var nodes = Array.prototype.slice.call(frag.content.childNodes);
    nodes.forEach(function(nd){ grid.appendChild(nd); });
    if (it.type !== "group") firstSection = false;
    if (overflowed()){
      nodes.forEach(function(nd){ grid.removeChild(nd); });
      // pull a dangling header along to the next page
      var carry = [];
      if (it.type === "group"){
        var last = grid.querySelectorAll(".vopl-city,.vopl-dist");
        if (last.length){
          var lastHdr = last[last.length-1];
          if (lastHdr === grid.lastElementChild){ carry.push(lastHdr); grid.removeChild(lastHdr); }
        }
      }
      startNewPage();
      carry.forEach(function(nd){ nd.classList.add("first"); grid.appendChild(nd); firstSection = false; });
      var frag2 = document.createElement("template");
      prevType = "head";
      frag2.innerHTML = itemHtml(it);
      Array.prototype.slice.call(frag2.content.childNodes).forEach(function(nd){ grid.appendChild(nd); });
      if (it.type !== "group") firstSection = false;
    }
    prevType = it.type === "group" ? "group" : "head";
  }
  grid.insertAdjacentHTML("beforeend", '<div class="vopl-endline"></div>');

  /* ---- FEATURES PAGE ---- */
  var ftab = DATA[mkt.featuresTab] ? mkt.featuresTab : (DATA["Data"] ? "Data" : null);
  if (ftab){
    var F = parseFeatures(DATA[ftab], curLang);
    var fp = newPage(titles, curMarket);
    stage.appendChild(fp);
    var fbody = fp.querySelector(".vopl-pbody");
    var fg = document.createElement("div");
    fg.className = "vopl-cols";
    var fh = '<div class="vopl-chead lbl"></div>' + F.heads.map(function(h){
      return '<div class="vopl-chead vopl-vline">' + esc(h) + '</div>'; }).join("");
    var firstCat = true;
    F.feats.forEach(function(x){
      if (x.type === "cat"){
        fh += '<div class="vopl-fcat' + (firstCat ? " first" : "") + '">' + esc(x.label) + '</div>';
        firstCat = false;
      } else {
        fh += '<div class="vopl-frow-l">' + esc(x.label) + '</div>';
        x.vals.forEach(function(v){
          var inner;
          var vv = v.trim();
          if (vv === "\u2022") inner = '<span class="dot"></span>';
          else if (vv === "\u2014" || vv === "-" || vv === "\u2013") inner = '<span class="dash"></span>';
          else if (vv === "") inner = "";
          else inner = '<span class="txt">' + esc(vv) + '</span>';
          fh += '<div class="vopl-fval vopl-vline">' + inner + '</div>';
        });
      }
    });
    fh += '<div class="vopl-endline"></div>';
    fg.innerHTML = fh;
    fbody.appendChild(fg);
    if (F.notes.length){
      var nt = document.createElement("div");
      nt.className = "vopl-fnotes";
      nt.innerHTML = F.notes.map(function(x, idx){
        var bold = /^\*/.test(x) || /[:\uFF1A]\s*$/.test(x) || idx === F.notes.length - 1;
        return '<div class="vopl-fnote ' + (bold ? "b" : "i") + '">' + esc(x) + '</div>';
      }).join("");
      fbody.appendChild(nt);
    }
  }
}

/* =====================================================================
   PDF EXPORT + SAVE TO DRIVE
   ===================================================================== */
function pdfFilename(){
  return curMarket.replace(/\s+/g, "") + "-" + curLang + ".pdf";
}

function exportPdf(toDrive){
  var pages = document.querySelectorAll(".vopl-page");
  if (!pages.length){ setStatus("Nothing to export.", "err"); return; }
  if (toDrive) {
    if (!SCRIPT_URL){ setStatus("SCRIPT_URL is not set — cannot save to Drive.", "err"); return; }
  }
  setStatus("Rendering PDF\u2026");
  document.getElementById("btnPdf").disabled = true;
  document.getElementById("btnDrive").disabled = true;

  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ unit:"pt", format:"a4", orientation:"portrait" });
  var W = 595.28, H = 841.89;
  var idx = 0;

  function next(){
    if (idx >= pages.length){ finish(); return; }
    // force reflow before capture (export-fidelity gotcha)
    pages[idx].getBoundingClientRect();
    html2canvas(pages[idx], { scale:2.2, useCORS:true, backgroundColor:"#FFFFFF", logging:false })
      .then(function(cv){
        if (idx > 0) doc.addPage();
        doc.addImage(cv.toDataURL("image/jpeg", 0.95), "JPEG", 0, 0, W, H);
        idx++; next();
      })
      .catch(function(err){ setStatus("Capture failed: " + err.message, "err"); unlock(); });
  }

  function finish(){
    var name = pdfFilename();
    if (!toDrive){
      doc.save(name);
      setStatus("Downloaded " + name, "ok");
      unlock();
      return;
    }
    setStatus("Uploading to Drive\u2026");
    var b64 = doc.output("datauristring").split(",")[1];
    fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action:"savePdf", filename:name, pdfBase64:b64 })
    })
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok) throw new Error(j.error || "backend error");
      setStatus("Saved to Drive: " + name, "ok");
      unlock();
    })
    .catch(function(err){ setStatus("Drive save failed: " + err.message, "err"); unlock(); });
  }

  function unlock(){
    document.getElementById("btnPdf").disabled = false;
    document.getElementById("btnDrive").disabled = false;
  }
  next();
}
</script>

<style>
/* ============ scoped: .vopl ============ */
.vopl{
  --co-orange:#FF6600;      --co-orange-dk:#E55A00;
  --co-orange-wash:#FFF3EB; --co-orange-tint:#FFD9BD;
  --co-ink:#1A1A1A;         --co-ink-deep:#161616;
  --co-text:#333333;        --co-text-2:#555555;
  --co-muted:#888888;       --co-faint:#BBBBBB;
  --co-line:#E5E5E5;        --co-line-soft:rgba(0,0,0,.08);
  --co-bg:#F5F5F5;          --co-fill:#EFEFEF;      --co-paper:#FFFFFF;
  --co-radius:10px;         --co-radius-pill:999px;
  color:var(--co-ink);
  font-family:'Hanken Grotesk','Noto Sans TC','Noto Sans SC','Noto Sans JP',sans-serif;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  background:var(--co-bg);
  margin:0; min-height:100vh;
}
.vopl *,.vopl *::before,.vopl *::after{box-sizing:border-box;}

/* ---- toolbar ---- */
.vopl-bar{position:sticky;top:0;z-index:50;background:var(--co-paper);border-bottom:1px solid var(--co-line);
  padding:12px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.vopl-bar-logo{height:26px;width:auto;display:block;}
.vopl-bar label{font-size:12px;font-weight:600;color:var(--co-text-2);margin-right:2px;}
.vopl-sel{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--co-line);border-radius:8px;
  background:var(--co-paper);color:var(--co-ink);cursor:pointer;}
.vopl-langs{display:flex;border:1px solid var(--co-line);border-radius:var(--co-radius-pill);overflow:hidden;}
.vopl-lang{font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 13px;border:0;background:var(--co-paper);
  color:var(--co-text-2);cursor:pointer;}
.vopl-lang.on{background:var(--co-orange);color:#fff;}
.vopl-lang:disabled{opacity:.35;cursor:not-allowed;}
.vopl-chk{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--co-text-2);cursor:pointer;}
.vopl-chk input{accent-color:#FF6600;cursor:pointer;}
.vopl-btn{font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:var(--co-radius-pill);
  border:1px solid var(--co-line);background:var(--co-paper);color:var(--co-ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
.vopl-btn:hover{border-color:var(--co-faint);}
.vopl-btn.primary{background:var(--co-orange);border-color:var(--co-orange);color:#fff;}
.vopl-btn.primary:hover{background:var(--co-orange-dk);border-color:var(--co-orange-dk);}
.vopl-btn:disabled{opacity:.45;cursor:not-allowed;}
.vopl-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.vopl-status{font-size:12px;color:var(--co-muted);margin-left:auto;max-width:340px;}
.vopl-status.err{color:#C0392B;}
.vopl-status.ok{color:#2E7D32;}
.vopl-file{display:none;}

/* ---- page stage ---- */
.vopl-stage{padding:28px 12px 60px;display:flex;flex-direction:column;align-items:center;gap:24px;}
.vopl-page{width:794px;height:1123px;background:var(--co-paper);position:relative;
  box-shadow:0 4px 24px rgba(0,0,0,.10);padding:46px 48px 64px;display:flex;flex-direction:column;overflow:hidden;}
.vopl-phead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;flex:0 0 auto;}
.vopl-phead-logo{width:190px;height:auto;display:block;margin-top:6px;}
.vopl-ptitle{text-align:right;}
.vopl-ptitle .t1{font-size:40px;font-weight:800;color:var(--co-orange);line-height:1.05;letter-spacing:.5px;}
.vopl-ptitle .t2{font-size:26px;font-weight:300;color:var(--co-ink);line-height:1.15;letter-spacing:.5px;}
.vopl-pbody{flex:1 1 auto;overflow:hidden;}
.vopl-pfoot{position:absolute;left:48px;right:48px;bottom:28px;display:flex;justify-content:space-between;
  font-size:10px;color:var(--co-muted);}
.vopl-pfoot span{margin-right:18px;}

/* ---- VO price table ---- */
.vopl-cols{display:grid;grid-template-columns:1fr 128px 128px 128px;}
.vopl-chead{padding:8px 6px 10px;text-align:center;font-weight:700;font-size:16px;color:var(--co-orange);}
.vopl-chead.lbl{text-align:left;}
.vopl-vline{border-left:1px solid var(--co-line);}
.vopl-city{grid-column:1 / -1;padding:10px 0 4px;font-size:17.5px;font-weight:800;color:var(--co-ink);
  letter-spacing:.4px;border-top:1px solid var(--co-ink);}
.vopl-dist{grid-column:1 / -1;padding:7px 0 3px;font-size:16px;font-weight:700;color:var(--co-ink);
  border-top:1px solid var(--co-faint);}
.vopl-dist.first,.vopl-city.first{border-top:1px solid var(--co-ink);}
.vopl-grp-l{padding:5px 8px 5px 0;border-top:1px dotted var(--co-line);}
.vopl-grp-l.nodot{border-top:0;}
.vopl-grp-l .lv,.vopl-grp-l .ad{font-size:13px;color:var(--co-text);line-height:1.45;}
.vopl-grp-l .bd{font-size:14.5px;font-weight:700;color:var(--co-orange);line-height:1.45;}
.vopl-price{display:flex;align-items:center;justify-content:center;font-size:14.5px;font-weight:700;
  color:var(--co-ink);border-top:1px dotted var(--co-line);}
.vopl-price.nodot{border-top:0;}
.vopl-endline{grid-column:1 / -1;border-top:1px solid var(--co-ink);}

/* ---- VO features table ---- */
.vopl-fcat{grid-column:1 / -1;padding:16px 0 6px;font-size:15.5px;font-weight:700;color:var(--co-ink);border-top:1px solid var(--co-line);}
.vopl-fcat.first{border-top:1px solid var(--co-ink);padding-top:12px;}
.vopl-frow-l{padding:7px 10px 7px 0;font-size:14px;color:var(--co-text);border-top:1px dotted var(--co-line);line-height:1.5;}
.vopl-fval{display:flex;align-items:center;justify-content:center;font-size:14px;border-top:1px dotted var(--co-line);color:var(--co-ink);}
.vopl-fval .dot,.vopl-mx .dot{width:8px;height:8px;border-radius:50%;background:var(--co-orange);display:inline-block;}
.vopl-fval .dash{width:14px;height:2px;background:var(--co-ink);display:inline-block;}
.vopl-fval .txt{font-weight:700;font-size:13.5px;text-align:center;}
.vopl-fnotes{margin-top:26px;border-top:1px dotted var(--co-faint);padding-top:14px;}
.vopl-fnote{font-size:11px;color:var(--co-text);line-height:1.6;}
.vopl-fnote.b{font-weight:700;}
.vopl-fnote.i{padding-left:10px;}

/* ---- MR pricing ---- */
.vopl-mrsec{margin-bottom:8px;}
.vopl-mrtitle{font-size:17px;font-weight:700;color:var(--co-ink);padding:14px 0 6px;}
.vopl-mrt{display:grid;}
.vopl-mrt .h{padding:8px 6px;text-align:center;font-weight:700;font-size:15px;color:var(--co-orange);}
.vopl-mrt .h.lbl{text-align:left;color:var(--co-orange);font-size:15.5px;}
.vopl-mrt .bld{grid-column:1 / -1;padding:8px 0 2px;font-size:14.5px;font-weight:700;color:var(--co-orange);}
.vopl-mrt .rl{padding:8px 8px 8px 0;font-size:14px;color:var(--co-text);border-top:1px solid var(--co-line);}
.vopl-mrt .rv{display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;
  color:var(--co-ink);border-top:1px solid var(--co-line);}
.vopl-mrt .bot{grid-column:1 / -1;border-top:1px solid var(--co-line);}
.vopl-vc{font-size:15px;font-weight:700;font-style:italic;color:var(--co-ink);padding:20px 0 4px;line-height:1.6;}
.vopl-mrbottom{display:flex;gap:14px;margin-top:26px;border-top:1px dotted var(--co-faint);padding-top:14px;align-items:flex-start;}
.vopl-tc{flex:1.35;}
.vopl-tc .tt{font-size:12.5px;font-weight:700;color:var(--co-ink);margin-bottom:3px;}
.vopl-tc .ln{font-size:11px;color:var(--co-text);line-height:1.6;}
.vopl-card{flex:1;border:1px solid var(--co-line);border-radius:8px;padding:12px 14px;background:var(--co-paper);}
.vopl-card .tt{font-size:13.5px;font-weight:700;color:var(--co-orange);margin-bottom:6px;line-height:1.35;}
.vopl-card .ln{font-size:12px;color:var(--co-text);line-height:1.75;}

/* ---- MR availability matrix ---- */
.vopl-mx .h{padding:8px 6px 10px;text-align:center;font-weight:700;font-size:14.5px;color:var(--co-orange);white-space:pre-line;}
.vopl-mx .h.lbl{text-align:left;}
.vopl-mx-dist{grid-column:1 / -1;padding:12px 0 2px;font-size:15.5px;font-weight:700;color:var(--co-muted);border-top:1px solid var(--co-line);}
.vopl-mx-dist.first{border-top:1px solid var(--co-ink);}
.vopl-mx .bname{padding:7px 8px 7px 0;font-size:14.5px;font-weight:700;color:var(--co-orange);}
.vopl-mx .bname.cont{border-top:0;}
.vopl-mx .lvl{padding:7px 8px;font-size:14px;font-weight:700;color:var(--co-ink);}
.vopl-mx .dcell{display:flex;align-items:center;justify-content:center;}
.vopl-mx .sep{grid-column:1 / -1;border-top:1px solid var(--co-line);margin:5px 0 4px;}

.vopl-empty{padding:60px 20px;text-align:center;color:var(--co-muted);font-size:14px;}
@media (max-width:840px){.vopl-page{transform:scale(.44);transform-origin:top center;margin-bottom:-600px;}}
</style>
</head>

<script>
/* =====================================================================
   CONFIG
   ===================================================================== */
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTBXPlBtYsiD_0oEThJ_pJzQOmeYNNWFezpC1z6ZIiA-p8VyqDqpdZExkG-51Lqxtf/exec";
var WEBSITE = "www.compassoffices.com";
var LANG_LABELS = { EN:"EN", TC:"\u7E41", SC:"\u7C21", JP:"\u65E5", VI:"VI" };
var LANG_KEYS = { EN:"en", TC:"tc", SC:"sc", JP:"jp", VI:"vi" };
var VO_HEADS = ["Gold","Platinum","Diamond"];

/* =====================================================================
   STATE
   ===================================================================== */
var DB = null;            // { config, centres, voPrices, voFeatures, mrPrices, mrTiers, mrMatrix, text }
var curMarket = "Hong Kong";
var curLang = "EN";

/* =====================================================================
   BOOT
   ===================================================================== */
var mktSel = document.getElementById("mkt");
mktSel.addEventListener("change", function(){ curMarket = mktSel.value; render(); });
var langsEl = document.getElementById("langs");
Object.keys(LANG_LABELS).forEach(function(k){
  var b = document.createElement("button");
  b.className = "vopl-lang"; b.textContent = LANG_LABELS[k]; b.dataset.lang = k;
  b.addEventListener("click", function(){ curLang = k; render(); });
  langsEl.appendChild(b);
});
document.getElementById("btnRefresh").addEventListener("click", fetchData);
document.getElementById("btnLoad").addEventListener("click", function(){ document.getElementById("fileIn").click(); });
document.getElementById("fileIn").addEventListener("change", loadXlsx);
document.getElementById("btnPdf").addEventListener("click", function(){ exportPdf(false); });
document.getElementById("btnDrive").addEventListener("click", function(){ exportPdf(true); });
document.getElementById("secVO").addEventListener("change", render);
document.getElementById("secMR").addEventListener("change", render);

function setStatus(msg, cls){
  var el = document.getElementById("status");
  el.textContent = msg; el.className = "vopl-status" + (cls ? " " + cls : "");
}
if (SCRIPT_URL) fetchData();
else setStatus("Set SCRIPT_URL, or Load XLSX (the structured workbook) to test offline.");

/* =====================================================================
   DATA LOADING — structured workbook
   ===================================================================== */
function rowsToObjects(rows){
  if (!rows || !rows.length) return [];
  var head = rows[0].map(function(h){ return String(h || "").trim().toLowerCase().replace(/\s+/g, "_"); });
  var out = [];
  for (var r = 1; r < rows.length; r++){
    var o = {}, any = false;
    for (var c = 0; c < head.length; c++){
      var v = rows[r] ? rows[r][c] : null;
      if (v === undefined || v === null) v = "";
      if (typeof v === "string") v = v.trim();
      o[head[c]] = v;
      if (v !== "") any = true;
    }
    if (any) out.push(o);
  }
  return out;
}

function ingest(tabs){
  function need(name){
    if (!tabs[name]) throw new Error("Tab '" + name + "' not found — is this the structured workbook?");
    return rowsToObjects(tabs[name]);
  }
  DB = {
    config:     need("Config"),
    centres:    need("Centres"),
    voPrices:   need("VO-Prices"),
    voFeatures: need("VO-Features"),
    mrPrices:   need("MR-Prices"),
    mrTiers:    need("MR-Tiers"),
    mrMatrix:   need("MR-Matrix"),
    text:       need("Text")
  };
  mktSel.innerHTML = "";
  DB.config.forEach(function(c){
    var o = document.createElement("option"); o.value = c.market; o.textContent = c.market; mktSel.appendChild(o);
  });
  if (!DB.config.some(function(c){ return c.market === curMarket; }) && DB.config.length) curMarket = DB.config[0].market;
  mktSel.value = curMarket;
}

function fetchData(){
  if (!SCRIPT_URL){ setStatus("SCRIPT_URL is not set.", "err"); return; }
  setStatus("Fetching from Google Sheets\u2026");
  fetch(SCRIPT_URL + (SCRIPT_URL.indexOf("?") > -1 ? "&" : "?") + "action=data")
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok) throw new Error(j.error || "backend error");
      ingest(j.tabs);
      setStatus("Loaded \u00B7 " + new Date().toLocaleTimeString(), "ok");
      render();
    })
    .catch(function(err){ setStatus("Fetch failed: " + err.message, "err"); });
}

function loadXlsx(ev){
  var f = (ev.target.files || [])[0];
  if (!f) return;
  var rd = new FileReader();
  rd.onload = function(e){
    try{
      var wb = XLSX.read(new Uint8Array(e.target.result), { type:"array" });
      var tabs = {};
      wb.SheetNames.forEach(function(n){
        tabs[n] = XLSX.utils.sheet_to_json(wb.Sheets[n], { header:1, raw:true, defval:null });
      });
      ingest(tabs);
      setStatus("Loaded " + f.name, "ok");
      render();
    }catch(err){ setStatus("Load failed: " + err.message, "err"); }
  };
  rd.readAsArrayBuffer(f);
  ev.target.value = "";
}

/* =====================================================================
   LOOKUPS (all language access falls back to English)
   ===================================================================== */
function L(row, field){
  var v = row[field + "_" + LANG_KEYS[curLang]];
  if (v === undefined || v === "") v = row[field + "_en"];
  return v === undefined ? "" : String(v);
}
function conf(){ return DB.config.filter(function(c){ return c.market === curMarket; })[0] || {}; }
function TXT(key, centreId){
  var rows = DB.text.filter(function(t){
    return t.key === key && (t.market === curMarket || t.market === "all") &&
           (centreId ? t.centre_id === centreId : true);
  });
  rows.sort(function(a, b){ return (a.market === "all" ? 1 : 0) - (b.market === "all" ? 1 : 0); });
  if (!rows.length) return "";
  var r = rows[0];
  var v = r["text_" + LANG_KEYS[curLang]];
  return (v === undefined || v === "") ? String(r.text_en || "") : String(v);
}
function txtSeries(prefix){
  var out = [];
  for (var i = 1; i <= 40; i++){
    var v = TXT(prefix + "." + i);
    if (v === "") break;
    out.push(v);
  }
  return out;
}
function tiersFor(kind){
  var row = DB.mrTiers.filter(function(t){ return t.market === curMarket && t.kind === kind; })[0];
  if (!row) return [];
  var out = [];
  for (var i = 1; i <= 6; i++){
    var en = row["t" + i];
    if (en === undefined || en === "") break;
    var loc = row["t" + i + "_" + LANG_KEYS[curLang]];
    out.push({ en:String(en), label:(loc === undefined || loc === "") ? String(en) : String(loc) });
  }
  return out;
}
function centre(id){ return DB.centres.filter(function(c){ return c.id === id; })[0] || null; }
function marketCentres(){
  return DB.centres.filter(function(c){ return c.market === curMarket; })
    .sort(function(a, b){ return (Number(a.sort) || 0) - (Number(b.sort) || 0); });
}
function fmtPrice(v, prefix){
  if (v === null || v === undefined || v === "") return "";
  var num = (typeof v === "number") ? v : parseFloat(String(v).replace(/[^\d.]/g, ""));
  if (isNaN(num)) return String(v);
  return prefix + Math.round(num).toLocaleString("en-US");
}
function levelText(levels){
  var raw = String(levels).trim();
  if (curLang === "EN") return raw;                      // keep the sheet's exact wording, e.g. "Level 18 & 19"
  var fmt = TXT("level.format") || "Level {n}";
  var n = raw.replace(/^Level\s+/i, "").trim();
  if (curLang === "TC" || curLang === "SC"){
    n = n.replace(/\s*&\s*/g, "\u53CA").replace(/\s*,\s*/g, "\u3001");   // & -> 及, comma -> 、
  }
  return fmt.replace("{n}", n);                          // e.g. "18及19 樓", "T\u1EA7ng 10"
}
function esc(s){
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
}

function paginateItems(stage, titles, items, makeContainer){
  var page = newPage(titles);
  stage.appendChild(page);
  var body = page.querySelector(".vopl-pbody");
  var box = makeContainer();
  body.appendChild(box);
  function overflowed(){ return body.scrollHeight > body.clientHeight + 1; }
  items.forEach(function(it){
    var frag = document.createElement("template");
    frag.innerHTML = it.html;
    var nodes = Array.prototype.slice.call(frag.content.childNodes);
    nodes.forEach(function(nd){ box.appendChild(nd); });
    if (overflowed()){
      nodes.forEach(function(nd){ box.removeChild(nd); });
      var carry = [];
      while (box.lastElementChild && box.lastElementChild.dataset && box.lastElementChild.dataset.hdr === "1"){
        carry.unshift(box.lastElementChild);
        box.removeChild(box.lastElementChild);
      }
      page = newPage(titles);
      stage.appendChild(page);
      body = page.querySelector(".vopl-pbody");
      box = makeContainer();
      body.appendChild(box);
      carry.forEach(function(nd){ nd.classList.add("first"); box.appendChild(nd); });
      var frag2 = document.createElement("template");
      frag2.innerHTML = it.html;
      Array.prototype.slice.call(frag2.content.childNodes).forEach(function(nd){ box.appendChild(nd); });
    }
  });
  return box;
}

/* =====================================================================
   RENDER
   ===================================================================== */
function render(){
  langsEl.querySelectorAll(".vopl-lang").forEach(function(b){
    b.classList.toggle("on", b.dataset.lang === curLang);
    b.disabled = false;   // every language renders; blanks fall back to English
  });
  var stage = document.getElementById("stage");
  stage.innerHTML = "";
  if (!DB){ stage.innerHTML = '<div class="vopl-empty">No data loaded.</div>'; return; }
  var did = false;
  if (document.getElementById("secVO").checked){ did = renderVO(stage) || did; }
  if (document.getElementById("secMR").checked){ did = renderMR(stage) || did; }
  if (!did) stage.innerHTML = '<div class="vopl-empty">Nothing to show for this market \u2014 tick a section or add data.</div>';
}

/* ---------- Virtual Office ---------- */
function renderVO(stage){
  var c = conf(), titles = titlePair("vo");
  var priced = {};
  DB.voPrices.forEach(function(p){
    if (p.gold !== "" || p.platinum !== "" || p.diamond !== "") priced[p.centre_id] = p;
  });
  var list = [], prevCity = null, prevDist = null, prevType = "head", first = true;
  marketCentres().forEach(function(ct){
    var p = priced[ct.id];
    if (!p) return;    // no prices yet -> not on the VO page
    var dist = L(ct, "district"), city = "", d = dist;
    if (dist.indexOf(" \u2014 ") > -1){ var sp = dist.split(" \u2014 "); city = sp[0]; d = sp.slice(1).join(" \u2014 "); }
    if (city && city !== prevCity){
      list.push({ html:'<div class="vopl-city' + (first ? " first" : "") + '" data-hdr="1">' + esc(city) + '</div>' });
      first = false; prevCity = city; prevDist = null; prevType = "head";
    }
    if (d && d !== prevDist){
      list.push({ html:'<div class="vopl-dist' + (first ? " first" : "") + '" data-hdr="1">' + esc(d) + '</div>' });
      first = false; prevDist = d; prevType = "head";
    }
    var nodot = (prevType !== "grp") ? " nodot" : "";
    var lv = levelText(ct.levels), bld = L(ct, "building"), adr = L(ct, "address");
    var h = '<div class="vopl-grp-l' + nodot + '">';
    if ((c.vo_order || "") === "building-first"){
      h += '<div class="bd">' + esc(bld) + '</div><div class="lv">' + esc(lv) + '</div>';
    } else {
      h += '<div class="lv">' + esc(lv) + '</div><div class="bd">' + esc(bld) + '</div>';
    }
    h += '<div class="ad">' + esc(adr) + '</div></div>';
    [p.gold, p.platinum, p.diamond].forEach(function(v){
      h += '<div class="vopl-price vopl-vline' + nodot + '">' + esc(fmtPrice(v, c.currency)) + '</div>';
    });
    list.push({ html:h });
    prevType = "grp";
  });
  if (!list.length) return false;

  var headHtml = '<div class="vopl-chead lbl" data-hdr="1"></div>' +
    VO_HEADS.map(function(h){ return '<div class="vopl-chead vopl-vline" data-hdr="1">' + esc(h) + '</div>'; }).join("");
  var box = paginateItems(stage, titles, list, function(){
    var g = document.createElement("div"); g.className = "vopl-cols"; g.innerHTML = headHtml; return g;
  });
  box.insertAdjacentHTML("beforeend", '<div class="vopl-endline"></div>');

  /* features page */
  var setName = c.features_set || "default";
  var feats = DB.voFeatures.filter(function(f){ return f.set === setName; });
  if (feats.length){
    var fp = newPage(titles);
    stage.appendChild(fp);
    var fg = document.createElement("div");
    fg.className = "vopl-cols";
    var fh = '<div class="vopl-chead lbl"></div>' + VO_HEADS.map(function(h){
      return '<div class="vopl-chead vopl-vline">' + esc(h) + '</div>'; }).join("");
    var firstCat = true, notes = [];
    feats.forEach(function(x){
      var label = L(x, "label");
      if (x.row_type === "footnote"){ notes.push(label); return; }
      if (x.row_type === "category"){
        fh += '<div class="vopl-fcat' + (firstCat ? " first" : "") + '">' + esc(label) + '</div>';
        firstCat = false; return;
      }
      fh += '<div class="vopl-frow-l">' + esc(label) + '</div>';
      [x.gold, x.platinum, x.diamond].forEach(function(v){
        var vv = String(v === undefined ? "" : v).trim(), inner;
        if (vv === "\u2022") inner = '<span class="dot"></span>';
        else if (vv === "\u2014" || vv === "-" || vv === "\u2013") inner = '<span class="dash"></span>';
        else if (vv === "") inner = "";
        else inner = '<span class="txt">' + esc(vv) + '</span>';
        fh += '<div class="vopl-fval vopl-vline">' + inner + '</div>';
      });
    });
    fh += '<div class="vopl-endline"></div>';
    fg.innerHTML = fh;
    fp.querySelector(".vopl-pbody").appendChild(fg);
    if (notes.length){
      var nt = document.createElement("div");
      nt.className = "vopl-fnotes";
      nt.innerHTML = notes.map(function(x, idx){
        var bold = /^\*/.test(x) || /[:\uFF1A]\s*$/.test(x) || idx === notes.length - 1;
        return '<div class="vopl-fnote ' + (bold ? "b" : "i") + '">' + esc(x) + '</div>';
      }).join("");
      fp.querySelector(".vopl-pbody").appendChild(nt);
    }
  }
  return true;
}

/* ---------- Meeting Room ---------- */
function renderMR(stage){
  var c = conf(), titles = titlePair("mr");
  var rows = DB.mrPrices.filter(function(p){ return p.market === curMarket; });
  var pricingTiers = tiersFor("pricing");
  var list = [];

  ["Internal","External"].forEach(function(client){
    var mine = rows.filter(function(p){ return p.client === client; });
    if (!mine.length) return;
    var title = TXT(client === "Internal" ? "mr.internal.title" : "mr.external.title");
    var tiers = pricingTiers.length ? pricingTiers : [];
    if (!tiers.length){
      var seen = {}, t = [];
      mine.forEach(function(p){ if (!seen[p.tier_en]){ seen[p.tier_en] = 1; t.push({ en:p.tier_en, label:p.tier_en }); } });
      tiers = t;
    }
    var w = tiers.length <= 3 ? 118 : 74;
    var grid = 'style="grid-template-columns:1fr repeat(' + tiers.length + ',' + w + 'px)"';
    var scopes = [];
    mine.forEach(function(p){ if (scopes.indexOf(p.scope) < 0) scopes.push(p.scope); });
    var h = '<div class="vopl-mrtitle" data-hdr="1">' + esc(title) + '</div>';
    h += '<div class="vopl-mrt" ' + grid + '>';
    var lblCell = (scopes.length === 1 && scopes[0] === "all" && client === "Internal") ? TXT("mr.allcentres") : "";
    h += '<div class="h lbl">' + esc(lblCell) + '</div>';
    tiers.forEach(function(t){ h += '<div class="h vopl-vline">' + esc(t.label) + '</div>'; });
    scopes.forEach(function(scope){
      if (scope !== "all"){
        var ct = centre(scope);
        h += '<div class="bld">' + esc(ct ? L(ct, "building") : scope) + '</div>';
      }
      var srows = mine.filter(function(p){ return p.scope === scope; });
      [["per_30_mins", client === "External" && TXT("mr.per30.ext") ? "mr.per30.ext" : "mr.per30"],
       ["per_day", "mr.perday"]].forEach(function(pair){
        var field = pair[0], key = pair[1];
        var vals = tiers.map(function(t){
          var pr = srows.filter(function(p){ return p.tier_en === t.en; })[0];
          return pr ? pr[field] : "";
        });
        if (!vals.some(function(v){ return v !== ""; })) return;
        h += '<div class="rl">' + esc(TXT(key)) + '</div>';
        vals.forEach(function(v){ h += '<div class="rv vopl-vline">' + esc(fmtPrice(v, c.currency)) + '</div>'; });
      });
    });
    h += '<div class="bot"></div></div>';
    list.push({ html:'<div class="vopl-mrsec">' + h + '</div>' });
  });
  if (!list.length) return false;

  /* video conferencing lines */
  for (var i = 1; i <= 10; i++){
    var vcRows = DB.text.filter(function(t){ return t.key === "vc." + i && t.market === curMarket; });
    if (!vcRows.length) break;
    vcRows.forEach(function(r){
      var v = r["text_" + LANG_KEYS[curLang]] || r.text_en || "";
      if (!v) return;
      var pre = "";
      if (r.centre_id){ var ct = centre(r.centre_id); if (ct) pre = L(ct, "building") + " \u2014 "; }
      list.push({ html:'<div class="vopl-vc">' + esc(pre + v) + '</div>' });
    });
  }

  /* T&C + cards */
  var tcT = TXT("tc.title"), tcL = txtSeries("tc");
  var inT = TXT("incl.title"), inL = txtSeries("incl");
  var avT = TXT("avail.title"), avL = txtSeries("avail");
  if (tcL.length || inL.length || avL.length){
    var b = '<div class="vopl-mrbottom">';
    if (tcL.length) b += '<div class="vopl-tc"><div class="tt">' + esc(tcT) + '</div>' +
      tcL.map(function(l){ return '<div class="ln">' + esc(l) + '</div>'; }).join("") + '</div>';
    [[inT, inL], [avT, avL]].forEach(function(card){
      if (!card[1].length) return;
      b += '<div class="vopl-card"><div class="tt">' + esc(card[0]) + '</div>' +
        card[1].map(function(l){ return '<div class="ln">' + esc(l) + '</div>'; }).join("") + '</div>';
    });
    b += '</div>';
    list.push({ html:b });
  }
  paginateItems(stage, titles, list, function(){ var d = document.createElement("div"); return d; });

  /* availability matrix */
  var mxTiers = tiersFor("matrix");
  if (!mxTiers.length) return true;
  var byCentre = {};
  DB.mrMatrix.forEach(function(m){
    var ticks = [];
    for (var k = 1; k <= mxTiers.length; k++) ticks.push(String(m["t" + k] || "").indexOf("\u2713") > -1);
    if (!ticks.some(function(x){ return x; })) return;   // pending rows (no ticks yet) are hidden
    (byCentre[m.centre_id] = byCentre[m.centre_id] || []).push({ level:m.level, ticks:ticks });
  });
  var mlist = [], prevDist = null, firstDist = true, lastWasRow = false, any = false;
  marketCentres().forEach(function(ct){
    var lv = byCentre[ct.id];
    if (!lv) return;
    any = true;
    var dist = L(ct, "district").split(" \u2014 ").pop();
    if (dist !== prevDist){
      mlist.push({ html:'<div class="vopl-mx-dist' + (firstDist ? " first" : "") + '" data-hdr="1">' + esc(dist) + '</div>' });
      firstDist = false; prevDist = dist; lastWasRow = false;
    }
    var fmt = TXT("level.format") || "Level {n}";
    lv.forEach(function(row, li){
      var h = "";
      if (li === 0 && lastWasRow) h += '<div class="sep"></div>';
      h += '<div class="bname' + (li > 0 ? " cont" : "") + '">' + (li === 0 ? esc(L(ct, "building")) : "") + '</div>';
      h += '<div class="lvl">' + esc(fmt.replace("{n}", row.level)) + '</div>';
      row.ticks.forEach(function(t){
        h += '<div class="dcell vopl-vline">' + (t ? '<span class="dot"></span>' : "") + '</div>';
      });
      mlist.push({ html:h });
    });
    lastWasRow = true;
  });
  if (!any) return true;
  var w2 = mxTiers.length <= 4 ? 108 : 84;
  var gridStyle = "grid-template-columns:1fr 95px repeat(" + mxTiers.length + "," + w2 + "px)";
  var headHtml = '<div class="h lbl" data-hdr="1"></div><div class="h" data-hdr="1"></div>' +
    mxTiers.map(function(t){ return '<div class="h vopl-vline" data-hdr="1">' + esc(t.label) + '</div>'; }).join("");
  var mbox = paginateItems(stage, titles, mlist, function(){
    var g = document.createElement("div"); g.className = "vopl-cols vopl-mx";
    g.style.cssText = gridStyle; g.innerHTML = headHtml; return g;
  });
  mbox.insertAdjacentHTML("beforeend", '<div class="vopl-endline"></div>');
  return true;
}

/* =====================================================================
   PDF EXPORT + SAVE TO DRIVE (unchanged)
   ===================================================================== */
function pdfFilename(){ return curMarket.replace(/\s+/g, "") + "-" + curLang + ".pdf"; }
function exportPdf(toDrive){
  var pages = document.querySelectorAll(".vopl-page");
  if (!pages.length){ setStatus("Nothing to export.", "err"); return; }
  if (toDrive && !SCRIPT_URL){ setStatus("SCRIPT_URL is not set.", "err"); return; }
  setStatus("Rendering PDF\u2026");
  document.getElementById("btnPdf").disabled = true;
  document.getElementById("btnDrive").disabled = true;
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ unit:"pt", format:"a4", orientation:"portrait" });
  var W = 595.28, idx = 0;
  function next(){
    if (idx >= pages.length){ finish(); return; }
    html2canvas(pages[idx], { scale:2.2, useCORS:true, backgroundColor:"#FFFFFF", logging:false })
      .then(function(cv){
        if (idx > 0) doc.addPage();
        doc.addImage(cv.toDataURL("image/jpeg", 0.95), "JPEG", 0, 0, W, 841.89);
        idx++; next();
      })
      .catch(function(err){ setStatus("Capture failed: " + err.message, "err"); unlock(); });
  }
  function finish(){
    var name = pdfFilename();
    if (!toDrive){ doc.save(name); setStatus("Downloaded " + name, "ok"); unlock(); return; }
    setStatus("Uploading to Drive\u2026");
    fetch(SCRIPT_URL, {
      method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify({ action:"savePdf", filename:name, pdfBase64: doc.output("datauristring").split(",")[1] })
    })
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok) throw new Error(j.error || "backend error");
      setStatus("Saved to Drive: " + name, "ok"); unlock();
    })
    .catch(function(err){ setStatus("Drive save failed: " + err.message, "err"); unlock(); });
  }
  function unlock(){
    document.getElementById("btnPdf").disabled = false;
    document.getElementById("btnDrive").disabled = false;
  }
  next();
}

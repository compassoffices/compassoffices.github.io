<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass Offices — Price List Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
.coed{
  --co-orange:#FF6600; --co-orange-dk:#E55A00; --co-orange-wash:#FFF3EB; --co-orange-tint:#FFD9BD;
  --co-ink:#1A1A1A; --co-text:#333; --co-text-2:#555; --co-muted:#888; --co-faint:#BBB;
  --co-line:#E5E5E5; --co-bg:#F5F5F5; --co-paper:#FFF; --co-radius:10px; --co-pill:999px;
  color:var(--co-ink);
  font-family:'Hanken Grotesk','Noto Sans TC','Noto Sans SC','Noto Sans JP',sans-serif;
  background:var(--co-bg); margin:0; min-height:100vh; line-height:1.5;
}
.coed *,.coed *::before,.coed *::after{box-sizing:border-box;}
.coed-top{position:sticky;top:0;z-index:40;background:var(--co-paper);border-bottom:1px solid var(--co-line);
  display:flex;align-items:center;gap:14px;padding:12px 22px;}
.coed-top .logo{height:26px;width:auto;}
.coed-top h1{font-size:15px;font-weight:800;margin:0;letter-spacing:.3px;}
.coed-top h1 span{color:var(--co-orange);}
.coed-status{margin-left:auto;font-size:12.5px;color:var(--co-muted);max-width:360px;}
.coed-status.ok{color:#2E7D32;} .coed-status.err{color:#C0392B;}
.coed-shell{display:flex;min-height:calc(100vh - 51px);}
.coed-nav{width:196px;flex:0 0 196px;background:var(--co-paper);border-right:1px solid var(--co-line);padding:16px 10px;}
.coed-nav button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;font-family:inherit;font-size:13.5px;
  font-weight:600;color:var(--co-text-2);background:none;border:0;border-radius:8px;padding:10px 12px;cursor:pointer;}
.coed-nav button:hover{background:var(--co-bg);}
.coed-nav button.on{background:var(--co-orange-wash);color:var(--co-orange);}
.coed-nav svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:0 0 16px;}
.coed-main{flex:1;padding:22px 26px 80px;min-width:0;}
.coed-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
.coed-chip{font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 15px;border-radius:var(--co-pill);
  border:1px solid var(--co-line);background:var(--co-paper);color:var(--co-text-2);cursor:pointer;}
.coed-chip.on{background:var(--co-orange);border-color:var(--co-orange);color:#fff;}
.coed-h2{font-size:17px;font-weight:800;margin:0 0 4px;}
.coed-sub{font-size:12.5px;color:var(--co-muted);margin:0 0 16px;}
/* cards */
.coed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
.coed-card{background:var(--co-paper);border:1px solid var(--co-line);border-radius:var(--co-radius);padding:16px;
  cursor:pointer;transition:border-color .15s, box-shadow .15s;position:relative;}
.coed-card:hover{border-color:var(--co-orange-tint);box-shadow:0 3px 14px rgba(0,0,0,.06);}
.coed-card .d{font-size:11px;font-weight:700;color:var(--co-muted);text-transform:uppercase;letter-spacing:.5px;}
.coed-card .b{font-size:15px;font-weight:700;color:var(--co-orange);margin:3px 0 2px;}
.coed-card .a{font-size:12px;color:var(--co-text-2);}
.coed-card .badges{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;}
.coed-badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:var(--co-pill);background:var(--co-bg);color:var(--co-text-2);}
.coed-badge.warn{background:#F5F5F5;color:#8a6d00;border:1px dashed #D9C87A;}
.coed-badge.ok{background:var(--co-orange-wash);color:var(--co-orange);}
.coed-add{border:1.5px dashed var(--co-faint);display:flex;align-items:center;justify-content:center;color:var(--co-muted);
  font-weight:700;font-size:13.5px;min-height:110px;background:none;}
.coed-add:hover{color:var(--co-orange);border-color:var(--co-orange-tint);}
/* drawer */
.coed-veil{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:60;display:none;}
.coed-veil.open{display:block;}
.coed-drawer{position:fixed;top:0;right:-620px;width:600px;max-width:96vw;height:100vh;background:var(--co-paper);
  z-index:70;box-shadow:-8px 0 30px rgba(0,0,0,.14);transition:right .22s ease;display:flex;flex-direction:column;}
.coed-drawer.open{right:0;}
.coed-dh{padding:18px 24px 12px;border-bottom:1px solid var(--co-line);display:flex;align-items:center;gap:12px;}
.coed-dh h3{margin:0;font-size:16px;font-weight:800;flex:1;}
.coed-x{background:none;border:0;font-size:20px;color:var(--co-muted);cursor:pointer;line-height:1;padding:4px 8px;}
.coed-db{flex:1;overflow-y:auto;padding:18px 24px 30px;}
.coed-df{padding:14px 24px;border-top:1px solid var(--co-line);display:flex;gap:10px;align-items:center;}
.coed-langs{display:flex;border:1px solid var(--co-line);border-radius:var(--co-pill);overflow:hidden;width:max-content;margin:0 0 16px;}
.coed-lang{font-family:inherit;font-size:12px;font-weight:700;padding:6px 14px;border:0;background:var(--co-paper);color:var(--co-text-2);cursor:pointer;}
.coed-lang.on{background:var(--co-orange);color:#fff;}
.coed-field{margin-bottom:12px;}
.coed-field label{display:block;font-size:11px;font-weight:700;color:var(--co-text-2);margin-bottom:4px;letter-spacing:.2px;}
.coed-field input,.coed-field select,.coed-field textarea{width:100%;font-family:inherit;font-size:13.5px;padding:9px 11px;
  border:1px solid var(--co-line);border-radius:8px;background:var(--co-paper);color:var(--co-ink);}
.coed-field textarea{resize:vertical;min-height:54px;}
.coed-field input:focus,.coed-field textarea:focus,.coed-field select:focus{outline:none;border-color:var(--co-orange-tint);box-shadow:0 0 0 3px var(--co-orange-wash);}
.coed-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.coed-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.coed-sec{font-size:12px;font-weight:800;color:var(--co-orange);letter-spacing:.6px;text-transform:uppercase;margin:22px 0 10px;
  padding-top:14px;border-top:1px solid var(--co-line);}
.coed-sec:first-child{margin-top:0;border-top:0;padding-top:0;}
.coed-hint{font-size:11.5px;color:var(--co-muted);margin:-6px 0 12px;}
/* matrix editor */
.coed-mx{border:1px solid var(--co-line);border-radius:8px;overflow:hidden;}
.coed-mx-h,.coed-mx-r{display:grid;grid-template-columns:86px repeat(var(--mxn,4),1fr) 36px;align-items:center;}
.coed-mx-h{background:var(--co-bg);font-size:11px;font-weight:700;color:var(--co-text-2);}
.coed-mx-h div,.coed-mx-r div{padding:8px 6px;text-align:center;}
.coed-mx-r{border-top:1px solid var(--co-line);}
.coed-mx-r input[type="text"]{width:64px;font-family:inherit;font-size:13px;padding:5px 7px;border:1px solid var(--co-line);border-radius:6px;text-align:center;}
.coed-mx-r input[type="checkbox"]{width:16px;height:16px;accent-color:#FF6600;cursor:pointer;}
.coed-mx-r .del{background:none;border:0;color:var(--co-faint);cursor:pointer;font-size:15px;}
.coed-mx-r .del:hover{color:#C0392B;}
.coed-mini{font-family:inherit;font-size:12px;font-weight:700;color:var(--co-orange);background:none;border:0;cursor:pointer;padding:8px 2px;}
/* buttons */
.coed-btn{font-family:inherit;font-size:13.5px;font-weight:700;padding:10px 20px;border-radius:var(--co-pill);
  border:1px solid var(--co-line);background:var(--co-paper);color:var(--co-ink);cursor:pointer;}
.coed-btn.primary{background:var(--co-orange);border-color:var(--co-orange);color:#fff;}
.coed-btn.primary:hover{background:var(--co-orange-dk);border-color:var(--co-orange-dk);}
.coed-btn.danger{color:#C0392B;border-color:rgba(192,57,43,.35);}
.coed-btn:disabled{opacity:.5;cursor:not-allowed;}
/* tables (MR prices, texts, config) */
.coed-table{width:100%;background:var(--co-paper);border:1px solid var(--co-line);border-radius:var(--co-radius);overflow:hidden;border-collapse:separate;border-spacing:0;}
.coed-table th{font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--co-text-2);
  background:var(--co-bg);padding:10px 12px;text-align:left;}
.coed-table td{padding:8px 12px;font-size:13px;border-top:1px solid var(--co-line);vertical-align:top;}
.coed-table td input,.coed-table td textarea{width:100%;font-family:inherit;font-size:13px;padding:7px 9px;
  border:1px solid transparent;border-radius:6px;background:transparent;color:var(--co-ink);}
.coed-table td textarea{min-height:38px;resize:vertical;}
.coed-table td input:hover,.coed-table td textarea:hover{border-color:var(--co-line);background:var(--co-paper);}
.coed-table td input:focus,.coed-table td textarea:focus{outline:none;border-color:var(--co-orange-tint);background:var(--co-paper);box-shadow:0 0 0 3px var(--co-orange-wash);}
.coed-table td.dirty input,.coed-table td.dirty textarea{border-color:var(--co-orange);background:var(--co-orange-wash);}
.coed-group{font-size:12px;font-weight:800;color:var(--co-orange);padding:16px 0 8px;letter-spacing:.4px;}
.coed-savebar{position:fixed;left:50%;transform:translateX(-50%);bottom:-70px;z-index:50;background:var(--co-ink);color:#fff;
  border-radius:var(--co-pill);padding:10px 12px 10px 20px;display:flex;align-items:center;gap:14px;font-size:13px;
  box-shadow:0 8px 26px rgba(0,0,0,.25);transition:bottom .2s ease;}
.coed-savebar.show{bottom:24px;}
.coed-savebar .coed-btn{padding:8px 18px;}
.coed-empty{padding:50px;text-align:center;color:var(--co-muted);font-size:14px;}
@media (max-width:760px){.coed-nav{width:60px;flex-basis:60px;} .coed-nav button span{display:none;} .coed-main{padding:16px 12px 90px;}}
</style>
</head>

    <button data-view="centres" class="on"><svg viewBox="0 0 24 24"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"/></svg><span>Centres</span></button>
    <button data-view="mrprices"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16"/></svg><span>MR Prices</span></button>
    <button data-view="texts"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg><span>Texts &amp; T&amp;C</span></button>
    <button data-view="saleskit"><svg viewBox="0 0 24 24"><path d="M3 7h18M3 7l2 12h14l2-12M9 7V5a3 3 0 0 1 6 0v2"/></svg><span>Sales Kit</span></button>
    <button data-view="config"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.51 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1z"/></svg><span>Config</span></button>
  </nav>
  <main class="coed-main" id="main"><div class="coed-empty">Loading data from Google Sheets&hellip;</div></main>
</div>

<div class="coed-veil" id="veil"></div>
<aside class="coed-drawer" id="drawer">
  <div class="coed-dh"><h3 id="dTitle">Edit centre</h3><button class="coed-x" id="dClose">&#10005;</button></div>
  <div class="coed-db" id="dBody"></div>
  <div class="coed-df">
    <button class="coed-btn danger" id="dDelete">Delete</button>
    <div style="flex:1"></div>
    <button class="coed-btn" id="dCancel">Cancel</button>
    <button class="coed-btn primary" id="dSave">Save centre</button>
  </div>
</aside>

<div class="coed-savebar" id="savebar">
  <span id="savebarText">0 unsaved changes</span>
  <button class="coed-btn" id="sbDiscard" style="border-color:#555;color:#fff;background:none;">Discard</button>
  <button class="coed-btn primary" id="sbSave">Save all</button>
</div>

<script>
/* ================= CONFIG ================= */
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTBXPlBtYsiD_0oEThJ_pJzQOmeYNNWFezpC1z6ZIiA-p8VyqDqpdZExkG-51Lqxtf/exec";
var LANGS = [["en","EN"],["tc","\u7E41"],["sc","\u7C21"],["jp","\u65E5"],["vi","VI"]];

/* ================= STATE ================= */
var DB = null;
var view = "centres";
var mkt = null;               // current market filter
var editLang = "en";          // language tab inside the drawer
var editing = null;           // centre object being edited (working copy)
var editingNew = false;
var dirty = {};               // pending inline edits: key -> {action payload}

/* ================= UTIL ================= */
function el(q){ return document.querySelector(q); }
function esc(s){ return String(s === undefined || s === null ? "" : s)
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function setStatus(m, c){ var s = el("#status"); s.textContent = m; s.className = "coed-status" + (c ? " " + c : ""); }
function rowsToObjects(rows){
  if (!rows || !rows.length) return [];
  var head = rows[0].map(function(h){ return String(h || "").trim().toLowerCase().replace(/\s+/g, "_"); });
  var out = [];
  for (var r = 1; r < rows.length; r++){
    var o = {}, any = false;
    for (var c = 0; c < head.length; c++){
      var v = rows[r] ? rows[r][c] : "";
      if (v === undefined || v === null) v = "";
      if (typeof v === "string") v = v.trim();
      o[head[c]] = v;
      if (v !== "") any = true;
    }
    if (any) out.push(o);
  }
  return out;
}
function post(payload){
  return fetch(SCRIPT_URL, {
    method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  }).then(function(r){ return r.json(); }).then(function(j){
    if (!j.ok) throw new Error(j.error || "backend error");
    return j;
  });
}

/* ================= LOAD ================= */
function load(){
  setStatus("Loading\u2026");
  fetch(SCRIPT_URL + "?action=data")
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok) throw new Error(j.error || "backend error");
      DB = {
        config:   rowsToObjects(j.tabs["Config"]),
        centres:  rowsToObjects(j.tabs["Centres"]),
        voPrices: rowsToObjects(j.tabs["VO-Prices"]),
        mrPrices: rowsToObjects(j.tabs["MR-Prices"]),
        mrTiers:  rowsToObjects(j.tabs["MR-Tiers"]),
        mrMatrix: rowsToObjects(j.tabs["MR-Matrix"]),
        texts:    rowsToObjects(j.tabs["Text"]),
        skIncluded:  rowsToObjects(j.tabs["SK-Included"] || []),
        skAdditional:rowsToObjects(j.tabs["SK-Additional"] || []),
        skAddPrices: rowsToObjects(j.tabs["SK-AddPrices"] || []),
        skAssets:    rowsToObjects(j.tabs["SK-Assets"] || []),
        skText:      rowsToObjects(j.tabs["SK-Text"] || []),
        skMapNodes:  rowsToObjects(j.tabs["SK-MapNodes"] || [])
      };
      if (!mkt) mkt = DB.config.length ? DB.config[0].market : null;
      dirty = {}; syncSavebar();
      setStatus("Loaded \u00B7 " + new Date().toLocaleTimeString(), "ok");
      renderView();
    })
    .catch(function(e){ setStatus("Load failed: " + e.message, "err"); });
}
el("#btnReload").addEventListener("click", function(){
  if (Object.keys(dirty).length && !confirm("Discard unsaved changes and reload?")) return;
  load();
});

/* ================= NAV + CHIPS ================= */
document.querySelectorAll("#nav button").forEach(function(b){
  b.addEventListener("click", function(){
    document.querySelectorAll("#nav button").forEach(function(x){ x.classList.remove("on"); });
    b.classList.add("on"); view = b.dataset.view; renderView();
  });
});
function chipsHtml(){
  return '<div class="coed-chips">' + DB.config.map(function(c){
    return '<button class="coed-chip' + (c.market === mkt ? " on" : "") + '" data-mkt="' + esc(c.market) + '">' + esc(c.market) + '</button>';
  }).join("") + '</div>';
}
function bindChips(){
  document.querySelectorAll(".coed-chip").forEach(function(b){
    b.addEventListener("click", function(){ mkt = b.dataset.mkt; renderView(); });
  });
}

/* ================= VIEW: CENTRES ================= */
function centrePrices(id){ return DB.voPrices.filter(function(p){ return p.centre_id === id; })[0] || null; }
function centreMatrix(id){ return DB.mrMatrix.filter(function(m){ return m.centre_id === id; }); }
function matrixTierLabels(){
  var row = DB.mrTiers.filter(function(t){ return t.market === mkt && t.kind === "matrix"; })[0];
  if (!row) return [];
  var out = [];
  for (var i = 1; i <= 6; i++){ if (row["t" + i]) out.push(row["t" + i]); }
  return out;
}
function renderCentres(){
  var list = DB.centres.filter(function(c){ return c.market === mkt; })
    .sort(function(a,b){ return (Number(a.sort)||0) - (Number(b.sort)||0); });
  var h = chipsHtml();
  h += '<h2 class="coed-h2">Centres \u2014 ' + esc(mkt) + '</h2>';
  h += '<p class="coed-sub">Click a centre to edit its names, prices and meeting-room availability. Changes save straight to the Google Sheet.</p>';
  h += '<div class="coed-grid">';
  list.forEach(function(c){
    var p = centrePrices(c.id);
    var hasPrices = p && (p.gold !== "" || p.platinum !== "" || p.diamond !== "");
    var mx = centreMatrix(c.id).some(function(m){ return ["t1","t2","t3","t4"].some(function(k){ return String(m[k]).indexOf("\u2713") > -1; }); });
    h += '<div class="coed-card" data-id="' + esc(c.id) + '">' +
      '<div class="d">' + esc(c.district_en) + '</div>' +
      '<div class="b">' + esc(c.building_en) + '</div>' +
      '<div class="a">' + esc(c.address_en) + (c.levels ? ' \u00B7 ' + esc(c.levels) : '') + '</div>' +
      '<div class="badges">' +
        (hasPrices ? '<span class="coed-badge ok">VO priced</span>' : '<span class="coed-badge warn">No VO prices \u2014 hidden</span>') +
        (mx ? '<span class="coed-badge ok">In MR matrix</span>' : '<span class="coed-badge">No meeting rooms</span>') +
      '</div></div>';
  });
  h += '<button class="coed-card coed-add" id="addCentre">+ Add centre</button></div>';
  el("#main").innerHTML = h;
  bindChips();
  document.querySelectorAll(".coed-card[data-id]").forEach(function(card){
    card.addEventListener("click", function(){ openDrawer(card.dataset.id); });
  });
  el("#addCentre").addEventListener("click", function(){ openDrawer(null); });
}

/* ---------- drawer ---------- */
function blankCentre(){
  var o = { id:"", market:mkt, sort:"", levels:"" };
  ["district","building","address"].forEach(function(f){
    LANGS.forEach(function(L){ o[f + "_" + L[0]] = ""; });
  });
  return o;
}
function openDrawer(id){
  editingNew = !id;
  var src = id ? DB.centres.filter(function(c){ return c.id === id; })[0] : blankCentre();
  editing = JSON.parse(JSON.stringify(src));
  editing._prices = JSON.parse(JSON.stringify(centrePrices(id) || { centre_id:id||"", gold:"", platinum:"", diamond:"" }));
  editing._matrix = JSON.parse(JSON.stringify(centreMatrix(id)));
  editLang = "en";
  el("#dTitle").textContent = editingNew ? "Add centre \u2014 " + mkt : src.building_en;
  el("#dDelete").style.display = editingNew ? "none" : "";
  drawDrawer();
  el("#veil").classList.add("open"); el("#drawer").classList.add("open");
}
function closeDrawer(){ el("#veil").classList.remove("open"); el("#drawer").classList.remove("open"); editing = null; }
el("#veil").addEventListener("click", closeDrawer);
el("#dClose").addEventListener("click", closeDrawer);
el("#dCancel").addEventListener("click", closeDrawer);

function drawDrawer(){
  var c = editing, L = editLang;
  var tiers = matrixTierLabels();
  var h = '<div class="coed-sec">Names &amp; address</div>';
  h += '<div class="coed-langs">' + LANGS.map(function(x){
    return '<button class="coed-lang' + (x[0] === L ? " on" : "") + '" data-l="' + x[0] + '">' + x[1] + '</button>';
  }).join("") + '</div>';
  if (L !== "en") h += '<div class="coed-hint">Blank fields fall back to English on the documents.</div>';
  [["building","Building name"],["district","District"],["address","Address"]].forEach(function(f){
    h += '<div class="coed-field"><label>' + f[1] + ' (' + L.toUpperCase() + ')</label>' +
      '<input data-f="' + f[0] + '_' + L + '" value="' + esc(c[f[0] + "_" + L]) + '"></div>';
  });
  h += '<div class="coed-row2">' +
    '<div class="coed-field"><label>Levels (display text)</label><input data-f="levels" value="' + esc(c.levels) + '" placeholder="Level 10 or Level 18 &amp; 19"></div>' +
    '<div class="coed-field"><label>Sort position</label><input data-f="sort" type="number" value="' + esc(c.sort) + '"></div></div>';

  h += '<div class="coed-sec">Virtual Office prices</div>';
  h += '<div class="coed-hint">Leave blank to keep this centre off the VO page.</div>';
  h += '<div class="coed-row3">' +
    ['gold','platinum','diamond'].map(function(k){
      return '<div class="coed-field"><label>' + k.charAt(0).toUpperCase() + k.slice(1) + '</label>' +
        '<input data-p="' + k + '" type="number" step="any" value="' + esc(c._prices[k]) + '"></div>';
    }).join("") + '</div>';

  h += '<div class="coed-sec">Meeting room availability</div>';
  if (tiers.length){
    h += '<div class="coed-mx" style="--mxn:' + tiers.length + '">' +
      '<div class="coed-mx-h"><div>Level</div>' + tiers.map(function(t){ return '<div>' + esc(t) + '</div>'; }).join("") + '<div></div></div>';
    c._matrix.forEach(function(m, i){
      h += '<div class="coed-mx-r"><div><input type="text" data-mxl="' + i + '" value="' + esc(m.level) + '"></div>';
      tiers.forEach(function(_, ti){
        var on = String(m["t" + (ti+1)] || "").indexOf("\u2713") > -1;
        h += '<div><input type="checkbox" data-mxr="' + i + '" data-mxt="' + (ti+1) + '"' + (on ? " checked" : "") + '></div>';
      });
      h += '<div><button class="del" data-mxdel="' + i + '" title="Remove level">&#10005;</button></div></div>';
    });
    h += '</div><button class="coed-mini" id="mxAdd">+ Add level</button>';
    h += '<div class="coed-hint">A level with no ticks stays off the matrix pages.</div>';
  } else {
    h += '<div class="coed-hint">' + esc(mkt) + ' has no availability matrix (no matrix tiers defined in MR-Tiers).</div>';
  }
  el("#dBody").innerHTML = h;

  document.querySelectorAll("#dBody .coed-lang").forEach(function(b){
    b.addEventListener("click", function(){ captureDrawer(); editLang = b.dataset.l; drawDrawer(); });
  });
  var add = el("#mxAdd");
  if (add) add.addEventListener("click", function(){
    captureDrawer();
    editing._matrix.push({ centre_id: editing.id, level:"", t1:"", t2:"", t3:"", t4:"" });
    drawDrawer();
  });
  document.querySelectorAll("[data-mxdel]").forEach(function(b){
    b.addEventListener("click", function(){
      captureDrawer();
      editing._matrix.splice(Number(b.dataset.mxdel), 1);
      drawDrawer();
    });
  });
}
function captureDrawer(){
  document.querySelectorAll("#dBody [data-f]").forEach(function(i){ editing[i.dataset.f] = i.value.trim(); });
  document.querySelectorAll("#dBody [data-p]").forEach(function(i){ editing._prices[i.dataset.p] = i.value.trim(); });
  document.querySelectorAll("#dBody [data-mxl]").forEach(function(i){ editing._matrix[Number(i.dataset.mxl)].level = i.value.trim(); });
  document.querySelectorAll("#dBody [data-mxr]").forEach(function(i){
    editing._matrix[Number(i.dataset.mxr)]["t" + i.dataset.mxt] = i.checked ? "\u2713" : "";
  });
}
el("#dSave").addEventListener("click", function(){
  captureDrawer();
  if (!editing.building_en){ alert("English building name is required."); return; }
  editing._matrix = editing._matrix.filter(function(m){ return m.level !== ""; });
  var btn = el("#dSave"); btn.disabled = true; setStatus("Saving centre\u2026");
  post({ action:"saveCentre", isNew: editingNew, centre: stripPrivate(editing),
         prices: editing._prices, matrix: editing._matrix })
  .then(function(j){
    setStatus(j.message || "Saved", "ok"); btn.disabled = false; closeDrawer(); load();
  })
  .catch(function(e){ setStatus("Save failed: " + e.message, "err"); btn.disabled = false; });
});
el("#dDelete").addEventListener("click", function(){
  if (!confirm("Delete '" + editing.building_en + "' and all its prices and matrix rows?")) return;
  var btn = el("#dDelete"); btn.disabled = true; setStatus("Deleting\u2026");
  post({ action:"deleteCentre", id: editing.id })
  .then(function(){ setStatus("Deleted", "ok"); btn.disabled = false; closeDrawer(); load(); })
  .catch(function(e){ setStatus("Delete failed: " + e.message, "err"); btn.disabled = false; });
});
function stripPrivate(o){
  var out = {};
  Object.keys(o).forEach(function(k){ if (k.charAt(0) !== "_") out[k] = o[k]; });
  return out;
}

/* ================= VIEW: MR PRICES ================= */
function renderMrPrices(){
  var rows = DB.mrPrices.filter(function(p){ return p.market === mkt; });
  var h = chipsHtml();
  h += '<h2 class="coed-h2">Meeting Room Prices \u2014 ' + esc(mkt) + '</h2>';
  h += '<p class="coed-sub">Edit a price and it highlights orange; use the save bar at the bottom to write everything back to the sheet.</p>';
  if (!rows.length){ h += '<div class="coed-empty">No meeting room prices for this market.</div>'; el("#main").innerHTML = h; bindChips(); return; }
  var scopes = [];
  rows.forEach(function(p){ if (scopes.indexOf(p.scope) < 0) scopes.push(p.scope); });
  ["Internal","External"].forEach(function(client){
    var mine = rows.filter(function(p){ return p.client === client; });
    if (!mine.length) return;
    h += '<div class="coed-group">' + client + ' clients</div>';
    h += '<table class="coed-table"><tr><th style="width:26%">Scope</th><th style="width:22%">Room size</th><th>Per 30 mins</th><th>Per day</th></tr>';
    scopes.forEach(function(scope){
      mine.filter(function(p){ return p.scope === scope; }).forEach(function(p){
        var scopeName = scope;
        if (scope !== "all"){
          var ct = DB.centres.filter(function(c){ return c.id === scope; })[0];
          if (ct) scopeName = ct.building_en;
        } else scopeName = "All centres";
        var key = ["mr", p.market, p.scope, p.client, p.tier_en].join("|");
        h += '<tr><td>' + esc(scopeName) + '</td><td>' + esc(p.tier_en) + '</td>' +
          '<td data-cell="' + esc(key) + '|per_30_mins"><input type="number" step="any" value="' + esc(p.per_30_mins) + '"></td>' +
          '<td data-cell="' + esc(key) + '|per_day"><input type="number" step="any" value="' + esc(p.per_day) + '"></td></tr>';
      });
    });
    h += '</table>';
  });
  el("#main").innerHTML = h;
  bindChips(); bindCells();
}

/* ================= VIEW: TEXTS ================= */
var TEXT_GROUPS = [
  ["Section titles", /^mr\.(internal|external)\.title|^mr\.allcentres/],
  ["Row labels", /^mr\.per/],
  ["Video conferencing", /^vc\./],
  ["Terms and Conditions", /^tc\./],
  ["Included with booking", /^incl\./],
  ["Available on request", /^avail\./],
  ["Page titles & formats (all markets)", /^title\.|^level\./]
];
function renderTexts(){
  var h = chipsHtml();
  h += '<h2 class="coed-h2">Texts &amp; T&amp;C \u2014 ' + esc(mkt) + '</h2>';
  h += '<p class="coed-sub">Everything written on the documents. Blank translations fall back to English.</p>';
  TEXT_GROUPS.forEach(function(g){
    var rows = DB.texts.filter(function(t){
      var m = (g[1].source.indexOf("title\\.") > -1) ? (t.market === "all") : (t.market === mkt);
      return m && g[1].test(t.key);
    });
    if (!rows.length) return;
    h += '<div class="coed-group">' + g[0] + '</div>';
    h += '<table class="coed-table"><tr><th style="width:9%">Key</th>' +
      LANGS.map(function(L){ return '<th>' + L[1] + '</th>'; }).join("") + '</tr>';
    rows.forEach(function(t){
      var key = ["tx", t.market, t.centre_id, t.key].join("|");
      h += '<tr><td>' + esc(t.key) + '</td>' + LANGS.map(function(L){
        return '<td data-cell="' + esc(key) + '|text_' + L[0] + '"><textarea>' + esc(t["text_" + L[0]]) + '</textarea></td>';
      }).join("") + '</tr>';
    });
    h += '</table>';
  });
  el("#main").innerHTML = h;
  bindChips(); bindCells();
}

/* ================= VIEW: SALES KIT ================= */
var SK_TABLES = [
  { title:"Included Services", data:"skIncluded", kind:"ski",
    keys:["category","sort","row_type"],
    fields:["label_en","label_tc","label_sc","label_jp","label_vi","image_1","image_2"], area:true },
  { title:"Additional Services \u2014 bullets (market 'all' = standard; market rows replace per category)", data:"skAdditional", kind:"ska",
    keys:["category","market","sort","row_type"],
    fields:["label_en","label_tc","label_sc","label_jp","label_vi"], area:true },
  { title:"Additional Services \u2014 price notes", data:"skAddPrices", kind:"skp",
    keys:["market","category","bullet_sort"],
    fields:["note_en","note_tc","note_sc","note_jp","note_vi"] },
  { title:"Photos & map images (Google Drive file IDs)", data:"skAssets", kind:"sks",
    keys:["key"], fields:["drive_file_id"], extras:["note"] },
  { title:"Sales Kit texts (page titles, network blurb)", data:"skText", kind:"skt",
    keys:["key"], fields:["text_en","text_tc","text_sc","text_jp","text_vi"], area:true },
  { title:"Train map stations (rows here = transit style; delete a market's rows for Google maps)", data:"skMapNodes", kind:"skn",
    keys:["market","line","sort"],
    fields:["label_en","label_tc","label_sc","label_jp","station_code","active","district_en","marker"] }
];
function renderSalesKit(){
  var h = '<h2 class="coed-h2">Sales Kit content</h2>' +
    '<p class="coed-sub">Everything the Sales Kit generator reads, except centres (edit those in the Centres section \u2014 the Locations and Global Network pages derive from them automatically). Grey cells are row keys and are fixed.</p>';
  SK_TABLES.forEach(function(t){
    var rows = DB[t.data] || [];
    if (!rows.length){
      h += '<div class="coed-group">' + t.title + '</div><div class="coed-sub">Tab empty or not imported.</div>';
      return;
    }
    h += '<div class="coed-group">' + t.title + '</div>';
    h += '<table class="coed-table"><tr>' +
      t.keys.map(function(k){ return '<th>' + esc(k) + '</th>'; }).join("") +
      t.fields.map(function(f){ return '<th>' + esc(f.replace(/^(label_|note_|text_)/, "")) + '</th>'; }).join("") +
      (t.extras || []).map(function(f){ return '<th>' + esc(f) + '</th>'; }).join("") + '</tr>';
    rows.forEach(function(r){
      var key = [t.kind].concat(t.keys.map(function(k){ return r[k]; })).join("|");
      h += '<tr>' + t.keys.map(function(k){
        return '<td style="color:var(--co-muted);white-space:nowrap">' + esc(r[k]) + '</td>'; }).join("");
      h += t.fields.map(function(f){
        var v = esc(r[f]);
        return '<td data-cell="' + esc(key) + '|' + f + '">' +
          (t.area ? '<textarea>' + v + '</textarea>' : '<input value="' + v + '">') + '</td>';
      }).join("");
      h += (t.extras || []).map(function(f){
        return '<td style="color:var(--co-muted)">' + esc(r[f]) + '</td>'; }).join("");
      h += '</tr>';
    });
    h += '</table>';
  });
  el("#main").innerHTML = h;
  bindCells();
}

/* ================= VIEW: CONFIG ================= */
function renderConfig(){
  var h = '<h2 class="coed-h2">Market Config</h2>';
  h += '<p class="coed-sub">Currency symbols, footer contacts and page behaviour per market.</p>';
  h += '<table class="coed-table"><tr><th>Market</th><th>Currency</th><th>Phone</th><th>Email</th><th>VO order</th><th>Features set</th></tr>';
  DB.config.forEach(function(c){
    var key = "cf|" + c.market;
    h += '<tr><td>' + esc(c.market) + '</td>' +
      ['currency','phone','email','vo_order','features_set'].map(function(f){
        return '<td data-cell="' + esc(key) + '|' + f + '"><input value="' + esc(c[f]) + '"></td>';
      }).join("") + '</tr>';
  });
  h += '</table>';
  el("#main").innerHTML = h;
  bindCells();
}

/* ================= INLINE DIRTY TRACKING + SAVE ALL ================= */
function bindCells(){
  document.querySelectorAll("[data-cell] input, [data-cell] textarea").forEach(function(inp){
    inp.addEventListener("input", function(){
      var td = inp.closest("[data-cell]");
      dirty[td.dataset.cell] = inp.value;
      td.classList.add("dirty");
      syncSavebar();
    });
  });
}
function syncSavebar(){
  var n = Object.keys(dirty).length;
  el("#savebarText").textContent = n + " unsaved change" + (n === 1 ? "" : "s");
  el("#savebar").classList.toggle("show", n > 0);
}
el("#sbDiscard").addEventListener("click", function(){ dirty = {}; syncSavebar(); renderView(); });
el("#sbSave").addEventListener("click", function(){
  var edits = Object.keys(dirty).map(function(k){
    var parts = k.split("|");
    var field = parts.pop();
    return { kind: parts[0], keys: parts.slice(1), field: field, value: dirty[k] };
  });
  var btn = el("#sbSave"); btn.disabled = true; setStatus("Saving " + edits.length + " change(s)\u2026");
  post({ action:"saveEdits", edits: edits })
  .then(function(j){
    setStatus(j.message || "Saved", "ok"); btn.disabled = false; dirty = {}; syncSavebar(); load();
  })
  .catch(function(e){ setStatus("Save failed: " + e.message, "err"); btn.disabled = false; });
});

/* ================= ROUTER ================= */
function renderView(){
  if (!DB) return;
  if (view === "centres") renderCentres();
  else if (view === "mrprices") renderMrPrices();
  else if (view === "texts") renderTexts();
  else if (view === "saleskit") renderSalesKit();
  else renderConfig();
}
load();
</script>
</body>
</html>

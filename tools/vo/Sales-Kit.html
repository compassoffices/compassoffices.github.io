<title>Compass Offices — Sales Kit Generator</title>

<style>
.vopl{
  --co-orange:#FF6600; --co-orange-dk:#E55A00; --co-orange-wash:#FFF3EB; --co-orange-tint:#FFD9BD;
  --co-ink:#1A1A1A; --co-text:#333; --co-text-2:#555; --co-muted:#888; --co-faint:#BBB;
  --co-line:#E5E5E5; --co-bg:#F5F5F5; --co-paper:#FFF; --co-radius:10px; --co-pill:999px;
  color:var(--co-ink);
  font-family:'Hanken Grotesk','Noto Sans TC','Noto Sans SC','Noto Sans JP',sans-serif;
  line-height:1.5; background:var(--co-bg); margin:0; min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.vopl *,.vopl *::before,.vopl *::after{box-sizing:border-box;}
.vopl-bar{position:sticky;top:0;z-index:50;background:var(--co-paper);border-bottom:1px solid var(--co-line);
  padding:12px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.vopl-bar-logo{height:26px;width:auto;display:block;}
.vopl-bar label{font-size:12px;font-weight:600;color:var(--co-text-2);}
.vopl-sel{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--co-line);border-radius:8px;background:var(--co-paper);cursor:pointer;}
.vopl-langs{display:flex;border:1px solid var(--co-line);border-radius:var(--co-pill);overflow:hidden;}
.vopl-lang{font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 13px;border:0;background:var(--co-paper);color:var(--co-text-2);cursor:pointer;}
.vopl-lang.on{background:var(--co-orange);color:#fff;}
.vopl-chk{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--co-text-2);cursor:pointer;}
.vopl-chk input{accent-color:#FF6600;cursor:pointer;}
.vopl-btn{font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:var(--co-pill);
  border:1px solid var(--co-line);background:var(--co-paper);color:var(--co-ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
.vopl-btn.primary{background:var(--co-orange);border-color:var(--co-orange);color:#fff;}
.vopl-btn.primary:hover{background:var(--co-orange-dk);border-color:var(--co-orange-dk);}
.vopl-btn:disabled{opacity:.45;cursor:not-allowed;}
.vopl-status{font-size:12px;color:var(--co-muted);margin-left:auto;max-width:340px;}
.vopl-status.err{color:#C0392B;} .vopl-status.ok{color:#2E7D32;}
.vopl-stage{padding:28px 12px 60px;display:flex;flex-direction:column;align-items:center;gap:24px;}
.vopl-page{width:794px;height:1123px;background:var(--co-paper);position:relative;box-shadow:0 4px 24px rgba(0,0,0,.10);
  padding:46px 48px 64px;display:flex;flex-direction:column;overflow:hidden;}
.vopl-phead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex:0 0 auto;}
.vopl-phead-logo{width:140px;height:auto;display:block;margin-top:6px;}
.vopl-ptitle{text-align:right;}
.vopl-ptitle .t1{font-size:40px;font-weight:800;color:var(--co-orange);line-height:1.05;letter-spacing:.5px;}
.vopl-ptitle .t2{font-size:26px;font-weight:300;color:var(--co-ink);line-height:1.15;letter-spacing:.5px;}
.vopl-pbody{flex:1 1 auto;overflow:hidden;}
.vopl-pfoot{position:absolute;left:48px;right:48px;bottom:28px;display:flex;justify-content:space-between;font-size:10px;color:var(--co-muted);}
.vopl-pfoot span{margin-right:18px;}
.vopl-empty{padding:60px 20px;text-align:center;color:var(--co-muted);font-size:14px;}

/* ---- Included / Additional sections ---- */
.sk-sec{margin-bottom:20px;}
.sk-sec .tt{font-size:19px;font-weight:700;color:var(--co-orange);margin-bottom:8px;}
.sk-flex{display:flex;gap:16px;align-items:flex-start;}
.sk-imgs{display:flex;gap:8px;flex:0 0 auto;}
.sk-img{width:138px;height:96px;border-radius:6px;object-fit:cover;background:var(--co-bg);display:block;}
.sk-img.ph{display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--co-faint);}
.sk-bullets{flex:1;min-width:0;}
.sk-b{display:flex;gap:10px;padding:6px 0;border-bottom:1px dotted var(--co-line);font-size:14px;color:var(--co-text);line-height:1.5;align-items:baseline;}
.sk-b .tx{flex:1;min-width:0;}
.sk-b:last-child{border-bottom:0;}
.sk-b::before{content:"\2022";color:var(--co-ink);flex:0 0 auto;}
.sk-b .note{flex:0 0 172px;font-weight:700;color:var(--co-orange);font-size:14px;text-align:right;padding-left:12px;}
.sk-catnote{flex:0 0 168px;text-align:right;font-weight:700;color:var(--co-orange);font-size:14.5px;padding-top:2px;}

/* ---- Locations: transit composition (MTR / JR) ---- */
.sk-tcanvas{position:relative;width:698px;height:915px;}
.sk-tcanvas > svg{position:absolute;inset:0;width:698px;height:915px;}
.sk-block{position:absolute;}
.sk-block .sk-loc .b{font-size:13.5px;}
.sk-block .sk-loc .l{font-size:11.5px;}
.sk-block .sk-loc .a{font-size:11px;}
.sk-block .dn{font-size:23px;font-weight:800;color:var(--co-ink);margin-bottom:9px;letter-spacing:.2px;}
.sk-loc{margin-bottom:13px;}
.sk-loc .b{font-size:14.5px;font-weight:700;color:var(--co-orange);line-height:1.3;}
.sk-loc .l{font-size:12.5px;font-weight:700;color:var(--co-orange);margin-top:1px;}
.sk-loc .a{font-size:12px;color:var(--co-muted);line-height:1.4;margin-top:1px;}
/* ---- Locations: geo (map-image) style ---- */
.sk-cityhead{font-size:24px;font-weight:700;color:var(--co-muted);border-bottom:1px solid var(--co-line);padding-bottom:5px;margin:6px 0 12px;}
.sk-geobox{position:relative;width:698px;height:428px;margin-bottom:6px;border-radius:16px;overflow:hidden;}
.sk-geobox.auto{height:476px;}
.sk-geobox .bg.auto{position:absolute;top:0;left:0;width:100%;height:auto;}
.sk-mapcredit{font-size:8.5px;color:var(--co-faint);text-align:right;margin:0 4px 14px 0;}
.sk-geobox .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
.sk-geobox .bg.ph{background:var(--co-bg);display:flex;align-items:center;justify-content:center;color:var(--co-faint);font-size:11px;}
.sk-geobox .ovl{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.sk-card{position:absolute;width:44%;background:rgba(255,255,255,.9);border-radius:8px;padding:9px 13px 5px;}
.sk-card .dn{font-size:20px;font-weight:800;color:var(--co-ink);margin-bottom:4px;}
.sk-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 20px;margin-bottom:14px;}
.sk-dist{break-inside:avoid;padding-top:10px;}
.sk-dist .dn{font-size:20px;font-weight:800;color:var(--co-ink);margin-bottom:7px;}

/* ---- Global Network ---- */
.sk-net{display:grid;grid-template-columns:1fr 1fr;gap:0 26px;}
.sk-net-sec{break-inside:avoid;margin-bottom:14px;}
.sk-net-h{font-size:18px;font-weight:800;color:var(--co-ink);background:var(--co-bg);padding:6px 12px;margin-bottom:8px;}
.sk-net-h.hl{color:var(--co-orange);background:var(--co-orange-wash);}
.sk-net-city{font-size:14.5px;font-weight:700;color:var(--co-ink);margin:8px 0 3px;}
.sk-net-line{font-size:12.5px;color:var(--co-text);padding:4px 0;border-bottom:1px dotted var(--co-line);line-height:1.45;}
.sk-net-blurb{font-size:13px;color:var(--co-text);margin:6px 0 8px;line-height:1.5;}
.sk-net-hq .b{font-size:14.5px;font-weight:700;color:var(--co-ink);}
.sk-net-hq .a{font-size:12.5px;color:var(--co-muted);}
.sk-net-grid{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--co-ink);}
.sk-net-grid .gh{font-size:13.5px;font-weight:800;padding:6px 4px 3px;border-bottom:1px solid var(--co-line);}
.sk-net-grid .gi{font-size:12.5px;color:var(--co-text);padding:3px 4px;border-bottom:1px dotted var(--co-line);}
@media (max-width:840px){.vopl-page{transform:scale(.44);transform-origin:top center;margin-bottom:-600px;}}
</style>
</head>

var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTBXPlBtYsiD_0oEThJ_pJzQOmeYNNWFezpC1z6ZIiA-p8VyqDqpdZExkG-51Lqxtf/exec";

/* ---------- boot ---------- */
var mktSel = document.getElementById("mkt");
mktSel.addEventListener("change", function(){ curMarket = mktSel.value; render(); });
var langsEl = document.getElementById("langs");
Object.keys(LANG_LABELS).forEach(function(k){
  var b = document.createElement("button");
  b.className = "vopl-lang"; b.textContent = LANG_LABELS[k]; b.dataset.lang = k;
  b.addEventListener("click", function(){ curLang = k; render(); });
  langsEl.appendChild(b);
});
["pgIncl","pgAdd","pgLoc","pgNet"].forEach(function(id){
  document.getElementById(id).addEventListener("change", render);
});
document.getElementById("btnRefresh").addEventListener("click", load);
document.getElementById("btnPdf").addEventListener("click", function(){ exportPdf(false); });
document.getElementById("btnDrive").addEventListener("click", function(){ exportPdf(true); });
function setStatus(m, c){ var s = document.getElementById("status"); s.textContent = m; s.className = "vopl-status" + (c ? " " + c : ""); }

function rowsToObjects(rows){
  if (!rows || !rows.length) return [];
  var head = rows[0].map(function(h){ return String(h || "").trim().toLowerCase().replace(/\s+/g, "_"); });
  var out = [];
  for (var r = 1; r < rows.length; r++){
    var o = {}, any = false;
    for (var c = 0; c < head.length; c++){
      var v = rows[r] ? rows[r][c] : "";
      if (v === undefined || v === null) v = "";
      if (typeof v === "string") v = v.trim();
      o[head[c]] = v; if (v !== "") any = true;
    }
    if (any) out.push(o);
  }
  return out;
}
function load(){
  setStatus("Loading\u2026");
  fetch(SCRIPT_URL + "?action=data")
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok) throw new Error(j.error || "backend error");
      function T(n){ return rowsToObjects(j.tabs[n] || []); }
      DB = { config:T("Config"), centres:T("Centres"),
             skIncluded:T("SK-Included"), skAdditional:T("SK-Additional"), skAddPrices:T("SK-AddPrices"),
             skMapNodes:T("SK-MapNodes"), skAssets:T("SK-Assets"), skText:T("SK-Text"),
             skMapPins:T("SK-MapPins") };
      var missing = ["skIncluded","skAdditional","skAddPrices","skMapNodes","skAssets","skText"]
        .filter(function(k){ return !DB[k].length; });
      mktSel.innerHTML = "";
      DB.config.forEach(function(c){ var o = document.createElement("option"); o.value = o.textContent = c.market; mktSel.appendChild(o); });
      mktSel.value = curMarket;
      setStatus(missing.length ? "Loaded, but SK tab(s) look empty: " + missing.join(", ") : "Loaded \u00B7 " + new Date().toLocaleTimeString(), missing.length ? "err" : "ok");
      render();
    })
    .catch(function(e){ setStatus("Load failed: " + e.message, "err"); });
}

/* ---------- lookups ---------- */
function conf(){ return DB.config.filter(function(c){ return c.market === curMarket; })[0] || {}; }
function L(row, f){
  var v = row[f + "_" + LK[curLang]];
  if (v === undefined || v === "") v = row[f + "_en"];
  return v === undefined ? "" : String(v);
}
function SKT(key){
  var r = DB.skText.filter(function(t){ return t.key === key; })[0];
  if (!r) return "";
  var v = r["text_" + LK[curLang]];
  return (v === undefined || v === "") ? String(r.text_en || "") : String(v);
}
function esc(s){ return String(s === undefined || s === null ? "" : s)
  .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>"); }
function marketCentres(m){
  return DB.centres.filter(function(c){ return c.market === m; })
    .sort(function(a, b){ return (Number(a.sort) || 0) - (Number(b.sort) || 0); });
}
function assetId(key){
  var r = DB.skAssets.filter(function(a){ return a.key === key; })[0];
  return r && r.drive_file_id ? String(r.drive_file_id).trim() : "";
}
function imgTag(key, cls){
  var id = assetId(key);
  if (!id) return '<div class="' + cls + ' ph">photo pending</div>';
  if (IMG[id] === undefined){
    IMG[id] = null;
    fetch(SCRIPT_URL + "?action=image&id=" + encodeURIComponent(id))
      .then(function(r){ return r.json(); })
      .then(function(j){ IMG[id] = j.ok ? j.dataUri : ""; render(); })
      .catch(function(){ IMG[id] = ""; render(); });
  }
  if (IMG[id]) return '<img class="' + cls + '" src="' + IMG[id] + '">';
  if (IMG[id] === null) return '<div class="' + cls + ' ph">loading\u2026</div>';
  return '<div class="' + cls + ' ph">image unavailable</div>';
}
function imagesPending(){
  return Object.keys(IMG).some(function(k){ return IMG[k] === null; }) ||
         Object.keys(GEO).some(function(k){ return GEO[k] === null; });
}

function addPaged(stage, t1, t2, itemsHtml){
  var page = newPage(t1, t2); stage.appendChild(page);
  var body = page.querySelector(".vopl-pbody");
  itemsHtml.forEach(function(h){
    var tp = document.createElement("template"); tp.innerHTML = h;
    var nodes = Array.prototype.slice.call(tp.content.childNodes);
    nodes.forEach(function(n){ body.appendChild(n); });
    if (body.scrollHeight > body.clientHeight + 1){
      nodes.forEach(function(n){ body.removeChild(n); });
      page = newPage(t1, t2); stage.appendChild(page);
      body = page.querySelector(".vopl-pbody");
      var tp2 = document.createElement("template"); tp2.innerHTML = h;
      Array.prototype.slice.call(tp2.content.childNodes).forEach(function(n){ body.appendChild(n); });
    }
  });
}

/* ---------- PAGE 1: Included ---------- */
function renderIncluded(stage){
  var cats = {};
  DB.skIncluded.forEach(function(r){ (cats[r.category] = cats[r.category] || []).push(r); });
  var items = Object.keys(cats).map(function(k){
    var rows = cats[k];
    var cat = rows.filter(function(r){ return r.row_type === "category"; })[0];
    var bullets = rows.filter(function(r){ return r.row_type === "bullet"; })
      .sort(function(a, b){ return (Number(a.sort)||0) - (Number(b.sort)||0); });
    if (!cat) return "";
    var h = '<div class="sk-sec"><div class="tt">' + esc(L(cat, "label")) + '</div><div class="sk-flex">';
    h += '<div class="sk-imgs">' + imgTag("included." + k + ".img1", "sk-img") + imgTag("included." + k + ".img2", "sk-img") + '</div>';
    h += '<div class="sk-bullets">' + bullets.map(function(b){
      return '<div class="sk-b"><span class="tx">' + esc(L(b, "label")) + '</span></div>'; }).join("") + '</div>';
    h += '</div></div>';
    return h;
  });
  addPaged(stage, SKT("title.included.line1") || "INCLUDED", SKT("title.included.line2") || "SERVICES", items);
}

/* ---------- PAGE 2: Additional ---------- */
function renderAdditional(stage){
  var cats = [];
  DB.skAdditional.forEach(function(r){ if (r.row_type === "category" && cats.indexOf(r.category) < 0) cats.push(r.category); });
  var items = cats.map(function(k){
    var cat = DB.skAdditional.filter(function(r){ return r.category === k && r.row_type === "category"; })[0];
    var mine = DB.skAdditional.filter(function(r){ return r.category === k && r.row_type === "bullet" && r.market === curMarket; });
    var bullets = (mine.length ? mine : DB.skAdditional.filter(function(r){ return r.category === k && r.row_type === "bullet" && r.market === "all"; }))
      .sort(function(a, b){ return (Number(a.sort)||0) - (Number(b.sort)||0); });
    var notes = DB.skAddPrices.filter(function(p){ return p.category === k && p.market === curMarket; });
    function noteFor(sort){
      var n = notes.filter(function(p){ return Number(p.bullet_sort) === sort; })[0];
      if (!n) return "";
      var v = n["note_" + LK[curLang]];
      return (v === undefined || v === "") ? String(n.note_en || "") : String(v);
    }
    var h = '<div class="sk-sec"><div class="tt">' + esc(L(cat, "label")) + '</div><div class="sk-flex">';
    h += '<div class="sk-imgs">' + imgTag("additional." + k, "sk-img") + '</div>';
    var hasNotes = notes.length > 0;
    h += '<div class="sk-bullets">' + bullets.map(function(b, i){
      var per = noteFor(Number(b.sort));
      if (!per && i === 0) per = noteFor(0);          // category-level note sits on the first row, far right
      return '<div class="sk-b"><span class="tx">' + esc(L(b, "label")) + '</span>' +
        (per ? '<span class="note">' + esc(per) + '</span>' :
         (hasNotes ? '<span class="note"></span>' : '')) + '</div>';
    }).join("") + '</div>';
    h += '</div></div>';
    return h;
  });
  addPaged(stage, SKT("title.additional.line1") || "ADDITIONAL", SKT("title.additional.line2") || "SERVICES", items);
}

/* ---------- PAGE 3: Locations ---------- */
function centreCards(market, groupByCity){
  var groups = {}, order = [];
  marketCentres(market).forEach(function(ct){
    var d = L(ct, "district"), city = "", dist = d;
    if (d.indexOf(" \u2014 ") > -1){ var sp = d.split(" \u2014 "); city = sp[0]; dist = sp.slice(1).join(" \u2014 "); }
    var key = groupByCity && city ? city : (dist || city || "");
    if (!groups[key]){ groups[key] = []; order.push(key); }
    groups[key].push(ct);
  });
  return { groups:groups, order:order };
}
function locCard(ct){
  return '<div class="sk-loc"><div class="b">' + esc(L(ct, "building")) + '</div>' +
    '<div class="l">' + esc(ct.levels) + '</div>' +
    '<div class="a">' + esc(L(ct, "address")) + '</div></div>';
}
function normd(x){ return String(x || "").toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g, ""); }
function centresForNodeDistrict(nodeDist){
  var nd = normd(nodeDist);
  return marketCentres(curMarket).filter(function(ct){
    var cd = normd(ct.district_en);
    return cd === nd || (nd && cd.slice(-nd.length) === nd) || (cd && nd.slice(-cd.length) === cd && cd);
  });
}
/* Interchange stations render as perpendicular capsules (MTR/JR visual grammar). */
var INTERCHANGE = { "central":1, "admiralty":1, "northpoint":1, "quarrybay":1, "mongkok":1, "yaumatei":1,
  "tokyo":1, "osaka":1, "shimbashi":1 };
function blockHtml(title, centres, style){
  return '<div class="sk-block" style="' + style + '"><div class="dn">' + esc(title) + '</div>' +
    centres.map(locCard).join("") + '</div>';
}
function renderTransit(stage, style){
  var nodes = DB.skMapNodes.filter(function(n){ return n.market === curMarket; })
    .sort(function(a, b){ return (Number(a.sort)||0) - (Number(b.sort)||0); });
  var t1 = COUNTRY[curMarket].toUpperCase();
  var page = newPage(t1, SKT("title.locations.line2") || "LOCATIONS");
  stage.appendChild(page);
  var body = page.querySelector(".vopl-pbody");
  if (!nodes.length){ body.innerHTML = '<div class="vopl-empty">No SK-MapNodes rows for ' + esc(curMarket) + '.</div>'; return; }

  var lines = [];
  nodes.forEach(function(n){ if (lines.indexOf(n.line) < 0) lines.push(n.line); });
  var main = nodes.filter(function(n){ return n.line === lines[0]; });
  var branch = lines[1] ? nodes.filter(function(n){ return n.line === lines[1]; }) : [];
  var W = 698, H = 915, mainY = 560;
  var padL = 102, padR = 44;
  var step = (W - padL - padR) / Math.max(main.length - 1, 1);
  main.forEach(function(n, i){ n._x = padL + step * i; });
  var mainCol = style === "jr" ? "#2E7D32" : "#1B5FA6";

  var svg = '';
  /* branch (red) line: vertical, elbow joining the main line */
  var bx = 0, joinX = 0;
  if (branch.length){
    var bi = Math.min(main.length - 2, Math.max(2, Math.round((main.length - 1) * 0.42)));
    bx = (main[bi]._x + main[bi + 1]._x) / 2;
    joinX = main[Math.max(bi - 1, 1)]._x + 10;
    var topY = 160, lastY = 430;
    branch.forEach(function(n, i){
      n._x = bx;
      n._y = topY + (lastY - topY) * (branch.length > 1 ? (branch.length - 1 - i) / (branch.length - 1) : 0);
    });
    svg += '<path d="M ' + bx + ' 116 L ' + bx + ' ' + (lastY + 24) +
      ' L ' + joinX + ' ' + (mainY - 7) +
      '" fill="none" stroke="#C0392B" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>';
  }
  /* main (blue/green) line */
  svg += '<rect x="' + (padL - 14) + '" y="' + (mainY - 6.5) + '" width="' + (W - padL - padR + 28) + '" height="13" rx="6.5" fill="' + mainCol + '"/>';

  function marker(x, y, active, vertical, lineCol){
    var stroke = "#1A1A1A";
    if (INTERCHANGE[normd(arguments[5])]){
      var w = vertical ? 17 : 34, h = vertical ? 34 : 17;
      return '<rect x="' + (x - w/2) + '" y="' + (y - h/2) + '" width="' + w + '" height="' + h + '" rx="' + Math.min(w,h)/2 + '" fill="#fff" stroke="' + stroke + '" stroke-width="4"/>';
    }
    return '<circle cx="' + x + '" cy="' + y + '" r="8" fill="#fff" stroke="' + stroke + '" stroke-width="4"/>';
  }
  branch.forEach(function(n){
    var act = String(n.active).indexOf("\u2713") > -1;
    svg += marker(n._x, n._y, act, false, "#C0392B", n.label_en);
    svg += '<text x="' + (n._x + 22) + '" y="' + (n._y + 5.5) + '" font-size="14.5" font-weight="' + (act ? "800" : "600") + '" fill="' + (act ? "#1A1A1A" : "#BBBBBB") + '" font-family="Hanken Grotesk, Noto Sans TC, Noto Sans JP, sans-serif">' + esc(L(n, "label")) + '</text>';
  });
  main.forEach(function(n){
    var act = String(n.active).indexOf("\u2713") > -1;
    if (style === "jr"){
      svg += '<rect x="' + (n._x - 13) + '" y="' + (mainY - 17) + '" width="26" height="34" rx="5" fill="#fff" stroke="' + (act ? "#1A1A1A" : mainCol) + '" stroke-width="3"/>';
      var code = String(n.station_code || "");
      svg += '<text x="' + n._x + '" y="' + (mainY - 3) + '" font-size="8.5" text-anchor="middle" font-weight="800" fill="' + (act ? "#1A1A1A" : "#888") + '" font-family="Hanken Grotesk, sans-serif">' + esc(code.slice(0,2)) + '</text>';
      svg += '<text x="' + n._x + '" y="' + (mainY + 9) + '" font-size="9.5" text-anchor="middle" font-weight="800" fill="' + (act ? "#1A1A1A" : "#888") + '" font-family="Hanken Grotesk, sans-serif">' + esc(code.slice(2)) + '</text>';
    } else {
      svg += marker(n._x, mainY, act, true, mainCol, n.label_en);
    }
    svg += '<text x="' + (n._x - 7) + '" y="' + (mainY + 42) + '" font-size="16" font-weight="' + (act ? "800" : "600") + '" fill="' + (act ? "#1A1A1A" : "#BBBBBB") + '" transform="rotate(-45 ' + (n._x - 7) + ' ' + (mainY + 42) + ')" text-anchor="end" font-family="Hanken Grotesk, Noto Sans TC, Noto Sans JP, sans-serif">' + esc(L(n, "label")) + '</text>';
  });

  /* ---- info blocks around the diagram ---- */
  var blocks = "";
  var conn = "";     // light grey connector lines
  /* Elbow built backwards from the endpoint: vertical stub from the start,
     then a diagonal locked to 45\u00B0 \u2014 parallel to the rotated station labels,
     so it threads the gaps between them instead of crossing text. */
  /* Four-point connector: vertical stub -> 45\u00B0 diagonal (parallel to the rotated
     labels, running in the corridor between them) -> short vertical approach.
     Built backwards from the endpoint so the diagonal angle is exact and the
     line never crosses label text. */
  function connect(sx, sy, ex, ey, my){
    var k = my + (sy > my ? 1 : -1) * Math.abs(ex - sx);
    if ((sy > my && (k > sy || k < my)) || (sy < my && (k < sy || k > my))) k = (sy + my) / 2;
    conn += '<path d="M ' + sx + ' ' + sy + ' L ' + sx + ' ' + k + ' L ' + ex + ' ' + my + ' L ' + ex + ' ' + ey +
      '" fill="none" stroke="#ECECEC" stroke-width="1.3" stroke-linejoin="round"/>';
  }
  var seen = {}, mainDist = [];
  main.forEach(function(n){
    if (String(n.active).indexOf("\u2713") < 0 || !n.district_en) return;
    if (seen[n.district_en]) return;
    seen[n.district_en] = 1;
    mainDist.push(n);
  });
  var branchDist = [];
  branch.forEach(function(n){
    if (String(n.active).indexOf("\u2713") < 0 || !n.district_en || seen[n.district_en]) return;
    seen[n.district_en] = 1;
    branchDist.push(n);
  });
  /* top-left block: leftmost main district */
  var bottom = mainDist.slice();
  if (mainDist.length > 3){
    var tl = bottom.shift();
    blocks += blockHtml(L(tl, "label") ? shortDist(tl) : "", centresForNodeDistrict(tl.district_en),
      "left:96px;top:126px;width:250px;");
    connect(112, 126 + 186, tl._x, mainY - 13, mainY - 27);
  }
  /* top-right block: branch district (or rightmost main) */
  var tr = branchDist[0] || (bottom.length > 4 ? bottom.pop() : null);
  if (tr){
    blocks += blockHtml(shortDist(tr), centresForNodeDistrict(tr.district_en),
      "left:538px;top:126px;width:158px;");
    var trX = (tr._x !== undefined ? tr._x : 600), trY = (tr._y !== undefined ? tr._y : mainY);
    connect(534, 168, trX + 96, trY + 30, trY + 54);
  }
  /* bottom row */
  var n = Math.max(bottom.length, 1);
  var colW = Math.min(178, (W - 8) / n - 10);
  bottom.forEach(function(nd, i){
    var left = 4 + i * ((W - 8) / n);
    blocks += blockHtml(shortDist(nd), centresForNodeDistrict(nd.district_en),
      "left:" + left + "px;top:678px;width:" + colW + "px;");
    var bex = nd._x - 22, bsx = left + 56;
    if (Math.abs(bex - bsx) > 78) bsx = bex + (bsx > bex ? 78 : -78);   // keep the 45\u00B0 diagonal inside the stub zone
    connect(bsx, 674, bex, mainY + 16, mainY + 30);
  });

  body.innerHTML = '<div class="sk-tcanvas">' +
    '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' + conn + svg + '</svg>' +
    blocks + '</div>';
}
function shortDist(node){
  // Block headings use the STATION name (e.g. "Fortress Hill" for AIA Tower),
  // matching the designed page — not the centre's district.
  var d = L(node, "label") || node.district_en || "";
  return String(d).split(" \u2014 ").pop();
}

/* ---- geo (map-image) style ---- */
function geoWard(ct){
  var d = L(ct, "district");
  return d.indexOf(" \u2014 ") > -1 ? d.split(" \u2014 ").slice(1).join(" \u2014 ") : "";
}
function geoHeading(ct){
  return geoWard(ct) || L(ct, "building");        // JP: ward; AU/others: building name
}
function geoCard(ct){
  var a = L(ct, "address");
  var orange = geoWard(ct) ? L(ct, "building") : a.split(",")[0];   // ward cards show the building; else the street
  return '<div class="sk-loc"><div class="b">' + esc(orange) + '</div>' +
    '<div class="l">' + esc(ct.levels) + '</div>' +
    '<div class="a">' + esc(a) + '</div></div>';
}
function titleCase(s2){
  return String(s2).toLowerCase().replace(/(^|\s|-)([a-z\u00e0-\u024f])/g, function(m){ return m.toUpperCase(); });
}
function geoAuto(city){
  var key = curMarket + "|" + city;
  if (GEO[key] === undefined){
    if (typeof fetch === "undefined" || !SCRIPT_URL){ GEO[key] = false; return GEO[key]; }
    GEO[key] = null;
    fetch(SCRIPT_URL + "?action=staticmap&market=" + encodeURIComponent(curMarket) + "&city=" + encodeURIComponent(city))
      .then(function(r){ return r.json(); })
      .then(function(j){
        if (!j.ok){ GEO[key] = false; render(); return; }
        monoize(j.dataUri, function(m){ j.dataUri = m; GEO[key] = j; render(); });
      })
      .catch(function(){ GEO[key] = false; render(); });
  }
  return GEO[key];
}
function monoize(dataUri, cb){   // monotone map: grayscale wash baked into the pixels (PDF-safe)
  try{
    var img = new Image();
    img.onload = function(){
      try{
        var c = document.createElement("canvas");
        c.width = img.width; c.height = img.height;
        var x = c.getContext("2d");
        x.filter = "grayscale(1) brightness(1.06) contrast(0.92)";
        x.drawImage(img, 0, 0);
        cb(c.toDataURL("image/png"));
      }catch(e){ cb(dataUri); }
    };
    img.onerror = function(){ cb(dataUri); };
    img.src = dataUri;
  }catch(e){ cb(dataUri); }
}
function pinsFor(city, cityCentres){
  var ids = {};
  cityCentres.forEach(function(ct){ ids[ct.id] = ct; });
  var manual = DB.skMapPins.filter(function(p){
    return p.market === curMarket && ids[p.centre_id] && p.x_pct !== "" && p.y_pct !== "";
  }).map(function(p){
    return { ct: ids[p.centre_id], x: Number(p.x_pct), y: Number(p.y_pct) };
  });
  if (manual.length) return manual;                      // designer override wins
  var auto = geoAuto(city);
  if (auto && auto.pins) return auto.pins.filter(function(p){ return ids[p.centre_id]; })
    .map(function(p){ return { ct: ids[p.centre_id], x: Number(p.x_pct), y: Number(p.y_pct) }; });
  return [];
}
function geoCityHtml(displayCity, cityCentres, rawKey){
  var city = rawKey === undefined ? displayCity : rawKey;
  var pins = pinsFor(city, cityCentres);
  var bgKey1 = "map." + curMarket + "." + city, bgKey2 = "map." + curMarket;
  var isAuto = !assetId(bgKey1) && !assetId(bgKey2);
  /* auto maps: box shows the top 436 of the 472px-tall source (640-wide), so the
     bottom strip with Google's attribution falls outside; 698*436/640 = 476 */
  var W = 698, H = isAuto ? 476 : 428;
  var h = '<div class="sk-cityhead">' + esc(/^[A-Z\s]+$/.test(displayCity) ? titleCase(displayCity) : displayCity) + '</div>';
  h += '<div class="sk-geobox' + (isAuto ? " auto" : "") + '">';
  if (!isAuto) h += imgTag(assetId(bgKey1) ? bgKey1 : bgKey2, "bg");
  else {
    var auto = geoAuto(city);
    if (auto && auto.dataUri) h += '<img class="bg auto" src="' + auto.dataUri + '">';
    else if (auto === null) h += '<div class="bg ph">building map from Google\u2026</div>';
    else h += '<div class="bg ph">map unavailable \u2014 add an image in SK-Assets</div>';
  }
  var ovl = "", cards = "";
  var slotsL = [4, 40, 68], slotsR = [4, 40, 68], usedL = 0, usedR = 0;
  pins.sort(function(a, b){ return a.y - b.y; });
  pins.forEach(function(p){
    var side = p.x < 50 ? "L" : "R";
    var slot;
    if (side === "L" && usedL < 3) slot = slotsL[usedL++];
    else if (usedR < 3){ side = "R"; slot = slotsR[usedR++]; }
    else { side = "L"; slot = slotsL[Math.min(usedL++, 2)]; }
    var cardLeft = side === "L" ? 3 : 51;    /* % */
    cards += '<div class="sk-card" style="left:' + cardLeft + '%;top:' + slot + '%;">' +
      '<div class="dn">' + esc(geoHeading(p.ct)) + '</div>' + geoCard(p.ct) + '</div>';
    /* pixel coordinates (uniform scale, undistorted shapes) */
    var px = p.x / 100 * W, py = p.y / 100 * H;
    var axp = (side === "L" ? cardLeft + 43 : cardLeft) / 100 * W;
    var ayp = (slot + 9) / 100 * H;
    /* connector: dot at the card edge, one bend, ending just above the pin head */
    var route;
    if (Math.abs(py - ayp) > 46)
      route = 'M ' + axp + ' ' + ayp + ' L ' + axp + ' ' + (py - 58) + ' L ' + px + ' ' + (py - 58) + ' L ' + px + ' ' + (py - 46);
    else
      route = 'M ' + axp + ' ' + ayp + ' L ' + px + ' ' + ayp + ' L ' + px + ' ' + (py - 46);
    ovl += '<path d="' + route + '" fill="none" stroke="#FF6600" stroke-width="1.5" stroke-linejoin="round"/>';
    ovl += '<circle cx="' + axp + '" cy="' + ayp + '" r="3" fill="#FF6600"/>';
    /* teardrop pin, tip exactly on the location */
    ovl += '<g transform="translate(' + px + ',' + py + ')">' +
      '<path d="M0 0 C-6.5 -11 -14.5 -15.5 -14.5 -25.5 A14.5 14.5 0 1 1 14.5 -25.5 C14.5 -15.5 6.5 -11 0 0 Z" fill="#FF6600"/>' +
      '<circle cx="0" cy="-25.5" r="5.4" fill="#FFFFFF"/></g>';
  });
  if (pins.length)
    h += '<svg class="ovl" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' + ovl + '</svg>';
  h += cards + '</div>';
  if (isAuto) h += '<div class="sk-mapcredit">Map data \u00A9Google</div>';
  /* centres without a pin: cards grid below the map */
  var pinned = {};
  pins.forEach(function(p){ pinned[p.ct.id] = 1; });
  var rest = cityCentres.filter(function(ct){ return !pinned[ct.id]; });
  if (rest.length){
    h += '<div class="sk-cards">' + rest.map(function(ct){
      return '<div class="sk-dist"><div class="dn">' + esc(geoHeading(ct)) + '</div>' + geoCard(ct) + '</div>';
    }).join("") + '</div>';
  }
  return h;
}
function cityKey(d){
  d = String(d || "");
  if (d.indexOf(" \u2014 ") > -1) return d.split(" \u2014 ")[0];
  if (/^[A-Z][A-Z\s]+$/.test(d.trim())) return d.trim();   // all-caps district = city header (e.g. SYDNEY)
  return "";                                                 // plain district -> one market-wide map
}
function renderLocations(stage){
  // Data decides the style: SK-MapNodes rows -> transit diagram
  // (JR badges when station codes are filled, MTR otherwise); no rows -> geo maps.
  var forced = String(SKT("map.style") || "").toLowerCase();
  var nodes = DB.skMapNodes.filter(function(n){ return n.market === curMarket; });
  if (nodes.length && forced !== "geo"){
    var style = nodes.some(function(n){ return String(n.station_code || "").trim() !== ""; }) ? "jr" : "mtr";
    renderTransit(stage, style); return;
  }
  var t1 = COUNTRY[curMarket].toUpperCase();
  var groups = {}, order = [];
  marketCentres(curMarket).forEach(function(ct){
    var k = cityKey(L(ct, "district"));
    if (!groups[k]){ groups[k] = []; order.push(k); }
    groups[k].push(ct);
  });
  var items = order.map(function(k){
    return geoCityHtml(k || COUNTRY[curMarket], groups[k], k);
  });
  addPaged(stage, t1, SKT("title.locations.line2") || "LOCATIONS", items);
}

/* ---------- PAGE 4: Global Network ---------- */
function netLine(ct){
  var lv = String(ct.levels || ""), b = L(ct, "building"), a = L(ct, "address");
  var line;
  if (a && b && a.toLowerCase().indexOf(b.toLowerCase()) === 0) line = [lv, a];
  else line = [lv, b, a];
  return line.filter(String).join(", ");
}
function renderNetwork(stage){
  var order = ["Hong Kong","Japan","Australia","Philippines","Malaysia","Vietnam","Singapore"];
  var byCountry = {};
  DB.config.forEach(function(cf){
    var country = COUNTRY[cf.market] || cf.market;
    (byCountry[country] = byCountry[country] || []).push(cf.market);
  });
  var secs = [];
  // Hong Kong featured
  var hkC = marketCentres("Hong Kong");
  var hq = hkC.filter(function(x){ return x.id === "hk-wing-on-centre"; })[0] || hkC[0];
  var h = '<div class="sk-net-sec"><div class="sk-net-h hl">Hong Kong</div>';
  if (hq) h += '<div class="sk-net-hq"><div class="b">' + esc(String(hq.levels)) + ', ' + esc(L(hq, "building")) + '</div>' +
    '<div class="a">' + esc(L(hq, "address")) + '</div></div>';
  var blurb = SKT("network.hk.blurb");
  if (blurb) h += '<div class="sk-net-blurb">' + esc(blurb) + '</div>';
  var dists = {}, dOrder = [];
  hkC.forEach(function(ct){
    var d = L(ct, "district");
    if (!dists[d]){ dists[d] = []; dOrder.push(d); }
    dists[d].push(L(ct, "building"));
  });
  h += '<div class="sk-net-grid">';
  dOrder.forEach(function(d){
    h += '<div><div class="gh">' + esc(d) + '</div>' +
      dists[d].map(function(b){ return '<div class="gi">' + esc(b) + '</div>'; }).join("") + '</div>';
  });
  h += '</div></div>';
  secs.push(h);
  order.slice(1).forEach(function(country){
    var mkts = byCountry[country];
    if (!mkts) return;
    var s = '<div class="sk-net-sec"><div class="sk-net-h">' + esc(country) + '</div>';
    mkts.forEach(function(m){
      var byCity = centreCards(m, true);
      byCity.order.forEach(function(city){
        s += '<div class="sk-net-city">' + esc(city || m) + '</div>';
        byCity.groups[city].forEach(function(ct){
          s += '<div class="sk-net-line">' + esc(netLine(ct)) + '</div>';
        });
      });
    });
    s += '</div>';
    secs.push(s);
  });
  var page = newPage(SKT("title.network.line1") || "GLOBAL", SKT("title.network.line2") || "NETWORK");
  stage.appendChild(page);
  var left = [], right = [];
  secs.forEach(function(s, i){ (i % 2 === 0 ? left : right).push(s); });
  page.querySelector(".vopl-pbody").innerHTML =
    '<div class="sk-net"><div>' + left.join("") + '</div><div>' + right.join("") + '</div></div>';
}

/* ---------- render + export ---------- */
function render(){
  langsEl.querySelectorAll(".vopl-lang").forEach(function(b){
    b.classList.toggle("on", b.dataset.lang === curLang);
  });
  var stage = document.getElementById("stage");
  stage.innerHTML = "";
  if (!DB){ stage.innerHTML = '<div class="vopl-empty">No data.</div>'; return; }
  if (document.getElementById("pgIncl").checked) renderIncluded(stage);
  if (document.getElementById("pgAdd").checked) renderAdditional(stage);
  if (document.getElementById("pgLoc").checked) renderLocations(stage);
  if (document.getElementById("pgNet").checked) renderNetwork(stage);
  if (!stage.children.length) stage.innerHTML = '<div class="vopl-empty">No pages selected.</div>';
}
function pdfFilename(){ return curMarket.replace(/\s+/g, "") + "-SalesKit-" + curLang + ".pdf"; }
function exportPdf(toDrive){
  if (imagesPending()){ setStatus("Photos still loading \u2014 try again in a moment.", "err"); return; }
  var pages = document.querySelectorAll(".vopl-page");
  if (!pages.length){ setStatus("Nothing to export.", "err"); return; }
  setStatus("Rendering PDF\u2026");
  document.getElementById("btnPdf").disabled = true;
  document.getElementById("btnDrive").disabled = true;
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ unit:"pt", format:"a4", orientation:"portrait" });
  var idx = 0;
  function next(){
    if (idx >= pages.length){ finish(); return; }
    html2canvas(pages[idx], { scale:2.2, useCORS:true, backgroundColor:"#FFFFFF", logging:false })
      .then(function(cv){
        if (idx > 0) doc.addPage();
        doc.addImage(cv.toDataURL("image/jpeg", 0.95), "JPEG", 0, 0, 595.28, 841.89);
        idx++; next();
      })
      .catch(function(err){ setStatus("Capture failed: " + err.message, "err"); unlock(); });
  }
  function finish(){
    var name = pdfFilename();
    if (!toDrive){ doc.save(name); setStatus("Downloaded " + name, "ok"); unlock(); return; }
    setStatus("Uploading to Drive\u2026");
    fetch(SCRIPT_URL, { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify({ action:"savePdf", filename:name, pdfBase64: doc.output("datauristring").split(",")[1] }) })
    .then(function(r){ return r.json(); })
    .then(function(j){ if (!j.ok) throw new Error(j.error || "backend error");
      setStatus("Saved to Drive: " + name, "ok"); unlock(); })
    .catch(function(err){ setStatus("Drive save failed: " + err.message, "err"); unlock(); });
  }
  function unlock(){
    document.getElementById("btnPdf").disabled = false;
    document.getElementById("btnDrive").disabled = false;
  }
  next();
}
load();
</script>

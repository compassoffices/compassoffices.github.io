<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office Icons - Offline Gallery</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #222; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 40px auto;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .card:hover { transform: scale(1.05); }
    .icon { width: 90px; height: 90px; margin: 10px auto; }
    .name { font-size: 14px; color: #333; margin: 8px 0; word-break: break-all; }
    button {
      padding: 8px 14px;
      font-size: 13px;
      background: #ff6600;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #e55a00; }
  </style>
</head>
<body>
  <h1>Office Icons Gallery (Offline)</h1>
  <div class="grid" id="grid"></div>

  <script>
    // Paste the entire icons.json content here as a JS object
    const data = { /* ← PASTE THE FULL JSON CONTENT HERE */ };

    const grid = document.getElementById('grid');

    data.icons.forEach(icon => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <div class="icon">${icon.svg}</div>
        <div class="name">${icon.name}</div>
        <button onclick="copyToClipboard('${icon.name}')">Copy SVG</button>
      `;
      grid.appendChild(div);
    });

    function copyToClipboard(name) {
      const icon = data.icons.find(i => i.name === name);
      if (icon) {
        navigator.clipboard.writeText(icon.svg).then(() => {
          alert(`✅ ${name}.svg copied to clipboard!`);
        });
      }
    }
  </script>
</body>
</html>

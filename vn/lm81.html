<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Company Information</title>
  <link href="https://fonts.cdnfonts.com/css/neue-haas-grotesk-display-pro" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700&family=Noto+Sans:wght@400;700&display=sans-serif" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Neue Haas Grotesk Display Pro', 'Source Sans Pro', 'Noto Sans', sans-serif;
      background-color: #282828;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      background-color: #282828;
      color: white;
    }

    .header {
      height: 10%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3.7037%;
      font-size: 2.8vw;
      font-weight: bold;
      text-transform: capitalize;
      letter-spacing: 0.1852vw;
      background-color: #282828;
      z-index: 3;
    }

    .logo-container {
      width: 18.5185%;
      height: 100%;
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .headline {
      text-align: right;
    }

    .content {
      flex-grow: 1;
      padding: 0 3.7037%;
      padding-bottom: 5.2083vh; /* Adjusted since banner is removed */
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .slideshow {
      width: 100%;
      height: 100%;
    }

    .page {
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
    }

    .page.active {
      display: flex;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 2.2vw;
      padding: 8px 0;
      border-bottom: 1px solid #ffffff33;
      text-transform: capitalize;
      letter-spacing: 0.1389vw;
      opacity: 0;
      overflow: hidden;
      flex-shrink: 0;
    }

    .row:last-child {
      border-bottom: none;
    }

    .company-name {
      flex: 1;
      margin-right: 4%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: normal;
      word-wrap: break-word;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .tax-label {
      font-size: 1.6vw;
      color: #808080;
    }

    .tax-code {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    @keyframes splitFlap {
      0% {
        opacity: 1;
        transform: perspective(46.2963vw) rotateX(0deg);
      }
      45% {
        opacity: 0;
        transform: perspective(46.2963vw) rotateX(-90deg);
      }
      50% {
        opacity: 0;
        transform: perspective(46.2963vw) rotateX(90deg);
      }
      100% {
        opacity: 1;
        transform: perspective(46.2963vw) rotateX(0deg);
      }
    }

    .animate {
      animation: splitFlap 0.8s ease-in-out forwards;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    .footer {
      background-color: #ff6600;
      height: 5.2083vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 3.7037%;
      font-size: 1.8vw;
    }

    .footer .left-container,
    .footer .center-container,
    .footer .social-container {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .footer .center-container {
      justify-content: flex-start;
      margin-left: 0.3vw;
    }

    .footer .social-container {
      justify-content: flex-end;
      gap: 2vw;
      margin-right: 5vw;
    }

    .footer .social-container img {
      height: 50px;
      width: 50px;
      object-fit: contain;
    }

    .footer .social-container span {
      font-size: 1.5vw;
      text-align: left;
    }

    .page-number {
      font-size: 1.5vw;
    }

    .timeline-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 6px;
      background-color: #ffffff;
      width: 0%;
      animation: loadProgress 15s linear infinite;
      z-index: 1;
    }

    @keyframes loadProgress {
      from { width: 0%; }
      to { width: 100%; }
    }

    @media screen and (max-width: 1080px) and (max-height: 1920px) {
      .header { font-size: 3.3vw; }
      .row { font-size: 2.4vw; }
      .tax-label { font-size: 1.9vw; }
      .footer { font-size: 2vw; }
      .footer .social-container span { font-size: 1.7vw; }
      .page-number { font-size: 1.7vw; }
    }

    @media screen and (orientation: portrait) {
      .content { padding-bottom: 6vh; }
      .row { font-size: 2.5vw; }
      .tax-label { font-size: 1.8vw; }
    }
  </style>
</head>
<body onload="openFullscreen()">
  <div class="container">
    <div class="header">
      <div class="logo-container">
        <img src="https://compassoffices.github.io/img/logo/compassoffices-logo-web-2025_ow.png" alt="Company Logo" />
      </div>
      <div class="headline">Company Information</div>
    </div>

    <div class="content" id="contentArea">
      <div class="slideshow" id="slideshow"></div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="footer">
        <div class="left-container">
          <span>Compass Offices | LM81</span>
        </div>
        <div class="center-container">
          <span class="page-number" id="pageCounter">Page 1/1</span>
        </div>
        <div class="social-container">
          <img src="https://compassoffices.github.io/img/linktr-ee-compassoffices.svg" alt="QR Code" />
          <span>Follow us on <br> social media <br> for more updates</span>
        </div>
        <div class="timeline-bar"></div>
      </div>
    </div>
  </div>

  <script>
    function openFullscreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }

    // Live data source: a Google Sheet published to the web as CSV
    // (in Sheets: File -> Share -> Publish to web -> Entire document -> CSV).
    // Column A = company name, Column B = tax code. First row is treated as a header.
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_tCRUkoIcOJYk2FSpSmYy8T4jdzANAJkSKnJfO0q74T7cYHtv3ccoQsGYG1ETcdRZO7Mo0WSRGyOe/pub?output=csv";

    // Proper CSV parser: handles quoted fields, escaped quotes (""), commas
    // inside quotes, and the \r\n line endings Google Sheets serves.
    function parseCSV(text) {
      const rows = [];
      let field = "", row = [], inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') { field += '"'; i++; }
            else inQuotes = false;
          } else { field += c; }
        } else if (c === '"') {
          inQuotes = true;
        } else if (c === ",") {
          row.push(field); field = "";
        } else if (c === "\n" || c === "\r") {
          if (c === "\r" && text[i + 1] === "\n") i++;
          row.push(field); rows.push(row); field = ""; row = [];
        } else {
          field += c;
        }
      }
      if (field.length || row.length) { row.push(field); rows.push(row); }
      return rows;
    }

    async function fetchSheetData() {
      try {
        // Cache-buster so a reloaded board picks up the latest sheet edits.
        const response = await fetch(SHEET_CSV_URL + "&_cb=" + Date.now());
        const data = await response.text();
        const rows = parseCSV(data).slice(1); // drop the header row
        return rows
          .map(cols => ({
            company: (cols[0] || "").trim(),
            tax: (cols[1] || "").trim()
          }))
          .filter(entry => entry.company);
      } catch (error) {
        console.error("Error fetching sheet data:", error);
        return [];
      }
    }

    function makeRow(entry) {
      const row = document.createElement("div");
      row.className = "row";
      const name = document.createElement("span");
      name.className = "company-name";
      name.textContent = entry.company || "N/A";
      const tax = document.createElement("span");
      tax.className = "tax-code";
      const label = document.createElement("span");
      label.className = "tax-label";
      label.textContent = "Tax: ";
      tax.appendChild(label);
      tax.appendChild(document.createTextNode(entry.tax || "N/A"));
      row.appendChild(name);
      row.appendChild(tax);
      return row;
    }

    // Group entries into pages by MEASURING real row heights against the true
    // usable height (content box minus the footer padding). This fills the
    // screen and never overflows, whether names are one or two lines.
    function paginate(data) {
      const content = document.getElementById("contentArea");
      const cs = getComputedStyle(content);
      const available = content.clientHeight
        - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);

      // Hidden gauge styled like a real page but with natural (auto) height.
      const gauge = document.createElement("div");
      gauge.className = "page";
      gauge.style.cssText = "display:flex;flex-direction:column;height:auto;visibility:hidden;position:absolute;top:0;left:-99999px;";
      gauge.style.width = (content.clientWidth
        - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight)) + "px";
      content.appendChild(gauge);

      const groups = [];
      let current = [];
      for (const entry of data) {
        const row = makeRow(entry);
        gauge.appendChild(row);
        if (current.length > 0 && gauge.offsetHeight > available) {
          gauge.removeChild(row);
          groups.push(current);
          current = [];
          gauge.innerHTML = "";
          gauge.appendChild(row);
        }
        current.push(entry);
      }
      if (current.length) groups.push(current);
      content.removeChild(gauge);
      return groups;
    }

    // ---- Display config (safe to tweak) ----
    const SLIDE_MS   = 15000;          // time each page stays on screen
    const REFRESH_MS = 5 * 60 * 1000;  // re-pull the Google Sheet every 5 minutes
    const RETRY_MS   = 30000;          // if a load fails, retry after 30 seconds

    let slideshowData = [];
    let pages = [];
    let currentPage = 0;
    let slideshowInterval;
    let refreshInterval;
    let lastDataKey = "";

    const slideshow = document.getElementById("slideshow");
    const pageCounter = document.getElementById("pageCounter");

    function restartTimeline() {
      const bar = document.querySelector(".timeline-bar");
      if (!bar) return;
      bar.style.animation = "none";
      bar.offsetHeight; // force reflow so the animation restarts
      bar.style.animation = "loadProgress " + SLIDE_MS + "ms linear infinite";
    }

    function buildPages() {
      const groups = paginate(slideshowData);
      pages = groups.map(group => {
        const page = document.createElement("div");
        page.className = "page";
        group.forEach(entry => page.appendChild(makeRow(entry)));
        return page;
      });
      slideshow.innerHTML = "";
      pages.forEach(page => slideshow.appendChild(page));
      if (currentPage >= pages.length) currentPage = 0;
      if (pages.length) showPage(currentPage);
      restartTimeline();
    }

    function startSlideshow() {
      clearInterval(slideshowInterval);
      slideshowInterval = setInterval(() => {
        if (!pages.length) return;
        currentPage = (currentPage + 1) % pages.length;
        showPage(currentPage);
        restartTimeline();
      }, SLIDE_MS);
    }

    // Fetch the sheet. On success, only rebuild if the data actually changed
    // (so a routine refresh never interrupts the current slide). On failure,
    // keep showing the last good data; on a failed FIRST load, retry quietly.
    async function loadData(isRefresh) {
      const data = await fetchSheetData();
      if (data.length) {
        const key = JSON.stringify(data);
        if (key !== lastDataKey) {
          lastDataKey = key;
          slideshowData = data;
          buildPages();
        }
        return;
      }
      if (!isRefresh && !slideshowData.length) {
        slideshow.innerHTML = '<div style="color:#ff6600; font-size:2vw; padding-top:2vw;">Loading data\u2026</div>';
        setTimeout(() => loadData(false), RETRY_MS);
      }
    }

    function showPage(index) {
      pages.forEach(p => p.classList.remove("active"));
      const current = pages[index];
      current.classList.add("active");
      const rows = current.querySelectorAll(".row");
      rows.forEach((row, i) => {
        row.className = "row";
        setTimeout(() => {
          row.classList.add("animate");
        }, i * 100);
      });
      pageCounter.textContent = "Page " + (index + 1) + "/" + pages.length;
    }

    async function init() {
      await loadData(false);
      startSlideshow();
      clearInterval(refreshInterval);
      refreshInterval = setInterval(() => loadData(true), REFRESH_MS);
    }

    document.addEventListener("DOMContentLoaded", () => {
      init();
      let resizeTimeout;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          if (slideshowData.length) buildPages();
        }, 300);
      });
    });
  </script>
</body>
</html>
